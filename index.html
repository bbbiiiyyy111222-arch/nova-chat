<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>[SEAL CLICKER] No emoji</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #1e6b3e; font-family: 'Segoe UI', system-ui; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .game-card { max-width: 950px; width: 100%; background: #fffef5; border-radius: 60px; padding: 25px; box-shadow: 0 20px 30px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #1c6948; margin-bottom: 20px; }
        .nick-panel { background: #e9f3ed; border-radius: 60px; padding: 15px; display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nick-input, .pass-input { flex: 2; padding: 10px; border-radius: 50px; border: 1px solid #ffc896; text-align: center; font-weight: bold; }
        button { background: #ffb347; border: none; padding: 8px 18px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.05s linear; }
        button:active { transform: scale(0.97); }
        .seal-area { text-align: center; cursor: pointer; margin: 20px 0; }
        .seal-emoji { font-size: 8rem; display: inline-block; transition: 0.07s; }
        .click-effect { transform: scale(0.9); }
        .avatar-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #ddd; border: 2px solid #ffb347; }
        .fish-counter { background: #2a5c48; color: #FFE5B4; font-size: 2rem; font-weight: bold; text-align: center; padding: 12px; border-radius: 60px; margin: 15px 0; }
        .stat-grid { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
        .stat { background: #e3f0ea; flex: 1; border-radius: 40px; padding: 8px; text-align: center; font-weight: bold; }
        .upgrade { background: #faefe2; border-radius: 50px; padding: 10px 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .upgrade-info { flex: 2; }
        .help-icon { background: #ffb347; border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; margin-left: 8px; }
        .warning { background: #f9e6e6; color: #c7254e; border-radius: 40px; padding: 8px; text-align: center; font-size: 0.8rem; margin-top: 10px; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin: 15px 0; }
        .action-buttons button { flex: 1; font-size: 0.8rem; padding: 6px; }
        .achievements { background: #f7efdd; border-radius: 40px; padding: 12px; margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .achievement { font-size: 0.75rem; padding: 4px 8px; margin: 4px 0; border-radius: 30px; background: #fff3e0; }
        .achievement.unlocked { background: #ffe0b5; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fffef5; border-radius: 60px; padding: 25px; max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .close-modal { float: right; font-size: 1.5rem; cursor: pointer; }
        .player-list { max-height: 400px; overflow-y: auto; }
        .player-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding: 8px; gap: 8px; flex-wrap: wrap; }
        .role-badge { padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .role-player { background: #a0c4ff; }
        .role-developer { background: #ffb347; color: white; }
        .role-seal { background: #6b8e23; color: white; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2b241cee; color: #ffeaaf; padding: 8px 20px; border-radius: 60px; animation: fadeOut 2s forwards; z-index: 1001; }
        @keyframes fadeOut { 0% { opacity: 1; bottom: 0; } 80% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        footer { font-size: 0.7rem; text-align: center; margin-top: 20px; color: #6e8f7a; }
    </style>
</head>
<body>
<div class="game-card" id="app"></div>

<script>
    // --------------------------------------------------------------
    // 1. Хранилище
    // --------------------------------------------------------------
    let accounts = {};
    let currentUser = null;
    let syncInterval = null;
    let passiveInterval = null, eventInterval = null;
    let renderScheduled = false;

    function loadData() {
        const raw = localStorage.getItem('seal_accounts');
        if (raw) try { accounts = JSON.parse(raw); } catch(e) { accounts = {}; }
        else accounts = {};
        const saved = localStorage.getItem('seal_current_user');
        if (saved && accounts[saved]) currentUser = saved;
        else currentUser = null;
    }
    function saveData() {
        localStorage.setItem('seal_accounts', JSON.stringify(accounts));
        if (currentUser) localStorage.setItem('seal_current_user', currentUser);
        else localStorage.removeItem('seal_current_user');
    }
    function getUser() { return currentUser ? accounts[currentUser] : null; }
    function saveUser() { if (currentUser) saveData(); }

    // --------------------------------------------------------------
    // 2. Достижения
    // --------------------------------------------------------------
    function generateAchievements() {
        const list = [];
        for (let i = 1; i <= 20; i++) {
            let target = 100 * Math.pow(1.6, i-1);
            list.push({ id: `total_${i}`, name: `${Math.floor(target).toLocaleString()} fish`, cond: (d) => d.totalFish >= target, reward: Math.floor(target * 0.1) });
        }
        for (let i = 1; i <= 15; i++) {
            let clicks = 50 * Math.pow(2, i-1);
            list.push({ id: `clicks_${i}`, name: `${Math.floor(clicks).toLocaleString()} clicks`, cond: (d) => d.stats.totalClicks >= clicks, reward: Math.floor(clicks * 0.2) });
        }
        for (let i = 1; i <= 10; i++) {
            list.push({ id: `clickPower_${i}`, name: `Click power ${i}`, cond: (d) => d.upgrades.clickPower >= i, reward: 50 * i });
            list.push({ id: `auto_${i}`, name: `Auto feeder ${i}`, cond: (d) => d.upgrades.autoClicker >= i, reward: 60 * i });
        }
        for (let i = 1; i <= 5; i++) {
            list.push({ id: `crit_${i}`, name: `Crit ${i}`, cond: (d) => d.upgrades.crit >= i, reward: 80 * i });
        }
        return list.slice(0, 60);
    }
    const achievementsList = generateAchievements();

    function initAchievements(data) {
        if (!data.achievements) data.achievements = {};
        achievementsList.forEach(ach => { if (data.achievements[ach.id] === undefined) data.achievements[ach.id] = false; });
    }
    function checkAchievements(data) {
        let changed = false;
        for (let ach of achievementsList) {
            if (!data.achievements[ach.id] && ach.cond(data)) {
                data.achievements[ach.id] = true;
                data.fish += ach.reward;
                data.totalFish += ach.reward;
                changed = true;
                showToast(`[ACHIEVEMENT] ${ach.name}! +${ach.reward} fish`);
            }
        }
        if (changed) saveUser();
        return changed;
    }

    // --------------------------------------------------------------
    // 3. Game calculations
    // --------------------------------------------------------------
    function getClickPower(data) {
        let base = 1 + data.upgrades.clickPower * 2;
        let mult = 1 + data.upgrades.clickMult * 0.03;
        let prestige = data.prestigeBonus || 0;
        return Math.floor(base * mult * (1 + prestige / 100));
    }
    function getPassiveIncome(data) {
        let inc = data.upgrades.autoClicker * 1;
        let mult = 1 + data.upgrades.passiveMult * 0.02;
        return Math.floor(inc * mult);
    }
    function getCritChance(data) { return Math.min(70, data.upgrades.crit * 5); }
    function getEventBonus(data) { return 1 + data.upgrades.eventBonus * 0.1; }

    function addFish(amount, fromClick = false) {
        if (!currentUser) return;
        let data = getUser();
        data.fish += amount;
        data.totalFish += amount;
        if (fromClick) data.stats.totalClicks++;
        saveUser();
        checkAchievements(data);
        scheduleRender();
    }

    // --------------------------------------------------------------
    // 4. Anticheat
    // --------------------------------------------------------------
    function isBlocked(data) {
        if (data.anticheatDisabled) return false;
        if (Date.now() < (data.anticheatBlockedUntil || 0)) return true;
        return false;
    }
    function registerClick() {
        let data = getUser();
        if (!data) return false;
        if (data.anticheatDisabled) return true;
        if (isBlocked(data)) {
            showToast("[ANTICHEAT] clicks blocked for 8 sec");
            return false;
        }
        const now = Date.now();
        if (!data.clickTimestamps) data.clickTimestamps = [];
        data.clickTimestamps.push(now);
        while (data.clickTimestamps.length && data.clickTimestamps[0] < now - 1000) data.clickTimestamps.shift();
        if (data.clickTimestamps.length > 18) {
            data.anticheatBlockedUntil = now + 8000;
            data.clickTimestamps = [];
            showToast("[ANTICHEAT] too fast! blocked 8 sec.");
            saveUser();
            scheduleRender();
            return false;
        }
        return true;
    }
    function disableAnticheat(password) {
        let data = getUser();
        if (!data) return;
        if (password === 'seal') {
            data.anticheatDisabled = true;
            data.anticheatBlockedUntil = 0;
            data.clickTimestamps = [];
            saveUser();
            showToast("[ANTICHEAT] disabled. No more blocks.");
            scheduleRender();
        } else showToast("[ANTICHEAT] wrong password");
    }
    function enableAnticheat() {
        let data = getUser();
        if (data) {
            data.anticheatDisabled = false;
            data.anticheatBlockedUntil = 0;
            data.clickTimestamps = [];
            saveUser();
            showToast("[ANTICHEAT] enabled.");
            scheduleRender();
        }
    }

    // --------------------------------------------------------------
    // 5. Shop
    // --------------------------------------------------------------
    function buyUpgrade(id, basePrice, name) {
        let data = getUser();
        let level = data.upgrades[id];
        let price = Math.floor(basePrice * (level + 1));
        if (data.fish < price) { showToast(`[SHOP] need ${price} fish`); return; }
        data.fish -= price;
        data.upgrades[id]++;
        saveUser();
        checkAchievements(data);
        scheduleRender();
        showToast(`[SHOP] ${name} -> lvl ${data.upgrades[id]}`);
    }

    // --------------------------------------------------------------
    // 6. Prestige
    // --------------------------------------------------------------
    function doPrestige() {
        let data = getUser();
        if (data.totalFish < 5000) { showToast("[PRESTIGE] need 5000 total fish"); return; }
        if (confirm("Prestige: reset fish and upgrades, get +50% click power forever?")) {
            data.prestigeBonus = (data.prestigeBonus || 0) + 50;
            data.fish = 0;
            data.totalFish = 0;
            data.upgrades = { clickPower:0, autoClicker:0, crit:0, clickMult:0, passiveMult:0, eventBonus:0 };
            data.stats.prestigeCount = (data.stats.prestigeCount || 0) + 1;
            saveUser();
            checkAchievements(data);
            scheduleRender();
            showToast("[PRESTIGE] +50% click power");
        }
    }

    // --------------------------------------------------------------
    // 7. Avatar
    // --------------------------------------------------------------
    function changeAvatar(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            let data = getUser();
            data.avatar = e.target.result;
            saveUser();
            scheduleRender();
            showToast("[AVATAR] photo updated");
        };
        reader.readAsDataURL(file);
    }

    // --------------------------------------------------------------
    // 8. Admin panel (password seal123)
    // --------------------------------------------------------------
    function showAdminModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>[ADMIN PANEL]</h3>
                <input type="password" id="adminPass" placeholder="Password" style="width:100%; margin:10px 0;">
                <button id="adminLoginBtn">Login</button>
                <div id="adminControls" style="display:none; margin-top:15px;">
                    <h4>Give resources to player:</h4>
                    <input type="text" id="targetNick" placeholder="Nickname" style="width:100%; margin-bottom:8px;">
                    <input type="number" id="giveFish" placeholder="Fish amount" style="width:100%; margin-bottom:8px;">
                    <button id="giveFishBtn">Give fish</button><br><br>
                    <select id="upgradeSelect">
                        <option value="clickPower">Click power</option>
                        <option value="autoClicker">Auto feeder</option>
                        <option value="crit">Crit</option>
                        <option value="clickMult">Click multiplier</option>
                        <option value="passiveMult">Passive multiplier</option>
                        <option value="eventBonus">Event bonus</option>
                    </select>
                    <input type="number" id="giveLevels" placeholder="Levels">
                    <button id="giveUpgradeBtn">Give levels</button><br><br>
                    <h4>Role management</h4>
                    <div id="playersListAdmin" class="player-list"></div>
                    <button id="resetDataBtn" style="background:#c7254e; margin-top:10px;">[RESET ALL DATA]</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        
        const loginBtn = modal.querySelector('#adminLoginBtn');
        loginBtn.onclick = () => {
            const pass = modal.querySelector('#adminPass').value;
            if (pass === 'seal123') {
                modal.querySelector('#adminControls').style.display = 'block';
                loginBtn.disabled = true;
                renderAdminPlayerList(modal);
            } else showToast("Wrong password");
        };
        
        function renderAdminPlayerList(modal) {
            const container = modal.querySelector('#playersListAdmin');
            const players = Object.entries(accounts).map(([nick, data]) => ({ nick, ...data }));
            players.sort((a,b) => b.totalFish - a.totalFish);
            container.innerHTML = players.map(p => `
                <div class="player-row" data-nick="${p.nick}">
                    <div style="display:flex; align-items:center; gap:8px;">
                        ${p.avatar ? `<img src="${p.avatar}" class="avatar-img" style="width:40px;height:40px;">` : '<span style="font-size:2rem;">[SEAL]</span>'}
                        <strong>${escapeHtml(p.nick)}</strong>
                        <span class="role-badge role-${p.role || 'player'}">${p.role || 'player'}</span>
                    </div>
                    <div style="display:flex; gap:5px; flex-wrap:wrap;">
                        <select class="role-select" data-nick="${p.nick}">
                            <option value="player" ${(p.role||'player')==='player'?'selected':''}>Player</option>
                            <option value="developer" ${(p.role||'player')==='developer'?'selected':''}>Developer</option>
                            <option value="seal" ${(p.role||'player')==='seal'?'selected':''}>Seal</option>
                        </select>
                        <button class="giveFishSmall" data-nick="${p.nick}" data-amount="100">+100</button>
                        <button class="giveFishSmall" data-nick="${p.nick}" data-amount="1000">+1000</button>
                        <button class="giveUpgradeSmall" data-nick="${p.nick}" data-upgrade="clickPower" data-levels="1">+1 click</button>
                    </div>
                </div>
            `).join('');
            
            container.querySelectorAll('.role-select').forEach(sel => {
                sel.onchange = () => {
                    const nick = sel.dataset.nick;
                    const newRole = sel.value;
                    if (accounts[nick]) {
                        accounts[nick].role = newRole;
                        saveData();
                        showToast(`Role of ${nick} changed to ${newRole}`);
                        renderAdminPlayerList(modal);
                        if (currentUser === nick) scheduleRender();
                    }
                };
            });
            container.querySelectorAll('.giveFishSmall').forEach(btn => {
                btn.onclick = () => {
                    const nick = btn.dataset.nick;
                    const amount = parseInt(btn.dataset.amount);
                    if (accounts[nick]) {
                        accounts[nick].fish += amount;
                        accounts[nick].totalFish += amount;
                        saveData();
                        showToast(`Given ${amount} fish to ${nick}`);
                        if (currentUser === nick) scheduleRender();
                        renderAdminPlayerList(modal);
                    }
                };
            });
            container.querySelectorAll('.giveUpgradeSmall').forEach(btn => {
                btn.onclick = () => {
                    const nick = btn.dataset.nick;
                    const upgrade = btn.dataset.upgrade;
                    const levels = parseInt(btn.dataset.levels);
                    if (accounts[nick]) {
                        accounts[nick].upgrades[upgrade] = (accounts[nick].upgrades[upgrade] || 0) + levels;
                        saveData();
                        showToast(`Upgrade ${upgrade} +${levels} for ${nick}`);
                        if (currentUser === nick) scheduleRender();
                        renderAdminPlayerList(modal);
                    }
                };
            });
        }
        
        modal.querySelector('#giveFishBtn').onclick = () => {
            const nick = modal.querySelector('#targetNick').value.trim();
            const amount = parseInt(modal.querySelector('#giveFish').value);
            if (!nick || isNaN(amount)) { showToast("Enter nickname and amount"); return; }
            if (accounts[nick]) {
                accounts[nick].fish += amount;
                accounts[nick].totalFish += amount;
                saveData();
                showToast(`Given ${amount} fish to ${nick}`);
                if (currentUser === nick) scheduleRender();
                if (modal.querySelector('#adminControls').style.display === 'block') renderAdminPlayerList(modal);
            } else showToast("Player not found");
        };
        modal.querySelector('#giveUpgradeBtn').onclick = () => {
            const nick = modal.querySelector('#targetNick').value.trim();
            const up = modal.querySelector('#upgradeSelect').value;
            const levels = parseInt(modal.querySelector('#giveLevels').value);
            if (!nick || isNaN(levels)) { showToast("Enter nickname and levels"); return; }
            if (accounts[nick]) {
                accounts[nick].upgrades[up] = (accounts[nick].upgrades[up] || 0) + levels;
                saveData();
                showToast(`Upgrade ${up} +${levels} for ${nick}`);
                if (currentUser === nick) scheduleRender();
                if (modal.querySelector('#adminControls').style.display === 'block') renderAdminPlayerList(modal);
            } else showToast("Player not found");
        };
        modal.querySelector('#resetDataBtn').onclick = () => {
            if (confirm("Reset ALL data? All players will lose progress!")) {
                localStorage.clear();
                location.reload();
            }
        };
    }

    // --------------------------------------------------------------
    // 9. Players list (view only)
    // --------------------------------------------------------------
    function showPlayersList() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>[ALL PLAYERS]</h3>
                <div id="playersListView" class="player-list"></div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        
        const container = modal.querySelector('#playersListView');
        const players = Object.entries(accounts).map(([nick, data]) => ({ nick, ...data }));
        players.sort((a,b) => b.totalFish - a.totalFish);
        container.innerHTML = players.map(p => `
            <div class="player-row">
                <div style="display:flex; align-items:center; gap:8px;">
                    ${p.avatar ? `<img src="${p.avatar}" class="avatar-img" style="width:40px;height:40px;">` : '<span style="font-size:2rem;">[SEAL]</span>'}
                    <strong>${escapeHtml(p.nick)}</strong>
                    <span class="role-badge role-${p.role || 'player'}">${p.role || 'player'}</span>
                </div>
                <div>[FISH] ${Math.floor(p.fish).toLocaleString()}</div>
                <div>[TOTAL] ${Math.floor(p.totalFish).toLocaleString()}</div>
            </div>
        `).join('');
    }

    // --------------------------------------------------------------
    // 10. Profile
    // --------------------------------------------------------------
    function showProfileModal() {
        const data = getUser();
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>[PROFILE] ${escapeHtml(currentUser)}</h3>
                <div style="display:flex; align-items:center; gap:15px; margin:10px 0;">
                    ${data.avatar ? `<img src="${data.avatar}" class="avatar-img" style="width:80px;height:80px;">` : '<div style="font-size:4rem;">[SEAL]</div>'}
                    <div>
                        <input type="file" id="avatarInput" accept="image/*" style="margin-bottom:5px;">
                        <button id="uploadAvatarBtn">Upload photo</button>
                    </div>
                </div>
                <p>[FISH] ${Math.floor(data.fish).toLocaleString()}</p>
                <p>[TOTAL] ${Math.floor(data.totalFish).toLocaleString()}</p>
                <p>[CLICKS] ${data.stats.totalClicks.toLocaleString()}</p>
                <p>[PRESTIGE] +${data.prestigeBonus || 0}%</p>
                <p>[ROLE] <span class="role-badge role-${data.role || 'player'}">${data.role || 'player'}</span></p>
                <hr>
                <h4>Change nickname</h4>
                <input type="text" id="newNick" placeholder="New nickname" style="width:100%; margin:8px 0;">
                <input type="password" id="confirmPass" placeholder="Your password" style="width:100%; margin:8px 0;">
                <button id="changeNickBtn">Change nickname</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        
        modal.querySelector('#uploadAvatarBtn').onclick = () => {
            const fileInput = modal.querySelector('#avatarInput');
            if (fileInput.files && fileInput.files[0]) changeAvatar(fileInput.files[0]);
            else showToast("Select a file");
        };
        modal.querySelector('#changeNickBtn').onclick = () => {
            const newNick = modal.querySelector('#newNick').value.trim();
            const pass = modal.querySelector('#confirmPass').value;
            if (!newNick || !pass) { showToast("Fill all fields"); return; }
            if (pass !== data.password) { showToast("Wrong password"); return; }
            if (accounts[newNick]) { showToast("Nickname already taken"); return; }
            accounts[newNick] = { ...data };
            delete accounts[currentUser];
            currentUser = newNick;
            saveData();
            showToast("Nickname changed!");
            modal.remove();
            scheduleRender();
        };
    }

    // --------------------------------------------------------------
    // 11. Leaderboard
    // --------------------------------------------------------------
    function showLeaderboard() {
        const sorted = Object.entries(accounts)
            .map(([nick, d]) => ({ nick, total: d.totalFish }))
            .sort((a,b) => b.total - a.total)
            .slice(0, 20);
        let msg = "[GLOBAL LEADERBOARD]\n";
        sorted.forEach((u,i) => msg += `${i+1}. ${u.nick} — ${u.total.toLocaleString()} fish\n`);
        alert(msg);
    }

    // --------------------------------------------------------------
    // 12. Register / Login / Logout
    // --------------------------------------------------------------
    function register(nick, pass) {
        if (accounts[nick]) { showToast("Nickname already taken"); return false; }
        accounts[nick] = {
            password: pass,
            fish: 0,
            totalFish: 0,
            upgrades: { clickPower:0, autoClicker:0, crit:0, clickMult:0, passiveMult:0, eventBonus:0 },
            stats: { totalClicks:0, prestigeCount:0 },
            achievements: {},
            anticheatDisabled: false,
            anticheatBlockedUntil: 0,
            clickTimestamps: [],
            prestigeBonus: 0,
            role: 'player',
            avatar: null,
        };
        initAchievements(accounts[nick]);
        saveData();
        currentUser = nick;
        saveData();
        showToast("Registration successful!");
        scheduleRender();
        startGameLoops();
        return true;
    }
    function login(nick, pass) {
        const user = accounts[nick];
        if (!user || user.password !== pass) { showToast("Wrong nickname or password"); return false; }
        currentUser = nick;
        saveData();
        showToast("Login successful");
        scheduleRender();
        startGameLoops();
        return true;
    }
    function logout() {
        currentUser = null;
        saveData();
        if (syncInterval) clearInterval(syncInterval);
        scheduleRender();
    }

    // --------------------------------------------------------------
    // 13. Auto sync (without toasts)
    // --------------------------------------------------------------
    let lastDataHash = "";
    function startDataSync() {
        if (syncInterval) clearInterval(syncInterval);
        syncInterval = setInterval(() => {
            if (currentUser && accounts[currentUser]) {
                const data = accounts[currentUser];
                const hash = JSON.stringify({
                    fish: data.fish,
                    totalFish: data.totalFish,
                    upgrades: data.upgrades,
                    stats: data.stats,
                    anticheatDisabled: data.anticheatDisabled,
                    prestigeBonus: data.prestigeBonus,
                    achievements: data.achievements,
                    role: data.role,
                    avatar: data.avatar,
                });
                if (lastDataHash !== "" && lastDataHash !== hash) {
                    scheduleRender();
                }
                lastDataHash = hash;
            }
        }, 3000);
    }

    // --------------------------------------------------------------
    // 14. Optimized render
    // --------------------------------------------------------------
    function scheduleRender() {
        if (!renderScheduled) {
            renderScheduled = true;
            requestAnimationFrame(() => {
                renderUI();
                renderScheduled = false;
            });
        }
    }

    function renderUI() {
        const root = document.getElementById('app');
        if (!currentUser) {
            root.innerHTML = `
                <h1>[SEAL CLICKER]</h1>
                <div class="nick-panel">
                    <input type="text" id="regNick" class="nick-input" placeholder="Nickname" maxlength="20">
                    <input type="password" id="regPass" class="pass-input" placeholder="Password">
                    <button id="registerBtn">REGISTER</button>
                </div>
                <div class="nick-panel">
                    <input type="text" id="loginNick" class="nick-input" placeholder="Nickname">
                    <input type="password" id="loginPass" class="pass-input" placeholder="Password">
                    <button id="loginBtn">LOGIN</button>
                </div>
                <button id="leaderboardBtn" style="width:100%; margin-top:10px;">[LEADERBOARD]</button>
                <footer>Create account or login</footer>
            `;
            document.getElementById('registerBtn').onclick = () => {
                const n = document.getElementById('regNick').value.trim();
                const p = document.getElementById('regPass').value;
                if (n && p) register(n, p);
                else showToast("Enter nickname and password");
            };
            document.getElementById('loginBtn').onclick = () => {
                const n = document.getElementById('loginNick').value.trim();
                const p = document.getElementById('loginPass').value;
                if (n && p) login(n, p);
                else showToast("Enter nickname and password");
            };
            document.getElementById('leaderboardBtn').onclick = showLeaderboard;
            return;
        }

        const data = getUser();
        const fish = Math.floor(data.fish);
        const total = Math.floor(data.totalFish);
        const clickPower = getClickPower(data);
        const passive = getPassiveIncome(data);
        const critChance = getCritChance(data);
        const blocked = isBlocked(data);
        const unlockCount = achievementsList.filter(a => data.achievements[a.id]).length;
        const role = data.role || 'player';

        const upgradesList = [
            { id: 'clickPower', name: '[SHARP TOOTH]', desc: '+2 fish/click', basePrice: 20, level: data.upgrades.clickPower },
            { id: 'autoClicker', name: '[AUTO FEEDER]', desc: '+1 fish/sec', basePrice: 25, level: data.upgrades.autoClicker },
            { id: 'crit', name: '[CRITICAL HIT]', desc: '+5% chance x2', basePrice: 80, level: data.upgrades.crit },
            { id: 'clickMult', name: '[CLICK MULTIPLIER]', desc: '+3% click power', basePrice: 500, level: data.upgrades.clickMult },
            { id: 'passiveMult', name: '[PASSIVE MULTIPLIER]', desc: '+2% passive income', basePrice: 700, level: data.upgrades.passiveMult },
            { id: 'eventBonus', name: '[EVENT BONUS]', desc: '+10% event rewards', basePrice: 300, level: data.upgrades.eventBonus },
        ];

        let upgradesHtml = '';
        for (let up of upgradesList) {
            const price = Math.floor(up.basePrice * (up.level + 1));
            const canBuy = data.fish >= price && !blocked;
            upgradesHtml += `
                <div class="upgrade">
                    <div class="upgrade-info">
                        <div class="upgrade-name">${up.name}</div>
                        <div class="upgrade-desc">${up.desc} (lvl ${up.level})</div>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button class="buy-btn" data-upgrade="${up.id}" data-price="${up.basePrice}" ${!canBuy ? 'disabled' : ''}>${price} [FISH]</button>
                        <div class="help-icon" data-help="${up.id}">?</div>
                    </div>
                </div>
            `;
        }

        let achievementsHtml = '';
        for (let ach of achievementsList.slice(0, 50)) {
            const unlocked = data.achievements[ach.id];
            achievementsHtml += `<div class="achievement ${unlocked ? 'unlocked' : ''}">${unlocked ? '[OK]' : '[LOCK]'} ${ach.name}</div>`;
        }

        root.innerHTML = `
            <h1>[SEAL CLICKER]</h1>
            <div class="nick-panel" style="justify-content:space-between;">
                <div style="display:flex; align-items:center; gap:8px;">
                    ${data.avatar ? `<img src="${data.avatar}" class="avatar-img">` : '<span style="font-size:2rem;">[SEAL]</span>'}
                    <span>[NICK] ${escapeHtml(currentUser)}</span>
                    <span class="role-badge role-${role}">${role}</span>
                </div>
                <span>[PRESTIGE] +${data.prestigeBonus || 0}%</span>
                <button id="logoutBtn">LOGOUT</button>
            </div>
            <div class="seal-area" id="clickZone">
                <div class="seal-emoji" id="sealEmoji">[SEAL]</div>
                <div>click on the seal</div>
            </div>
            <div class="fish-counter">[FISH] ${fish.toLocaleString()}</div>
            <div class="stat-grid">
                <div class="stat">[POWER] +${clickPower}</div>
                <div class="stat">[PASSIVE] +${passive}/sec</div>
                <div class="stat">[CRIT] ${critChance}%</div>
            </div>
            <div class="stat-grid">
                <div class="stat">[TOTAL] ${total.toLocaleString()}</div>
                <div class="stat">[CLICKS] ${data.stats.totalClicks}</div>
            </div>
            ${blocked ? `<div class="warning">[ANTICHEAT] clicks blocked for a few seconds</div>` : ''}
            <div class="action-buttons">
                ${!data.anticheatDisabled ? `<button id="disableAnticheatBtn">[DISABLE ANTICHEAT]</button>` : `<button id="enableAnticheatBtn">[ENABLE ANTICHEAT]</button>`}
                <button id="adminPanelBtn">[ADMIN]</button>
                <button id="playersListBtn">[PLAYERS]</button>
                <button id="profileBtn">[PROFILE]</button>
                <button id="leaderboardBtn">[LEADERBOARD]</button>
                <button id="prestigeBtn">[PRESTIGE]</button>
            </div>
            <div style="font-weight:bold; margin:10px 0 5px;">[SHOP]</div>
            ${upgradesHtml}
            <div class="achievements">
                <strong>[ACHIEVEMENTS] (${unlockCount}/${achievementsList.length})</strong>
                <div style="max-height:200px; overflow-y:auto;">${achievementsHtml}</div>
            </div>
            <footer>Auto‑save. Admin password: ***. Anticheat password: ***</footer>
        `;

        document.getElementById('clickZone').onclick = () => {
            if (!registerClick()) return;
            let gain = getClickPower(getUser());
            if (Math.random() < getCritChance(getUser())/100) gain *= 2;
            addFish(gain, true);
            const seal = document.getElementById('sealEmoji');
            if (seal) {
                seal.classList.add('click-effect');
                setTimeout(() => seal.classList.remove('click-effect'), 100);
                try { playSound(); } catch(e) {}
            }
        };
        document.getElementById('logoutBtn').onclick = () => logout();
        if (!data.anticheatDisabled) {
            document.getElementById('disableAnticheatBtn').onclick = () => {
                const pwd = prompt("Enter password to disable anticheat:");
                if (pwd === 'seal') disableAnticheat(pwd);
                else showToast("Wrong password");
            };
        } else {
            document.getElementById('enableAnticheatBtn').onclick = enableAnticheat;
        }
        document.getElementById('adminPanelBtn').onclick = showAdminModal;
        document.getElementById('playersListBtn').onclick = showPlayersList;
        document.getElementById('profileBtn').onclick = showProfileModal;
        document.getElementById('leaderboardBtn').onclick = showLeaderboard;
        document.getElementById('prestigeBtn').onclick = doPrestige;
        
        document.querySelectorAll('.buy-btn').forEach(btn => {
            const id = btn.dataset.upgrade;
            const price = parseInt(btn.dataset.price);
            btn.onclick = () => buyUpgrade(id, price, upgradesList.find(u => u.id === id).name);
        });
        document.querySelectorAll('.help-icon').forEach(icon => {
            const id = icon.dataset.help;
            icon.onclick = (e) => { e.stopPropagation(); showHelp(id); };
        });
    }

    function showHelp(id) {
        const helps = {
            clickPower: "[SHARP TOOTH] +2 fish/click per level.",
            autoClicker: "[AUTO FEEDER] +1 fish/sec per level.",
            crit: "[CRITICAL HIT] +5% chance x2 per level.",
            clickMult: "[CLICK MULTIPLIER] +3% click power per level.",
            passiveMult: "[PASSIVE MULTIPLIER] +2% passive income per level.",
            eventBonus: "[EVENT BONUS] +10% event rewards per level.",
        };
        alert(helps[id] || "Upgrade increases your income.");
    }

    function playSound() {
        try {
            let ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 600;
            gain.gain.value = 0.05;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.2);
            osc.stop(ctx.currentTime + 0.2);
        } catch(e) {}
    }

    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    function startGameLoops() {
        if (passiveInterval) clearInterval(passiveInterval);
        if (eventInterval) clearInterval(eventInterval);
        passiveInterval = setInterval(() => {
            if (currentUser) {
                const d = getUser();
                const inc = getPassiveIncome(d);
                if (inc > 0) addFish(inc, false);
            }
        }, 1000);
        eventInterval = setInterval(() => {
            if (currentUser && Math.random() < 0.4) {
                const d = getUser();
                const events = [
                    { msg: "[EVENT] School of fish! +50", gain: 50 },
                    { msg: "[EVENT] Golden fish! +200", gain: 200 },
                    { msg: "[EVENT] Fisherman shared +30", gain: 30 },
                ];
                const ev = events[Math.floor(Math.random() * events.length)];
                let gain = ev.gain * getEventBonus(d);
                addFish(gain, false);
                showToast(ev.msg + " " + Math.floor(gain) + " fish!");
            }
        }, 25000);
        startDataSync();
    }

    loadData();
    if (currentUser) startGameLoops();
    renderUI();
</script>
</body>
</html>
