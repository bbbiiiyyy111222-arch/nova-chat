<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 MoonTunnel | Видео строительства в выживании</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0f0f2a 100%);
            min-height: 100vh;
            color: white;
            position: relative;
        }

        /* АНИМИРОВАННЫЙ ФОН */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(168,85,247,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(124,58,237,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 10s infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* ШАПКА С ДЕКОРОМ */
        .header {
            text-align: center;
            padding: 50px 30px;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            margin-bottom: 30px;
            border: 1px solid rgba(168,85,247,0.3);
            position: relative;
            overflow: hidden;
            animation: headerGlow 3s infinite;
        }

        @keyframes headerGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(168,85,247,0.2); }
            50% { box-shadow: 0 0 50px rgba(168,85,247,0.4); }
        }

        .header::before {
            content: '🌙';
            position: absolute;
            top: -30px;
            right: -30px;
            font-size: 180px;
            opacity: 0.08;
            pointer-events: none;
            animation: rotate 20s linear infinite;
        }

        .header::after {
            content: '🔨';
            position: absolute;
            bottom: -30px;
            left: -30px;
            font-size: 180px;
            opacity: 0.08;
            pointer-events: none;
            animation: rotateReverse 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateReverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        .header h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #a855f7, #7c3aed, #d8b4fe, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(168,85,247,0.3);
            animation: titleGlow 3s infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .header p {
            color: #c0c0ff;
            font-size: 16px;
            letter-spacing: 2px;
        }

        .header .sub {
            font-size: 13px;
            color: #8a8aff;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header .sub span {
            background: rgba(168,85,247,0.15);
            padding: 5px 12px;
            border-radius: 20px;
        }

        /* КНОПКА ВХОДА */
        .login-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #4a4a8a, #5a5a9a);
            border: 1px solid #7a7aff;
            color: white;
            padding: 10px 25px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 100;
            font-size: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #5a5a9a, #6a6aaa);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(122,122,255,0.5);
        }

        /* АДМИН ПАНЕЛЬ */
        .admin-panel {
            background: rgba(26,26,42,0.9);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 30px;
            margin-bottom: 30px;
            display: none;
            border: 1px solid rgba(168,85,247,0.3);
            animation: fadeIn 0.5s;
        }

        .admin-panel.active {
            display: block;
        }

        /* КНОПКА ЗАГРУЗКИ */
        .upload-label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            padding: 14px 40px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 0 25px rgba(168,85,247,0.4);
        }

        .upload-label:hover {
            transform: scale(1.05);
            box-shadow: 0 0 45px rgba(168,85,247,0.7);
        }

        input[type="file"] {
            display: none;
        }

        /* ПРОГРЕСС БАР */
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #2a2a4a;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #7c3aed);
            transition: width 0.3s;
            border-radius: 20px;
        }

        .status {
            text-align: center;
            padding: 10px;
            color: #a0a0ff;
            font-size: 12px;
        }

        /* СООБЩЕНИЕ */
        .info-message {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            margin-bottom: 30px;
            color: #ffaa44;
            font-size: 13px;
            border: 1px solid rgba(255,170,68,0.3);
        }

        /* СЕТКА ВИДЕО */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* КАРТОЧКА ВИДЕО */
        .video-card {
            background: rgba(26,26,42,0.9);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s;
            border: 1px solid rgba(168,85,247,0.2);
            position: relative;
            overflow: hidden;
        }

        .video-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(168,85,247,0.1), transparent);
            transition: left 0.5s;
        }

        .video-card:hover::before {
            left: 100%;
        }

        .video-card:hover {
            transform: translateY(-8px);
            border-color: rgba(168,85,247,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .video-thumb {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #1a1a3a, #0a0a2a);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        .video-name {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
            word-break: break-word;
        }

        .video-size {
            font-size: 11px;
            color: #888;
        }

        .video-date {
            font-size: 11px;
            color: #a855f7;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* КНОПКА УДАЛЕНИЯ */
        .delete-video {
            background: rgba(239,68,68,0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 8px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 10px;
            margin-top: 12px;
            transition: all 0.3s;
            width: 100%;
        }

        .delete-video:hover {
            background: #ef4444;
            color: white;
        }

        /* ПЛЕЕР */
        .player-section {
            background: rgba(26,26,42,0.95);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 25px;
            margin-top: 30px;
            display: none;
            border: 1px solid rgba(168,85,247,0.3);
            animation: fadeIn 0.5s;
        }

        .player-section.active {
            display: block;
        }

        video {
            width: 100%;
            max-height: 500px;
            border-radius: 20px;
            background: #000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .close-player {
            background: linear-gradient(135deg, #4a4a8a, #5a5a9a);
            border: none;
            color: white;
            padding: 12px 35px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .close-player:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(122,122,255,0.5);
        }

        /* МОДАЛКА ВХОДА */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a3a, #0f0f2a);
            border-radius: 45px;
            padding: 50px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(168,85,247,0.3);
            animation: modalFadeIn 0.4s;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content h2 {
            margin-bottom: 25px;
            font-size: 24px;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-content input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(26,26,58,0.8);
            border: 1px solid rgba(168,85,247,0.3);
            border-radius: 15px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168,85,247,0.3);
        }

        .modal-content button {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            padding: 14px;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .modal-content button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(168,85,247,0.5);
        }

        .error {
            color: #ef4444;
            margin-top: 15px;
            font-size: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .videos-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 28px;
            }
            .header .sub span {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <button class="login-btn" id="loginBtn" onclick="showLoginModal()">
        🔑 ВХОД ДЛЯ АДМИНА
    </button>

    <div class="container">
        <div class="header">
            <h1>🌙 MOONTUNNEL</h1>
            <p>Видео строительства в выживании | Туннель под водой</p>
            <div class="sub">
                <span>⛏️ ЧИСТОВОЕ ВЫЖИВАНИЕ</span>
                <span>🏗️ СТРОИТЕЛЬСТВО</span>
                <span>🌊 ПОДВОДНЫЙ ТУННЕЛЬ</span>
                <span>🎬 ВИДЕО СКОРО БУДЕТ ДОСТУПНО</span>
            </div>
        </div>

        <div class="info-message">
            🎥 ВИДЕО ЗАГРУЖАЮТСЯ | ОНИ ПОЯВЯТСЯ ЗДЕСЬ ПОСЛЕ ЗАВЕРШЕНИЯ ЗАГРУЗКИ
        </div>

        <div id="adminPanel" class="admin-panel">
            <div style="text-align: center;">
                <label class="upload-label" onclick="document.getElementById('videoInput').click()">
                    📹 ЗАГРУЗИТЬ ВИДЕО
                </label>
                <input type="file" id="videoInput" accept="video/*" onchange="uploadVideo()">
                <div class="progress-bar" id="progressBar" style="display: none;">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div id="uploadStatus" class="status"></div>
            </div>
        </div>

        <div class="videos-grid" id="videosGrid"></div>

        <div class="player-section" id="playerSection">
            <video id="videoPlayer" controls></video>
            <button class="close-player" onclick="closePlayer()">✖ ЗАКРЫТЬ ПЛЕЕР</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>🔐 ВХОД ДЛЯ АДМИНА</h2>
            <input type="text" id="loginUsername" placeholder="ЛОГИН">
            <input type="password" id="loginPassword" placeholder="ПАРОЛЬ">
            <button onclick="checkAdminLogin()">ВОЙТИ</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <script>
        // ============================================
        // SUPABASE (ТВОИ КЛЮЧИ)
        // ============================================
        const SUPABASE_URL = 'https://pmvbhhidcojkkpumsxxb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdmJoaGlkY29qa2twdW1zeHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzk3MjcsImV4cCI6MjA5Mjg1NTcyN30.1eKxcaqeClRdAVH8lVcOdYaV0o_PbRzjnM9vBUP15QQ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let videos = [];
        let isAdmin = false;

        // ============================================
        // ЗАГРУЗКА ВИДЕО
        // ============================================
        async function loadVideos() {
            const { data, error } = await supabase
                .from('videos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Ошибка:', error);
                return;
            }

            videos = data;
            renderVideos();
        }

        function renderVideos() {
            const grid = document.getElementById('videosGrid');
            
            if (videos.length === 0) {
                grid.innerHTML = '<div style="text-align:center; color:#888; padding:60px; background:rgba(0,0,0,0.2); border-radius:30px;">📭 ВИДЕО ПОКА НЕТ</div>';
                return;
            }

            let html = '';
            videos.forEach(video => {
                const sizeMB = (video.size / 1024 / 1024).toFixed(2);
                const date = new Date(video.created_at).toLocaleDateString('ru-RU');
                
                html += `
                    <div class="video-card" onclick="playVideo('${video.url}', '${video.name}')">
                        <div class="video-thumb">🎬</div>
                        <div class="video-name">${escapeHtml(video.name)}</div>
                        <div class="video-size">📁 ${sizeMB} MB</div>
                        <div class="video-date">📅 ${date}</div>
                        ${isAdmin ? `<button class="delete-video" onclick="event.stopPropagation(); deleteVideo('${video.id}')">🗑️ УДАЛИТЬ ВИДЕО</button>` : ''}
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        // ============================================
        // ЗАГРУЗКА ВИДЕО (АДМИН)
        // ============================================
        async function uploadVideo() {
            if (!isAdmin) {
                alert('⛔ Только администратор может загружать видео');
                return;
            }

            const fileInput = document.getElementById('videoInput');
            const file = fileInput.files[0];
            
            if (!file) return;
            
            if (file.size > 2 * 1024 * 1024 * 1024) {
                alert('❌ Файл превышает 2GB');
                return;
            }
            
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const statusDiv = document.getElementById('uploadStatus');
            
            progressBar.style.display = 'block';
            statusDiv.innerHTML = '⏳ ЗАГРУЗКА... 0%';
            
            const fileName = `${Date.now()}_${file.name}`;
            const filePath = `videos/${fileName}`;
            
            const { data, error } = await supabase.storage
                .from('videos')
                .upload(filePath, file, {
                    onUploadProgress: (progress) => {
                        const percent = (progress.loaded / progress.total) * 100;
                        progressFill.style.width = `${percent}%`;
                        statusDiv.innerHTML = `⏳ ЗАГРУЗКА... ${Math.round(percent)}%`;
                    }
                });
            
            if (error) {
                statusDiv.innerHTML = '❌ ОШИБКА ЗАГРУЗКИ';
                progressBar.style.display = 'none';
                return;
            }
            
            const { data: urlData } = supabase.storage
                .from('videos')
                .getPublicUrl(filePath);
            
            const videoUrl = urlData.publicUrl;
            
            await supabase
                .from('videos')
                .insert([{
                    name: file.name,
                    size: file.size,
                    url: videoUrl,
                    created_at: new Date().toISOString()
                }]);
            
            statusDiv.innerHTML = '✅ ВИДЕО ЗАГРУЖЕНО!';
            progressFill.style.width = '100%';
            
            setTimeout(() => {
                progressBar.style.display = 'none';
                statusDiv.innerHTML = '';
            }, 2000);
            
            fileInput.value = '';
            await loadVideos();
        }

        // ============================================
        // ПЛЕЕР
        // ============================================
        function playVideo(url, name) {
            const player = document.getElementById('videoPlayer');
            const section = document.getElementById('playerSection');
            
            player.src = url;
            player.load();
            section.classList.add('active');
            section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function closePlayer() {
            const player = document.getElementById('videoPlayer');
            const section = document.getElementById('playerSection');
            
            player.pause();
            player.src = '';
            section.classList.remove('active');
        }

        // ============================================
        // УДАЛЕНИЕ
        // ============================================
        async function deleteVideo(id) {
            if (!confirm('🗑️ Удалить это видео навсегда?')) return;
            
            const video = videos.find(v => v.id === id);
            if (!video) return;
            
            const urlParts = video.url.split('/');
            const filePath = `videos/${urlParts[urlParts.length - 1]}`;
            
            await supabase.storage.from('videos').remove([filePath]);
            await supabase.from('videos').delete().eq('id', id);
            await loadVideos();
        }

        // ============================================
        // ВХОД (РАБОТАЕТ)
        // ============================================
        function showLoginModal() {
            document.getElementById('loginModal').classList.add('active');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
        }

        async function checkAdminLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (username === 'milk' && password === 'milk') {
                isAdmin = true;
                closeLoginModal();
                document.getElementById('adminPanel').classList.add('active');
                document.getElementById('loginBtn').style.display = 'none';
                renderVideos();
            } else {
                document.getElementById('loginError').innerText = '❌ Неверный логин или пароль';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            loadVideos();
        });

        window.onclick = function(event) {
            const modal = document.getElementById('loginModal');
            if (event.target === modal) {
                closeLoginModal();
            }
        }
    </script>
</body>
</html>
