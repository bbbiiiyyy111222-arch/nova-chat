<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🦭 SEAL EMPIRE | Супер-кликер</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1e6b3e;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-card {
            max-width: 750px;
            width: 100%;
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #1c6948; margin-bottom: 20px; }
        .nick-panel {
            background: #e9f3ed;
            border-radius: 60px;
            padding: 15px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nick-input {
            flex: 2;
            padding: 10px;
            border-radius: 50px;
            border: 1px solid #ffc896;
            text-align: center;
            font-weight: bold;
        }
        button {
            background: #ffb347;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
        }
        button:active { transform: scale(0.97); }
        .seal-area { text-align: center; cursor: pointer; margin: 20px 0; }
        .seal-emoji { font-size: 8rem; display: inline-block; transition: 0.07s; }
        .click-effect { transform: scale(0.9); }
        .fish-counter {
            background: #2a5c48;
            color: #FFE5B4;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            margin: 15px 0;
        }
        .stat-grid {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .stat {
            background: #e3f0ea;
            flex: 1;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            font-weight: bold;
        }
        .upgrade {
            background: #faefe2;
            border-radius: 50px;
            padding: 10px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .upgrade-info { flex: 2; }
        .upgrade-name { font-weight: bold; }
        .upgrade-desc { font-size: 0.7rem; color: #7a6a54; }
        .help-icon {
            background: #ffb347;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            margin-left: 8px;
        }
        .warning {
            background: #f9e6e6;
            color: #c7254e;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .action-buttons button { flex: 1; font-size: 0.8rem; padding: 6px 10px; }
        .achievements {
            background: #f7efdd;
            border-radius: 40px;
            padding: 12px;
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }
        .achievement {
            font-size: 0.75rem;
            padding: 4px 8px;
            margin: 4px 0;
            border-radius: 30px;
            background: #fff3e0;
        }
        .achievement.unlocked { background: #ffe0b5; font-weight: bold; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3, .modal-content h4 { margin-bottom: 10px; }
        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .player-list { max-height: 300px; overflow-y: auto; }
        .player-item {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
        }
        .player-item:hover { background: #f0e5d8; }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #6e8f7a;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2b241cee;
            color: #ffeaaf;
            padding: 8px 20px;
            border-radius: 60px;
            animation: fadeOut 2s forwards;
            z-index: 1001;
        }
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 0; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="game-card" id="app"></div>

<script>
    // ========== SUPABASE (ТВОИ КЛЮЧИ) ==========
    const SUPABASE_URL = 'https://pmvbhhidcojkkpumsxxb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdmJoaGlkY29qa2twdW1zeHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzk3MjcsImV4cCI6MjA5Mjg1NTcyN30.1eKxcaqeClRdAVH8lVcOdYaV0o_PbRzjnM9vBUP15QQ';
    let supabase;
    try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch(e) { console.warn(e); supabase = null; }

    // ========== ГЛОБАЛЬНОЕ СОСТОЯНИЕ (всегда инициализировано) ==========
    let game = {
        nickname: null,
        fish: 0,
        totalFish: 0,
        upgrades: {
            clickPower: 0,
            autoClicker: 0,
            crit: 0,
            bank: 0,
            clickMult: 0,
            passiveMult: 0,
            eventBonus: 0,
        },
        stats: { totalClicks: 0, prestigeCount: 0 },
        achievements: {},
        anticheatDisabled: false,
        anticheatBlockedUntil: 0,
        clickTimestamps: [],
        role: 'player',
        prestigeBonus: 0,
    };

    // ========== ДОСТИЖЕНИЯ (50+) ==========
    function generateAchievements() {
        const list = [];
        for (let i = 1; i <= 20; i++) {
            let target = 100 * Math.pow(1.6, i-1);
            list.push({ id: `total_${i}`, name: `${Math.floor(target).toLocaleString()} рыб`, cond: () => game.totalFish >= target, reward: Math.floor(target * 0.1) });
        }
        for (let i = 1; i <= 15; i++) {
            let clicks = 50 * Math.pow(2, i-1);
            list.push({ id: `clicks_${i}`, name: `${Math.floor(clicks).toLocaleString()} кликов`, cond: () => game.stats.totalClicks >= clicks, reward: Math.floor(clicks * 0.2) });
        }
        for (let i = 1; i <= 10; i++) {
            list.push({ id: `clickPower_${i}`, name: `Сила клика ${i}`, cond: () => game.upgrades.clickPower >= i, reward: 50 * i });
            list.push({ id: `auto_${i}`, name: `Автокликер ${i}`, cond: () => game.upgrades.autoClicker >= i, reward: 60 * i });
        }
        for (let i = 1; i <= 5; i++) {
            list.push({ id: `crit_${i}`, name: `Крит ${i}`, cond: () => game.upgrades.crit >= i, reward: 80 * i });
            list.push({ id: `bank_${i}`, name: `Банк ${i}`, cond: () => game.upgrades.bank >= i, reward: 150 * i });
        }
        return list.slice(0, 60);
    }
    let achievementsList = generateAchievements();

    function initAchievements() {
        achievementsList.forEach(ach => { if (game.achievements[ach.id] === undefined) game.achievements[ach.id] = false; });
    }

    async function checkAchievements() {
        let changed = false;
        for (let ach of achievementsList) {
            if (!game.achievements[ach.id] && ach.cond()) {
                game.achievements[ach.id] = true;
                game.fish += ach.reward;
                game.totalFish += ach.reward;
                changed = true;
                showToast(`🏆 ${ach.name}! +${ach.reward} рыб`);
            }
        }
        if (changed) await saveToSupabase();
    }

    // ========== ИГРОВЫЕ РАСЧЁТЫ ==========
    function getClickPower() {
        let base = 1 + game.upgrades.clickPower * 2;
        let mult = 1 + game.upgrades.clickMult * 0.03;
        let prestige = game.prestigeBonus;
        return Math.floor(base * mult * (1 + prestige / 100));
    }
    function getPassiveIncome() {
        let inc = game.upgrades.autoClicker * 1;
        let mult = 1 + game.upgrades.passiveMult * 0.02;
        return Math.floor(inc * mult);
    }
    function getCritChance() { return Math.min(70, game.upgrades.crit * 5); }
    function getBankBonus() { return game.upgrades.bank * 0.005; }
    function getEventBonus() { return 1 + game.upgrades.eventBonus * 0.1; }

    async function addFish(amount, fromClick = false) {
        if (!game.nickname) return;
        let final = amount;
        if (fromClick && getBankBonus() > 0) final += Math.floor(game.totalFish * getBankBonus());
        game.fish += final;
        game.totalFish += final;
        if (fromClick) game.stats.totalClicks++;
        await saveToSupabase();
        await checkAchievements();
        renderUI();
    }

    // ========== АНТИЧИТ ==========
    function isAnticheatBlocked() {
        if (game.anticheatDisabled) return false;
        if (Date.now() < game.anticheatBlockedUntil) return true;
        return false;
    }
    function registerClick() {
        if (isAnticheatBlocked()) { showToast("⛔ Античит: блокировка 8 сек"); return false; }
        const now = Date.now();
        game.clickTimestamps.push(now);
        while (game.clickTimestamps.length && game.clickTimestamps[0] < now - 1000) game.clickTimestamps.shift();
        if (game.clickTimestamps.length > 18) {
            game.anticheatBlockedUntil = now + 8000;
            game.clickTimestamps = [];
            showToast("⚠️ Слишком быстро! Блокировка на 8 секунд.");
            renderUI();
            return false;
        }
        return true;
    }

    // ========== РАБОТА С SUPABASE (с обработкой ошибок) ==========
    async function saveToSupabase() {
        if (!supabase || !game.nickname) return;
        try {
            const data = {
                nickname: game.nickname,
                fish: game.fish,
                total_fish: game.totalFish,
                click_power_level: game.upgrades.clickPower,
                auto_level: game.upgrades.autoClicker,
                crit_level: game.upgrades.crit,
                bank_level: game.upgrades.bank,
                click_mult_level: game.upgrades.clickMult,
                passive_mult_level: game.upgrades.passiveMult,
                event_bonus_level: game.upgrades.eventBonus,
                prestige_bonus: game.prestigeBonus,
                anticheat_disabled: game.anticheatDisabled,
                role: game.role,
                stats: game.stats,
                achievements: game.achievements,
                updated_at: new Date(),
            };
            await supabase.from('users').upsert(data, { onConflict: 'nickname' });
            await supabase.from('leaderboard').upsert({ nickname: game.nickname, total_fish: game.totalFish, updated_at: new Date() }, { onConflict: 'nickname' });
        } catch(e) { console.warn("Supabase save error", e); }
    }

    async function loadFromSupabase(nickname) {
        if (!supabase) return false;
        try {
            const { data, error } = await supabase.from('users').select('*').eq('nickname', nickname).maybeSingle();
            if (error || !data) return false;
            game.nickname = data.nickname;
            game.fish = data.fish;
            game.totalFish = data.total_fish;
            game.upgrades = {
                clickPower: data.click_power_level || 0,
                autoClicker: data.auto_level || 0,
                crit: data.crit_level || 0,
                bank: data.bank_level || 0,
                clickMult: data.click_mult_level || 0,
                passiveMult: data.passive_mult_level || 0,
                eventBonus: data.event_bonus_level || 0,
            };
            game.stats = data.stats || { totalClicks:0, prestigeCount:0 };
            game.achievements = data.achievements || {};
            game.anticheatDisabled = data.anticheat_disabled || false;
            game.role = data.role || 'player';
            game.prestigeBonus = data.prestige_bonus || 0;
            initAchievements();
            return true;
        } catch(e) { console.warn(e); return false; }
    }

    // ========== ЛИДЕРБОРД (из Supabase) ==========
    async function fetchLeaderboard() {
        if (!supabase) return [];
        try {
            const { data, error } = await supabase.from('leaderboard').select('nickname, total_fish').order('total_fish', { ascending: false }).limit(20);
            if (error) return [];
            return data;
        } catch(e) { return []; }
    }

    async function showLeaderboardModal() {
        const leaders = await fetchLeaderboard();
        let msg = "🏆 ГЛОБАЛЬНЫЙ ТОП 🏆\n";
        leaders.forEach((u,i) => msg += `${i+1}. ${u.nickname} — ${u.total_fish.toLocaleString()} 🐟\n`);
        alert(msg);
    }

    // ========== ПРОФИЛЬ И СПИСОК ИГРОКОВ ==========
    async function showPlayersModal() {
        if (!supabase) { alert("Нет подключения к Supabase"); return; }
        const { data: players, error } = await supabase.from('users').select('nickname, total_fish, role').order('total_fish', { ascending: false });
        if (error) { alert("Ошибка"); return; }
        const modalHtml = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>👥 Все игроки</h3>
                <div class="player-list" id="playerList">
                    ${players.map(p => `<div class="player-item" data-nick="${p.nickname}"><strong>${escapeHtml(p.nickname)}</strong> (${p.role === 'developer' ? '👑 Разработчик' : '🦭 Игрок'}) — ${p.total_fish.toLocaleString()} 🐟</div>`).join('')}
                </div>
                <div id="selectedProfile" style="margin-top:15px; border-top:1px solid #ccc; padding-top:10px;"></div>
            </div>
        `;
        const modal = createModal(modalHtml);
        modal.querySelectorAll('.player-item').forEach(el => {
            el.onclick = async () => {
                const nick = el.dataset.nick;
                const { data: userData } = await supabase.from('users').select('*').eq('nickname', nick).single();
                if (userData) {
                    modal.querySelector('#selectedProfile').innerHTML = `
                        <h4>Профиль: ${escapeHtml(userData.nickname)}</h4>
                        <p>Роль: ${userData.role === 'developer' ? 'Разработчик' : 'Игрок'}</p>
                        <p>Всего рыбы: ${userData.total_fish.toLocaleString()}</p>
                        <p>Сила клика: ${1 + (userData.click_power_level||0)*2}</p>
                        <p>Пассив: ${(userData.auto_level||0)}/сек</p>
                        <p>Крит: ${(userData.crit_level||0)*5}%</p>
                    `;
                }
            };
        });
    }

    // ========== АДМИН-ПАНЕЛЬ ==========
    function showAdminModal() {
        const modalHtml = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>👑 Админ-панель</h3>
                <input type="password" id="adminPass" placeholder="Пароль администратора" style="width:100%; margin:10px 0;">
                <button id="adminLoginBtn">Войти</button>
                <div id="adminControls" style="display:none; margin-top:15px;">
                    <h4>Выдать ресурсы:</h4>
                    <input type="number" id="giveFish" placeholder="Рыба"> <button id="giveFishBtn">Выдать</button><br><br>
                    <select id="upgradeSelect">
                        <option value="clickPower">Сила клика</option>
                        <option value="autoClicker">Автокликер</option>
                        <option value="crit">Крит</option>
                        <option value="bank">Банк</option>
                        <option value="clickMult">Множитель клика</option>
                        <option value="passiveMult">Множитель пассива</option>
                        <option value="eventBonus">Бонус событий</option>
                    </select>
                    <input type="number" id="giveLevels" placeholder="Уровней"> <button id="giveUpgradeBtn">Выдать</button><br><br>
                    <select id="roleSelect"><option value="player">Игрок</option><option value="developer">Разработчик</option></select>
                    <button id="setRoleBtn">Установить роль</button><br><br>
                    <button id="resetAnticheatBtn">Сбросить блокировку античита</button>
                </div>
            </div>
        `;
        const modal = createModal(modalHtml);
        const adminLoginBtn = modal.querySelector('#adminLoginBtn');
        const adminControls = modal.querySelector('#adminControls');
        adminLoginBtn.onclick = () => {
            const pass = modal.querySelector('#adminPass').value;
            if (pass === 'seal123') {
                adminControls.style.display = 'block';
                adminLoginBtn.disabled = true;
            } else showToast("Неверный пароль!");
        };
        modal.querySelector('#giveFishBtn').onclick = async () => {
            const amount = parseInt(modal.querySelector('#giveFish').value);
            if (isNaN(amount)) return;
            game.fish += amount;
            game.totalFish += amount;
            await saveToSupabase();
            await checkAchievements();
            renderUI();
            showToast(`Выдано ${amount} рыбы`);
        };
        modal.querySelector('#giveUpgradeBtn').onclick = async () => {
            const up = modal.querySelector('#upgradeSelect').value;
            const levels = parseInt(modal.querySelector('#giveLevels').value);
            if (isNaN(levels)) return;
            game.upgrades[up] += levels;
            await saveToSupabase();
            await checkAchievements();
            renderUI();
            showToast(`Улучшение ${up} +${levels}`);
        };
        modal.querySelector('#setRoleBtn').onclick = async () => {
            const role = modal.querySelector('#roleSelect').value;
            game.role = role;
            await saveToSupabase();
            renderUI();
            showToast(`Роль: ${role === 'developer' ? 'Разработчик' : 'Игрок'}`);
        };
        modal.querySelector('#resetAnticheatBtn').onclick = async () => {
            game.anticheatBlockedUntil = 0;
            await saveToSupabase();
            showToast("Античит разблокирован");
            renderUI();
        };
    }

    // ========== ОТКЛЮЧЕНИЕ АНТИЧИТА ПО ПАРОЛЮ ==========
    function showDisableAnticheatModal() {
        const modalHtml = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>Отключение защиты от авто-клика</h3>
                <input type="password" id="anticheatPass" placeholder="Пароль" style="width:100%; margin:10px 0;">
                <button id="confirmDisableBtn">Отключить навсегда</button>
            </div>
        `;
        const modal = createModal(modalHtml);
        modal.querySelector('#confirmDisableBtn').onclick = async () => {
            const pass = modal.querySelector('#anticheatPass').value;
            if (pass === 'seal') {
                game.anticheatDisabled = true;
                await saveToSupabase();
                showToast("✅ Защита отключена!");
                modal.remove();
                renderUI();
            } else showToast("❌ Неверный пароль!");
        };
    }

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ UI ==========
    function createModal(html) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = html;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        return modal;
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    // ========== ПОЯСНЕНИЯ К УЛУЧШЕНИЯМ ==========
    function showHelp(upgradeId) {
        const helps = {
            clickPower: "🐟 Острый зуб: +2 рыбы за клик за уровень.",
            autoClicker: "⏱️ Автокормушка: +1 рыба/сек за уровень.",
            crit: "⚡ Крит-удар: +5% шанс x2 за уровень.",
            bank: "🏦 Банк: +0.5% от общего улова за клик за уровень.",
            clickMult: "📈 Множитель клика: +3% к силе клика за уровень.",
            passiveMult: "📈 Множитель пассива: +2% к пассивному доходу за уровень.",
            eventBonus: "🎁 Бонус событий: +10% к наградам событий за уровень.",
        };
        alert(helps[upgradeId] || "Улучшение увеличивает доход.");
    }

    // ========== ПРЕСТИЖ ==========
    async function doPrestige() {
        if (game.totalFish < 5000) { showToast("Нужно 5000 общей рыбы"); return; }
        if (confirm("Престиж: сбросить рыбу и улучшения, получить +50% к силе клика навсегда?")) {
            game.prestigeBonus += 50;
            game.fish = 0;
            game.totalFish = 0;
            game.upgrades = { clickPower:0, autoClicker:0, crit:0, bank:0, clickMult:0, passiveMult:0, eventBonus:0 };
            game.stats.prestigeCount++;
            await saveToSupabase();
            await checkAchievements();
            renderUI();
            showToast("🌟 Престиж! +50% к силе клика.");
        }
    }

    // ========== ПОКУПКА УЛУЧШЕНИЙ ==========
    async function buyUpgrade(id, basePrice, name) {
        let level = game.upgrades[id];
        let price = Math.floor(basePrice * (level + 1));
        if (game.fish < price) { showToast(`❌ Нужно ${price} рыб`); return; }
        game.fish -= price;
        game.upgrades[id]++;
        await saveToSupabase();
        await checkAchievements();
        renderUI();
        showToast(`🎉 ${name} → ур.${game.upgrades[id]}`);
    }

    // ========== ОСНОВНОЙ РЕНДЕР ИНТЕРФЕЙСА ==========
    function renderUI() {
        const root = document.getElementById('app');
        if (!game.nickname) {
            root.innerHTML = `
                <h1>🦭 SEAL CLICKER</h1>
                <div class="nick-panel">
                    <input type="text" id="nickInput" class="nick-input" placeholder="Твой ник" maxlength="20">
                    <button id="startBtn">НАЧАТЬ</button>
                </div>
                <button id="leaderboardBtn" class="action-buttons" style="width:100%; margin-top:10px;">🏆 Глобальный топ</button>
                <footer>Введи ник – прогресс сохранится в облаке (если Supabase настроен).</footer>
            `;
            const startBtn = document.getElementById('startBtn');
            if (startBtn) startBtn.onclick = async () => {
                const nick = document.getElementById('nickInput').value.trim();
                if (!nick) return;
                const loaded = await loadFromSupabase(nick);
                if (!loaded) {
                    game.nickname = nick;
                    game.fish = 0;
                    game.totalFish = 0;
                    game.upgrades = { clickPower:0, autoClicker:0, crit:0, bank:0, clickMult:0, passiveMult:0, eventBonus:0 };
                    game.stats = { totalClicks:0, prestigeCount:0 };
                    game.achievements = {};
                    game.anticheatDisabled = false;
                    game.role = 'player';
                    game.prestigeBonus = 0;
                    initAchievements();
                    await saveToSupabase();
                }
                startGameLoop();
                renderUI();
            };
            const lbBtn = document.getElementById('leaderboardBtn');
            if (lbBtn) lbBtn.onclick = showLeaderboardModal;
            return;
        }

        // ----- Игровой интерфейс -----
        const fish = Math.floor(game.fish);
        const total = Math.floor(game.totalFish);
        const clickPower = getClickPower();
        const passive = getPassiveIncome();
        const critChance = getCritChance();
        const bankBonus = (getBankBonus() * 100).toFixed(1);
        const blocked = isAnticheatBlocked();
        const unlockCount = achievementsList.filter(a => game.achievements[a.id]).length;

        const upgradesList = [
            { id: 'clickPower', name: '🐟 Острый зуб', desc: '+2 рыбы/клик', basePrice: 20, level: game.upgrades.clickPower },
            { id: 'autoClicker', name: '⏱️ Автокормушка', desc: '+1 рыба/сек', basePrice: 25, level: game.upgrades.autoClicker },
            { id: 'crit', name: '⚡ Крит-удар', desc: '+5% шанс x2', basePrice: 80, level: game.upgrades.crit },
            { id: 'bank', name: '🏦 Банк', desc: '+0.5% от улова за клик', basePrice: 200, level: game.upgrades.bank },
            { id: 'clickMult', name: '📈 Множитель клика', desc: '+3% к силе', basePrice: 500, level: game.upgrades.clickMult },
            { id: 'passiveMult', name: '📈 Множитель пассива', desc: '+2% к пассивке', basePrice: 700, level: game.upgrades.passiveMult },
            { id: 'eventBonus', name: '🎁 Бонус событий', desc: '+10% к наградам', basePrice: 300, level: game.upgrades.eventBonus },
        ];

        let upgradesHtml = '';
        for (let up of upgradesList) {
            const price = Math.floor(up.basePrice * (up.level + 1));
            const canBuy = game.fish >= price && !blocked;
            upgradesHtml += `
                <div class="upgrade">
                    <div class="upgrade-info">
                        <div class="upgrade-name">${up.name}</div>
                        <div class="upgrade-desc">${up.desc} (ур.${up.level})</div>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button class="buy-btn" data-upgrade="${up.id}" data-price="${up.basePrice}" ${!canBuy ? 'disabled' : ''}>${price} 🐟</button>
                        <div class="help-icon" data-help="${up.id}">?</div>
                    </div>
                </div>
            `;
        }

        let achievementsHtml = '';
        for (let ach of achievementsList.slice(0, 45)) {
            const unlocked = game.achievements[ach.id];
            achievementsHtml += `<div class="achievement ${unlocked ? 'unlocked' : ''}">${unlocked ? '✅' : '🔒'} ${ach.name}</div>`;
        }

        root.innerHTML = `
            <h1>🦭 SEAL CLICKER</h1>
            <div class="nick-panel" style="justify-content:space-between;">
                <span>🐚 ${escapeHtml(game.nickname)} | Роль: ${game.role === 'developer' ? '👑 Разработчик' : '🦭 Игрок'}</span>
                <span>⭐ Престиж +${game.prestigeBonus}%</span>
                <button id="logoutBtn">Выйти</button>
            </div>
            <div class="seal-area" id="clickZone">
                <div class="seal-emoji" id="sealEmoji">🦭</div>
                <div>👆 нажми на тюленя</div>
            </div>
            <div class="fish-counter">🐟 ${fish.toLocaleString()}</div>
            <div class="stat-grid">
                <div class="stat">💪 Сила: +${clickPower}</div>
                <div class="stat">⏱️ Пассив: +${passive}/сек</div>
                <div class="stat">💥 Крит: ${critChance}%</div>
                <div class="stat">🏦 Банк: +${bankBonus}%</div>
            </div>
            <div class="stat-grid">
                <div class="stat">🏆 Всего: ${total.toLocaleString()}</div>
                <div class="stat">🖱️ Кликов: ${game.stats.totalClicks}</div>
            </div>
            ${blocked ? `<div class="warning">⛔ Античит: клики заблокированы на несколько секунд</div>` : ''}
            <div class="action-buttons">
                <button id="disableAnticheatBtn">🔓 Отключить защиту</button>
                <button id="adminPanelBtn">👑 Админ-панель</button>
                <button id="playersBtn">👥 Игроки и профиль</button>
                <button id="leaderboardBtn">🏆 Топ</button>
                <button id="prestigeBtn">🏅 Престиж</button>
            </div>
            <div style="font-weight:bold; margin:10px 0 5px;">📦 МАГАЗИН ФУНКЦИЙ</div>
            ${upgradesHtml}
            <div class="achievements">
                <strong>🏅 ДОСТИЖЕНИЯ (${unlockCount}/${achievementsList.length})</strong>
                <div style="max-height:200px; overflow-y:auto;">${achievementsHtml}</div>
            </div>
            <footer>Автосохранение в облаке. Античит отключается паролем "seal". Админ-пароль "seal123".</footer>
        `;

        // Обработчики
        document.getElementById('clickZone').onclick = () => {
            if (!registerClick()) return;
            let gain = getClickPower();
            if (Math.random() < getCritChance()/100) gain *= 2;
            addFish(gain, true);
            const seal = document.getElementById('sealEmoji');
            if (seal) {
                seal.classList.add('click-effect');
                setTimeout(() => seal.classList.remove('click-effect'), 100);
                playSound(600, 0.08);
            }
        };
        document.getElementById('logoutBtn').onclick = () => { game.nickname = null; if (passiveInterval) clearInterval(passiveInterval); renderUI(); };
        document.getElementById('disableAnticheatBtn').onclick = showDisableAnticheatModal;
        document.getElementById('adminPanelBtn').onclick = showAdminModal;
        document.getElementById('playersBtn').onclick = showPlayersModal;
        document.getElementById('leaderboardBtn').onclick = showLeaderboardModal;
        document.getElementById('prestigeBtn').onclick = doPrestige;
        document.querySelectorAll('.buy-btn').forEach(btn => {
            const id = btn.dataset.upgrade;
            const price = parseInt(btn.dataset.price);
            btn.onclick = () => buyUpgrade(id, price, upgradesList.find(u => u.id === id).name);
        });
        document.querySelectorAll('.help-icon').forEach(icon => {
            const id = icon.dataset.help;
            icon.onclick = (e) => { e.stopPropagation(); showHelp(id); };
        });
    }

    // ========== ЗВУК ==========
    let audioCtx = null;
    function playSound(freq, duration) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.value = 0.05;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    // ========== ИГРОВОЙ ЦИКЛ ==========
    let passiveInterval = null;
    let eventInterval = null;
    function startGameLoop() {
        if (passiveInterval) clearInterval(passiveInterval);
        if (eventInterval) clearInterval(eventInterval);
        passiveInterval = setInterval(async () => {
            if (game.nickname) {
                let inc = getPassiveIncome();
                if (inc > 0) await addFish(inc, false);
            }
        }, 1000);
        eventInterval = setInterval(async () => {
            if (game.nickname && Math.random() < 0.4) {
                const events = [
                    { msg: "🐟 Косяк рыбы! +50", gain: 50 },
                    { msg: "💎 Золотая рыбка! +200", gain: 200 },
                    { msg: "🎣 Рыбак поделился +30", gain: 30 },
                ];
                const ev = events[Math.floor(Math.random() * events.length)];
                let gain = ev.gain * getEventBonus();
                await addFish(gain, false);
                showToast(ev.msg + " " + Math.floor(gain) + " рыб!");
            }
        }, 25000);
    }

    // ========== СТАРТ ==========
    initAchievements();
    renderUI();
</script>
</body>
</html>
