<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌙 Nova Chat | Мессенджер</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            background: #0a0a0a;
        }

        /* САЙДБАР */
        .sidebar {
            width: 320px;
            background: #111111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #222;
            background: #0d0d0d;
        }

        .sidebar-header h2 {
            font-size: 20px;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ПОИСК */
        .search-box {
            padding: 15px;
            border-bottom: 1px solid #222;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .search-input:focus {
            border-color: #a855f7;
        }

        /* ПОЛЬЗОВАТЕЛЬ В САЙДБАРЕ */
        .user-info-sidebar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            background: #0d0d0d;
            border-bottom: 1px solid #222;
            cursor: pointer;
        }

        .user-avatar-sidebar {
            width: 45px;
            height: 45px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid #a855f7;
        }

        .user-info-sidebar .user-details {
            flex: 1;
        }

        .user-info-sidebar .user-name {
            font-weight: bold;
            font-size: 15px;
        }

        .user-info-sidebar .user-status {
            font-size: 11px;
            color: #4ade80;
        }

        .logout-sidebar {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }

        /* СПИСОК ЧАТОВ */
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #1a1a1a;
        }

        .chat-item:hover {
            background: #1a1a1a;
        }

        .chat-item.active {
            background: #1a1a1a;
            border-left: 3px solid #a855f7;
        }

        .chat-avatar {
            width: 45px;
            height: 45px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: bold;
            font-size: 14px;
        }

        .chat-preview {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        /* ОСНОВНАЯ ОБЛАСТЬ ЧАТА */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
        }

        .chat-header {
            padding: 15px 20px;
            background: #111111;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-weight: bold;
            font-size: 16px;
        }

        .chat-header-status {
            font-size: 11px;
            color: #888;
        }

        .call-buttons {
            display: flex;
            gap: 10px;
        }

        .call-btn {
            background: #1a1a1a;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .call-btn:hover {
            background: #a855f7;
        }

        /* СООБЩЕНИЯ */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 70%;
        }

        .message-own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .message-bubble {
            background: #1a1a1a;
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 100%;
        }

        .message-own .message-bubble {
            background: #a855f7;
            color: white;
        }

        .message-user {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 3px;
            color: #a855f7;
        }

        .message-own .message-user {
            color: #c0a0ff;
        }

        .message-text {
            font-size: 14px;
            word-wrap: break-word;
        }

        .message-time {
            font-size: 9px;
            color: #888;
            margin-top: 3px;
            text-align: right;
        }

        /* ГОЛОСОВОЕ СООБЩЕНИЕ */
        .voice-message {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 20px;
        }

        .voice-play {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .voice-wave {
            flex: 1;
            height: 30px;
            background: repeating-linear-gradient(90deg, #a855f7, #a855f7 2px, transparent 2px, transparent 6px);
            background-size: 4px 100%;
        }

        .voice-duration {
            font-size: 11px;
            color: #888;
        }

        /* ВВОД СООБЩЕНИЯ */
        .message-input-area {
            padding: 15px 20px;
            background: #111111;
            border-top: 1px solid #222;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .message-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 25px;
            padding: 12px 18px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .message-input:focus {
            border-color: #a855f7;
        }

        .voice-record-btn {
            background: #1a1a1a;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice-record-btn.recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .send-btn {
            background: #a855f7;
            border: none;
            border-radius: 25px;
            padding: 0 24px;
            color: white;
            cursor: pointer;
            font-size: 18px;
            height: 45px;
        }

        /* МОДАЛКИ */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            border: 1px solid #a855f7;
        }

        .modal-content h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #a855f7;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            background: #a855f7;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .close-modal {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #888;
        }

        .avatar-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .avatar-opt {
            font-size: 30px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .avatar-opt:hover {
            background: #a855f7;
            transform: scale(1.1);
        }

        .avatar-opt.selected {
            background: #a855f7;
            box-shadow: 0 0 10px #a855f7;
        }

        .code-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .code-input {
            width: 45px;
            text-align: center;
            font-size: 24px;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
        }

        .error {
            color: #ef4444;
            text-align: center;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .link-btn {
            background: none !important;
            color: #a855f7 !important;
            margin-top: 10px;
        }

        /* ЗВОНОК */
        .call-modal {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: #1a1a1a;
            border: 2px solid #a855f7;
            border-radius: 20px;
            padding: 20px;
            width: 300px;
            text-align: center;
            z-index: 100;
        }

        .call-modal .call-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }

        .call-modal button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .answer-call {
            background: #4ade80;
            color: white;
        }

        .reject-call {
            background: #ef4444;
            color: white;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #a855f7;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="app" id="app" style="display: none;">
        <!-- БОКОВАЯ ПАНЕЛЬ -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🌙 Nova Chat</h2>
            </div>
            <div class="user-info-sidebar" onclick="showProfileModal()">
                <div class="user-avatar-sidebar" id="sidebarAvatar">👤</div>
                <div class="user-details">
                    <div class="user-name" id="sidebarName">milk123</div>
                    <div class="user-status" id="sidebarStatus">🟢 Онлайн</div>
                </div>
                <button class="logout-sidebar" onclick="logout()">🚪</button>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск чатов...">
            </div>
            <div class="chats-list" id="chatsList"></div>
        </div>

        <!-- ОСНОВНАЯ ОБЛАСТЬ ЧАТА -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-header-avatar" id="chatHeaderAvatar">👥</div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatHeaderName">Общий чат</div>
                    <div class="chat-header-status" id="chatHeaderStatus">👥 Группа</div>
                </div>
                <div class="call-buttons">
                    <button class="call-btn" onclick="startAudioCall()" title="Аудиозвонок">🎤</button>
                    <button class="call-btn" onclick="startVideoCall()" title="Видеозвонок">📹</button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="message-input-area">
                <button class="voice-record-btn" id="voiceRecordBtn" onclick="toggleVoiceRecording()">🎙️</button>
                <input type="text" class="message-input" id="messageInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">📤</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ВХОДА -->
    <div id="authModal" class="modal" style="display: flex;">
        <div class="modal-content">
            <div id="loginForm">
                <h2>🔐 Вход в Nova Chat</h2>
                <div id="loginError" class="error"></div>
                <input type="text" id="loginUsername" placeholder="Имя пользователя">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button onclick="doLogin()">Войти</button>
                <button class="link-btn" onclick="showRegisterForm()">📝 Нет аккаунта? Зарегистрироваться</button>
            </div>
            <div id="registerForm" style="display: none;">
                <h2>📝 Регистрация</h2>
                <div id="registerError" class="error"></div>
                <input type="text" id="regUsername" placeholder="Имя пользователя">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Пароль (мин. 4 символа)">
                <button onclick="sendVerificationCode()">📨 Отправить код на почту</button>
                <button class="link-btn" onclick="showLoginForm()">🔐 Уже есть аккаунт? Войти</button>
            </div>
            <div id="verifyForm" style="display: none;">
                <h2>🔐 Подтверждение</h2>
                <div id="verifyError" class="error"></div>
                <div class="code-inputs">
                    <input type="text" maxlength="1" class="code-input" id="code1" oninput="moveToNext(this, 'code2')">
                    <input type="text" maxlength="1" class="code-input" id="code2" oninput="moveToNext(this, 'code3')">
                    <input type="text" maxlength="1" class="code-input" id="code3" oninput="moveToNext(this, 'code4')">
                    <input type="text" maxlength="1" class="code-input" id="code4" oninput="moveToNext(this, 'code5')">
                    <input type="text" maxlength="1" class="code-input" id="code5" oninput="moveToNext(this, 'code6')">
                    <input type="text" maxlength="1" class="code-input" id="code6" oninput="verifyCode()">
                </div>
                <button onclick="verifyCode()">✅ Подтвердить</button>
                <button class="link-btn" onclick="resendCode()">🔄 Отправить код повторно</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ПРОФИЛЯ -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeProfileModal()">✖</span>
            <h2>👤 Мой профиль</h2>
            <div id="profileError" class="error"></div>
            <div class="avatar-selector" id="avatarSelector">
                <div class="avatar-opt" onclick="selectAvatar('👤')">👤</div>
                <div class="avatar-opt" onclick="selectAvatar('😀')">😀</div>
                <div class="avatar-opt" onclick="selectAvatar('😎')">😎</div>
                <div class="avatar-opt" onclick="selectAvatar('🐱')">🐱</div>
                <div class="avatar-opt" onclick="selectAvatar('🐶')">🐶</div>
                <div class="avatar-opt" onclick="selectAvatar('⭐')">⭐</div>
                <div class="avatar-opt" onclick="selectAvatar('🌙')">🌙</div>
                <div class="avatar-opt" onclick="selectAvatar('🚀')">🚀</div>
            </div>
            <input type="text" id="profileDisplayName" placeholder="Отображаемое имя">
            <textarea id="profileBio" rows="3" placeholder="О себе"></textarea>
            <button onclick="updateProfile()">💾 Сохранить</button>
        </div>
    </div>

    <!-- МОДАЛКА СОЗДАНИЯ ГРУППЫ -->
    <div id="createGroupModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCreateGroupModal()">✖</span>
            <h2>➕ Создать группу</h2>
            <input type="text" id="groupName" placeholder="Название группы">
            <button onclick="createGroup()">Создать</button>
        </div>
    </div>

    <!-- МОДАЛКА ЗВОНКА -->
    <div id="callModal" class="call-modal" style="display: none;">
        <div id="callStatus">📞 Входящий звонок...</div>
        <div class="call-actions">
            <button class="answer-call" onclick="answerCall()">Ответить</button>
            <button class="reject-call" onclick="rejectCall()">Отклонить</button>
        </div>
    </div>

    <script>
        // ============================================
        // КОНФИГУРАЦИЯ
        // ============================================
        const SUPABASE_URL = 'https://drsmnvtmyxqeqjoybaxq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRyc21udnRteXhxZXFqb3liYXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NzE0MDEsImV4cCI6MjA5MTQ0NzQwMX0.copFAJWP57olKR3cm6PTfYdMh5gQM1-z0Bo7-q-q004';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // EmailJS
        emailjs.init('ZGGZOMtj2UyXw9FqL');
        const EMAILJS_SERVICE_ID = 'service_6xc4w3o';
        const EMAILJS_TEMPLATE_ID = 'template_xrzni65';

        // Глобальные переменные
        let currentUser = null;
        let currentChat = { type: 'group', id: 1, name: 'Общий чат', avatar: '👥' };
        let pendingRegistration = null;
        let pendingCode = null;
        let selectedAvatar = '👤';
        let realtimeSubscription = null;
        let chats = [];
        let searchQuery = '';
        
        // Переменные для звонков (заглушка)
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        // ============================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================
        function moveToNext(current, nextId) {
            if (current.value.length === 1) {
                document.getElementById(nextId).focus();
            }
        }

        function getCode() {
            return document.getElementById('code1').value +
                   document.getElementById('code2').value +
                   document.getElementById('code3').value +
                   document.getElementById('code4').value +
                   document.getElementById('code5').value +
                   document.getElementById('code6').value;
        }

        function clearCodeInputs() {
            for(let i = 1; i <= 6; i++) {
                document.getElementById(`code${i}`).value = '';
            }
            document.getElementById('code1').focus();
        }

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            if (el) {
                el.innerText = message;
                setTimeout(() => el.innerText = '', 3000);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // РЕГИСТРАЦИЯ И ПОДТВЕРЖДЕНИЕ
        // ============================================
        window.sendVerificationCode = async function() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username || !email || !password) {
                showError('registerError', '❌ Заполните все поля');
                return;
            }
            if (password.length < 4) {
                showError('registerError', '❌ Пароль минимум 4 символа');
                return;
            }

            const { data: existing } = await supabaseClient
                .from('users')
                .select('username')
                .eq('username', username)
                .or(`email.eq.${email}`);

            if (existing && existing.length > 0) {
                showError('registerError', '❌ Пользователь или email уже существуют');
                return;
            }

            const code = Math.floor(100000 + Math.random() * 900000).toString();
            pendingCode = code;
            pendingRegistration = { username, email, password };

            try {
                // Правильный формат для EmailJS
                const templateParams = {
                    to_email: email,
                    code: code,
                    message: `Ваш код подтверждения: ${code}`
                };
                
                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
                
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('verifyForm').style.display = 'block';
                clearCodeInputs();
                showError('verifyError', '');
            } catch (error) {
                console.error('EmailJS error:', error);
                showError('registerError', '❌ Ошибка отправки кода. Попробуйте позже.');
            }
        };

        window.verifyCode = async function() {
            const code = getCode();
            if (code.length !== 6) {
                showError('verifyError', '❌ Введите 6-значный код');
                return;
            }
            if (code !== pendingCode) {
                showError('verifyError', '❌ Неверный код');
                return;
            }

            const { error } = await supabaseClient
                .from('users')
                .insert([{
                    username: pendingRegistration.username,
                    email: pendingRegistration.email,
                    password: pendingRegistration.password,
                    role: 'user',
                    display_name: pendingRegistration.username,
                    avatar: '👤'
                }]);

            if (error) {
                showError('verifyError', '❌ Ошибка регистрации');
                return;
            }

            alert('✅ Регистрация успешна! Теперь войдите.');
            pendingRegistration = null;
            pendingCode = null;
            window.showLoginForm();
        };

        window.resendCode = async function() {
            if (!pendingRegistration) return;
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            pendingCode = code;
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                to_email: pendingRegistration.email,
                code: code,
                message: `Ваш код подтверждения: ${code}`
            });
            alert('📨 Код отправлен повторно');
        };

        // ============================================
        // АВТОРИЗАЦИЯ
        // ============================================
        window.doLogin = async function() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            const { data, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('username', username)
                .eq('password', password);

            if (error || !data || data.length === 0) {
                showError('loginError', '❌ Неверное имя или пароль');
                return;
            }

            currentUser = data[0];
            selectedAvatar = currentUser.avatar || '👤';
            
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('sidebarName').innerText = currentUser.display_name || currentUser.username;
            document.getElementById('sidebarAvatar').innerText = currentUser.avatar || '👤';
            
            await loadChats();
            await loadMessages();
            startRealtime();
        };

        window.logout = function() {
            if (realtimeSubscription) {
                realtimeSubscription.unsubscribe();
            }
            currentUser = null;
            document.getElementById('app').style.display = 'none';
            document.getElementById('authModal').style.display = 'flex';
            window.showLoginForm();
        };

        // ============================================
        // ПРОФИЛЬ
        // ============================================
        window.showProfileModal = function() {
            document.getElementById('profileDisplayName').value = currentUser.display_name || currentUser.username;
            document.getElementById('profileBio').value = currentUser.bio || '';
            document.getElementById('profileModal').style.display = 'flex';
            
            document.querySelectorAll('.avatar-opt').forEach(opt => {
                if (opt.innerText === (currentUser.avatar || '👤')) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });
        };

        window.closeProfileModal = function() {
            document.getElementById('profileModal').style.display = 'none';
        };

        window.selectAvatar = function(avatar) {
            selectedAvatar = avatar;
            document.querySelectorAll('.avatar-opt').forEach(opt => {
                if (opt.innerText === avatar) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });
        };

        window.updateProfile = async function() {
            const displayName = document.getElementById('profileDisplayName').value.trim();
            const bio = document.getElementById('profileBio').value.trim();
            
            const { error } = await supabaseClient
                .from('users')
                .update({
                    display_name: displayName || currentUser.username,
                    bio: bio,
                    avatar: selectedAvatar
                })
                .eq('id', currentUser.id);

            if (error) {
                showError('profileError', '❌ Ошибка сохранения');
                return;
            }

            currentUser.display_name = displayName || currentUser.username;
            currentUser.bio = bio;
            currentUser.avatar = selectedAvatar;
            
            document.getElementById('sidebarName').innerText = currentUser.display_name;
            document.getElementById('sidebarAvatar').innerText = selectedAvatar;
            
            window.closeProfileModal();
            await loadChats();
            alert('✅ Профиль обновлён');
        };

        // ============================================
        // ЗАГРУЗКА ЧАТОВ
        // ============================================
        async function loadChats() {
            // Группы
            const { data: groups, error: groupsError } = await supabaseClient
                .from('group_members')
                .select(`
                    group_id,
                    groups:group_id (id, name)
                `)
                .eq('username', currentUser.username);

            if (groupsError) {
                console.error('Groups error:', groupsError);
            }

            // Пользователи для ЛС
            const { data: users, error: usersError } = await supabaseClient
                .from('users')
                .select('username, display_name, avatar, status')
                .neq('username', currentUser.username);

            if (usersError) {
                console.error('Users error:', usersError);
            }

            chats = [];
            
            // Добавляем группы
            if (groups && !groupsError) {
                groups.forEach(g => {
                    if (g.groups) {
                        chats.push({
                            id: g.groups.id,
                            type: 'group',
                            name: g.groups.name,
                            avatar: '👥',
                            preview: ''
                        });
                    }
                });
            }
            
            // Добавляем пользователей для ЛС
            if (users && !usersError) {
                users.forEach(u => {
                    chats.push({
                        id: u.username,
                        type: 'user',
                        name: u.display_name || u.username,
                        avatar: u.avatar || '👤',
                        status: u.status || 'offline',
                        preview: ''
                    });
                });
            }

            renderChats();
        }

        function renderChats() {
            const container = document.getElementById('chatsList');
            let filtered = chats;
            
            if (searchQuery) {
                filtered = chats.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase()));
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #888;">Нет чатов</div>';
                return;
            }
            
            let html = '';
            filtered.forEach(chat => {
                const isActive = (currentChat.type === chat.type && currentChat.id === chat.id);
                const statusClass = chat.status === 'online' ? '🟢' : '⚫';
                html += `
                    <div class="chat-item ${isActive ? 'active' : ''}" onclick="switchChat('${chat.type}', '${chat.id}', '${chat.name.replace(/'/g, "\\'")}', '${chat.avatar}')">
                        <div class="chat-avatar">${chat.avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${chat.name} ${chat.type === 'user' ? statusClass : ''}</div>
                            <div class="chat-preview">${chat.preview || 'Напишите сообщение...'}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ============================================
        // ПЕРЕКЛЮЧЕНИЕ ЧАТА
        // ============================================
        window.switchChat = function(type, id, name, avatar) {
            currentChat = { type, id, name, avatar };
            document.getElementById('chatHeaderName').innerText = name;
            document.getElementById('chatHeaderAvatar').innerText = avatar;
            if (type === 'user') {
                const user = chats.find(c => c.id === id);
                document.getElementById('chatHeaderStatus').innerHTML = user?.status === 'online' ? '🟢 Онлайн' : '⚫ Офлайн';
            } else {
                document.getElementById('chatHeaderStatus').innerHTML = '👥 Группа';
            }
            loadMessages();
            renderChats();
        };

        // ============================================
        // ЗАГРУЗКА СООБЩЕНИЙ
        // ============================================
        async function loadMessages() {
            const container = document.getElementById('messagesContainer');
            let messages = [];

            if (currentChat.type === 'group') {
                const { data } = await supabaseClient
                    .from('group_messages')
                    .select('*')
                    .eq('group_id', currentChat.id)
                    .order('created_at', { ascending: true });
                messages = data || [];
            } else {
                const { data } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .or(`and(from_user.eq.${currentUser.username},to_user.eq.${currentChat.id}),and(from_user.eq.${currentChat.id},to_user.eq.${currentUser.username})`)
                    .order('created_at', { ascending: true });
                messages = data || [];
            }

            // Получаем аватары пользователей
            const usersMap = {};
            const { data: users } = await supabaseClient.from('users').select('username, avatar, display_name');
            if (users) {
                users.forEach(u => {
                    usersMap[u.username] = { avatar: u.avatar || '👤', display_name: u.display_name || u.username };
                });
            }

            let html = '';
            messages.forEach(msg => {
                const isOwn = msg.from_user === currentUser.username;
                const avatar = isOwn ? (currentUser.avatar || '👤') : (usersMap[msg.from_user]?.avatar || '👤');
                const displayName = isOwn ? (currentUser.display_name || currentUser.username) : (usersMap[msg.from_user]?.display_name || msg.from_user);
                const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                // Проверка на голосовое сообщение
                if (msg.message && msg.message.startsWith('audio:')) {
                    const audioUrl = msg.message.substring(6);
                    html += `
                        <div class="message ${isOwn ? 'message-own' : ''}">
                            <div class="message-avatar">${avatar}</div>
                            <div class="message-bubble">
                                <div class="message-user">${escapeHtml(displayName)}</div>
                                <div class="voice-message">
                                    <button class="voice-play" onclick="playAudio('${audioUrl}')">▶️</button>
                                    <div class="voice-wave"></div>
                                    <span class="voice-duration">🎤</span>
                                </div>
                                <div class="message-time">${time}</div>
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="message ${isOwn ? 'message-own' : ''}">
                            <div class="message-avatar">${avatar}</div>
                            <div class="message-bubble">
                                <div class="message-user">${escapeHtml(displayName)}</div>
                                <div class="message-text">${escapeHtml(msg.message)}</div>
                                <div class="message-time">${time}</div>
                            </div>
                        </div>
                    `;
                }
            });
            container.innerHTML = html || '<div style="text-align:center; color:#888; padding:20px;">💬 Напишите первое сообщение!</div>';
            container.scrollTop = container.scrollHeight;
        }

        // ============================================
        // ОТПРАВКА СООБЩЕНИЙ
        // ============================================
        window.sendMessage = async function() {
            const text = document.getElementById('messageInput').value.trim();
            if (!text) return;

            if (currentChat.type === 'group') {
                await supabaseClient.from('group_messages').insert([{
                    group_id: currentChat.id,
                    username: currentUser.username,
                    message: text
                }]);
            } else {
                await supabaseClient.from('messages').insert([{
                    from_user: currentUser.username,
                    to_user: currentChat.id,
                    message: text
                }]);
            }

            document.getElementById('messageInput').value = '';
            loadMessages();
        };

        // ============================================
        // ГОЛОСОВЫЕ СООБЩЕНИЯ
        // ============================================
        window.toggleVoiceRecording = async function() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onloadend = async () => {
                            const audioDataUrl = reader.result;
                            const audioMessage = `audio:${audioDataUrl}`;
                            
                            if (currentChat.type === 'group') {
                                await supabaseClient.from('group_messages').insert([{
                                    group_id: currentChat.id,
                                    username: currentUser.username,
                                    message: audioMessage
                                }]);
                            } else {
                                await supabaseClient.from('messages').insert([{
                                    from_user: currentUser.username,
                                    to_user: currentChat.id,
                                    message: audioMessage
                                }]);
                            }
                            loadMessages();
                        };
                        reader.readAsDataURL(audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    document.getElementById('voiceRecordBtn').classList.add('recording');
                    document.getElementById('voiceRecordBtn').innerHTML = '⏹️';
                    
                    setTimeout(() => {
                        if (isRecording) {
                            stopVoiceRecording();
                        }
                    }, 30000);
                    
                } catch (err) {
                    alert('Не удалось получить доступ к микрофону');
                }
            } else {
                stopVoiceRecording();
            }
        };

        function stopVoiceRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('voiceRecordBtn').classList.remove('recording');
                document.getElementById('voiceRecordBtn').innerHTML = '🎙️';
            }
        }

        window.playAudio = function(audioDataUrl) {
            const audio = new Audio(audioDataUrl);
            audio.play();
        };

        // ============================================
        // ЗВОНКИ (ЗАГЛУШКА)
        // ============================================
        window.startAudioCall = function() {
            alert('📞 Аудиозвонок (в разработке)');
        };

        window.startVideoCall = function() {
            alert('📹 Видеозвонок (в разработке)');
        };

        // ============================================
        // ПОИСК
        // ============================================
        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderChats();
        });

        // ============================================
        // ГРУППЫ
        // ============================================
        window.createGroup = async function() {
            const name = document.getElementById('groupName').value.trim();
            if (!name) {
                alert('Введите название группы');
                return;
            }

            const { data: group, error } = await supabaseClient
                .from('groups')
                .insert([{ name, owner: currentUser.username }])
                .select();

            if (error) {
                alert('❌ Ошибка создания группы');
                return;
            }

            await supabaseClient.from('group_members').insert([{
                group_id: group[0].id,
                username: currentUser.username
            }]);

            closeCreateGroupModal();
            await loadChats();
            window.switchChat('group', group[0].id, name, '👥');
        };

        window.showCreateGroupModal = function() {
            document.getElementById('createGroupModal').style.display = 'flex';
        };

        window.closeCreateGroupModal = function() {
            document.getElementById('createGroupModal').style.display = 'none';
            document.getElementById('groupName').value = '';
        };

        // ============================================
        // РЕАЛЬНОЕ ВРЕМЯ
        // ============================================
        function startRealtime() {
            if (realtimeSubscription) {
                realtimeSubscription.unsubscribe();
            }
            realtimeSubscription = supabaseClient
                .channel('nova-chat-realtime')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'group_messages' }, () => {
                    if (currentChat.type === 'group') loadMessages();
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
                    if (currentChat.type !== 'group') loadMessages();
                })
                .subscribe();
        }

        // ============================================
        // ПЕРЕКЛЮЧЕНИЕ ФОРМ
        // ============================================
        window.showRegisterForm = function() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('verifyForm').style.display = 'none';
        };

        window.showLoginForm = function() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('verifyForm').style.display = 'none';
        };
    </script>
</body>
</html>
