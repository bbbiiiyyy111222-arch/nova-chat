<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🦭 Тюлений бизнес | Кликер + бои</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1e6b3e, #0f4a2a);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-card {
            max-width: 800px;
            width: 100%;
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #1c6948;
            margin-bottom: 20px;
        }
        .register-area {
            background: #e9f3ed;
            border-radius: 60px;
            padding: 15px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nick-input {
            flex: 2;
            padding: 10px;
            border-radius: 50px;
            border: 1px solid #ffc896;
            text-align: center;
            font-weight: bold;
            background: #fffcf5;
        }
        button {
            background: #ffb347;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
            color: white;
        }
        button:active { transform: scale(0.97); }
        .seal-area {
            text-align: center;
            cursor: pointer;
            margin: 20px 0;
        }
        .seal-emoji {
            font-size: 7rem;
            display: inline-block;
            transition: 0.07s;
        }
        .click-effect { transform: scale(0.9); }
        .resource {
            background: #2a5c48;
            color: #FFE5B4;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            margin: 15px 0;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .stat-card {
            background: #e3f0ea;
            flex: 1;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            color: #1c6948;
        }
        .upgrade {
            background: #faefe2;
            border-radius: 50px;
            padding: 12px 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .action-buttons button {
            flex: 1;
            font-size: 0.8rem;
            padding: 8px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2b241cee;
            color: #ffeaaf;
            padding: 8px 20px;
            border-radius: 60px;
            animation: fadeOut 2s forwards;
            z-index: 1001;
        }
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 0; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            color: #7e9a7a;
        }
        .leaderboard {
            background: #f0ecdf;
            border-radius: 40px;
            padding: 12px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        .leaderboard h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #1c6948;
        }
        .leaderboard ol {
            padding-left: 25px;
        }
        .leaderboard li {
            margin: 4px 0;
            font-size: 0.8rem;
        }
        .rival {
            background: #f9e6e6;
            border-radius: 40px;
            padding: 12px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div class="game-card" id="app"></div>

<script>
    // -------- ИГРОВОЕ СОСТОЯНИЕ --------
    let players = {};        // все сохранённые игроки { nickname: { fish, totalFish, clickLevel, workers, achievements, rivalFish } }
    let currentNick = null;
    let useEmoji = false;    // false = текст, true = смайлы
    let autoSaveInterval = null;

    // Загрузка всех данных
    function loadAllData() {
        const raw = localStorage.getItem('seal_business');
        if (raw) {
            try { players = JSON.parse(raw); } catch(e) { players = {}; }
        } else {
            players = {};
        }
        currentNick = localStorage.getItem('seal_current');
        if (currentNick && !players[currentNick]) currentNick = null;
    }

    function saveAllData() {
        localStorage.setItem('seal_business', JSON.stringify(players));
        if (currentNick) localStorage.setItem('seal_current', currentNick);
        else localStorage.removeItem('seal_current');
    }

    // Получить данные текущего игрока
    function getPlayer() {
        if (!currentNick) return null;
        if (!players[currentNick]) {
            // новый игрок
            players[currentNick] = {
                fish: 0,
                totalFish: 0,
                clickLevel: 0,
                workers: 0,
                achievements: {},
                rivalFish: 1000 + Math.random() * 500,
            };
        }
        return players[currentNick];
    }

    function savePlayer() {
        if (currentNick) saveAllData();
    }

    // -------- Игровые формулы --------
    function getClickPower() {
        let p = getPlayer();
        if (!p) return 1;
        return 1 + p.clickLevel * 2;
    }
    function getPassiveIncome() {
        let p = getPlayer();
        if (!p) return 0;
        return p.workers * 1;
    }

    // Добавить рыбу
    function addFish(amount, fromClick = false) {
        let p = getPlayer();
        if (!p) return;
        p.fish += amount;
        p.totalFish += amount;
        if (fromClick && p.clickLevel === 0 && p.workers === 0 && p.fish >= 10) {
            checkAchievements();
        }
        savePlayer();
        renderUI();
    }

    // Улучшения
    function buyClickUpgrade() {
        let p = getPlayer();
        if (!p) return;
        let price = 20 * (p.clickLevel + 1);
        if (p.fish < price) { showToast("❌ Не хватает рыбы!"); return; }
        p.fish -= price;
        p.clickLevel++;
        savePlayer();
        showToast(`🐟 Сила клика увеличина до ${getClickPower()}`);
        checkAchievements();
        renderUI();
    }

    function buyWorker() {
        let p = getPlayer();
        if (!p) return;
        let price = 30 * (p.workers + 1);
        if (p.fish < price) { showToast("❌ Не хватает рыбы!"); return; }
        p.fish -= price;
        p.workers++;
        savePlayer();
        showToast(`🧑‍🌾 Нанят работник! +1 рыба/сек`);
        checkAchievements();
        renderUI();
    }

    // Битва с конкурентом (упрощённое PvE)
    function fightRival() {
        let p = getPlayer();
        if (!p) return;
        let myPower = getClickPower() + p.workers;
        let rivalPower = Math.floor(p.rivalFish / 200) + 1;
        if (myPower >= rivalPower) {
            let reward = Math.floor(p.rivalFish * 0.2);
            addFish(reward, false);
            // новый конкурент
            p.rivalFish = 500 + Math.random() * 1500;
            savePlayer();
            showToast(`🎉 Вы победили конкурента! +${reward} рыбы`);
        } else {
            let loss = Math.floor(p.fish * 0.1);
            p.fish = Math.max(0, p.fish - loss);
            savePlayer();
            showToast(`😵 Поражение! Конкурент отнял ${loss} рыбы`);
        }
        renderUI();
    }

    // -------- Достижения --------
    const achievementsList = [
        { id: "fish100", name: "100 рыб", cond: (p) => p.totalFish >= 100, reward: 50 },
        { id: "fish1000", name: "1000 рыб", cond: (p) => p.totalFish >= 1000, reward: 200 },
        { id: "fish10000", name: "10000 рыб", cond: (p) => p.totalFish >= 10000, reward: 1000 },
        { id: "clicks100", name: "100 кликов", cond: (p) => (p.clicks||0) >= 100, reward: 100 },
        { id: "clicks1000", name: "1000 кликов", cond: (p) => (p.clicks||0) >= 1000, reward: 500 },
        { id: "click5", name: "Сила клика 5", cond: (p) => p.clickLevel >= 5, reward: 200 },
        { id: "click10", name: "Сила клика 10", cond: (p) => p.clickLevel >= 10, reward: 500 },
        { id: "worker5", name: "5 работников", cond: (p) => p.workers >= 5, reward: 300 },
        { id: "worker10", name: "10 работников", cond: (p) => p.workers >= 10, reward: 800 },
        { id: "rival1", name: "Первая победа", cond: (p) => (p.rivalWins||0) >= 1, reward: 150 },
    ];

    function checkAchievements() {
        let p = getPlayer();
        if (!p) return;
        if (!p.achievements) p.achievements = {};
        if (!p.clicks) p.clicks = 0;
        if (!p.rivalWins) p.rivalWins = 0;
        let changed = false;
        for (let ach of achievementsList) {
            if (!p.achievements[ach.id] && ach.cond(p)) {
                p.achievements[ach.id] = true;
                p.fish += ach.reward;
                p.totalFish += ach.reward;
                changed = true;
                showToast(`🏆 Достижение: ${ach.name}! +${ach.reward} рыб`);
            }
        }
        if (changed) savePlayer();
    }

    // -------- Лидерборд --------
    function showLeaderboard() {
        let list = Object.entries(players).map(([nick, data]) => ({ nick, total: data.totalFish }));
        list.sort((a,b) => b.total - a.total);
        let msg = "🏆 ТОП ИГРОКОВ 🏆\n";
        list.slice(0, 15).forEach((p, i) => msg += `${i+1}. ${p.nick} — ${Math.floor(p.total)} 🐟\n`);
        alert(msg);
    }

    // -------- Регистрация / логин --------
    function register() {
        let nick = document.getElementById('regNick').value.trim();
        if (!nick) { showToast("Введите ник"); return; }
        if (players[nick]) {
            currentNick = nick;
            saveAllData();
            showToast(`Добро пожаловать, ${nick}!`);
        } else {
            players[nick] = {
                fish: 0,
                totalFish: 0,
                clickLevel: 0,
                workers: 0,
                achievements: {},
                rivalFish: 1000 + Math.random() * 500,
                clicks: 0,
                rivalWins: 0,
            };
            currentNick = nick;
            saveAllData();
            showToast(`Новый игрок ${nick} создан!`);
        }
        renderUI();
        startAutoSave();
    }

    function logout() {
        currentNick = null;
        showToast("Вы вышли из аккаунта");
        renderUI();
    }

    // -------- Отрисовка --------
    function renderUI() {
        const root = document.getElementById('app');
        if (!currentNick) {
            root.innerHTML = `
                <h1>🦭 Тюлений бизнес</h1>
                <div class="register-area">
                    <input type="text" id="regNick" class="nick-input" placeholder="Твой ник" maxlength="20">
                    <button id="startBtn">СТАРТ / ВОЙТИ</button>
                </div>
                <button id="leaderboardBtn" style="width:100%; margin-bottom:15px;">🏆 Топ игроков</button>
                <button id="styleBtn" style="width:100%;">🎨 Переключить стиль (смайлы/текст)</button>
                <footer>Введи ник – начнёшь играть. Прогресс сохранится в браузере.</footer>
            `;
            document.getElementById('startBtn').onclick = register;
            document.getElementById('leaderboardBtn').onclick = showLeaderboard;
            document.getElementById('styleBtn').onclick = () => { useEmoji = !useEmoji; renderUI(); };
            return;
        }

        let p = getPlayer();
        if (!p) return;

        const s = (emoji, text) => useEmoji ? emoji : text;
        const fish = Math.floor(p.fish);
        const total = Math.floor(p.totalFish);
        const clickPower = getClickPower();
        const passive = getPassiveIncome();
        const rivalPower = Math.floor(p.rivalFish / 200) + 1;

        let achievementsHtml = '';
        for (let ach of achievementsList) {
            let unlocked = p.achievements && p.achievements[ach.id];
            achievementsHtml += `<div style="font-size:0.7rem; margin:4px 0;">${unlocked ? '✅' : '🔒'} ${ach.name}</div>`;
        }

        root.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div>${s('🦭','[ТЮЛЕНЬ]')} ${currentNick}</div>
                <button id="logoutBtn">Выйти</button>
            </div>
            <div class="seal-area" id="clickZone">
                <div class="seal-emoji" id="sealEmoji">${s('🦭','[ТЮЛЕНЬ]')}</div>
                <div>${s('👆 нажми на тюленя', '[КЛИК]')}</div>
            </div>
            <div class="resource">${s('🐟','[РЫБА]')} ${fish.toLocaleString()}</div>
            <div class="stats">
                <div class="stat-card">💪 Сила клика: +${clickPower}</div>
                <div class="stat-card">🧑‍🌾 Работники: ${p.workers} (+${passive}/сек)</div>
                <div class="stat-card">🏆 Всего: ${total.toLocaleString()}</div>
            </div>
            <div class="upgrade">
                <div>🐟 Улучшить силу клика (ур.${p.clickLevel})</div>
                <button id="buyClickBtn">${20 * (p.clickLevel + 1)} 🐟</button>
            </div>
            <div class="upgrade">
                <div>🧑‍🌾 Нанять работника (ур.${p.workers})</div>
                <button id="buyWorkerBtn">${30 * (p.workers + 1)} 🐟</button>
            </div>
            <div class="rival">
                <div><strong>🐙 Конкурент</strong><br>Сила: ${rivalPower}</div>
                <div>🎣 Его рыба: ${Math.floor(p.rivalFish)}</div>
                <button id="fightBtn">⚔️ АТАКОВАТЬ</button>
            </div>
            <div class="action-buttons">
                <button id="leaderboardBtn">🏆 Топ</button>
                <button id="styleBtn">${useEmoji ? '📄 Текст' : '😀 Смайлы'}</button>
            </div>
            <div class="leaderboard">
                <h3>🏅 Достижения</h3>
                ${achievementsHtml}
            </div>
            <footer>Пассивный доход каждую секунду. Атакуй конкурентов и становись богаче!</footer>
        `;

        document.getElementById('clickZone').onclick = () => {
            let gain = getClickPower();
            addFish(gain, true);
            if (p) p.clicks = (p.clicks || 0) + 1;
            savePlayer();
            const seal = document.getElementById('sealEmoji');
            if (seal) {
                seal.classList.add('click-effect');
                setTimeout(() => seal.classList.remove('click-effect'), 100);
            }
            checkAchievements();
            renderUI();
        };
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('buyClickBtn').onclick = buyClickUpgrade;
        document.getElementById('buyWorkerBtn').onclick = buyWorker;
        document.getElementById('fightBtn').onclick = () => {
            fightRival();
            if (p) p.rivalWins = (p.rivalWins || 0) + 1;
            checkAchievements();
        };
        document.getElementById('leaderboardBtn').onclick = showLeaderboard;
        document.getElementById('styleBtn').onclick = () => { useEmoji = !useEmoji; renderUI(); };
    }

    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    function startAutoSave() {
        if (autoSaveInterval) clearInterval(autoSaveInterval);
        autoSaveInterval = setInterval(() => {
            if (currentNick) {
                // пассивный доход
                let p = getPlayer();
                if (p && p.workers > 0) {
                    addFish(p.workers, false);
                }
            }
        }, 1000);
    }

    // Инициализация
    loadAllData();
    if (currentNick) startAutoSave();
    renderUI();
</script>
</body>
</html>
