<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тюленьи бои | Локальная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1e6b3e;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-card {
            max-width: 800px;
            width: 100%;
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #1c6948;
            margin-bottom: 20px;
        }
        .auth-panel {
            background: #e9f3ed;
            border-radius: 60px;
            padding: 15px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nick-input {
            flex: 2;
            padding: 10px;
            border-radius: 50px;
            border: 1px solid #ffc896;
            text-align: center;
            font-weight: bold;
            background: #fffcf5;
        }
        button {
            background: #ffb347;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
            color: white;
        }
        button:active {
            transform: scale(0.97);
        }
        .battle-area {
            background: #f0ecdf;
            border-radius: 50px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .hp-bar {
            background: #ccc;
            border-radius: 20px;
            height: 20px;
            overflow: hidden;
            margin: 10px 0;
        }
        .hp-fill {
            background: #ff6b6b;
            height: 100%;
            width: 100%;
            transition: width 0.2s;
        }
        .seal-area {
            text-align: center;
            cursor: pointer;
            margin: 15px 0;
        }
        .seal-emoji {
            font-size: 6rem;
            display: inline-block;
            transition: 0.07s;
        }
        .click-effect {
            transform: scale(0.9);
        }
        .resource {
            background: #2a5c48;
            color: #FFE5B4;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 60px;
            margin: 15px 0;
        }
        .flex {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .stat-card {
            background: #e3f0ea;
            flex: 1;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            color: #1c6948;
        }
        .upgrade {
            background: #faefe2;
            border-radius: 50px;
            padding: 10px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2b241cee;
            color: #ffeaaf;
            padding: 8px 20px;
            border-radius: 60px;
            animation: fadeOut 2s forwards;
            z-index: 1001;
        }
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 0; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            color: #7e9a7a;
        }
        .effect-text {
            font-weight: bold;
            animation: pulse 0.3s;
            margin-top: 8px;
        }
        @keyframes pulse {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="game-card" id="app"></div>

<script>
    // ---------- Игровое состояние (localStorage) ----------
    let players = {};      // все аккаунты
    let currentNick = null;
    let useEmoji = false;
    let passiveInterval = null;
    let anticheatBlockedUntil = 0, clickTimestamps = [];
    let lastEffect = "";

    // Загрузка данных
    function loadData() {
        const raw = localStorage.getItem('seal_battle');
        if (raw) {
            try { players = JSON.parse(raw); } catch(e) { players = {}; }
        } else {
            players = {};
        }
        currentNick = localStorage.getItem('seal_current');
        if (currentNick && !players[currentNick]) currentNick = null;
    }

    function saveData() {
        localStorage.setItem('seal_battle', JSON.stringify(players));
        if (currentNick) localStorage.setItem('seal_current', currentNick);
        else localStorage.removeItem('seal_current');
    }

    function getPlayer() {
        if (!currentNick) return null;
        if (!players[currentNick]) {
            // новый игрок
            players[currentNick] = {
                hp: 100, max_hp: 100,
                attack: 10, defense: 5, crit_chance: 10,
                fish: 0, total_fish: 0,
                prestige_bonus: 0,
                anticheat_disabled: false,
                role: 'player',
                stats: { wins: 0, losses: 0, boss_kills: 0 }
            };
            saveData();
        }
        return players[currentNick];
    }

    function savePlayer() {
        if (currentNick) saveData();
    }

    // ---------- Игровые функции ----------
    function getClickPower() {
        let prestige = getPlayer()?.prestige_bonus || 0;
        return 1 + Math.floor(prestige / 100);
    }

    // Босс (PvE) – общий для всех
    let boss = { hp: 200, max_hp: 200, attack: 15, defense: 8, level: 1 };
    function getBoss() {
        const saved = localStorage.getItem('seal_boss');
        if (saved) {
            try { boss = JSON.parse(saved); } catch(e) {}
        }
        return boss;
    }
    function saveBoss() {
        localStorage.setItem('seal_boss', JSON.stringify(boss));
    }
    getBoss();

    async function attackBoss() {
        let p = getPlayer();
        if (!p) return;
        if (p.hp <= 0) {
            showToast("❌ Вы мертвы! Восстановите здоровье за рыбу.");
            return;
        }
        // Игрок атакует
        let playerDamage = Math.max(1, p.attack - boss.defense + Math.floor(Math.random() * 5));
        let isCrit = Math.random() * 100 < p.crit_chance;
        if (isCrit) {
            playerDamage = Math.floor(playerDamage * 1.5);
            lastEffect = "КРИТ!";
        } else {
            lastEffect = "Удар!";
        }
        boss.hp -= playerDamage;
        let log = `Вы нанесли ${playerDamage} урона!`;
        if (boss.hp <= 0) {
            let reward = 100 * boss.level;
            p.fish += reward;
            p.total_fish += reward;
            p.stats.wins++;
            p.stats.boss_kills++;
            boss.level++;
            boss.max_hp = Math.floor(200 + boss.level * 30);
            boss.hp = boss.max_hp;
            boss.attack = 15 + boss.level * 2;
            boss.defense = 8 + Math.floor(boss.level / 2);
            saveBoss();
            savePlayer();
            showToast(`🎉 Босс повержен! +${reward} рыбы, уровень босса ${boss.level}`);
            log += " Босс повержен!";
        } else {
            // Босс контратакует
            let bossDamage = Math.max(1, boss.attack - p.defense + Math.floor(Math.random() * 6));
            let isBlock = Math.random() * 100 < 15;
            if (isBlock) {
                bossDamage = Math.floor(bossDamage / 2);
                log += " Вы заблокировали часть урона!";
                lastEffect = "БЛОК!";
            } else {
                lastEffect = "ПОЛУЧЕН УРОН!";
            }
            p.hp -= bossDamage;
            if (p.hp < 0) p.hp = 0;
            log += ` Босс нанёс ${bossDamage} урона.`;
            if (p.hp <= 0) {
                p.stats.losses++;
                log += " Вас победили!";
            }
            savePlayer();
        }
        showToast(log);
        renderUI();
    }

    function heal() {
        let p = getPlayer();
        if (!p) return;
        let price = 20 * (Math.floor((p.max_hp - p.hp) / 10) + 1);
        if (p.fish < price) { showToast("❌ Не хватает рыбы"); return; }
        p.fish -= price;
        p.hp = p.max_hp;
        savePlayer();
        showToast(`❤️ Здоровье восстановлено!`);
        renderUI();
    }

    function buyStat(stat, basePrice, increase, name) {
        let p = getPlayer();
        let currentVal = p[stat];
        let price = basePrice * (currentVal - (stat === 'attack' ? 10 : stat === 'defense' ? 5 : 10) + 1);
        if (p.fish < price) { showToast("❌ Не хватает рыбы"); return; }
        p.fish -= price;
        p[stat] += increase;
        savePlayer();
        showToast(`🎉 ${name} увеличена!`);
        renderUI();
    }

    function doPrestige() {
        let p = getPlayer();
        if (p.total_fish < 5000) { showToast("Нужно 5000 рыб"); return; }
        if (confirm("Престиж: сбросить рыбу и характеристики, получить +50% к силе клика и +5 ко всем характеристикам?")) {
            p.prestige_bonus = (p.prestige_bonus || 0) + 50;
            p.fish = 0;
            p.total_fish = 0;
            p.attack = 10 + 5;
            p.defense = 5 + 5;
            p.crit_chance = 10 + 5;
            p.hp = 100;
            p.max_hp = 100;
            savePlayer();
            showToast("🌟 Престиж! +50% к силе клика, +5 к атаке, защите и криту");
            renderUI();
        }
    }

    // Автокликер (пассивный доход)
    function startPassive() {
        if (passiveInterval) clearInterval(passiveInterval);
        passiveInterval = setInterval(() => {
            let p = getPlayer();
            if (p && p.fish !== undefined) {
                let gain = getClickPower();
                p.fish += gain;
                p.total_fish += gain;
                savePlayer();
                renderUI();
            }
        }, 1000);
    }

    // Анти-автоклик
    function isBlocked() {
        let p = getPlayer();
        if (p?.anticheat_disabled) return false;
        if (Date.now() < anticheatBlockedUntil) return true;
        return false;
    }
    function registerClick() {
        let p = getPlayer();
        if (!p) return false;
        if (p.anticheat_disabled) return true;
        if (isBlocked()) { showToast("⛔ Блокировка 8 сек"); return false; }
        const now = Date.now();
        clickTimestamps.push(now);
        while (clickTimestamps.length && clickTimestamps[0] < now - 1000) clickTimestamps.shift();
        if (clickTimestamps.length > 18) {
            anticheatBlockedUntil = now + 8000;
            clickTimestamps = [];
            showToast("⚠️ Слишком быстро! Блокировка 8 сек");
            renderUI(); return false;
        }
        return true;
    }

    function clickForFish() {
        if (!registerClick()) return;
        let p = getPlayer();
        let gain = getClickPower();
        p.fish += gain;
        p.total_fish += gain;
        savePlayer();
        const seal = document.getElementById('sealEmoji');
        if (seal) {
            seal.classList.add('click-effect');
            setTimeout(() => seal.classList.remove('click-effect'), 100);
        }
        renderUI();
        showToast(`+${gain} рыбы`);
    }

    // Админ-панель (модальное окно)
    function showAdminModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>👑 Админ-панель</h3>
                <input type="password" id="adminPass" placeholder="Пароль" style="width:100%; padding:8px; margin:10px 0;">
                <button id="adminLoginBtn">Войти</button>
                <div id="adminControls" style="display:none; margin-top:15px;">
                    <input type="text" id="targetNick" placeholder="Ник игрока" style="width:100%; margin-bottom:8px;">
                    <input type="number" id="giveFish" placeholder="Рыба">
                    <button id="giveFishBtn">Выдать рыбу</button><br><br>
                    <button id="resetAnticheatBtn">Сбросить античит для всех</button>
                </div>
                <button style="margin-top:10px;" onclick="this.closest('.modal').remove()">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        const loginBtn = modal.querySelector('#adminLoginBtn');
        loginBtn.onclick = () => {
            const pass = modal.querySelector('#adminPass').value;
            if (pass === 'seal123') {
                modal.querySelector('#adminControls').style.display = 'block';
                loginBtn.disabled = true;
            } else showToast("Неверный пароль");
        };
        modal.querySelector('#giveFishBtn').onclick = () => {
            const nick = modal.querySelector('#targetNick').value.trim();
            const amount = parseInt(modal.querySelector('#giveFish').value);
            if (!nick || isNaN(amount)) return;
            if (players[nick]) {
                players[nick].fish += amount;
                players[nick].total_fish += amount;
                saveData();
                showToast(`Выдано ${amount} рыбы игроку ${nick}`);
                if (currentNick === nick) renderUI();
            } else showToast("Игрок не найден");
        };
        modal.querySelector('#resetAnticheatBtn').onclick = () => {
            for (let nick in players) {
                players[nick].anticheat_disabled = false;
            }
            saveData();
            showToast("Античит сброшен для всех");
        };
    }

    function showLeaderboard() {
        let list = Object.entries(players).map(([nick, p]) => ({ nick, wins: p.stats?.wins || 0, fish: p.total_fish }));
        list.sort((a,b) => b.wins - a.wins);
        let msg = "🏆 ТОП ПО ПОБЕДАМ 🏆\n";
        list.slice(0, 15).forEach((p, i) => msg += `${i+1}. ${p.nick} — побед: ${p.wins}, рыбы: ${Math.floor(p.fish)}\n`);
        alert(msg);
    }

    // Регистрация / логин
    function register() {
        let nick = document.getElementById('regNick').value.trim();
        if (!nick) { showToast("Введите ник"); return; }
        if (players[nick]) {
            currentNick = nick;
            saveData();
            showToast(`Добро пожаловать, ${nick}!`);
        } else {
            players[nick] = {
                hp: 100, max_hp: 100,
                attack: 10, defense: 5, crit_chance: 10,
                fish: 0, total_fish: 0,
                prestige_bonus: 0,
                anticheat_disabled: false,
                role: 'player',
                stats: { wins: 0, losses: 0, boss_kills: 0 }
            };
            currentNick = nick;
            saveData();
            showToast(`Новый игрок ${nick} создан!`);
        }
        startPassive();
        renderUI();
    }
    function logout() {
        currentNick = null;
        if (passiveInterval) clearInterval(passiveInterval);
        saveData();
        renderUI();
    }

    function toggleStyle() { useEmoji = !useEmoji; renderUI(); }

    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    // Отрисовка
    function renderUI() {
        const root = document.getElementById('app');
        if (!currentNick) {
            root.innerHTML = `
                <h1>🐟 Тюленьи бои</h1>
                <div class="auth-panel">
                    <input id="regNick" class="nick-input" placeholder="Твой ник">
                    <button id="regBtn">СТАРТ / ВОЙТИ</button>
                </div>
                <button id="leaderBtn" style="width:100%; margin-bottom:10px;">🏆 Топ игроков</button>
                <button id="styleBtn" style="width:100%;">🎨 Переключить стиль</button>
                <footer>Введи ник – начнёшь играть. Прогресс сохранится в браузере.</footer>
            `;
            document.getElementById('regBtn').onclick = register;
            document.getElementById('leaderBtn').onclick = showLeaderboard;
            document.getElementById('styleBtn').onclick = toggleStyle;
            return;
        }

        const p = getPlayer();
        if (!p) return;
        const s = (e, t) => useEmoji ? e : t;
        const fish = Math.floor(p.fish);
        const total = Math.floor(p.total_fish);
        const prestigeBonus = p.prestige_bonus || 0;
        const playerHpPercent = (p.hp / p.max_hp) * 100;
        const bossHpPercent = (boss.hp / boss.max_hp) * 100;

        root.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div>${s('🦭','[ТЮЛЕНЬ]')} ${currentNick} <span class="role-badge">${p.role}</span></div>
                <div>⭐ +${prestigeBonus}%</div>
                <button id="logoutBtn">Выйти</button>
            </div>
            <div class="seal-area" id="clickZone">
                <div class="seal-emoji" id="sealEmoji">${s('🦭','[ТЮЛЕНЬ]')}</div>
                <div>${s('👆 клик – +рыба', '[КЛИК]')}</div>
            </div>
            <div class="resource">${s('🐟','[РЫБА]')} ${fish} | Всего: ${total}</div>
            <div class="flex">
                <div class="stat-card">❤️ HP: ${p.hp}/${p.max_hp}</div>
                <div class="stat-card">⚔️ Атака: ${p.attack}</div>
                <div class="stat-card">🛡️ Защита: ${p.defense}</div>
                <div class="stat-card">💥 Крит: ${p.crit_chance}%</div>
            </div>
            <div class="battle-area">
                <h3>${s('👾','[БОСС]')} Ур.${boss.level} (HP: ${boss.hp}/${boss.max_hp})</h3>
                <div class="hp-bar"><div class="hp-fill" style="width:${bossHpPercent}%"></div></div>
                <button id="attackBtn">⚔️ АТАКОВАТЬ</button>
                <div class="effect-text">${lastEffect}</div>
            </div>
            <div class="flex">
                <button id="healBtn">❤️ Лечиться</button>
                <button id="upgradeAttackBtn">⚔️ +Атака (${20*(p.attack-9)} 🐟)</button>
                <button id="upgradeDefenseBtn">🛡️ +Защита (${20*(p.defense-4)} 🐟)</button>
                <button id="upgradeCritBtn">💥 +Крит (${30*(p.crit_chance-9)} 🐟)</button>
                <button id="prestigeBtn">🏅 Престиж</button>
                <button id="adminBtn">👑 Админ</button>
                <button id="leaderBtn">🏆 Топ</button>
                <button id="styleBtn">${useEmoji ? '📄 Текст' : '😀 Смайлы'}</button>
            </div>
            <footer>Авто-кликер даёт +${getClickPower()} рыбы/сек. После боя здоровье не восстанавливается.</footer>
        `;

        document.getElementById('clickZone').onclick = clickForFish;
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('attackBtn').onclick = attackBoss;
        document.getElementById('healBtn').onclick = heal;
        document.getElementById('upgradeAttackBtn').onclick = () => buyStat('attack', 20, 1, 'Атака');
        document.getElementById('upgradeDefenseBtn').onclick = () => buyStat('defense', 20, 1, 'Защита');
        document.getElementById('upgradeCritBtn').onclick = () => buyStat('crit_chance', 30, 5, 'Шанс крита');
        document.getElementById('prestigeBtn').onclick = doPrestige;
        document.getElementById('adminBtn').onclick = showAdminModal;
        document.getElementById('leaderBtn').onclick = showLeaderboard;
        document.getElementById('styleBtn').onclick = toggleStyle;
    }

    loadData();
    if (currentNick) startPassive();
    renderUI();
</script>
</body>
</html>
