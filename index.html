<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seal Clicker: Neon Evolution</title>
    <!-- Библиотека Supabase -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --neon-green: #2ecc71;
            --neon-blue: #00d2ff;
            --neon-red: #ff4757;
            --dark-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            margin-top: 20px;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
        }

        .hidden { display: none !important; }

        /* Inputs & Buttons */
        input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 12px;
            color: white;
            margin-bottom: 12px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--neon-blue); outline: none; box-shadow: 0 0 15px rgba(0,210,255,0.3); }

        button {
            cursor: pointer;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 12px;
        }

        .btn-primary { background: linear-gradient(135deg, var(--neon-blue), #3a86ff); color: white; box-shadow: 0 4px 15px rgba(58,134,255,0.4); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(58,134,255,0.5); }

        /* Seal Clicker Visuals */
        .seal-wrapper {
            position: relative;
            margin: 40px auto;
            width: 200px;
            height: 200px;
        }

        .seal-main {
            width: 100%;
            height: 100%;
            font-size: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .seal-main:active { transform: scale(0.85); }

        .floating-fish {
            position: absolute;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            font-weight: bold;
            color: var(--neon-blue);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) opacity(1); }
            100% { transform: translateY(-100px) opacity(0); }
        }

        /* Stats */
        .stats-row {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 16px;
            margin: 20px 0;
        }
        .stat-item span { display: block; font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        .stat-item b { font-size: 18px; color: var(--neon-blue); }

        /* Shop & Tabs */
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .nav-tabs button { flex: 1; background: var(--glass); color: #94a3b8; padding: 10px 5px; }
        .nav-tabs button.active { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--neon-blue); }

        .shop-list { max-height: 300px; overflow-y: auto; padding-right: 5px; }
        .shop-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .shop-card:hover { background: rgba(255,255,255,0.07); }

        /* Battle Zone */
        .boss-area {
            background: linear-gradient(180deg, rgba(255,71,87,0.1) 0%, transparent 100%);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,71,87,0.2);
        }
        .hp-bar { height: 10px; background: #1e293b; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .hp-fill { height: 100%; transition: width 0.4s ease; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="glass-card">
        <!-- Auth -->
        <div id="auth-screen">
            <h1 style="background: linear-gradient(to right, #00d2ff, #2ecc71); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">SEAL EVOLUTION</h1>
            <input type="text" id="nick" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-primary" style="width: 100%;" onclick="handleAuth('login')">Войти в систему</button>
            <p style="font-size: 12px; color: #64748b; margin-top: 15px; cursor: pointer;" onclick="handleAuth('register')">Создать новый аккаунт</p>
        </div>

        <!-- Game -->
        <div id="game-screen" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <button onclick="toggleVisuals()" style="background:none; border: 1px solid var(--glass-border); color: #94a3b8;">🦭</button>
                <div id="display-nick" style="font-weight: 800; letter-spacing: 1px;">---</div>
                <button onclick="showAdmin()" style="background:none; color: #64748b;">⚙️</button>
            </div>

            <div class="seal-wrapper">
                <div class="seal-main" id="seal-btn" onclick="clickSeal(event)">🦭</div>
            </div>

            <div style="font-size: 40px; font-weight: 900; margin-bottom: 10px;">
                <span id="fish-icon">🐟</span> <span id="fish-count">0</span>
            </div>

            <div class="stats-row">
                <div class="stat-item"><span>Сила клика</span><b id="click-power">1</b></div>
                <div class="stat-item"><span>Авто-добыча</span><b id="auto-val">0</b></div>
            </div>

            <div class="nav-tabs">
                <button id="t-shop" class="active" onclick="showTab('shop')">Магазин</button>
                <button id="t-battle" onclick="showTab('battle')">Рейд</button>
                <button id="t-top" onclick="showTab('leaderboard')">Топ</button>
            </div>

            <!-- Tab: Shop -->
            <div id="tab-shop" class="tab-content shop-list">
                <!-- Items generated by JS -->
            </div>

            <!-- Tab: Battle -->
            <div id="tab-battle" class="tab-content hidden">
                <div class="boss-area">
                    <div style="display:flex; justify-content:space-between; font-size:12px;">
                        <b style="color:var(--neon-red)">BOSS LVL.<span id="boss-lvl">1</span></b>
                        <span id="boss-hp-text">0/0</span>
                    </div>
                    <div class="hp-bar"><div id="boss-hp-bar" class="hp-fill" style="background:var(--neon-red); width: 100%;"></div></div>
                    
                    <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:15px;">
                        <b>PLAYER HP</b>
                        <span id="player-hp-text">100/100</span>
                    </div>
                    <div class="hp-bar"><div id="player-hp-bar" class="hp-fill" style="background:var(--neon-green); width: 100%;"></div></div>
                    
                    <button class="btn-primary" id="atk-btn" onclick="attackBoss()" style="width:100%; background: var(--neon-red); margin-top:10px;">Нанести удар</button>
                    <div id="battle-log" style="font-family: monospace; font-size:10px; margin-top:10px; color:#94a3b8; height: 40px; overflow:hidden;"></div>
                </div>
            </div>

            <!-- Tab: Leaderboard -->
            <div id="tab-leaderboard" class="tab-content hidden shop-list">
                <div id="leaderboard-list"></div>
            </div>

            <div id="anticheat-ui" class="hidden" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.9); z-index:100; border-radius:24px; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                <h2 style="color:var(--neon-red)">SECURITY LOCK</h2>
                <p>Too many clicks! Wait 8s...</p>
            </div>

            <div style="margin-top: 20px; opacity: 0.3; font-size: 10px; cursor:pointer;" onclick="logout()">LOGOUT</div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdmJoaGlkY29qa2twdW1zeHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzk3MjcsImV4cCI6MjA5Mjg1NTcyN30.1eKxcaqeClRdAVH8lVcOdYaV0o_PbRzjnM9vBUP15QQ';
    
    let _sb = null;
    function getSB() {
        if (!_sb && typeof supabase !== 'undefined') {
            _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }
        return _sb;
    }

    let user = null, boss = null, playerHP = 100, clicks = 0, isBlocked = false, textMode = false;

    // --- Auth ---
    async function handleAuth(mode) {
        const sb = getSB();
        if(!sb) return alert('Библиотека не загружена');
        const n = document.getElementById('nick').value.trim();
        const p = document.getElementById('pass').value.trim();
        if(!n || !p) return alert('Заполни поля!');

        try {
            if(mode === 'register') {
                const { error } = await sb.from('users').insert([{ nickname: n, password: p, attack: 5, defense: 5 }]);
                if(error) return alert('Ник уже занят');
                alert('Готово! Теперь войди.');
            } else {
                const { data, error } = await sb.from('users').select('*').eq('nickname', n).eq('password', p).single();
                if(error || !data) return alert('Ошибка входа');
                user = data;
                localStorage.setItem('seal_user', JSON.stringify({n, p}));
                start();
            }
        } catch(e) { alert(e.message); }
    }

    function start() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('display-nick').innerText = user.nickname.toUpperCase();
        renderShop();
        updateUI();
        syncBoss();
        setInterval(() => { user.fish += user.auto_level; user.total_fish += user.auto_level; updateUI(); }, 1000);
        setInterval(cloudSave, 7000);
        setInterval(() => clicks = 0, 1000);
    }

    // --- Clicker ---
    function clickSeal(e) {
        if(isBlocked) return;
        clicks++;
        if(clicks > 18 && !user.anticheat_disabled) {
            isBlocked = true;
            document.getElementById('anticheat-ui').classList.remove('hidden');
            setTimeout(() => { isBlocked = false; document.getElementById('anticheat-ui').classList.add('hidden'); }, 8000);
            return;
        }

        const p = 1 + (user.click_level - 1) * 2;
        user.fish += p; user.total_fish += p;
        
        // FX
        const float = document.createElement('div');
        float.className = 'floating-fish';
        float.innerText = '+' + p;
        float.style.left = e.clientX - 20 + 'px';
        float.style.top = e.clientY - 20 + 'px';
        document.body.appendChild(float);
        setTimeout(() => float.remove(), 800);
        
        updateUI();
    }

    // --- Shop ---
    const UPGRADES = [
        { id: 'click_level', n: 'Сила клика', b: 10, m: 1.6 },
        { id: 'auto_level', n: 'Авто-тюлень', b: 50, m: 1.6 },
        { id: 'crit_level', n: 'Крит. шанс', b: 100, m: 1.2, flat: true },
        { id: 'attack', n: 'Меч (Атака)', b: 30, m: 30, flat: true, offset: 4 },
        { id: 'defense', n: 'Щит (Деф)', b: 30, m: 30, flat: true, offset: 4 }
    ];

    function renderShop() {
        const container = document.getElementById('tab-shop');
        container.innerHTML = UPGRADES.map(u => {
            const cost = u.flat ? (user[u.id] - (u.offset||0) + 1) * u.b : Math.floor(u.b * Math.pow(u.m, user[u.id]));
            return `
                <div class="shop-card">
                    <div style="text-align:left">
                        <div style="font-weight:700; font-size:14px;">${u.n}</div>
                        <div style="font-size:11px; color:var(--neon-blue)">Ур. ${user[u.id]} • ${cost} 🐟</div>
                    </div>
                    <button class="btn-primary" style="padding:8px 15px;" onclick="buy('${u.id}', ${cost})">UP</button>
                </div>
            `;
        }).join('');
    }

    function buy(id, cost) {
        if(user.fish >= cost) {
            user.fish -= cost;
            user[id]++;
            renderShop();
            updateUI();
        } else alert('Нужно больше рыбы!');
    }

    // --- Battle ---
    async function syncBoss() {
        const sb = getSB();
        const { data } = await sb.from('boss').select('*').eq('id', 1).single();
        if(data) { boss = data; updateUI(); }
    }

    async function attackBoss() {
        if(!boss || playerHP <= 0) return;
        const crit = (Math.random()*100 < (user.crit_level*5)) ? 1.5 : 1;
        const dmg = Math.max(1, Math.floor((user.attack - boss.defense + Math.random()*5)*crit));
        boss.health -= dmg;

        let bDmg = Math.max(1, Math.floor(boss.attack - user.defense + Math.random()*5));
        if(Math.random() < 0.15) bDmg = 0; // Block
        playerHP -= bDmg;

        document.getElementById('battle-log').innerText = `Вы: -${dmg} HP. Босс: -${bDmg} HP. ${crit>1?'CRIT!':''}`;

        if(boss.health <= 0) {
            user.fish += boss.level * 100;
            await getSB().from('boss').update({ level: boss.level+1, max_health: boss.max_health+200, health: boss.max_health+200, attack: boss.attack+2 }).eq('id', 1);
            syncBoss();
        }
        if(playerHP <= 0) {
            document.getElementById('atk-btn').disabled = true;
            setTimeout(() => { playerHP=100; document.getElementById('atk-btn').disabled=false; updateUI(); }, 10000);
        }
        updateUI();
        getSB().from('boss').update({ health: boss.health }).eq('id', 1);
    }

    // --- System ---
    function updateUI() {
        if(!user) return;
        document.getElementById('fish-count').innerText = Math.floor(user.fish).toLocaleString();
        document.getElementById('click-power').innerText = 1 + (user.click_level-1)*2;
        document.getElementById('auto-val').innerText = user.auto_level;
        if(boss) {
            document.getElementById('boss-lvl').innerText = boss.level;
            document.getElementById('boss-hp-text').innerText = `${boss.health}/${boss.max_health}`;
            document.getElementById('boss-hp-bar').style.width = (boss.health/boss.max_health*100) + '%';
        }
        document.getElementById('player-hp-bar').style.width = playerHP + '%';
        document.getElementById('player-hp-text').innerText = `${playerHP}/100`;
    }

    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(x => x.classList.add('hidden'));
        document.querySelectorAll('.nav-tabs button').forEach(x => x.classList.remove('active'));
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.getElementById('t-'+t).classList.add('active');
        if(t === 'leaderboard') loadTops();
    }

    async function loadTops() {
        const { data } = await getSB().from('leaderboard').select('*').order('total_fish', {ascending:false}).limit(20);
        document.getElementById('leaderboard-list').innerHTML = data.map((x,i) => `
            <div class="shop-card">
                <b>${i+1}. ${x.nickname}</b>
                <span style="color:var(--neon-blue)">${x.total_fish.toLocaleString()} 🐟</span>
            </div>
        `).join('');
    }

    async function cloudSave() {
        if(!user) return;
        const sb = getSB();
        await sb.from('users').update({ fish: user.fish, total_fish: user.total_fish, click_level: user.click_level, auto_level: user.auto_level, crit_level: user.crit_level, attack: user.attack, defense: user.defense }).eq('nickname', user.nickname);
        await sb.from('leaderboard').upsert({ nickname: user.nickname, total_fish: user.total_fish });
    }

    function toggleVisuals() {
        textMode = !textMode;
        document.getElementById('seal-btn').innerText = textMode ? '[SEAL]' : '🦭';
        document.getElementById('fish-icon').innerText = textMode ? '[FISH]' : '🐟';
    }

    function showAdmin() {
        if(prompt('Password?') === 'seal123') {
            const n = prompt('Ник?'); const a = parseInt(prompt('Рыба?'));
            getSB().from('users').select('fish').eq('nickname', n).single().then(({data}) => {
                if(data) getSB().from('users').update({ fish: data.fish + a }).eq('nickname', n).then(() => alert('OK'));
            });
        }
    }

    function logout() { localStorage.removeItem('seal_user'); location.reload(); }

    window.onload = () => {
        setTimeout(() => {
            const s = localStorage.getItem('seal_user');
            if(s) { 
                const p = JSON.parse(s);
                document.getElementById('nick').value = p.n;
                document.getElementById('pass').value = p.p;
                handleAuth('login');
            }
        }, 500);
    };
</script>

</body>
</html>
