<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🦭 SEAL CLICKER | Регистрация и админка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1e6b3e;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-card {
            max-width: 750px;
            width: 100%;
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #1c6948; margin-bottom: 20px; font-size: 1.8rem; }
        .form-group { margin-bottom: 15px; }
        input, button {
            width: 100%;
            padding: 10px;
            border-radius: 50px;
            border: 1px solid #ffc896;
            font-size: 1rem;
            margin-bottom: 8px;
        }
        button {
            background: #ffb347;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
        }
        button:active { transform: scale(0.97); }
        .toggle-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .toggle-buttons button { flex: 1; }
        .error { color: #c7254e; font-size: 0.8rem; text-align: center; margin-top: 5px; }
        .seal-area { text-align: center; cursor: pointer; margin: 20px 0; }
        .seal-emoji { font-size: 8rem; display: inline-block; transition: 0.07s; }
        .click-effect { transform: scale(0.9); }
        .fish-counter {
            background: #2a5c48;
            color: #FFE5B4;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            margin: 15px 0;
        }
        .stat-grid {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .stat {
            background: #e3f0ea;
            flex: 1;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            font-weight: bold;
        }
        .upgrade {
            background: #faefe2;
            border-radius: 50px;
            padding: 10px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .upgrade-info { flex: 2; }
        .upgrade-name { font-weight: bold; }
        .upgrade-desc { font-size: 0.7rem; color: #7a6a54; }
        .help-icon {
            background: #ffb347;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            margin-left: 8px;
        }
        .warning {
            background: #f9e6e6;
            color: #c7254e;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .action-buttons button { flex: 1; font-size: 0.8rem; padding: 6px; }
        .achievements {
            background: #f7efdd;
            border-radius: 40px;
            padding: 12px;
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }
        .achievement {
            font-size: 0.75rem;
            padding: 4px 8px;
            margin: 4px 0;
            border-radius: 30px;
            background: #fff3e0;
        }
        .achievement.unlocked { background: #ffe0b5; font-weight: bold; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .player-list-item {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .player-list-item:hover { background: #f0e5d8; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2b241cee;
            color: #ffeaaf;
            padding: 8px 20px;
            border-radius: 60px;
            animation: fadeOut 2s forwards;
            z-index: 1001;
        }
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 0; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #6e8f7a;
        }
    </style>
</head>
<body>
<div class="game-card" id="app"></div>

<script>
    // ---------- БАЗА ДАННЫХ (localStorage) ----------
    // Структура: users = { "ник": { password, fish, totalFish, upgrades, stats, achievements, anticheatDisabled, role, prestigeBonus } }
    let currentUser = null; // ник текущего пользователя
    let game = null; // данные текущего пользователя (ссылка на объект)

    // Функции работы с хранилищем
    function loadUsers() {
        const raw = localStorage.getItem('seal_users');
        if (raw) return JSON.parse(raw);
        // создаем админа по умолчанию (admin / adminpass) - можно убрать потом, но для теста
        const defaultUsers = {
            "admin": {
                password: "admin123",
                fish: 0,
                totalFish: 0,
                upgrades: { clickPower:0, autoClicker:0, crit:0, clickMult:0, passiveMult:0, eventBonus:0 },
                stats: { totalClicks:0, prestigeCount:0 },
                achievements: {},
                anticheatDisabled: false,
                role: "admin",
                prestigeBonus: 0,
            }
        };
        localStorage.setItem('seal_users', JSON.stringify(defaultUsers));
        return defaultUsers;
    }

    function saveUsers(users) {
        localStorage.setItem('seal_users', JSON.stringify(users));
    }

    // Сохранение текущего пользователя
    function saveCurrentUser() {
        if (!currentUser) return;
        const users = loadUsers();
        users[currentUser] = game;
        saveUsers(users);
    }

    // Загрузка пользователя по нику и паролю (возвращает true/false)
    function loginUser(nick, password) {
        const users = loadUsers();
        if (users[nick] && users[nick].password === password) {
            currentUser = nick;
            game = users[nick];
            // убедимся, что все поля есть (миграция)
            if (!game.upgrades) game.upgrades = { clickPower:0, autoClicker:0, crit:0, clickMult:0, passiveMult:0, eventBonus:0 };
            if (!game.stats) game.stats = { totalClicks:0, prestigeCount:0 };
            if (!game.achievements) game.achievements = {};
            if (game.anticheatDisabled === undefined) game.anticheatDisabled = false;
            if (!game.role) game.role = "player";
            if (!game.prestigeBonus) game.prestigeBonus = 0;
            initAchievements();
            return true;
        }
        return false;
    }

    // Регистрация нового пользователя (ник уникален)
    function registerUser(nick, password) {
        if (password.length < 4) return false;
        const users = loadUsers();
        if (users[nick]) return false;
        const newUser = {
            password: password,
            fish: 0,
            totalFish: 0,
            upgrades: { clickPower:0, autoClicker:0, crit:0, clickMult:0, passiveMult:0, eventBonus:0 },
            stats: { totalClicks:0, prestigeCount:0 },
            achievements: {},
            anticheatDisabled: false,
            role: "player",
            prestigeBonus: 0,
        };
        users[nick] = newUser;
        saveUsers(users);
        return true;
    }

    // Достижения (генерируются динамически)
    let achievementsList = [];

    function generateAchievements() {
        const list = [];
        for (let i = 1; i <= 20; i++) {
            let target = 100 * Math.pow(1.6, i-1);
            list.push({ id: `total_${i}`, name: `${Math.floor(target).toLocaleString()} рыб`, cond: () => game.totalFish >= target, reward: Math.floor(target * 0.1) });
        }
        for (let i = 1; i <= 15; i++) {
            let clicks = 50 * Math.pow(2, i-1);
            list.push({ id: `clicks_${i}`, name: `${Math.floor(clicks).toLocaleString()} кликов`, cond: () => game.stats.totalClicks >= clicks, reward: Math.floor(clicks * 0.2) });
        }
        for (let i = 1; i <= 10; i++) {
            list.push({ id: `clickPower_${i}`, name: `Сила клика ${i}`, cond: () => game.upgrades.clickPower >= i, reward: 50 * i });
            list.push({ id: `auto_${i}`, name: `Автокликер ${i}`, cond: () => game.upgrades.autoClicker >= i, reward: 60 * i });
        }
        for (let i = 1; i <= 5; i++) {
            list.push({ id: `crit_${i}`, name: `Крит ${i}`, cond: () => game.upgrades.crit >= i, reward: 80 * i });
        }
        return list.slice(0, 60);
    }

    function initAchievements() {
        achievementsList = generateAchievements();
        achievementsList.forEach(ach => {
            if (game.achievements[ach.id] === undefined) game.achievements[ach.id] = false;
        });
    }

    function checkAchievements() {
        let changed = false;
        for (let ach of achievementsList) {
            if (!game.achievements[ach.id] && ach.cond()) {
                game.achievements[ach.id] = true;
                game.fish += ach.reward;
                game.totalFish += ach.reward;
                changed = true;
                showToast(`🏆 ${ach.name}! +${ach.reward} рыб`);
            }
        }
        if (changed) saveCurrentUser();
    }

    // Игровые расчеты
    function getClickPower() {
        let base = 1 + game.upgrades.clickPower * 2;
        let mult = 1 + game.upgrades.clickMult * 0.03;
        let prestige = game.prestigeBonus;
        return Math.floor(base * mult * (1 + prestige / 100));
    }
    function getPassiveIncome() {
        let inc = game.upgrades.autoClicker * 1;
        let mult = 1 + game.upgrades.passiveMult * 0.02;
        return Math.floor(inc * mult);
    }
    function getCritChance() { return Math.min(70, game.upgrades.crit * 5); }
    function getEventBonus() { return 1 + game.upgrades.eventBonus * 0.1; }

    function addFish(amount, fromClick = false) {
        if (!currentUser) return;
        game.fish += amount;
        game.totalFish += amount;
        if (fromClick) game.stats.totalClicks++;
        saveCurrentUser();
        checkAchievements();
        renderGameUI();
    }

    // Античит
    let anticheatBlockedUntil = 0;
    let clickTimestamps = [];

    function isAnticheatBlocked() {
        if (game.anticheatDisabled) return false;
        if (Date.now() < anticheatBlockedUntil) return true;
        return false;
    }

    function registerClick() {
        if (isAnticheatBlocked()) {
            showToast("⛔ Античит: клики заблокированы на 8 секунд");
            return false;
        }
        const now = Date.now();
        clickTimestamps.push(now);
        while (clickTimestamps.length && clickTimestamps[0] < now - 1000) clickTimestamps.shift();
        if (clickTimestamps.length > 18 && !game.anticheatDisabled) {
            anticheatBlockedUntil = now + 8000;
            clickTimestamps = [];
            showToast("⚠️ Слишком быстро! Блокировка на 8 секунд.");
            renderGameUI();
            return false;
        }
        return true;
    }

    function disableAnticheat(password) {
        if (password === "seal") {
            game.anticheatDisabled = true;
            anticheatBlockedUntil = 0;
            saveCurrentUser();
            showToast("✅ Защита отключена.");
            renderGameUI();
            return true;
        } else {
            showToast("❌ Неверный пароль!");
            return false;
        }
    }

    function enableAnticheat() {
        game.anticheatDisabled = false;
        anticheatBlockedUntil = 0;
        clickTimestamps = [];
        saveCurrentUser();
        showToast("🛡️ Защита включена.");
        renderGameUI();
    }

    // Покупка улучшений
    function buyUpgrade(id, basePrice, name) {
        let level = game.upgrades[id];
        let price = Math.floor(basePrice * (level + 1));
        if (game.fish < price) { showToast(`❌ Нужно ${price} рыб`); return; }
        game.fish -= price;
        game.upgrades[id]++;
        saveCurrentUser();
        checkAchievements();
        renderGameUI();
        showToast(`🎉 ${name} → ур.${game.upgrades[id]}`);
    }

    // Престиж
    function doPrestige() {
        if (game.totalFish < 5000) { showToast("Нужно 5000 общей рыбы"); return; }
        if (confirm("Престиж: сбросить рыбу и улучшения, получить +50% к силе клика навсегда?")) {
            game.prestigeBonus += 50;
            game.fish = 0;
            game.totalFish = 0;
            game.upgrades = { clickPower:0, autoClicker:0, crit:0, clickMult:0, passiveMult:0, eventBonus:0 };
            game.stats.prestigeCount++;
            saveCurrentUser();
            checkAchievements();
            renderGameUI();
            showToast("🌟 Престиж! +50% к силе клика.");
        }
    }

    // Админ-панель (расширенная)
    function showAdminPanel() {
        if (game.role !== 'admin') { showToast("Доступно только администратору"); return; }
        const users = loadUsers();
        const userList = Object.keys(users).map(nick => ({ nick, ...users[nick] }));
        const modalHtml = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>👑 Админ-панель</h3>
                <div style="margin-bottom: 10px;">
                    <label>Выдать ресурсы игроку:</label>
                    <select id="adminSelectUser">${userList.map(u => `<option value="${u.nick}">${u.nick} (${u.role})</option>`).join('')}</select>
                    <input type="number" id="adminGiveFish" placeholder="Количество рыбы">
                    <button id="adminGiveFishBtn">Выдать рыбу</button>
                </div>
                <div style="margin-bottom: 10px;">
                    <select id="adminUpgradeSelect">
                        <option value="clickPower">Сила клика</option>
                        <option value="autoClicker">Автокликер</option>
                        <option value="crit">Крит</option>
                        <option value="clickMult">Множитель клика</option>
                        <option value="passiveMult">Множитель пассива</option>
                        <option value="eventBonus">Бонус событий</option>
                    </select>
                    <input type="number" id="adminGiveLevels" placeholder="Количество уровней">
                    <button id="adminGiveUpgradeBtn">Выдать уровни</button>
                </div>
                <div style="margin-bottom: 10px;">
                    <select id="adminRoleSelect">
                        <option value="player">Игрок</option>
                        <option value="admin">Администратор</option>
                    </select>
                    <button id="adminSetRoleBtn">Сменить роль</button>
                </div>
                <div style="margin-bottom: 10px;">
                    <button id="adminResetAnticheatBtn">Сбросить блокировку античита игроку</button>
                </div>
                <div style="margin-bottom: 10px;">
                    <button id="adminResetAllDataBtn" style="background:#c7254e; color:white;">⚠️ СБРОСИТЬ ВСЕ ДАННЫЕ (удалить всех игроков) ⚠️</button>
                </div>
                <div style="margin-top:15px;">
                    <h4>Список игроков</h4>
                    <div style="max-height:200px; overflow-y:auto;">${userList.map(u => `<div class="player-list-item" data-nick="${u.nick}"><span>${u.nick} (${u.role}) — ${u.totalFish} 🐟</span></div>`).join('')}</div>
                </div>
            </div>
        `;
        const modal = createModal(modalHtml);
        const targetNickSelect = modal.querySelector('#adminSelectUser');
        const giveFishBtn = modal.querySelector('#adminGiveFishBtn');
        giveFishBtn.onclick = () => {
            const targetNick = targetNickSelect.value;
            const amount = parseInt(modal.querySelector('#adminGiveFish').value);
            if (isNaN(amount)) return;
            const usersData = loadUsers();
            if (usersData[targetNick]) {
                usersData[targetNick].fish += amount;
                usersData[targetNick].totalFish += amount;
                saveUsers(usersData);
                showToast(`Выдано ${amount} рыбы игроку ${targetNick}`);
                if (targetNick === currentUser) {
                    game = usersData[currentUser];
                    renderGameUI();
                }
            }
        };
        modal.querySelector('#adminGiveUpgradeBtn').onclick = () => {
            const targetNick = targetNickSelect.value;
            const upgrade = modal.querySelector('#adminUpgradeSelect').value;
            const levels = parseInt(modal.querySelector('#adminGiveLevels').value);
            if (isNaN(levels)) return;
            const usersData = loadUsers();
            if (usersData[targetNick]) {
                if (!usersData[targetNick].upgrades) usersData[targetNick].upgrades = {};
                usersData[targetNick].upgrades[upgrade] = (usersData[targetNick].upgrades[upgrade] || 0) + levels;
                saveUsers(usersData);
                showToast(`Выдано ${levels} уровней ${upgrade} игроку ${targetNick}`);
                if (targetNick === currentUser) {
                    game = usersData[currentUser];
                    renderGameUI();
                }
            }
        };
        modal.querySelector('#adminSetRoleBtn').onclick = () => {
            const targetNick = targetNickSelect.value;
            const newRole = modal.querySelector('#adminRoleSelect').value;
            const usersData = loadUsers();
            if (usersData[targetNick]) {
                usersData[targetNick].role = newRole;
                saveUsers(usersData);
                showToast(`Роль игрока ${targetNick} изменена на ${newRole}`);
                if (targetNick === currentUser) {
                    game = usersData[currentUser];
                    renderGameUI();
                }
            }
        };
        modal.querySelector('#adminResetAnticheatBtn').onclick = () => {
            const targetNick = targetNickSelect.value;
            const usersData = loadUsers();
            if (usersData[targetNick]) {
                usersData[targetNick].anticheatDisabled = false;
                saveUsers(usersData);
                showToast(`Античит сброшен для ${targetNick}`);
                if (targetNick === currentUser) {
                    game = usersData[currentUser];
                    anticheatBlockedUntil = 0;
                    clickTimestamps = [];
                    renderGameUI();
                }
            }
        };
        modal.querySelector('#adminResetAllDataBtn').onclick = () => {
            if (confirm("ВНИМАНИЕ! Это удалит всех игроков, включая вас. Вы будете перенаправлены на страницу входа. Продолжить?")) {
                localStorage.removeItem('seal_users');
                currentUser = null;
                game = null;
                renderAuthUI();
                modal.remove();
            }
        };
    }

    // Лидерборд
    function showLeaderboard() {
        const users = loadUsers();
        const list = Object.entries(users).map(([nick, data]) => ({ nick, totalFish: data.totalFish }));
        list.sort((a,b) => b.totalFish - a.totalFish);
        let msg = "🏆 ГЛОБАЛЬНЫЙ ТОП 🏆\n";
        list.slice(0, 20).forEach((u, i) => msg += `${i+1}. ${u.nick} — ${u.totalFish.toLocaleString()} 🐟\n`);
        alert(msg);
    }

    // Список игроков и просмотр профиля
    function showPlayers() {
        const users = loadUsers();
        const list = Object.entries(users).map(([nick, data]) => ({ nick, totalFish: data.totalFish, role: data.role, stats: data.stats }));
        list.sort((a,b) => b.totalFish - a.totalFish);
        const modalHtml = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>👥 Игроки</h3>
                <div style="max-height:300px; overflow-y:auto;">
                    ${list.map(p => `<div class="player-list-item" data-nick="${p.nick}"><span>${p.nick} (${p.role === 'admin' ? '👑 Админ' : '🦭 Игрок'}) — ${p.totalFish.toLocaleString()} 🐟</span></div>`).join('')}
                </div>
                <div id="profileDetails" style="margin-top:15px; border-top:1px solid #ccc; padding:10px;"></div>
            </div>
        `;
        const modal = createModal(modalHtml);
        modal.querySelectorAll('.player-list-item').forEach(el => {
            el.onclick = () => {
                const nick = el.dataset.nick;
                const userData = users[nick];
                if (userData) {
                    modal.querySelector('#profileDetails').innerHTML = `
                        <h4>${escapeHtml(nick)}</h4>
                        <p>Роль: ${userData.role === 'admin' ? 'Администратор' : 'Игрок'}</p>
                        <p>Всего рыбы: ${userData.totalFish.toLocaleString()}</p>
                        <p>Кликов: ${userData.stats?.totalClicks || 0}</p>
                        <p>Сила клика: ${1 + (userData.upgrades?.clickPower||0)*2}</p>
                        <p>Пассивный доход: ${(userData.upgrades?.autoClicker||0)}/сек</p>
                    `;
                }
            };
        });
    }

    // Вспомогательные UI
    function renderAuthUI() {
        const root = document.getElementById('app');
        root.innerHTML = `
            <h1>🦭 SEAL CLICKER</h1>
            <div style="margin-bottom: 15px;">
                <input type="text" id="loginNick" placeholder="Никнейм">
                <input type="password" id="loginPass" placeholder="Пароль">
                <button id="loginBtn">Вход</button>
            </div>
            <div style="margin-bottom: 15px;">
                <input type="text" id="regNick" placeholder="Новый ник">
                <input type="password" id="regPass" placeholder="Пароль (мин.4 символа)">
                <button id="regBtn">Регистрация</button>
            </div>
            <div id="authError" class="error"></div>
            <footer>Уникальный ник, пароль. Админ по умолчанию: admin / admin123</footer>
        `;
        document.getElementById('loginBtn').onclick = () => {
            const nick = document.getElementById('loginNick').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (!nick || !pass) { showToast("Введите ник и пароль"); return; }
            if (loginUser(nick, pass)) {
                initAchievements();
                startGameLoop();
                renderGameUI();
            } else {
                document.getElementById('authError').innerText = "Неверный ник или пароль";
            }
        };
        document.getElementById('regBtn').onclick = () => {
            const nick = document.getElementById('regNick').value.trim();
            const pass = document.getElementById('regPass').value;
            if (!nick || pass.length < 4) { showToast("Ник обязателен, пароль минимум 4 символа"); return; }
            if (registerUser(nick, pass)) {
                showToast("Регистрация успешна! Теперь войдите.");
                document.getElementById('authError').innerHTML = "";
            } else {
                document.getElementById('authError').innerText = "Ник уже существует";
            }
        };
    }

    function renderGameUI() {
        if (!currentUser || !game) return;
        const fish = Math.floor(game.fish);
        const total = Math.floor(game.totalFish);
        const clickPower = getClickPower();
        const passive = getPassiveIncome();
        const critChance = getCritChance();
        const blocked = isAnticheatBlocked();
        const unlockCount = achievementsList.filter(a => game.achievements[a.id]).length;

        const upgradesList = [
            { id: 'clickPower', name: '🐟 Острый зуб', desc: '+2 рыбы/клик', basePrice: 20, level: game.upgrades.clickPower },
            { id: 'autoClicker', name: '⏱️ Автокормушка', desc: '+1 рыба/сек', basePrice: 25, level: game.upgrades.autoClicker },
            { id: 'crit', name: '⚡ Крит-удар', desc: '+5% шанс x2', basePrice: 80, level: game.upgrades.crit },
            { id: 'clickMult', name: '📈 Множитель клика', desc: '+3% к силе', basePrice: 500, level: game.upgrades.clickMult },
            { id: 'passiveMult', name: '📈 Множитель пассива', desc: '+2% к пассивке', basePrice: 700, level: game.upgrades.passiveMult },
            { id: 'eventBonus', name: '🎁 Бонус событий', desc: '+10% к наградам', basePrice: 300, level: game.upgrades.eventBonus },
        ];

        let upgradesHtml = '';
        for (let up of upgradesList) {
            const price = Math.floor(up.basePrice * (up.level + 1));
            const canBuy = game.fish >= price && !blocked;
            upgradesHtml += `
                <div class="upgrade">
                    <div class="upgrade-info">
                        <div class="upgrade-name">${up.name}</div>
                        <div class="upgrade-desc">${up.desc} (ур.${up.level})</div>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button class="buy-btn" data-upgrade="${up.id}" data-price="${up.basePrice}" ${!canBuy ? 'disabled' : ''}>${price} 🐟</button>
                        <div class="help-icon" data-help="${up.id}">?</div>
                    </div>
                </div>
            `;
        }

        let achievementsHtml = '';
        for (let ach of achievementsList.slice(0, 50)) {
            const unlocked = game.achievements[ach.id];
            achievementsHtml += `<div class="achievement ${unlocked ? 'unlocked' : ''}">${unlocked ? '✅' : '🔒'} ${ach.name}</div>`;
        }

        const root = document.getElementById('app');
        root.innerHTML = `
            <h1>🦭 SEAL CLICKER</h1>
            <div class="nick-panel" style="justify-content:space-between; background:#e9f3ed; border-radius:60px; padding:12px; margin-bottom:15px;">
                <span>🐚 ${escapeHtml(currentUser)} | Роль: ${game.role === 'admin' ? '👑 Админ' : '🦭 Игрок'}</span>
                <span>⭐ Престиж +${game.prestigeBonus}%</span>
                <button id="logoutBtn" style="background:#c2a575;">Выйти</button>
            </div>
            <div class="seal-area" id="clickZone">
                <div class="seal-emoji" id="sealEmoji">🦭</div>
                <div>👆 нажми на тюленя</div>
            </div>
            <div class="fish-counter">🐟 ${fish.toLocaleString()}</div>
            <div class="stat-grid">
                <div class="stat">💪 Сила: +${clickPower}</div>
                <div class="stat">⏱️ Пассив: +${passive}/сек</div>
                <div class="stat">💥 Крит: ${critChance}%</div>
            </div>
            <div class="stat-grid">
                <div class="stat">🏆 Всего: ${total.toLocaleString()}</div>
                <div class="stat">🖱️ Кликов: ${game.stats.totalClicks}</div>
            </div>
            ${blocked ? `<div class="warning">⛔ Античит: клики заблокированы</div>` : ''}
            <div class="action-buttons">
                ${!game.anticheatDisabled ? `<button id="disableAnticheatBtn">🔓 Отключить защиту</button>` : `<button id="enableAnticheatBtn" style="background:#b48c60;">🛡️ Включить защиту</button>`}
                ${game.role === 'admin' ? `<button id="adminPanelBtn">👑 Админ-панель</button>` : ''}
                <button id="playersBtn">👥 Игроки</button>
                <button id="leaderboardBtn">🏆 Топ</button>
                <button id="prestigeBtn">🏅 Престиж</button>
            </div>
            <div style="font-weight:bold; margin:10px 0 5px;">📦 МАГАЗИН</div>
            ${upgradesHtml}
            <div class="achievements">
                <strong>🏅 ДОСТИЖЕНИЯ (${unlockCount}/${achievementsList.length})</strong>
                <div style="max-height:200px; overflow-y:auto;">${achievementsHtml}</div>
            </div>
        `;

        // Обработчики
        document.getElementById('clickZone').onclick = () => {
            if (!registerClick()) return;
            let gain = getClickPower();
            if (Math.random() < getCritChance()/100) gain *= 2;
            addFish(gain, true);
            const seal = document.getElementById('sealEmoji');
            if (seal) {
                seal.classList.add('click-effect');
                setTimeout(() => seal.classList.remove('click-effect'), 100);
                playSound(600, 0.08);
            }
        };
        document.getElementById('logoutBtn').onclick = () => {
            currentUser = null;
            game = null;
            if (passiveInterval) clearInterval(passiveInterval);
            renderAuthUI();
        };
        if (!game.anticheatDisabled) {
            const btn = document.getElementById('disableAnticheatBtn');
            if (btn) btn.onclick = () => {
                const pwd = prompt("Введите пароль для отключения защиты:");
                if (pwd) disableAnticheat(pwd);
            };
        } else {
            const btn = document.getElementById('enableAnticheatBtn');
            if (btn) btn.onclick = enableAnticheat;
        }
        if (game.role === 'admin') {
            document.getElementById('adminPanelBtn').onclick = showAdminPanel;
        }
        document.getElementById('playersBtn').onclick = showPlayers;
        document.getElementById('leaderboardBtn').onclick = showLeaderboard;
        document.getElementById('prestigeBtn').onclick = doPrestige;
        document.querySelectorAll('.buy-btn').forEach(btn => {
            const id = btn.dataset.upgrade;
            const price = parseInt(btn.dataset.price);
            btn.onclick = () => buyUpgrade(id, price, upgradesList.find(u => u.id === id).name);
        });
        document.querySelectorAll('.help-icon').forEach(icon => {
            const id = icon.dataset.help;
            icon.onclick = (e) => { e.stopPropagation(); showHelp(id); };
        });
    }

    function showHelp(upgradeId) {
        const helps = {
            clickPower: "🐟 Острый зуб: +2 рыбы за клик за уровень.",
            autoClicker: "⏱️ Автокормушка: +1 рыба/сек за уровень.",
            crit: "⚡ Крит-удар: +5% шанс x2 за уровень.",
            clickMult: "📈 Множитель клика: +3% к силе клика за уровень.",
            passiveMult: "📈 Множитель пассива: +2% к пассивному доходу за уровень.",
            eventBonus: "🎁 Бонус событий: +10% к наградам событий за уровень.",
        };
        alert(helps[upgradeId] || "Улучшение увеличивает доход.");
    }

    // Вспомогательные
    let audioCtx = null;
    function playSound(freq, duration) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.value = 0.05;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function createModal(html) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = html;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        return modal;
    }

    let passiveInterval = null;
    let eventInterval = null;
    function startGameLoop() {
        if (passiveInterval) clearInterval(passiveInterval);
        if (eventInterval) clearInterval(eventInterval);
        passiveInterval = setInterval(() => {
            if (currentUser && game) {
                let inc = getPassiveIncome();
                if (inc > 0) addFish(inc, false);
            }
        }, 1000);
        eventInterval = setInterval(() => {
            if (currentUser && game && Math.random() < 0.4) {
                const events = [
                    { msg: "🐟 Косяк рыбы! +50", gain: 50 },
                    { msg: "💎 Золотая рыбка! +200", gain: 200 },
                    { msg: "🎣 Рыбак поделился +30", gain: 30 },
                ];
                const ev = events[Math.floor(Math.random() * events.length)];
                let gain = ev.gain * getEventBonus();
                addFish(gain, false);
                showToast(ev.msg + " " + Math.floor(gain) + " рыб!");
            }
        }, 25000);
    }

    // Инициализация
    renderAuthUI();
</script>
</body>
</html>
