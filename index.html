<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тюленья империя | Мега-версия</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #1e6b3e; font-family: 'Segoe UI', system-ui; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .game-card { max-width: 1100px; width: 100%; background: #fffef5; border-radius: 60px; padding: 25px; box-shadow: 0 20px 30px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #1c6948; margin-bottom: 20px; }
        .flex { display: flex; gap: 15px; flex-wrap: wrap; margin: 15px 0; }
        .panel { background: #f0ecdf; border-radius: 40px; padding: 15px; flex: 1; }
        .seal-area { text-align: center; cursor: pointer; margin: 20px 0; }
        .seal-emoji { font-size: 7rem; display: inline-block; transition: 0.07s; }
        .click-effect { transform: scale(0.9); }
        .resource { background: #2a5c48; color: #FFE5B4; font-size: 2rem; font-weight: bold; text-align: center; padding: 12px; border-radius: 60px; margin: 15px 0; }
        button { background: #ffb347; border: none; padding: 8px 16px; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 5px; color: white; }
        button:active { transform: scale(0.97); }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2b241cee; color: #ffeaaf; padding: 8px 20px; border-radius: 60px; animation: fadeOut 2s forwards; z-index: 1001; }
        @keyframes fadeOut { 0% { opacity: 1; bottom: 0; } 80% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        footer { text-align: center; font-size: 0.7rem; margin-top: 20px; color: #7e9a7a; }
        .role-badge { padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; background: #ffb347; color: white; }
        .bot-panel, .clan-panel { background: #e6d5b8; border-radius: 40px; padding: 15px; margin: 15px 0; text-align: center; }
        .bot-health { height: 15px; background: #ccc; border-radius: 15px; overflow: hidden; margin: 10px 0; }
        .bot-fill { height: 100%; background: #ff6b6b; width: 100%; }
        .achievement { font-size: 0.7rem; padding: 4px; margin: 2px; background: #fff3e0; border-radius: 20px; }
        .achievement.unlocked { background: #ffe0b5; font-weight: bold; }
        input, select { padding: 8px; border-radius: 40px; border: 1px solid #c0a070; background: #fffcf5; margin: 5px; }
    </style>
</head>
<body>
<div class="game-card" id="app"></div>

<script>
(function() {
    // Уникальное имя для клиента Supabase, чтобы не конфликтовать с глобальным "supabase"
    const _SUPABASE_URL = 'https://pmvbhhidcojkkpumsxxb.supabase.co';
    const _SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdmJoaGlkY29qa2twdW1zeHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzk3MjcsImV4cCI6MjA5Mjg1NTcyN30.1eKxcaqeClRdAVH8lVcOdYaV0o_PbRzjnM9vBUP15QQ';
    const _supabase = window.supabase.createClient(_SUPABASE_URL, _SUPABASE_KEY);

    // ----- Состояние -----
    let currentUser = null;
    let useEmoji = false;
    let syncInterval = null, passiveInterval = null;
    let anticheatBlockedUntil = 0, clickTimestamps = [];
    let botCurrentHp = 100;
    let botLevel = 1;

    // ----- Достижения (70+) -----
    const achievementsList = [];
    for (let i = 1; i <= 20; i++) {
        let target = 100 * Math.pow(1.5, i-1);
        achievementsList.push({ id: `fish_${i}`, name: `${Math.floor(target).toLocaleString()} рыб`, cond: (u) => u.total_fish >= target, reward: Math.floor(target * 0.1) });
    }
    for (let i = 1; i <= 15; i++) {
        let clicks = 50 * Math.pow(2, i-1);
        achievementsList.push({ id: `click_${i}`, name: `${Math.floor(clicks).toLocaleString()} кликов`, cond: (u) => (u.stats?.totalClicks || 0) >= clicks, reward: Math.floor(clicks * 0.2) });
    }
    for (let i = 1; i <= 10; i++) {
        achievementsList.push({ id: `clickLvl_${i}`, name: `Сила клика ${i}`, cond: (u) => (u.click_level || 0) >= i, reward: 50 * i });
        achievementsList.push({ id: `autoLvl_${i}`, name: `Автокликер ${i}`, cond: (u) => (u.auto_level || 0) >= i, reward: 60 * i });
    }
    for (let i = 1; i <= 5; i++) {
        achievementsList.push({ id: `win_${i}`, name: `${i*5} побед над ботом`, cond: (u) => (u.stats?.wins || 0) >= i*5, reward: 100 * i });
    }
    for (let i = 1; i <= 5; i++) {
        achievementsList.push({ id: `prestige_${i}`, name: `Престиж ${i}`, cond: (u) => (u.stats?.prestigeCount || 0) >= i, reward: 500 * i });
    }

    function checkAchievements() {
        if (!currentUser) return;
        if (!currentUser.achievements) currentUser.achievements = {};
        if (!currentUser.stats) currentUser.stats = { totalClicks: 0, wins: 0, prestigeCount: 0 };
        let changed = false;
        for (let ach of achievementsList) {
            if (!currentUser.achievements[ach.id] && ach.cond(currentUser)) {
                currentUser.achievements[ach.id] = true;
                currentUser.fish += ach.reward;
                currentUser.total_fish += ach.reward;
                changed = true;
                showToast(`🏆 ${ach.name}! +${ach.reward} рыб`);
            }
        }
        if (changed) saveUser();
    }

    // ----- Основные функции -----
    function getClickPower() {
        let base = 1 + (currentUser.click_level || 0) * 2;
        let prestige = currentUser.prestige_bonus || 0;
        return Math.floor(base * (1 + prestige / 100));
    }
    function getPassive() { return (currentUser.auto_level || 0) * 1; }
    function getCritChance() { return Math.min(60, (currentUser.click_level || 0) * 3); }
    function getBotMaxHp() { return 50 + botLevel * 20; }
    function getBotAttack() { return 5 + Math.floor(botLevel * 1.5); }

    async function addFish(amount, fromClick = false) {
        if (!currentUser) return;
        currentUser.fish += amount;
        currentUser.total_fish += amount;
        if (fromClick) currentUser.stats.totalClicks = (currentUser.stats.totalClicks || 0) + 1;
        await saveUser();
        checkAchievements();
        renderUI();
    }

    async function attackBot() {
        if (!currentUser) return;
        let playerPower = getClickPower();
        let damage = Math.max(1, playerPower - Math.floor(botLevel / 2));
        botCurrentHp -= damage;
        if (botCurrentHp <= 0) {
            let reward = 100 * botLevel;
            await addFish(reward, false);
            currentUser.stats.wins = (currentUser.stats.wins || 0) + 1;
            botLevel++;
            botCurrentHp = getBotMaxHp();
            currentUser.stats.bot_level = botLevel;
            await saveUser();
            showToast(`🎉 Победа! Бот повышен до уровня ${botLevel}, +${reward} рыбы`);
        } else {
            let botDamage = getBotAttack();
            let lose = Math.min(botDamage, Math.floor(currentUser.fish * 0.1));
            currentUser.fish = Math.max(0, currentUser.fish - lose);
            await saveUser();
            showToast(`⚔️ Вы нанесли ${damage} урона. Бот отнял ${lose} рыбы`);
        }
        renderUI();
    }

    async function buyClickUpgrade() {
        let price = 20 * (currentUser.click_level + 1);
        if (currentUser.fish < price) { showToast("❌ Не хватает рыбы"); return; }
        currentUser.fish -= price;
        currentUser.click_level++;
        await saveUser();
        showToast(`🐟 Сила клика → ${getClickPower()}`);
        renderUI();
    }

    async function buyAutoUpgrade() {
        let price = 30 * (currentUser.auto_level + 1);
        if (currentUser.fish < price) { showToast("❌ Не хватает рыбы"); return; }
        currentUser.fish -= price;
        currentUser.auto_level++;
        await saveUser();
        showToast(`⏱ Пассивный доход +1/сек`);
        renderUI();
    }

    async function doPrestige() {
        if (currentUser.total_fish < 5000) { showToast("Нужно 5000 рыб"); return; }
        if (confirm("Престиж: сбросить рыбу и уровни, получить +50% к силе клика?")) {
            currentUser.prestige_bonus = (currentUser.prestige_bonus || 0) + 50;
            currentUser.fish = 0;
            currentUser.total_fish = 0;
            currentUser.click_level = 0;
            currentUser.auto_level = 0;
            currentUser.stats.prestigeCount = (currentUser.stats.prestigeCount || 0) + 1;
            botLevel = 1;
            botCurrentHp = getBotMaxHp();
            await saveUser();
            showToast("🌟 Престиж! +50% к силе клика");
            renderUI();
        }
    }

    // ----- Админ-панель -----
    async function adminPanel() {
        let pass = prompt("Пароль администратора:");
        if (pass !== 'seal123') { showToast("Неверный пароль"); return; }
        let action = prompt("1 - выдать рыбу\n2 - сбросить античит\n3 - выдать уровни");
        if (action === '1') {
            let nick = prompt("Ник игрока:");
            if (!nick) return;
            let amount = parseInt(prompt("Количество рыбы:"));
            if (isNaN(amount)) return;
            let { data: target } = await _supabase.from('users').select('*').eq('nickname', nick).single();
            if (!target) { showToast("Игрок не найден"); return; }
            target.fish += amount;
            target.total_fish += amount;
            await _supabase.from('users').update({ fish: target.fish, total_fish: target.total_fish }).eq('nickname', nick);
            await _supabase.from('leaderboard').upsert({ nickname: nick, total_fish: target.total_fish });
            showToast(`Выдано ${amount} рыбы игроку ${nick}`);
            if (currentUser.nickname === nick) {
                currentUser.fish = target.fish;
                currentUser.total_fish = target.total_fish;
                renderUI();
            }
        } else if (action === '2') {
            await _supabase.from('users').update({ anticheat_disabled: false }).neq('nickname', '');
            showToast("Античит сброшен для всех");
        } else if (action === '3') {
            let nick = prompt("Ник игрока:");
            if (!nick) return;
            let up = prompt("click_level или auto_level");
            let levels = parseInt(prompt("Количество уровней:"));
            if (!up || isNaN(levels)) return;
            let { data: target } = await _supabase.from('users').select('*').eq('nickname', nick).single();
            if (!target) return;
            target[up] = (target[up] || 0) + levels;
            await _supabase.from('users').update({ [up]: target[up] }).eq('nickname', nick);
            showToast(`Выдано ${levels} уровней ${up} игроку ${nick}`);
            if (currentUser.nickname === nick) {
                currentUser[up] = target[up];
                renderUI();
            }
        }
    }

    // ----- Регистрация / логин -----
    async function register(nick, pass) {
        let { data: existing } = await _supabase.from('users').select('nickname').eq('nickname', nick);
        if (existing && existing.length) { showToast("Ник занят"); return false; }
        let newUser = {
            nickname: nick, password: pass,
            fish: 0, total_fish: 0,
            click_level: 0, auto_level: 0,
            prestige_bonus: 0, anticheat_disabled: false, role: 'player',
            stats: { totalClicks: 0, wins: 0, bot_level: 1, prestigeCount: 0 },
            achievements: {},
        };
        await _supabase.from('users').insert(newUser);
        await _supabase.from('leaderboard').insert({ nickname: nick, total_fish: 0 });
        currentUser = newUser;
        currentUser.nickname = nick;
        currentUser.password = pass;
        return true;
    }

    async function loadUser(nick, pass) {
        let { data } = await _supabase.from('users').select('*').eq('nickname', nick).maybeSingle();
        if (!data || data.password !== pass) return null;
        return data;
    }

    async function handleRegister() {
        let nick = document.getElementById('regNick').value.trim();
        let pass = document.getElementById('regPass').value;
        if (!nick || !pass) { showToast("Введите ник и пароль"); return; }
        if (await register(nick, pass)) {
            localStorage.setItem('seal_user', JSON.stringify({ nickname: nick, password: pass }));
            botLevel = currentUser.stats?.bot_level || 1;
            botCurrentHp = getBotMaxHp();
            startLoops();
            renderUI();
        }
    }

    async function handleLogin() {
        let nick = document.getElementById('loginNick').value.trim();
        let pass = document.getElementById('loginPass').value;
        if (!nick || !pass) { showToast("Введите ник и пароль"); return; }
        let data = await loadUser(nick, pass);
        if (!data) { showToast("Неверный ник или пароль"); return; }
        currentUser = data;
        botLevel = currentUser.stats?.bot_level || 1;
        botCurrentHp = getBotMaxHp();
        localStorage.setItem('seal_user', JSON.stringify({ nickname: nick, password: pass }));
        startLoops();
        renderUI();
    }

    function logout() {
        currentUser = null;
        if (syncInterval) clearInterval(syncInterval);
        if (passiveInterval) clearInterval(passiveInterval);
        localStorage.removeItem('seal_user');
        renderUI();
    }

    // ----- Античит -----
    function isBlocked() {
        if (currentUser?.anticheat_disabled) return false;
        if (Date.now() < anticheatBlockedUntil) return true;
        return false;
    }
    function registerClick() {
        if (!currentUser) return false;
        if (currentUser.anticheat_disabled) return true;
        if (isBlocked()) { showToast("⛔ Блокировка 8 сек"); return false; }
        let now = Date.now();
        clickTimestamps.push(now);
        while (clickTimestamps.length && clickTimestamps[0] < now - 1000) clickTimestamps.shift();
        if (clickTimestamps.length > 18) {
            anticheatBlockedUntil = now + 8000;
            clickTimestamps = [];
            showToast("⚠️ Слишком быстро! Блокировка 8 сек");
            renderUI();
            return false;
        }
        return true;
    }

    // ----- Лидерборд -----
    async function showLeaderboard() {
        let { data } = await _supabase.from('leaderboard').select('nickname, total_fish').order('total_fish', { ascending: false }).limit(20);
        let msg = "🏆 ГЛОБАЛЬНЫЙ ТОП 🏆\n";
        data.forEach((u,i) => msg += `${i+1}. ${u.nickname} — ${u.total_fish} 🐟\n`);
        alert(msg);
    }

    // ----- Ежедневный квест -----
    async function claimDaily() {
        let today = new Date().toDateString();
        let last = currentUser.daily_last ? new Date(currentUser.daily_last).toDateString() : null;
        if (last === today) { showToast("Уже получали сегодня!"); return; }
        let reward = 200 + Math.floor(currentUser.total_fish * 0.02);
        currentUser.fish += reward;
        currentUser.total_fish += reward;
        currentUser.daily_last = new Date().toISOString();
        await saveUser();
        showToast(`Ежедневная награда: +${reward} рыб!`);
        renderUI();
    }

    async function saveUser() {
        if (!currentUser) return;
        await _supabase.from('users').upsert({
            nickname: currentUser.nickname,
            password: currentUser.password,
            fish: currentUser.fish,
            total_fish: currentUser.total_fish,
            click_level: currentUser.click_level,
            auto_level: currentUser.auto_level,
            prestige_bonus: currentUser.prestige_bonus,
            anticheat_disabled: currentUser.anticheat_disabled,
            role: currentUser.role,
            clan: currentUser.clan,
            daily_last: currentUser.daily_last,
            stats: currentUser.stats,
            achievements: currentUser.achievements,
        }, { onConflict: 'nickname' });
        await _supabase.from('leaderboard').upsert({ nickname: currentUser.nickname, total_fish: currentUser.total_fish });
    }

    // ----- UI -----
    function toggleStyle() { useEmoji = !useEmoji; renderUI(); }

    function renderUI() {
        let root = document.getElementById('app');
        if (!currentUser) {
            root.innerHTML = `
                <h1>🐟 Тюленья империя</h1>
                <div class="flex">
                    <input id="regNick" placeholder="Ник" style="flex:2; padding:10px; border-radius:50px;">
                    <input id="regPass" type="password" placeholder="Пароль" style="flex:2; padding:10px; border-radius:50px;">
                    <button id="regBtn">Регистр</button>
                </div>
                <div class="flex">
                    <input id="loginNick" placeholder="Ник" style="flex:2; padding:10px; border-radius:50px;">
                    <input id="loginPass" type="password" placeholder="Пароль" style="flex:2; padding:10px; border-radius:50px;">
                    <button id="loginBtn">Войти</button>
                </div>
                <button id="leaderBtn" style="width:100%; margin:10px 0;">🏆 Топ</button>
                <button id="styleBtn" style="width:100%;">🎨 Стиль</button>
                <footer>Уникальный ник+пароль. Все данные в облаке</footer>
            `;
            document.getElementById('regBtn').onclick = handleRegister;
            document.getElementById('loginBtn').onclick = handleLogin;
            document.getElementById('leaderBtn').onclick = showLeaderboard;
            document.getElementById('styleBtn').onclick = toggleStyle;
            return;
        }

        let s = (e, t) => useEmoji ? e : t;
        let fish = Math.floor(currentUser.fish);
        let total = Math.floor(currentUser.total_fish);
        let clickPower = getClickPower();
        let passive = getPassive();
        let critChance = getCritChance();
        let prestige = currentUser.prestige_bonus || 0;
        let botHpPercent = (botCurrentHp / getBotMaxHp()) * 100;

        let achievementsHtml = '';
        let unlockedCount = 0;
        for (let ach of achievementsList.slice(0, 30)) {
            let unlocked = currentUser.achievements && currentUser.achievements[ach.id];
            if (unlocked) unlockedCount++;
            achievementsHtml += `<div class="achievement ${unlocked ? 'unlocked' : ''}">${unlocked ? '✅' : '🔒'} ${ach.name}</div>`;
        }

        root.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <div>${s('🦭','[ТЮЛЕНЬ]')} ${currentUser.nickname} <span class="role-badge">${currentUser.role}</span></div>
                <div>⭐ +${prestige}% <button id="dailyBtn" style="padding:4px 12px;">🎁 Ежедневно</button></div>
                <button id="logoutBtn">Выйти</button>
            </div>
            <div class="seal-area" id="clickZone">
                <div class="seal-emoji" id="sealEmoji">${s('🦭','[ТЮЛЕНЬ]')}</div>
                <div>${s('👆 клик', '[КЛИК]')}</div>
            </div>
            <div class="resource">${s('🐟','[РЫБА]')} ${fish.toLocaleString()}</div>
            <div class="flex">
                <div class="panel">💪 Сила: +${clickPower}</div>
                <div class="panel">⏱ Пассив: +${passive}/сек</div>
                <div class="panel">💥 Крит: ${critChance}%</div>
            </div>
            <div class="flex">
                <div class="panel">🏆 Всего: ${total.toLocaleString()}</div>
                <div class="panel">🖱 Кликов: ${currentUser.stats?.totalClicks || 0}</div>
                <div class="panel">🏅 Побед: ${currentUser.stats?.wins || 0}</div>
            </div>
            <div class="bot-panel">
                <h3>${s('🤖','[БОТ]')} Уровень ${botLevel}</h3>
                <div class="bot-health"><div class="bot-fill" style="width:${botHpPercent}%"></div></div>
                <button id="attackBtn">⚔️ АТАКОВАТЬ</button>
            </div>
            <div class="flex">
                <button id="buyClickBtn">🐟 Сила клика (${20*(currentUser.click_level+1)})</button>
                <button id="buyAutoBtn">⏱ Автокликер (${30*(currentUser.auto_level+1)})</button>
                <button id="prestigeBtn">🏅 Престиж</button>
                <button id="adminBtn">👑 Админ</button>
                <button id="leaderBtn">🏆 Топ</button>
                <button id="styleBtn">${useEmoji ? '📄 Текст' : '😀 Смайлы'}</button>
            </div>
            <div class="achievements" style="background:#f0ecdf; border-radius:40px; padding:12px; margin-top:15px;">
                <strong>🏅 Достижения (${unlockedCount}/${achievementsList.length})</strong>
                <div style="max-height:150px; overflow-y:auto;">${achievementsHtml}</div>
            </div>
            <footer>Автосохранение, синхронизация 3 сек. Админ-пароль: seal123</footer>
        `;

        document.getElementById('clickZone').onclick = async () => {
            if (!registerClick()) return;
            let gain = clickPower;
            if (Math.random() * 100 < critChance) gain *= 2;
            await addFish(gain, true);
            let seal = document.getElementById('sealEmoji');
            seal.classList.add('click-effect');
            setTimeout(() => seal.classList.remove('click-effect'), 100);
        };
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('dailyBtn').onclick = claimDaily;
        document.getElementById('attackBtn').onclick = attackBot;
        document.getElementById('buyClickBtn').onclick = buyClickUpgrade;
        document.getElementById('buyAutoBtn').onclick = buyAutoUpgrade;
        document.getElementById('prestigeBtn').onclick = doPrestige;
        document.getElementById('adminBtn').onclick = adminPanel;
        document.getElementById('leaderBtn').onclick = showLeaderboard;
        document.getElementById('styleBtn').onclick = toggleStyle;
    }

    async function startLoops() {
        if (passiveInterval) clearInterval(passiveInterval);
        if (syncInterval) clearInterval(syncInterval);
        passiveInterval = setInterval(async () => {
            if (currentUser) {
                let inc = getPassive();
                if (inc > 0) await addFish(inc, false);
            }
        }, 1000);
        syncInterval = setInterval(async () => {
            if (currentUser) {
                let { data } = await _supabase.from('users').select('*').eq('nickname', currentUser.nickname).single();
                if (data && (data.fish !== currentUser.fish || data.total_fish !== currentUser.total_fish)) {
                    currentUser = data;
                    botLevel = currentUser.stats?.bot_level || 1;
                    botCurrentHp = getBotMaxHp();
                    renderUI();
                    showToast("🔄 Данные обновлены");
                }
            }
        }, 3000);
    }

    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    (async () => {
        let saved = localStorage.getItem('seal_user');
        if (saved) {
            let { nickname, password } = JSON.parse(saved);
            let data = await loadUser(nickname, password);
            if (data) {
                currentUser = data;
                botLevel = currentUser.stats?.bot_level || 1;
                botCurrentHp = getBotMaxHp();
                startLoops();
            }
        }
        renderUI();
    })();
})();
</script>
</body>
</html>
