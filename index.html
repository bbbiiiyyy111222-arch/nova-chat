<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌙 Nova Chat | Мессенджер</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        /* ШАПКА */
        .header {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 28px;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo h1 {
            font-size: 20px;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            font-size: 28px;
            background: rgba(168,85,247,0.3);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .avatar:hover {
            background: rgba(168,85,247,0.6);
            transform: scale(1.05);
        }

        .username {
            font-weight: bold;
            cursor: pointer;
        }

        .logout-btn {
            background: rgba(220,38,38,0.3);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(220,38,38,0.6);
        }

        /* ОСНОВНОЙ ЧАТ */
        .chat-container {
            display: flex;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }

        /* КОМНАТЫ */
        .rooms-sidebar {
            width: 280px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .rooms-title {
            font-size: 11px;
            color: #a0a0ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .room-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .room-btn:hover {
            background: rgba(168,85,247,0.3);
            transform: translateX(5px);
        }

        .room-btn.active {
            background: rgba(168,85,247,0.5);
            border-left: 3px solid #a855f7;
        }

        .room-icon {
            font-size: 20px;
        }

        .create-group-btn {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
        }

        .create-group-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(168,85,247,0.4);
        }

        /* ОКНО СООБЩЕНИЙ */
        .messages-area {
            flex: 1;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages-header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .messages-header-icon {
            font-size: 24px;
        }

        .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s;
            max-width: 80%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            font-size: 32px;
        }

        .message-content {
            flex: 1;
        }

        .message-user {
            font-weight: bold;
            font-size: 12px;
            color: #a855f7;
        }

        .message-time {
            font-size: 9px;
            color: #a0a0ff;
            margin-left: 8px;
        }

        .message-text {
            font-size: 14px;
            margin-top: 4px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message-own {
            flex-direction: row-reverse;
            align-self: flex-end;
        }

        .message-own .message-content {
            text-align: right;
        }

        /* ВВОД СООБЩЕНИЯ */
        .message-input-area {
            padding: 15px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            padding: 12px 18px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .message-input:focus {
            border-color: #a855f7;
        }

        .send-btn {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            border-radius: 25px;
            padding: 0 24px;
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(168,85,247,0.4);
        }

        /* МОДАЛКИ */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a3a, #0f0c29);
            border-radius: 30px;
            padding: 35px;
            width: 90%;
            max-width: 450px;
            position: relative;
            border: 1px solid rgba(168,85,247,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .modal-content h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .modal-content input:focus, .modal-content textarea:focus {
            border-color: #a855f7;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            margin-top: 5px;
        }

        .modal-content button:hover {
            transform: scale(1.02);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #a0a0ff;
            transition: all 0.3s;
        }

        .close-modal:hover {
            color: #a855f7;
            transform: rotate(90deg);
        }

        .code-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .code-input {
            width: 50px;
            text-align: center;
            font-size: 28px;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
        }

        .error {
            color: #ff8a8a;
            text-align: center;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .success {
            color: #8aff8a;
            text-align: center;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .link-btn {
            background: none !important;
            color: #a855f7 !important;
            margin-top: 15px;
            font-size: 13px !important;
        }

        .link-btn:hover {
            text-decoration: underline;
            transform: none !important;
        }

        /* ПРОФИЛЬ */
        .profile-avatar-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .avatar-option {
            font-size: 40px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .avatar-option:hover {
            background: rgba(168,85,247,0.3);
            transform: scale(1.1);
        }

        .avatar-option.selected {
            background: rgba(168,85,247,0.5);
            box-shadow: 0 0 15px #a855f7;
        }

        /* СКРОЛЛ */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #a855f7;
            border-radius: 10px;
        }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 768px) {
            .rooms-sidebar {
                width: 200px;
            }
            .message {
                max-width: 95%;
            }
            .code-input {
                width: 40px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="chatContainer" style="display: none;">
        <div class="header">
            <div class="logo">
                <span class="logo-icon">🌙</span>
                <h1>Nova Chat</h1>
            </div>
            <div class="user-info">
                <div class="avatar" id="userAvatar" onclick="showProfileModal()">👤</div>
                <span class="username" id="userName" onclick="showProfileModal()">milk123</span>
                <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
            </div>
        </div>
        <div class="chat-container">
            <div class="rooms-sidebar" id="roomsSidebar">
                <div class="rooms-title">👥 ГРУППЫ</div>
                <div id="groupsList"></div>
                <div class="rooms-title" style="margin-top: 15px;">💬 ЛИЧНЫЕ</div>
                <div id="usersList"></div>
                <button class="create-group-btn" onclick="showCreateGroupModal()">➕ Создать группу</button>
            </div>
            <div class="messages-area">
                <div class="messages-header" id="currentChatHeader">
                    <span class="messages-header-icon">👥</span>
                    <span id="currentChatTitle">Общий чат</span>
                </div>
                <div class="messages-list" id="messagesList"></div>
                <div class="message-input-area">
                    <input type="text" class="message-input" id="messageInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="send-btn" onclick="sendMessage()">📤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ВХОДА/РЕГИСТРАЦИИ -->
    <div id="authModal" class="modal" style="display: flex;">
        <div class="modal-content">
            <div id="loginForm">
                <h2>🔐 Вход в Nova Chat</h2>
                <div id="loginError" class="error"></div>
                <input type="text" id="loginUsername" placeholder="Имя пользователя">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button onclick="doLogin()">Войти</button>
                <button class="link-btn" onclick="showRegisterForm()">📝 Нет аккаунта? Зарегистрироваться</button>
            </div>
            <div id="registerForm" style="display: none;">
                <h2>📝 Регистрация</h2>
                <div id="registerError" class="error"></div>
                <input type="text" id="regUsername" placeholder="Имя пользователя">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Пароль (мин. 4 символа)">
                <button onclick="sendVerificationCode()">📨 Отправить код на почту</button>
                <button class="link-btn" onclick="showLoginForm()">🔐 Уже есть аккаунт? Войти</button>
            </div>
            <div id="verifyForm" style="display: none;">
                <h2>🔐 Подтверждение</h2>
                <div id="verifyError" class="error"></div>
                <div class="code-inputs">
                    <input type="text" maxlength="1" class="code-input" id="code1" oninput="moveToNext(this, 'code2')">
                    <input type="text" maxlength="1" class="code-input" id="code2" oninput="moveToNext(this, 'code3')">
                    <input type="text" maxlength="1" class="code-input" id="code3" oninput="moveToNext(this, 'code4')">
                    <input type="text" maxlength="1" class="code-input" id="code4" oninput="moveToNext(this, 'code5')">
                    <input type="text" maxlength="1" class="code-input" id="code5" oninput="moveToNext(this, 'code6')">
                    <input type="text" maxlength="1" class="code-input" id="code6" oninput="verifyCode()">
                </div>
                <button onclick="verifyCode()">✅ Подтвердить</button>
                <button class="link-btn" onclick="resendCode()">🔄 Отправить код повторно</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ПРОФИЛЯ -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeProfileModal()">✖</span>
            <h2>👤 Мой профиль</h2>
            <div id="profileError" class="error"></div>
            <div class="profile-avatar-selector" id="avatarSelector">
                <div class="avatar-option" onclick="selectAvatar('👤')">👤</div>
                <div class="avatar-option" onclick="selectAvatar('😀')">😀</div>
                <div class="avatar-option" onclick="selectAvatar('😎')">😎</div>
                <div class="avatar-option" onclick="selectAvatar('🐱')">🐱</div>
                <div class="avatar-option" onclick="selectAvatar('🐶')">🐶</div>
                <div class="avatar-option" onclick="selectAvatar('⭐')">⭐</div>
                <div class="avatar-option" onclick="selectAvatar('🌙')">🌙</div>
                <div class="avatar-option" onclick="selectAvatar('🚀')">🚀</div>
            </div>
            <input type="text" id="profileDisplayName" placeholder="Отображаемое имя">
            <textarea id="profileBio" rows="3" placeholder="О себе"></textarea>
            <button onclick="updateProfile()">💾 Сохранить</button>
        </div>
    </div>

    <!-- МОДАЛКА СОЗДАНИЯ ГРУППЫ -->
    <div id="createGroupModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCreateGroupModal()">✖</span>
            <h2>➕ Создать группу</h2>
            <input type="text" id="groupName" placeholder="Название группы">
            <textarea id="groupDescription" rows="2" placeholder="Описание группы (необязательно)"></textarea>
            <button onclick="createGroup()">Создать</button>
        </div>
    </div>

    <script>
        // ============================================
        // КОНФИГУРАЦИЯ
        // ============================================
        const SUPABASE_URL = 'https://drsmnvtmyxqeqjoybaxq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRyc21udnRteXhxZXFqb3liYXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NzE0MDEsImV4cCI6MjA5MTQ0NzQwMX0.copFAJWP57olKR3cm6PTfYdMh5gQM1-z0Bo7-q-q004';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // EmailJS
        emailjs.init('ZGGZOMtj2UyXw9FqL');
        const EMAILJS_SERVICE_ID = 'service_6xc4w3o';
        const EMAILJS_TEMPLATE_ID = 'template_xrzni65';

        // Глобальные переменные
        let currentUser = null;
        let currentChat = { type: 'group', id: 1, name: 'Общий чат' };
        let pendingRegistration = null;
        let pendingCode = null;
        let selectedAvatar = '👤';
        let realtimeSubscription = null;

        // ============================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================
        function moveToNext(current, nextId) {
            if (current.value.length === 1) {
                document.getElementById(nextId).focus();
            }
        }

        function getCode() {
            return document.getElementById('code1').value +
                   document.getElementById('code2').value +
                   document.getElementById('code3').value +
                   document.getElementById('code4').value +
                   document.getElementById('code5').value +
                   document.getElementById('code6').value;
        }

        function clearCodeInputs() {
            for(let i = 1; i <= 6; i++) {
                document.getElementById(`code${i}`).value = '';
            }
            document.getElementById('code1').focus();
        }

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            if (el) {
                el.innerText = message;
                setTimeout(() => el.innerText = '', 3000);
            }
        }

        // ============================================
        // РЕГИСТРАЦИЯ И ПОДТВЕРЖДЕНИЕ
        // ============================================
        async function sendVerificationCode() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username || !email || !password) {
                showError('registerError', '❌ Заполните все поля');
                return;
            }
            if (password.length < 4) {
                showError('registerError', '❌ Пароль минимум 4 символа');
                return;
            }

            const { data: existing } = await supabase
                .from('users')
                .select('username')
                .eq('username', username)
                .or(`email.eq.${email}`);

            if (existing && existing.length > 0) {
                showError('registerError', '❌ Пользователь или email уже существуют');
                return;
            }

            const code = Math.floor(100000 + Math.random() * 900000).toString();
            pendingCode = code;
            pendingRegistration = { username, email, password };

            try {
                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                    to_email: email,
                    code: code
                });
                
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('verifyForm').style.display = 'block';
                clearCodeInputs();
                showError('verifyError', '');
            } catch (error) {
                showError('registerError', '❌ Ошибка отправки кода. Попробуйте позже.');
            }
        }

        async function verifyCode() {
            const code = getCode();
            if (code.length !== 6) {
                showError('verifyError', '❌ Введите 6-значный код');
                return;
            }
            if (code !== pendingCode) {
                showError('verifyError', '❌ Неверный код');
                return;
            }

            const { error } = await supabase
                .from('users')
                .insert([{
                    username: pendingRegistration.username,
                    email: pendingRegistration.email,
                    password: pendingRegistration.password,
                    role: 'user',
                    display_name: pendingRegistration.username,
                    avatar: '👤'
                }]);

            if (error) {
                showError('verifyError', '❌ Ошибка регистрации');
                return;
            }

            alert('✅ Регистрация успешна! Теперь войдите.');
            pendingRegistration = null;
            pendingCode = null;
            showLoginForm();
        }

        async function resendCode() {
            if (!pendingRegistration) return;
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            pendingCode = code;
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                to_email: pendingRegistration.email,
                code: code
            });
            alert('📨 Код отправлен повторно');
        }

        // ============================================
        // АВТОРИЗАЦИЯ
        // ============================================
        async function doLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('username', username)
                .eq('password', password);

            if (error || !data || data.length === 0) {
                showError('loginError', '❌ Неверное имя или пароль');
                return;
            }

            currentUser = data[0];
            selectedAvatar = currentUser.avatar || '👤';
            
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
            document.getElementById('userName').innerText = currentUser.display_name || currentUser.username;
            document.getElementById('userAvatar').innerText = currentUser.avatar || '👤';
            
            loadChats();
            loadMessages();
            startRealtime();
        }

        function logout() {
            if (realtimeSubscription) {
                realtimeSubscription.unsubscribe();
            }
            currentUser = null;
            document.getElementById('chatContainer').style.display = 'none';
            document.getElementById('authModal').style.display = 'flex';
            showLoginForm();
        }

        // ============================================
        // ПРОФИЛЬ
        // ============================================
        function showProfileModal() {
            document.getElementById('profileDisplayName').value = currentUser.display_name || currentUser.username;
            document.getElementById('profileBio').value = currentUser.bio || '';
            document.getElementById('profileModal').style.display = 'flex';
            
            // Подсветка выбранного аватара
            document.querySelectorAll('.avatar-option').forEach(opt => {
                if (opt.innerText === (currentUser.avatar || '👤')) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });
        }

        function closeProfileModal() {
            document.getElementById('profileModal').style.display = 'none';
        }

        function selectAvatar(avatar) {
            selectedAvatar = avatar;
            document.querySelectorAll('.avatar-option').forEach(opt => {
                if (opt.innerText === avatar) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });
        }

        async function updateProfile() {
            const displayName = document.getElementById('profileDisplayName').value.trim();
            const bio = document.getElementById('profileBio').value.trim();
            
            const { error } = await supabase
                .from('users')
                .update({
                    display_name: displayName || currentUser.username,
                    bio: bio,
                    avatar: selectedAvatar
                })
                .eq('id', currentUser.id);

            if (error) {
                showError('profileError', '❌ Ошибка сохранения');
                return;
            }

            currentUser.display_name = displayName || currentUser.username;
            currentUser.bio = bio;
            currentUser.avatar = selectedAvatar;
            
            document.getElementById('userName').innerText = currentUser.display_name;
            document.getElementById('userAvatar').innerText = selectedAvatar;
            
            closeProfileModal();
            alert('✅ Профиль обновлён');
        }

        // ============================================
        // ЧАТЫ И СООБЩЕНИЯ
        // ============================================
        async function loadChats() {
            // Группы
            const { data: memberships } = await supabase
                .from('group_members')
                .select('groups(*)')
                .eq('username', currentUser.username);

            let groupsHtml = '';
            if (memberships) {
                memberships.forEach(m => {
                    const group = m.groups;
                    const activeClass = (currentChat.type === 'group' && currentChat.id === group.id) ? 'active' : '';
                    groupsHtml += `
                        <button class="room-btn ${activeClass}" onclick="switchChat('group', ${group.id}, '${group.name.replace(/'/g, "\\'")}', '👥')">
                            <span class="room-icon">👥</span>
                            <span>${group.name}</span>
                        </button>
                    `;
                });
            }
            document.getElementById('groupsList').innerHTML = groupsHtml || '<div style="color:#a0a0ff; font-size:12px; padding:10px;">Нет групп</div>';

            // Пользователи для личных сообщений
            const { data: users } = await supabase
                .from('users')
                .select('username, display_name, avatar')
                .neq('username', currentUser.username);

            let usersHtml = '';
            if (users) {
                users.forEach(u => {
                    const activeClass = (currentChat.type === 'user' && currentChat.id === u.username) ? 'active' : '';
                    const displayName = u.display_name || u.username;
                    usersHtml += `
                        <button class="room-btn ${activeClass}" onclick="switchChat('user', '${u.username}', '${displayName.replace(/'/g, "\\'")}', '👤')">
                            <span class="room-icon">${u.avatar || '👤'}</span>
                            <span>${displayName}</span>
                        </button>
                    `;
                });
            }
            document.getElementById('usersList').innerHTML = usersHtml || '<div style="color:#a0a0ff; font-size:12px; padding:10px;">Нет пользователей</div>';
        }

        function switchChat(type, id, name, icon) {
            currentChat = { type, id, name, icon: icon || (type === 'group' ? '👥' : '👤') };
            document.getElementById('currentChatHeader').innerHTML = `
                <span class="messages-header-icon">${currentChat.icon}</span>
                <span id="currentChatTitle">${name}</span>
            `;
            loadMessages();
            
            document.querySelectorAll('.room-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) {
                const btn = event.target.closest('.room-btn');
                if (btn) btn.classList.add('active');
            }
        }

        async function loadMessages() {
            const container = document.getElementById('messagesList');
            let messages = [];

            if (currentChat.type === 'group') {
                const { data } = await supabase
                    .from('group_messages')
                    .select('*')
                    .eq('group_id', currentChat.id)
                    .order('created_at', { ascending: true });
                messages = data || [];
            } else {
                const { data } = await supabase
                    .from('messages')
                    .select('*')
                    .or(`and(from_user.eq.${currentUser.username},to_user.eq.${currentChat.id}),and(from_user.eq.${currentChat.id},to_user.eq.${currentUser.username})`)
                    .order('created_at', { ascending: true });
                messages = data || [];
            }

            // Загружаем аватары пользователей
            const usersMap = {};
            const { data: users } = await supabase.from('users').select('username, avatar, display_name');
            if (users) {
                users.forEach(u => {
                    usersMap[u.username] = { avatar: u.avatar || '👤', display_name: u.display_name || u.username };
                });
            }

            let html = '';
            messages.forEach(msg => {
                const isOwn = msg.from_user === currentUser.username;
                const avatar = isOwn ? (currentUser.avatar || '👤') : (usersMap[msg.from_user]?.avatar || '👤');
                const displayName = isOwn ? (currentUser.display_name || currentUser.username) : (usersMap[msg.from_user]?.display_name || msg.from_user);
                const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                html += `
                    <div class="message ${isOwn ? 'message-own' : ''}">
                        <div class="message-avatar">${avatar}</div>
                        <div class="message-content">
                            <div class="message-user">${displayName} <span class="message-time">${time}</span></div>
                            <div class="message-text">${escapeHtml(msg.message)}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html || '<div style="text-align:center; color:#a0a0ff; padding:20px;">💬 Напишите первое сообщение!</div>';
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const text = document.getElementById('messageInput').value.trim();
            if (!text) return;

            if (currentChat.type === 'group') {
                await supabase.from('group_messages').insert([{
                    group_id: currentChat.id,
                    username: currentUser.username,
                    message: text
                }]);
            } else {
                await supabase.from('messages').insert([{
                    from_user: currentUser.username,
                    to_user: currentChat.id,
                    message: text
                }]);
            }

            document.getElementById('messageInput').value = '';
            loadMessages();
        }

        function startRealtime() {
            if (realtimeSubscription) {
                realtimeSubscription.unsubscribe();
            }
            realtimeSubscription = supabase
                .channel('nova-chat-realtime')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'group_messages' }, () => {
                    if (currentChat.type === 'group') loadMessages();
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
                    if (currentChat.type !== 'group') loadMessages();
                })
                .subscribe();
        }

        // ============================================
        // ГРУППЫ
        // ============================================
        async function createGroup() {
            const name = document.getElementById('groupName').value.trim();
            if (!name) {
                alert('Введите название группы');
                return;
            }

            const { data: group, error } = await supabase
                .from('groups')
                .insert([{ name, owner: currentUser.username }])
                .select();

            if (error) {
                alert('❌ Ошибка создания группы');
                return;
            }

            await supabase.from('group_members').insert([{
                group_id: group[0].id,
                username: currentUser.username
            }]);

            closeCreateGroupModal();
            loadChats();
            switchChat('group', group[0].id, name, '👥');
        }

        function showCreateGroupModal() {
            document.getElementById('createGroupModal').style.display = 'flex';
        }

        function closeCreateGroupModal() {
            document.getElementById('createGroupModal').style.display = 'none';
            document.getElementById('groupName').value = '';
            document.getElementById('groupDescription').value = '';
        }

        // ============================================
        // ПЕРЕКЛЮЧЕНИЕ ФОРМ
        // ============================================
        function showRegisterForm() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('verifyForm').style.display = 'none';
        }

        function showLoginForm() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('verifyForm').style.display = 'none';
        }
    </script>
</body>
</html>
