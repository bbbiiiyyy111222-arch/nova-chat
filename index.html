<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seal Clicker: Battle Edition</title>
    <!-- Используем другой CDN для надежности -->
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --bg-color: #e8f5e9;
            --accent: #2ecc71;
            --accent-dark: #27ae60;
            --text-dark: #2c3e50;
            --boss-red: #ff4757;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .main-container {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        /* Дизайн кнопок */
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 var(--accent-dark);
            margin: 5px;
            text-transform: uppercase;
            font-size: 13px;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 var(--accent-dark);
        }

        button:disabled { background: #bdc3c7; box-shadow: 0 4px 0 #95a5a6; cursor: not-allowed; }

        input {
            width: calc(100% - 30px);
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            outline: none;
            font-size: 16px;
        }

        /* Кликер */
        .seal-circle {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #fff, #f0f0f0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            font-size: 80px;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: transform 0.05s;
        }

        .seal-circle:active { transform: scale(0.92); }

        .fish-display {
            font-size: 32px;
            font-weight: 900;
            color: var(--accent-dark);
            margin: 10px 0;
        }

        /* Вкладки */
        .tabs-nav {
            display: flex;
            gap: 5px;
            margin-top: 20px;
            background: #f8f9fa;
            padding: 5px;
            border-radius: 15px;
        }

        .tabs-nav button {
            flex: 1;
            padding: 8px 5px;
            font-size: 11px;
            background: transparent;
            color: #7f8c8d;
            box-shadow: none;
        }

        .tabs-nav button.active {
            background: white;
            color: var(--accent-dark);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Статистика и магазин */
        .stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
            font-size: 13px;
            background: #f1f8e9;
            padding: 10px;
            border-radius: 12px;
        }

        .item-card {
            background: #fff;
            border: 1px solid #eee;
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }

        .item-info b { display: block; font-size: 14px; }
        .item-info span { font-size: 11px; color: #7f8c8d; }

        /* Боевая зона */
        .battle-zone {
            background: #fff5f5;
            border-radius: 18px;
            padding: 15px;
            border: 2px solid #ffebeb;
        }

        .hp-container {
            height: 12px;
            background: #eee;
            border-radius: 6px;
            overflow: hidden;
            margin: 5px 0;
        }

        .hp-fill { height: 100%; width: 100%; transition: width 0.3s; }
        #boss-hp-bar { background: var(--boss-red); }
        #player-hp-bar { background: var(--accent); }

        .battle-log {
            font-size: 11px;
            height: 60px;
            overflow-y: auto;
            background: #333;
            color: #0f0;
            padding: 8px;
            border-radius: 8px;
            text-align: left;
            font-family: monospace;
            margin-top: 10px;
        }

        #anti-cheat-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: var(--boss-red);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="main-container">
    <!-- Блок логина -->
    <div id="auth-screen">
        <h1 style="margin-bottom: 0;">🦭 Seal Clicker</h1>
        <p style="color: #7f8c8d; font-size: 14px; margin-top: 5px;">Cloud Battle RPG</p>
        <input type="text" id="nick" placeholder="Твой никнейм">
        <input type="password" id="pass" placeholder="Пароль">
        <div style="margin-top: 10px;">
            <button onclick="handleAuth('login')" style="width: 45%;">Вход</button>
            <button onclick="handleAuth('register')" style="width: 45%; background: #3498db; box-shadow: 0 4px 0 #2980b9;">Регистрация</button>
        </div>
    </div>

    <!-- Основная игра -->
    <div id="game-screen" class="hidden">
        <div id="anti-cheat-overlay" class="hidden">
            <h2>⚠️ ЧИТЕР?</h2>
            <p>Клики заблокированы на 8 сек.</p>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button onclick="toggleVisuals()" id="visual-toggle" style="background:#f1c40f; box-shadow: 0 4px 0 #f39c12; padding: 5px 10px; font-size: 10px;">🦭</button>
            <span id="display-nick" style="font-weight: bold; font-size: 14px;">---</span>
            <button onclick="showAdmin()" style="background:#95a5a6; box-shadow: 0 4px 0 #7f8c8d; padding: 5px 10px; font-size: 10px;">Админ</button>
        </div>

        <div class="seal-circle" id="seal-btn" onclick="clickSeal()">🦭</div>
        
        <div class="fish-display">
            <span id="fish-icon">🐟</span> <span id="fish-count">0</span>
        </div>

        <div class="stats-bar">
            <span>Сила: <b id="click-power">1</b></span>
            <span>Авто: <b id="auto-val">0</b>/с</span>
        </div>

        <div class="tabs-nav">
            <button id="btn-shop" class="active" onclick="showTab('shop')">Магазин</button>
            <button id="btn-battle" onclick="showTab('battle')">БИТВА</button>
            <button id="btn-leader" onclick="showTab('leaderboard')">ТОП-20</button>
        </div>

        <!-- Магазин -->
        <div id="tab-shop" class="tab-content">
            <div style="margin-top: 15px;">
                <div class="item-card">
                    <div class="item-info"><b>Улучшить клик</b><span id="c-click">10 🐟</span></div>
                    <button onclick="buyUpgrade('click_level')">UP</button>
                </div>
                <div class="item-card">
                    <div class="item-info"><b>Авто-тюлень</b><span id="c-auto">50 🐟</span></div>
                    <button onclick="buyUpgrade('auto_level')">UP</button>
                </div>
                <div class="item-card">
                    <div class="item-info"><b>Крит. шанс</b><span id="c-crit">100 🐟</span></div>
                    <button onclick="buyUpgrade('crit_level')">UP</button>
                </div>
                <div class="item-card">
                    <div class="item-info"><b>Меч (Атака)</b><span id="c-atk">30 🐟</span></div>
                    <button onclick="buyUpgrade('attack')">UP</button>
                </div>
                <div class="item-card">
                    <div class="item-info"><b>Щит (Защита)</b><span id="c-def">30 🐟</span></div>
                    <button onclick="buyUpgrade('defense')">UP</button>
                </div>
            </div>
        </div>

        <!-- Битва -->
        <div id="tab-battle" class="tab-content hidden">
            <div class="battle-zone" style="margin-top: 15px;">
                <div style="display: flex; justify-content: space-between; font-size: 12px;">
                    <b>БОСС УР.<span id="boss-lvl">1</span></b>
                    <span id="boss-hp-text">0/0</span>
                </div>
                <div class="hp-container"><div id="boss-hp-bar" class="hp-fill"></div></div>

                <div style="margin-top: 15px; display: flex; justify-content: space-between; font-size: 12px;">
                    <b>ВАШЕ HP</b>
                    <span id="player-hp-text">100/100</span>
                </div>
                <div class="hp-container"><div id="player-hp-bar" class="hp-fill"></div></div>

                <button id="atk-btn" onclick="attackBoss()" style="width:100%; background:var(--boss-red); box-shadow: 0 4px 0 #c0392b; margin-top: 10px; height: 50px;">НАПАСТЬ</button>
                <div class="battle-log" id="battle-log">Готов к бою?</div>
            </div>
        </div>

        <!-- Лидеры -->
        <div id="tab-leaderboard" class="tab-content hidden">
            <div id="leaderboard-list" style="margin-top: 15px; text-align: left;"></div>
        </div>

        <button onclick="logout()" style="margin-top:20px; background:none; box-shadow:none; color:#bdc3c7; text-decoration: underline; font-size: 10px;">Сменить аккаунт</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdmJoaGlkY29qa2twdW1zeHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzk3MjcsImV4cCI6MjA5Mjg1NTcyN30.1eKxcaqeClRdAVH8lVcOdYaV0o_PbRzjnM9vBUP15QQ';
    
    let _supabase;
    // Безопасная инициализация
    try {
        _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch(e) {
        alert("Ошибка подключения к Supabase. Проверьте интернет или блокировщики рекламы.");
    }

    let user = null;
    let boss = null;
    let playerHP = 100;
    let clickCount = 0;
    let isBlocked = false;
    let textMode = false;

    async function handleAuth(type) {
        const nick = document.getElementById('nick').value.trim();
        const pass = document.getElementById('pass').value.trim();
        if (!nick || !pass) return alert('Введите данные');

        if (type === 'register') {
            const { data: exist } = await _supabase.from('users').select('nickname').eq('nickname', nick).single();
            if (exist) return alert('Ник занят');
            const { error } = await _supabase.from('users').insert([{ nickname: nick, password: pass, attack: 5, defense: 5 }]);
            if (error) return alert(error.message);
        }

        const { data, error } = await _supabase.from('users').select('*').eq('nickname', nick).eq('password', pass).single();
        if (error || !data) return alert('Неверный вход');

        user = data;
        localStorage.setItem('seal_user', JSON.stringify({nick, pass}));
        startGame();
    }

    function startGame() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('display-nick').innerText = user.nickname;
        
        updateUI();
        syncBoss();
        
        setInterval(autoFarm, 1000);
        setInterval(saveToCloud, 5000);
        setInterval(() => clickCount = 0, 1000);
    }

    function clickSeal() {
        if (isBlocked) return;
        clickCount++;
        if (clickCount > 18 && !user.anticheat_disabled) {
            isBlocked = true;
            document.getElementById('anti-cheat-overlay').classList.remove('hidden');
            setTimeout(() => {
                isBlocked = false;
                document.getElementById('anti-cheat-overlay').classList.add('hidden');
            }, 8000);
            return;
        }
        let p = 1 + (user.click_level - 1) * 2;
        user.fish += p;
        user.total_fish += p;
        updateUI();
    }

    function autoFarm() {
        if (!user) return;
        user.fish += (user.auto_level || 0);
        user.total_fish += (user.auto_level || 0);
        updateUI();
    }

    async function syncBoss() {
        const { data } = await _supabase.from('boss').select('*').eq('id', 1).single();
        boss = data;
        updateUI();
    }

    async function attackBoss() {
        if (!boss || playerHP <= 0) return;
        
        let crit = (Math.random() * 100 < (user.crit_level * 5)) ? 1.5 : 1;
        let dmg = Math.max(1, Math.floor((user.attack - boss.defense + Math.random()*5) * crit));
        boss.health -= dmg;

        let log = `Урон: ${dmg} ${crit>1?'💥':''}. `;
        
        if (Math.random() > 0.15) {
            let bDmg = Math.max(1, Math.floor(boss.attack - user.defense + Math.random()*5));
            playerHP -= bDmg;
            log += `Босс: -${bDmg} HP.`;
        } else {
            log += `БЛОК! 🛡️`;
        }

        if (boss.health <= 0) {
            let win = boss.level * 100;
            user.fish += win;
            log = `ПОБЕДА! +${win} 🐟. Босс стал сильнее!`;
            await _supabase.from('boss').update({
                level: boss.level + 1,
                max_health: boss.max_health + 200,
                health: boss.max_health + 200,
                attack: boss.attack + 2,
                defense: boss.defense + 1
            }).eq('id', 1);
            syncBoss();
        }

        if (playerHP <= 0) {
            playerHP = 0;
            document.getElementById('atk-btn').disabled = true;
            log = "Тюлень без сознания... (10с)";
            setTimeout(() => { playerHP = 100; document.getElementById('atk-btn').disabled = false; updateUI(); }, 10000);
        }

        document.getElementById('battle-log').innerText = log;
        updateUI();
        _supabase.from('boss').update({ health: boss.health }).eq('id', 1);
    }

    function buyUpgrade(key) {
        let cost = 0;
        if(key==='click_level') cost = Math.floor(10 * Math.pow(1.6, user.click_level));
        if(key==='auto_level') cost = Math.floor(50 * Math.pow(1.6, user.auto_level + 1));
        if(key==='crit_level') cost = (user.crit_level + 1) * 100;
        if(key==='attack') cost = (user.attack - 4) * 30;
        if(key==='defense') cost = (user.defense - 4) * 30;

        if (user.fish >= cost) {
            user.fish -= cost;
            user[key]++;
            updateUI();
        } else alert("Мало рыбы!");
    }

    async function saveToCloud() {
        if (!user) return;
        await _supabase.from('users').update({
            fish: user.fish, total_fish: user.total_fish,
            click_level: user.click_level, auto_level: user.auto_level,
            crit_level: user.crit_level, attack: user.attack, defense: user.defense
        }).eq('nickname', user.nickname);
        _supabase.from('leaderboard').upsert({ nickname: user.nickname, total_fish: user.total_fish });
    }

    function updateUI() {
        if (!user) return;
        document.getElementById('fish-count').innerText = Math.floor(user.fish);
        document.getElementById('click-power').innerText = 1 + (user.click_level - 1) * 2;
        document.getElementById('auto-val').innerText = user.auto_level;
        
        document.getElementById('c-click').innerText = Math.floor(10 * Math.pow(1.6, user.click_level)) + ' 🐟';
        document.getElementById('c-auto').innerText = Math.floor(50 * Math.pow(1.6, user.auto_level + 1)) + ' 🐟';
        document.getElementById('c-crit').innerText = ((user.crit_level + 1) * 100) + ' 🐟';
        document.getElementById('c-atk').innerText = ((user.attack - 4) * 30) + ' 🐟';
        document.getElementById('c-def').innerText = ((user.defense - 4) * 30) + ' 🐟';

        if (boss) {
            document.getElementById('boss-lvl').innerText = boss.level;
            document.getElementById('boss-hp-text').innerText = `${boss.health}/${boss.max_health}`;
            document.getElementById('boss-hp-bar').style.width = (boss.health/boss.max_health*100)+'%';
        }
        document.getElementById('player-hp-text').innerText = `${playerHP}/100`;
        document.getElementById('player-hp-bar').style.width = playerHP + '%';
    }

    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.tabs-nav button').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + t).classList.remove('hidden');
        document.getElementById('btn-' + t).classList.add('active');
        if (t === 'leaderboard') loadTops();
    }

    async function loadTops() {
        const { data } = await _supabase.from('leaderboard').select('*').order('total_fish', {ascending:false}).limit(20);
        document.getElementById('leaderboard-list').innerHTML = data.map((x,i) => `<div class="item-card"><b>${i+1}. ${x.nickname}</b> <span>${x.total_fish} 🐟</span></div>`).join('');
    }

    function toggleVisuals() {
        textMode = !textMode;
        document.getElementById('seal-btn').innerText = textMode ? '[SEAL]' : '🦭';
        document.getElementById('fish-icon').innerText = textMode ? '[FISH]' : '🐟';
    }

    function showAdmin() {
        if(prompt('Pass?')==='seal123') {
            const n = prompt('Ник?');
            const a = parseInt(prompt('Рыба?'));
            _supabase.from('users').select('fish').eq('nickname', n).single().then(({data}) => {
                if(data) _supabase.from('users').update({fish: data.fish + a}).eq('nickname', n).then(()=>alert('OK'));
            });
        }
    }

    function logout() { localStorage.removeItem('seal_user'); location.reload(); }

    window.onload = () => {
        const s = localStorage.getItem('seal_user');
        if(s) {
            const {nick, pass} = JSON.parse(s);
            document.getElementById('nick').value = nick;
            document.getElementById('pass').value = pass;
            handleAuth('login');
        }
    }
</script>
</body>
</html>
