<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Параметры подключения</title>
    <!-- Подключаем легкую библиотеку для генерации QR-кодов -->
    <script src="https://cloudflare.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #161b26;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 480px;
            border: 1px solid #232d3f;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            font-size: 22px;
            color: #fff;
        }
        .item-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            font-size: 13px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .copy-box {
            display: flex;
            align-items: center;
            background: #1f293d;
            border: 1px solid #2d3d5a;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .copy-box:hover {
            border-color: #3b82f6;
            background: #24324d;
        }
        .text-value {
            flex-grow: 1;
            font-family: monospace;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #e5e7eb;
        }
        .btn-copy {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-copy:hover {
            background: #2563eb;
        }
        .divider {
            border-top: 1px solid #232d3f;
            margin: 25px 0;
        }
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .qr-container {
            background: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: inline-block;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #10b981;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            pointer-events: none;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Конфигурация узла</h2>

    <!-- Хост -->
    <div class="item-group">
        <label>Хост / Адрес</label>
        <div class="copy-box" onclick="copyText('VIP.alotaxi.info', this)">
            <span class="text-value">VIP.alotaxi.info</span>
            <button class="btn-copy">Копировать</button>
        </div>
    </div>

    <!-- Порт -->
    <div class="item-group">
        <label>Порт</label>
        <div class="copy-box" onclick="copyText('4515', this)">
            <span class="text-value">4515</span>
            <button class="btn-copy">Копировать</button>
        </div>
    </div>

    <!-- Ключ -->
    <div class="item-group">
        <label>Ключ авторизации</label>
        <div class="copy-box" onclick="copyText('eee9a4f23b1d768c04a8d7f39120ca5b6e626973636f7474692e79656b74616e65742e636f6d', this)">
            <span class="text-value">eee9a4f23b1d768c04a8d7f39120ca5b6e626973636f7474692e79656b74616e65742e636f6d</span>
            <button class="btn-copy">Копировать</button>
        </div>
    </div>

    <div class="divider"></div>

    <!-- QR-код и импорт -->
    <div class="qr-section">
        <label style="margin-bottom: 12px;">Быстрый импорт (QR-Код)</label>
        <div class="qr-container" id="qrcode"></div>
        <p style="font-size: 12px; color: #6b7280; margin: 5px 0 0 0;">Отсканируйте камерой или приложением</p>
    </div>
</div>

<div id="toast" class="toast">Данные скопированы!</div>

<script>
// Здесь вы можете задать формат полной конфигурационной строки/ссылки (например vless://, ss://, или просто текст)
// Сейчас зашит базовый текстовый формат, который закодируется в QR
const fullConfigData = "Host: VIP.alotaxi.info\nPort: 4515\nKey: eee9a4f23b1d768c04a8d7f39120ca5b6e626973636f7474692e79656b74616e65742e636f6d";

// Инициализация QR-кода
new QRCode(document.getElementById("qrcode"), {
    text: fullConfigData,
    width: 160,
    height: 160,
    colorDark : "#000000",
    colorLight : "#ffffff",
    correctLevel : QRCode.CorrectLevel.H
});

function copyText(text, element) {
    navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        
        const btn = element.querySelector('.btn-copy');
        const originalText = btn.innerText;
        btn.innerText = 'Успешно!';
        btn.style.background = '#10b981';

        setTimeout(() => {
            toast.classList.remove('show');
            btn.innerText = originalText;
            btn.style.background = '#3b82f6';
        }, 1500);
    }).catch(err => {
        console.error('Ошибка копирования: ', err);
    });
}
</script>

</body>
</html>
