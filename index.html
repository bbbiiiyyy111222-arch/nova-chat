<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 MoonTunnel | Видео строительства в выживании</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0f0f2a 100%);
            min-height: 100vh;
            color: white;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(168,85,247,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(124,58,237,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            padding: 50px 30px;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            margin-bottom: 30px;
            border: 1px solid rgba(168,85,247,0.3);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '🌙';
            position: absolute;
            top: -30px;
            right: -30px;
            font-size: 180px;
            opacity: 0.08;
            pointer-events: none;
        }

        .header::after {
            content: '🔨';
            position: absolute;
            bottom: -30px;
            left: -30px;
            font-size: 180px;
            opacity: 0.08;
            pointer-events: none;
        }

        .header h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #a855f7, #7c3aed, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .header p {
            color: #c0c0ff;
            font-size: 16px;
            letter-spacing: 2px;
        }

        .header .sub {
            font-size: 13px;
            color: #8a8aff;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header .sub span {
            background: rgba(168,85,247,0.15);
            padding: 5px 12px;
            border-radius: 20px;
        }

        .login-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #4a4a8a, #5a5a9a);
            border: 1px solid #7a7aff;
            color: white;
            padding: 10px 25px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 100;
            font-size: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #5a5a9a, #6a6aaa);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(122,122,255,0.5);
        }

        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #8a4a4a, #9a5a5a);
            border: 1px solid #ff7a7a;
            color: white;
            padding: 10px 25px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 100;
            font-size: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background: linear-gradient(135deg, #9a5a5a, #aa6a6a);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,122,122,0.5);
        }

        .admin-panel {
            background: rgba(26,26,42,0.9);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 30px;
            margin-bottom: 30px;
            display: none;
            border: 1px solid rgba(168,85,247,0.3);
            animation: fadeIn 0.5s;
        }

        .admin-panel.active {
            display: block;
        }

        .upload-label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            padding: 14px 40px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 0 25px rgba(168,85,247,0.4);
        }

        .upload-label:hover {
            transform: scale(1.05);
            box-shadow: 0 0 45px rgba(168,85,247,0.7);
        }

        input[type="file"] {
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #2a2a4a;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #7c3aed);
            transition: width 0.3s;
            border-radius: 20px;
        }

        .status {
            text-align: center;
            padding: 10px;
            color: #a0a0ff;
            font-size: 12px;
        }

        .info-message {
            text-align: center;
            padding: 18px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            margin-bottom: 30px;
            color: #ffaa44;
            font-size: 13px;
            border: 1px solid rgba(255,170,68,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .video-card {
            background: rgba(26,26,42,0.9);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s;
            border: 1px solid rgba(168,85,247,0.2);
            position: relative;
            overflow: hidden;
        }

        .video-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(168,85,247,0.1), transparent);
            transition: left 0.5s;
        }

        .video-card:hover::before {
            left: 100%;
        }

        .video-card:hover {
            transform: translateY(-8px);
            border-color: rgba(168,85,247,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .video-thumb {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #1a1a3a, #0a0a2a);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            margin-bottom: 15px;
        }

        .video-name {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
            word-break: break-word;
        }

        .video-size {
            font-size: 11px;
            color: #888;
        }

        .video-date {
            font-size: 11px;
            color: #a855f7;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .delete-video {
            background: rgba(239,68,68,0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 8px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 10px;
            margin-top: 12px;
            transition: all 0.3s;
            width: 100%;
        }

        .delete-video:hover {
            background: #ef4444;
            color: white;
        }

        .player-section {
            background: rgba(26,26,42,0.95);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 25px;
            margin-top: 30px;
            display: none;
            border: 1px solid rgba(168,85,247,0.3);
            animation: fadeIn 0.5s;
        }

        .player-section.active {
            display: block;
        }

        video {
            width: 100%;
            max-height: 500px;
            border-radius: 20px;
            background: #000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .close-player {
            background: linear-gradient(135deg, #4a4a8a, #5a5a9a);
            border: none;
            color: white;
            padding: 12px 35px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .close-player:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(122,122,255,0.5);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a3a, #0f0f2a);
            border-radius: 45px;
            padding: 50px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(168,85,247,0.3);
            animation: modalFadeIn 0.4s;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content h2 {
            margin-bottom: 25px;
            font-size: 24px;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-content input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(26,26,58,0.8);
            border: 1px solid rgba(168,85,247,0.3);
            border-radius: 15px;
            color: white;
            font-size: 14px;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168,85,247,0.3);
        }

        .modal-content button {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            padding: 14px;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .modal-content button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(168,85,247,0.5);
        }

        .error {
            color: #ef4444;
            margin-top: 15px;
            font-size: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .videos-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <button class="login-btn" id="loginBtn">🔑 ВХОД ДЛЯ АДМИНА</button>
    <button class="logout-btn" id="logoutBtn">🚪 ВЫЙТИ</button>

    <div class="container">
        <div class="header">
            <h1>🌙 MOONTUNNEL</h1>
            <p>Видео строительства в выживании</p>
            <div class="sub">
                <span>⛏️ ЧИСТОВОЕ ВЫЖИВАНИЕ</span>
                <span>🏗️ СТРОИТЕЛЬСТВО</span>
                <span>🎬 ВИДЕО СКОРО БУДЕТ ДОСТУПНО</span>
            </div>
        </div>

        <div class="info-message">
            🎥 ВИДЕО ЗАГРУЖАЮТСЯ | ОНИ ПОЯВЯТСЯ ЗДЕСЬ ПОСЛЕ ЗАВЕРШЕНИЯ ЗАГРУЗКИ
        </div>

        <div id="adminPanel" class="admin-panel">
            <div style="text-align: center;">
                <label class="upload-label" id="uploadLabelBtn">
                    📹 ЗАГРУЗИТЬ ВИДЕО
                </label>
                <input type="file" id="videoInput" accept="video/*" style="display: none;">
                <div class="progress-bar" id="progressBar" style="display: none;">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div id="uploadStatus" class="status"></div>
            </div>
        </div>

        <div class="videos-grid" id="videosGrid"></div>

        <div class="player-section" id="playerSection">
            <video id="videoPlayer" controls></video>
            <button class="close-player" id="closePlayerBtn">✖ ЗАКРЫТЬ ПЛЕЕР</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>🔐 ВХОД ДЛЯ АДМИНА</h2>
            <input type="text" id="loginUsername" placeholder="ЛОГИН">
            <input type="password" id="loginPassword" placeholder="ПАРОЛЬ">
            <button id="loginSubmitBtn">ВОЙТИ</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <script>
        // ============================================
        // SUPABASE (ТВОИ КЛЮЧИ)
        // ============================================
        const SUPABASE_URL = 'https://pmvbhhidcojkkpumsxxb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdmJoaGlkY29qa2twdW1zeHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzk3MjcsImV4cCI6MjA5Mjg1NTcyN30.1eKxcaqeClRdAVH8lVcOdYaV0o_PbRzjnM9vBUP15QQ';
        
        let supabaseClient = null;
        let videos = [];
        let isAdmin = false;

        // Инициализация Supabase
        function initSupabase() {
            if (window.supabase && !supabaseClient) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('✅ Supabase инициализирован');
            }
            return supabaseClient;
        }

        // Сохранение состояния админа в localStorage
        function saveAdminState(adminStatus) {
            localStorage.setItem('moonTunnelAdmin', adminStatus ? 'true' : 'false');
        }

        function loadAdminState() {
            const saved = localStorage.getItem('moonTunnelAdmin');
            return saved === 'true';
        }

        // Обновление UI в зависимости от статуса админа
        function updateAdminUI() {
            const adminPanel = document.getElementById('adminPanel');
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            
            if (isAdmin) {
                if (adminPanel) adminPanel.classList.add('active');
                if (loginBtn) loginBtn.style.display = 'none';
                if (logoutBtn) logoutBtn.style.display = 'flex';
            } else {
                if (adminPanel) adminPanel.classList.remove('active');
                if (loginBtn) loginBtn.style.display = 'flex';
                if (logoutBtn) logoutBtn.style.display = 'none';
            }
            renderVideos();
        }

        // ============================================
        // РАБОТА С БАЗОЙ ДАННЫХ (с обходом RLS)
        // ============================================
        async function loadVideos() {
            const supabase = initSupabase();
            if (!supabase) return;

            // Пробуем получить видео без RLS
            try {
                // Используем .select() без условий
                const { data, error } = await supabase
                    .from('videos')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Ошибка загрузки:', error);
                    showErrorMessage('Ошибка загрузки видео: ' + error.message);
                    return;
                }

                videos = data || [];
                renderVideos();
            } catch (e) {
                console.error('Критическая ошибка:', e);
                showErrorMessage('Не удалось загрузить видео. Проверьте подключение.');
            }
        }

        function showErrorMessage(msg) {
            const grid = document.getElementById('videosGrid');
            if (grid) {
                grid.innerHTML = `<div style="text-align:center; color:#ef4444; padding:60px; background:rgba(0,0,0,0.2); border-radius:30px;">❌ ${msg}</div>`;
            }
        }

        async function addVideoToDatabase(videoData) {
            const supabase = initSupabase();
            if (!supabase) throw new Error('Supabase not initialized');

            // Прямая вставка - если RLS включена, нужно настроить политики
            const { data, error } = await supabase
                .from('videos')
                .insert([{
                    name: videoData.name,
                    size: videoData.size,
                    url: videoData.url,
                    created_at: new Date().toISOString()
                }])
                .select();

            if (error) {
                console.error('Insert error:', error);
                throw error;
            }
            return data;
        }

        async function deleteVideoFromDatabase(id) {
            const supabase = initSupabase();
            if (!supabase) throw new Error('Supabase not initialized');

            const { error } = await supabase
                .from('videos')
                .delete()
                .eq('id', id);

            if (error) throw error;
        }

        function renderVideos() {
            const grid = document.getElementById('videosGrid');
            if (!grid) return;

            if (!videos || videos.length === 0) {
                grid.innerHTML = '<div style="text-align:center; color:#888; padding:60px; background:rgba(0,0,0,0.2); border-radius:30px;">📭 ВИДЕО ПОКА НЕТ</div>';
                return;
            }

            let html = '';
            videos.forEach(video => {
                const sizeMB = (video.size / 1024 / 1024).toFixed(2);
                const date = video.created_at ? new Date(video.created_at).toLocaleDateString('ru-RU') : 'Дата неизвестна';

                html += `
                    <div class="video-card" data-video-url="${video.url || ''}" data-video-name="${escapeHtml(video.name || 'Без названия')}">
                        <div class="video-thumb">🎬</div>
                        <div class="video-name">${escapeHtml(video.name || 'Без названия')}</div>
                        <div class="video-size">📁 ${sizeMB} MB</div>
                        <div class="video-date">📅 ${date}</div>
                        ${isAdmin ? `<button class="delete-video" data-video-id="${video.id}" data-video-url="${video.url || ''}">🗑️ УДАЛИТЬ ВИДЕО</button>` : ''}
                    </div>
                `;
            });
            grid.innerHTML = html;

            // Добавляем обработчики
            document.querySelectorAll('.video-card').forEach(card => {
                const url = card.dataset.videoUrl;
                const name = card.dataset.videoName;
                if (url && name) {
                    card.addEventListener('click', (e) => {
                        if (!e.target.classList.contains('delete-video')) {
                            playVideo(url, name);
                        }
                    });
                }
            });

            if (isAdmin) {
                document.querySelectorAll('.delete-video').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.videoId;
                        const url = btn.dataset.videoUrl;
                        if (id && confirm('🗑️ Удалить это видео навсегда?')) {
                            await deleteVideo(id, url);
                        }
                    });
                });
            }
        }

        async function uploadVideo(file) {
            const supabase = initSupabase();
            if (!supabase) {
                alert('❌ Ошибка подключения к Supabase');
                return false;
            }

            if (!isAdmin) {
                alert('⛔ Только администратор может загружать видео');
                return false;
            }

            if (!file) return false;

            if (file.size > 2 * 1024 * 1024 * 1024) {
                alert('❌ Файл превышает 2GB');
                return false;
            }

            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const statusDiv = document.getElementById('uploadStatus');

            progressBar.style.display = 'block';
            statusDiv.innerHTML = '⏳ ЗАГРУЗКА... 0%';
            progressFill.style.width = '0%';

            const fileName = `${Date.now()}_${file.name}`;
            const filePath = `videos/${fileName}`;

            try {
                // Загрузка в Storage
                const { error: uploadError } = await supabase.storage
                    .from('videos')
                    .upload(filePath, file);

                if (uploadError) {
                    throw new Error(uploadError.message);
                }

                progressFill.style.width = '50%';
                statusDiv.innerHTML = '⏳ ПОЛУЧЕНИЕ ССЫЛКИ...';

                const { data: urlData } = supabase.storage
                    .from('videos')
                    .getPublicUrl(filePath);

                const videoUrl = urlData.publicUrl;

                progressFill.style.width = '75%';
                statusDiv.innerHTML = '⏳ СОХРАНЕНИЕ В БАЗУ...';

                // Сохранение в БД
                await addVideoToDatabase({
                    name: file.name,
                    size: file.size,
                    url: videoUrl
                });

                progressFill.style.width = '100%';
                statusDiv.innerHTML = '✅ ВИДЕО ЗАГРУЖЕНО!';
                
                setTimeout(() => {
                    progressBar.style.display = 'none';
                    statusDiv.innerHTML = '';
                    progressFill.style.width = '0%';
                }, 2000);

                await loadVideos();
                return true;
            } catch (error) {
                console.error('Upload error:', error);
                statusDiv.innerHTML = '❌ ОШИБКА: ' + error.message;
                setTimeout(() => {
                    progressBar.style.display = 'none';
                    statusDiv.innerHTML = '';
                }, 3000);
                return false;
            }
        }

        function playVideo(url, name) {
            const player = document.getElementById('videoPlayer');
            const section = document.getElementById('playerSection');

            if (player && section && url) {
                player.src = url;
                player.load();
                section.classList.add('active');
                setTimeout(() => {
                    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            } else if (!url) {
                alert('❌ Ссылка на видео отсутствует');
            }
        }

        function closePlayer() {
            const player = document.getElementById('videoPlayer');
            const section = document.getElementById('playerSection');

            if (player) {
                player.pause();
                player.src = '';
            }
            if (section) {
                section.classList.remove('active');
            }
        }

        async function deleteVideo(id, url) {
            const supabase = initSupabase();
            if (!supabase) return;

            try {
                // Удаление из Storage
                if (url) {
                    const urlParts = url.split('/');
                    const fileName = urlParts[urlParts.length - 1];
                    const filePath = `videos/${fileName}`;
                    await supabase.storage.from('videos').remove([filePath]);
                }

                // Удаление из БД
                await deleteVideoFromDatabase(id);
                await loadVideos();
            } catch (error) {
                console.error('Delete error:', error);
                alert('❌ Ошибка при удалении: ' + error.message);
            }
        }

        function showLoginModal() {
            const modal = document.getElementById('loginModal');
            if (modal) {
                modal.classList.add('active');
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginError').innerText = '';
            }
        }

        function closeLoginModal() {
            const modal = document.getElementById('loginModal');
            if (modal) {
                modal.classList.remove('active');
            }
        }

        function checkAdminLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (username === 'milk' && password === 'milk') {
                isAdmin = true;
                saveAdminState(true);
                closeLoginModal();
                updateAdminUI();
            } else {
                const errorDiv = document.getElementById('loginError');
                if (errorDiv) {
                    errorDiv.innerText = '❌ Неверный логин или пароль';
                }
            }
        }

        function logout() {
            isAdmin = false;
            saveAdminState(false);
            updateAdminUI();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        document.addEventListener('DOMContentLoaded', async () => {
            // Инициализация
            initSupabase();
            
            // Загрузка сохраненного состояния админа
            isAdmin = loadAdminState();
            
            // Загрузка видео
            await loadVideos();
            
            // Обновление UI
            updateAdminUI();

            // Обработчики событий
            document.getElementById('loginBtn')?.addEventListener('click', showLoginModal);
            document.getElementById('logoutBtn')?.addEventListener('click', logout);
            document.getElementById('closePlayerBtn')?.addEventListener('click', closePlayer);
            
            const uploadLabelBtn = document.getElementById('uploadLabelBtn');
            const videoInput = document.getElementById('videoInput');
            
            if (uploadLabelBtn && videoInput) {
                uploadLabelBtn.addEventListener('click', () => {
                    if (isAdmin) {
                        videoInput.click();
                    } else {
                        alert('⛔ Только администратор может загружать видео');
                    }
                });
                
                videoInput.addEventListener('change', (e) => {
                    if (e.target.files && e.target.files[0]) {
                        uploadVideo(e.target.files[0]);
                        videoInput.value = '';
                    }
                });
            }

            document.getElementById('loginSubmitBtn')?.addEventListener('click', checkAdminLogin);

            // Закрытие модалки по клику вне
            const modal = document.getElementById('loginModal');
            if (modal) {
                modal.addEventListener('click', (event) => {
                    if (event.target === modal) closeLoginModal();
                });
            }

            // Enter в полях ввода
            const loginUsername = document.getElementById('loginUsername');
            const loginPassword = document.getElementById('loginPassword');
            if (loginUsername && loginPassword) {
                const handleEnter = (e) => {
                    if (e.key === 'Enter') checkAdminLogin();
                };
                loginUsername.addEventListener('keypress', handleEnter);
                loginPassword.addEventListener('keypress', handleEnter);
            }
        });
    </script>
</body>
</html>
