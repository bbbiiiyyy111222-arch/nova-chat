<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🦭 SEAL CLICKER | Админ-панель 360°</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1e6b3e;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-card {
            max-width: 750px;
            width: 100%;
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #1c6948; margin-bottom: 20px; }
        .nick-panel {
            background: #e9f3ed;
            border-radius: 60px;
            padding: 15px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nick-input {
            flex: 2;
            padding: 10px;
            border-radius: 50px;
            border: 1px solid #ffc896;
            text-align: center;
            font-weight: bold;
        }
        button {
            background: #ffb347;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
        }
        button:active { transform: scale(0.97); }
        .seal-area { text-align: center; cursor: pointer; margin: 20px 0; }
        .seal-emoji { font-size: 8rem; display: inline-block; transition: 0.07s; }
        .click-effect { transform: scale(0.9); }
        .fish-counter {
            background: #2a5c48;
            color: #FFE5B4;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            margin: 15px 0;
        }
        .stat-grid {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .stat {
            background: #e3f0ea;
            flex: 1;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            font-weight: bold;
        }
        .upgrade {
            background: #faefe2;
            border-radius: 50px;
            padding: 10px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .upgrade-info { flex: 2; }
        .upgrade-name { font-weight: bold; }
        .upgrade-desc { font-size: 0.7rem; color: #7a6a54; }
        .help-icon {
            background: #ffb347;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            margin-left: 8px;
        }
        .warning {
            background: #f9e6e6;
            color: #c7254e;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .action-buttons button { flex: 1; font-size: 0.75rem; padding: 6px; }
        .achievements {
            background: #f7efdd;
            border-radius: 40px;
            padding: 12px;
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }
        .achievement {
            font-size: 0.75rem;
            padding: 4px 8px;
            margin: 4px 0;
            border-radius: 30px;
            background: #fff3e0;
        }
        .achievement.unlocked { background: #ffe0b5; font-weight: bold; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3, .modal-content h4 { margin-bottom: 10px; }
        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .player-list { max-height: 300px; overflow-y: auto; margin-bottom: 15px; }
        .player-item {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
        }
        .player-item:hover { background: #f0e5d8; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2b241cee;
            color: #ffeaaf;
            padding: 8px 20px;
            border-radius: 60px;
            animation: fadeOut 2s forwards;
            z-index: 1001;
        }
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 0; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #6e8f7a;
        }
        select, input[type="text"], input[type="number"], input[type="password"] {
            padding: 6px 10px;
            border-radius: 40px;
            border: 1px solid #cca86b;
            background: white;
            margin: 5px 0;
        }
    </style>
</head>
<body>
<div class="game-card" id="app"></div>

<script>
    // ========== ИГРОВОЕ СОСТОЯНИЕ (localStorage) ==========
    let game = {
        nickname: null,
        fish: 0,
        totalFish: 0,
        upgrades: {
            clickPower: 0,
            autoClicker: 0,
            crit: 0,
            clickMult: 0,
            passiveMult: 0,
            eventBonus: 0,
        },
        stats: { totalClicks: 0, prestigeCount: 0 },
        achievements: {},
        anticheatDisabled: false,
        anticheatBlockedUntil: 0,
        clickTimestamps: [],
        role: 'player',
        prestigeBonus: 0,
    };

    // ========== ДОСТИЖЕНИЯ ==========
    function generateAchievements() {
        const list = [];
        for (let i = 1; i <= 20; i++) {
            let target = 100 * Math.pow(1.6, i-1);
            list.push({ id: `total_${i}`, name: `${Math.floor(target).toLocaleString()} рыб`, cond: () => game.totalFish >= target, reward: Math.floor(target * 0.1) });
        }
        for (let i = 1; i <= 15; i++) {
            let clicks = 50 * Math.pow(2, i-1);
            list.push({ id: `clicks_${i}`, name: `${Math.floor(clicks).toLocaleString()} кликов`, cond: () => game.stats.totalClicks >= clicks, reward: Math.floor(clicks * 0.2) });
        }
        for (let i = 1; i <= 10; i++) {
            list.push({ id: `clickPower_${i}`, name: `Сила клика ${i}`, cond: () => game.upgrades.clickPower >= i, reward: 50 * i });
            list.push({ id: `auto_${i}`, name: `Автокликер ${i}`, cond: () => game.upgrades.autoClicker >= i, reward: 60 * i });
        }
        for (let i = 1; i <= 5; i++) {
            list.push({ id: `crit_${i}`, name: `Крит ${i}`, cond: () => game.upgrades.crit >= i, reward: 80 * i });
        }
        return list.slice(0, 60);
    }
    let achievementsList = generateAchievements();

    function initAchievements() {
        achievementsList.forEach(ach => {
            if (game.achievements[ach.id] === undefined) game.achievements[ach.id] = false;
        });
    }

    function checkAchievements() {
        let changed = false;
        for (let ach of achievementsList) {
            if (!game.achievements[ach.id] && ach.cond()) {
                game.achievements[ach.id] = true;
                game.fish += ach.reward;
                game.totalFish += ach.reward;
                changed = true;
                showToast(`🏆 ${ach.name}! +${ach.reward} рыб`);
            }
        }
        if (changed) saveGame();
    }

    // ========== ИГРОВЫЕ РАСЧЁТЫ ==========
    function getClickPower() {
        let base = 1 + game.upgrades.clickPower * 2;
        let mult = 1 + game.upgrades.clickMult * 0.03;
        let prestige = game.prestigeBonus;
        return Math.floor(base * mult * (1 + prestige / 100));
    }
    function getPassiveIncome() {
        let inc = game.upgrades.autoClicker * 1;
        let mult = 1 + game.upgrades.passiveMult * 0.02;
        return Math.floor(inc * mult);
    }
    function getCritChance() { return Math.min(70, game.upgrades.crit * 5); }
    function getEventBonus() { return 1 + game.upgrades.eventBonus * 0.1; }

    function addFish(amount, fromClick = false) {
        if (!game.nickname) return;
        game.fish += amount;
        game.totalFish += amount;
        if (fromClick) game.stats.totalClicks++;
        saveGame();
        checkAchievements();
        renderUI();
    }

    // ========== АНТИЧИТ ==========
    function isAnticheatBlocked() {
        if (game.anticheatDisabled) return false;
        if (Date.now() < game.anticheatBlockedUntil) return true;
        return false;
    }

    function registerClick() {
        if (isAnticheatBlocked()) {
            showToast("⛔ Античит: клики заблокированы на 8 секунд");
            return false;
        }
        const now = Date.now();
        game.clickTimestamps.push(now);
        while (game.clickTimestamps.length && game.clickTimestamps[0] < now - 1000) game.clickTimestamps.shift();
        if (game.clickTimestamps.length > 18 && !game.anticheatDisabled) {
            game.anticheatBlockedUntil = now + 8000;
            game.clickTimestamps = [];
            showToast("⚠️ Слишком быстро! Блокировка на 8 секунд.");
            renderUI();
            return false;
        }
        return true;
    }

    function disableAnticheatByPassword(password) {
        if (password === "seal") {
            game.anticheatDisabled = true;
            game.anticheatBlockedUntil = 0;
            saveGame();
            showToast("✅ Защита отключена.");
            renderUI();
            return true;
        } else {
            showToast("❌ Неверный пароль!");
            return false;
        }
    }

    function enableAnticheat() {
        game.anticheatDisabled = false;
        game.anticheatBlockedUntil = 0;
        game.clickTimestamps = [];
        saveGame();
        showToast("🛡️ Защита включена.");
        renderUI();
    }

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ДЛЯ АДМИНКИ ==========
    function getPlayerData(nickname) {
        const raw = localStorage.getItem(`sealGame_${nickname}`);
        if (!raw) return null;
        try { return JSON.parse(raw); } catch(e) { return null; }
    }

    function setPlayerData(nickname, data) {
        localStorage.setItem(`sealGame_${nickname}`, JSON.stringify(data));
    }

    function getAllPlayers() {
        let players = [];
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith('sealGame_')) {
                try {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (data && data.nickname) players.push(data);
                } catch(e) {}
            }
        }
        return players;
    }

    // ========== НОВАЯ РАСШИРЕННАЯ АДМИН-ПАНЕЛЬ ==========
    function showAdminModal() {
        const modalHtml = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>👑 Админ-панель</h3>
                <input type="password" id="adminPass" placeholder="Пароль" style="width:100%; margin:10px 0;">
                <button id="adminLoginBtn">Войти</button>
                <div id="adminControls" style="display:none; margin-top:15px;">
                    <h4>📌 Работа с текущим игроком (${game.nickname})</h4>
                    <input type="number" id="giveFish" placeholder="Рыба"> <button id="giveFishBtn">Выдать рыбу</button><br>
                    <select id="upgradeSelect">
                        <option value="clickPower">Сила клика</option>
                        <option value="autoClicker">Автокликер</option>
                        <option value="crit">Крит</option>
                        <option value="clickMult">Множитель клика</option>
                        <option value="passiveMult">Множитель пассива</option>
                        <option value="eventBonus">Бонус событий</option>
                    </select>
                    <input type="number" id="giveLevels" placeholder="Уровней"> <button id="giveUpgradeBtn">Выдать уровни</button><br>
                    <select id="roleSelect">
                        <option value="player">Обычный игрок</option>
                        <option value="developer">Разработчик</option>
                    </select>
                    <button id="setRoleBtn">Установить роль</button><br>
                    <button id="resetAnticheatBtn">Сбросить блокировку античита</button>
                    <button id="giveAchievementBtn">Выдать достижение (выбрать из списка)</button>
                    <select id="achievementSelect" style="width:100%; margin-top:5px;"></select>
                    
                    <h4 style="margin-top:15px;">🎮 Работа с другими игроками</h4>
                    <select id="targetPlayerSelect" style="width:100%;"></select>
                    <div id="targetPlayerStats" style="font-size:0.8rem; margin:5px 0;"></div>
                    <input type="number" id="targetGiveFish" placeholder="Рыба"> <button id="targetGiveFishBtn">Выдать рыбу</button><br>
                    <input type="number" id="targetGiveLevels" placeholder="Уровней"> <select id="targetUpgradeSelect">
                        <option value="clickPower">Сила клика</option>
                        <option value="autoClicker">Автокликер</option>
                        <option value="crit">Крит</option>
                        <option value="clickMult">Множитель клика</option>
                        <option value="passiveMult">Множитель пассива</option>
                        <option value="eventBonus">Бонус событий</option>
                    </select> <button id="targetGiveUpgradeBtn">Выдать уровни</button><br>
                    <button id="targetResetAnticheatBtn">Сбросить блокировку античита</button>
                    <button id="targetSetRoleBtn" style="margin-top:5px;">Сделать разработчиком</button>
                    
                    <h4 style="margin-top:15px;">🌍 Глобальные действия</h4>
                    <button id="globalDoubleIncomeBtn">Всем двойной доход на 1 час</button>
                    <button id="forceEventBtn">Запустить случайное событие для всех</button>
                    <button id="clearAllSavesBtn" style="background:#c7254e;">⚠️ Удалить ВСЕ сохранения</button>
                </div>
            </div>
        `;
        const modal = createModal(modalHtml);
        const adminLoginBtn = modal.querySelector('#adminLoginBtn');
        const adminControls = modal.querySelector('#adminControls');
        adminLoginBtn.onclick = () => {
            const pass = modal.querySelector('#adminPass').value;
            if (pass === 'seal123') {
                adminControls.style.display = 'block';
                adminLoginBtn.disabled = true;
                populateAchievementSelect(modal);
                populatePlayerSelect(modal);
            } else showToast("Неверный пароль!");
        };

        // ----- Функции для текущего игрока -----
        modal.querySelector('#giveFishBtn').onclick = () => {
            const amount = parseInt(modal.querySelector('#giveFish').value);
            if (isNaN(amount)) return;
            game.fish += amount;
            game.totalFish += amount;
            saveGame();
            checkAchievements();
            renderUI();
            showToast(`Выдано ${amount} рыбы`);
        };
        modal.querySelector('#giveUpgradeBtn').onclick = () => {
            const up = modal.querySelector('#upgradeSelect').value;
            const levels = parseInt(modal.querySelector('#giveLevels').value);
            if (isNaN(levels)) return;
            game.upgrades[up] += levels;
            saveGame();
            checkAchievements();
            renderUI();
            showToast(`Улучшение ${up} +${levels}`);
        };
        modal.querySelector('#setRoleBtn').onclick = () => {
            const role = modal.querySelector('#roleSelect').value;
            game.role = role;
            saveGame();
            renderUI();
            showToast(`Роль: ${role === 'developer' ? 'Разработчик' : 'Игрок'}`);
        };
        modal.querySelector('#resetAnticheatBtn').onclick = () => {
            game.anticheatBlockedUntil = 0;
            saveGame();
            showToast("Античит разблокирован");
            renderUI();
        };
        modal.querySelector('#giveAchievementBtn').onclick = () => {
            const achId = modal.querySelector('#achievementSelect').value;
            const ach = achievementsList.find(a => a.id === achId);
            if (ach && !game.achievements[achId]) {
                game.achievements[achId] = true;
                game.fish += ach.reward;
                game.totalFish += ach.reward;
                saveGame();
                renderUI();
                showToast(`Достижение ${ach.name} выдано! +${ach.reward} рыб`);
            } else showToast("Уже есть или не найдено");
        };

        // ----- Работа с другими игроками -----
        function refreshTargetStats(nickname) {
            const data = getPlayerData(nickname);
            if (data) {
                modal.querySelector('#targetPlayerStats').innerHTML = `💰 Рыбы: ${Math.floor(data.fish).toLocaleString()} | 🏆 Всего: ${data.total_fish.toLocaleString()}`;
            } else modal.querySelector('#targetPlayerStats').innerHTML = 'Нет данных';
        }
        modal.querySelector('#targetPlayerSelect').onchange = () => {
            const nick = modal.querySelector('#targetPlayerSelect').value;
            refreshTargetStats(nick);
        };
        modal.querySelector('#targetGiveFishBtn').onclick = () => {
            const nick = modal.querySelector('#targetPlayerSelect').value;
            const amount = parseInt(modal.querySelector('#targetGiveFish').value);
            if (!nick || isNaN(amount)) return;
            const data = getPlayerData(nick);
            if (data) {
                data.fish += amount;
                data.total_fish += amount;
                setPlayerData(nick, data);
                showToast(`Выдано ${amount} рыбы игроку ${nick}`);
                refreshTargetStats(nick);
                if (nick === game.nickname) { loadGame(game.nickname); renderUI(); }
            } else showToast("Игрок не найден");
        };
        modal.querySelector('#targetGiveUpgradeBtn').onclick = () => {
            const nick = modal.querySelector('#targetPlayerSelect').value;
            const up = modal.querySelector('#targetUpgradeSelect').value;
            const levels = parseInt(modal.querySelector('#targetGiveLevels').value);
            if (!nick || isNaN(levels)) return;
            const data = getPlayerData(nick);
            if (data) {
                data.upgrades[up] = (data.upgrades[up] || 0) + levels;
                setPlayerData(nick, data);
                showToast(`Игроку ${nick} выдано ${levels} уровней улучшения ${up}`);
                if (nick === game.nickname) { loadGame(game.nickname); renderUI(); }
            } else showToast("Игрок не найден");
        };
        modal.querySelector('#targetResetAnticheatBtn').onclick = () => {
            const nick = modal.querySelector('#targetPlayerSelect').value;
            const data = getPlayerData(nick);
            if (data) {
                data.anticheatBlockedUntil = 0;
                setPlayerData(nick, data);
                showToast(`Античит разблокирован для ${nick}`);
                if (nick === game.nickname) { loadGame(game.nickname); renderUI(); }
            } else showToast("Игрок не найден");
        };
        modal.querySelector('#targetSetRoleBtn').onclick = () => {
            const nick = modal.querySelector('#targetPlayerSelect').value;
            const data = getPlayerData(nick);
            if (data) {
                data.role = 'developer';
                setPlayerData(nick, data);
                showToast(`Игрок ${nick} теперь разработчик`);
                if (nick === game.nickname) { loadGame(game.nickname); renderUI(); }
            }
        };

        // ----- Глобальные действия -----
        modal.querySelector('#globalDoubleIncomeBtn').onclick = () => {
            const all = getAllPlayers();
            for (let p of all) {
                // добавим временный бафф в localStorage (просто в data)
                p.doubleIncomeUntil = Date.now() + 3600000;
                setPlayerData(p.nickname, p);
            }
            showToast("Всем выдан двойной доход на 1 час!");
        };
        modal.querySelector('#forceEventBtn').onclick = () => {
            const events = [
                { msg: "🐟 Косяк рыбы! +50", gain: 50 },
                { msg: "💎 Золотая рыбка! +200", gain: 200 },
                { msg: "🎣 Рыбак поделился +30", gain: 30 },
            ];
            const ev = events[Math.floor(Math.random() * events.length)];
            const gain = ev.gain * getEventBonus();
            addFish(gain, false);
            showToast(ev.msg + " " + Math.floor(gain) + " рыб!");
        };
        modal.querySelector('#clearAllSavesBtn').onclick = () => {
            if (confirm("Удалить ВСЕ сохранения всех игроков? Это необратимо!")) {
                for (let i = localStorage.length-1; i >= 0; i--) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('sealGame_')) localStorage.removeItem(key);
                }
                location.reload();
            }
        };

        function populateAchievementSelect(modal) {
            const select = modal.querySelector('#achievementSelect');
            select.innerHTML = achievementsList.map(ach => `<option value="${ach.id}">${ach.name}</option>`).join('');
        }
        function populatePlayerSelect(modal) {
            const players = getAllPlayers();
            const select = modal.querySelector('#targetPlayerSelect');
            select.innerHTML = players.map(p => `<option value="${p.nickname}">${p.nickname}</option>`).join('');
            if (players.length) refreshTargetStats(players[0].nickname);
        }
    }

    // ========== МОДАЛЬНЫЕ ОКНА ==========
    function showDisableAnticheatModal() {
        const modalHtml = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>Отключение защиты</h3>
                <input type="password" id="anticheatPass" placeholder="Пароль" style="width:100%; margin:10px 0;">
                <button id="confirmDisableBtn">Отключить</button>
            </div>
        `;
        const modal = createModal(modalHtml);
        modal.querySelector('#confirmDisableBtn').onclick = () => {
            const pass = modal.querySelector('#anticheatPass').value;
            disableAnticheatByPassword(pass);
            modal.remove();
        };
    }

    function showPlayersModal() {
        let players = getAllPlayers();
        if (game.nickname && !players.find(p => p.nickname === game.nickname)) {
            players.push({ nickname: game.nickname, totalFish: game.totalFish, role: game.role, stats: game.stats });
        }
        players.sort((a,b) => b.totalFish - a.totalFish);
        const modalHtml = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>👥 Все игроки</h3>
                <div class="player-list" id="playerList">
                    ${players.map(p => `<div class="player-item" data-nick="${p.nickname}"><strong>${escapeHtml(p.nickname)}</strong> (${p.role === 'developer' ? '👑 Разработчик' : '🦭 Игрок'}) — ${p.totalFish.toLocaleString()} 🐟</div>`).join('')}
                </div>
                <div id="selectedProfile" style="margin-top:15px; border-top:1px solid #ccc; padding-top:10px;"></div>
            </div>
        `;
        const modal = createModal(modalHtml);
        modal.querySelectorAll('.player-item').forEach(el => {
            el.onclick = () => {
                const nick = el.dataset.nick;
                const data = getPlayerData(nick);
                if (data) {
                    modal.querySelector('#selectedProfile').innerHTML = `
                        <h4>Профиль: ${escapeHtml(data.nickname)}</h4>
                        <p>Роль: ${data.role === 'developer' ? 'Разработчик' : 'Игрок'}</p>
                        <p>Всего рыбы: ${data.total_fish.toLocaleString()}</p>
                        <p>Кликов: ${(data.stats?.totalClicks || 0).toLocaleString()}</p>
                        <p>Престиж-бонус: +${data.prestigeBonus || 0}%</p>
                    `;
                }
            };
        });
    }

    function showLeaderboardModal() {
        let players = getAllPlayers();
        if (game.nickname && !players.find(p => p.nickname === game.nickname)) {
            players.push({ nickname: game.nickname, totalFish: game.totalFish });
        }
        players.sort((a,b) => b.totalFish - a.totalFish);
        let msg = "🏆 ГЛОБАЛЬНЫЙ ТОП 🏆\n";
        players.slice(0, 20).forEach((p, i) => {
            msg += `${i+1}. ${p.nickname} — ${p.totalFish.toLocaleString()} 🐟\n`;
        });
        alert(msg);
    }

    // ========== ПРЕСТИЖ, ПОКУПКИ, СОХРАНЕНИЕ ==========
    function doPrestige() {
        if (game.totalFish < 5000) { showToast("Нужно 5000 общей рыбы"); return; }
        if (confirm("Престиж: сбросить рыбу и улучшения, получить +50% к силе клика навсегда?")) {
            game.prestigeBonus += 50;
            game.fish = 0;
            game.totalFish = 0;
            game.upgrades = { clickPower:0, autoClicker:0, crit:0, clickMult:0, passiveMult:0, eventBonus:0 };
            game.stats.prestigeCount++;
            saveGame();
            checkAchievements();
            renderUI();
            showToast("🌟 Престиж! +50% к силе клика.");
        }
    }

    async function buyUpgrade(id, basePrice, name) {
        let level = game.upgrades[id];
        let price = Math.floor(basePrice * (level + 1));
        if (game.fish < price) { showToast(`❌ Нужно ${price} рыб`); return; }
        game.fish -= price;
        game.upgrades[id]++;
        saveGame();
        checkAchievements();
        renderUI();
        showToast(`🎉 ${name} → ур.${game.upgrades[id]}`);
    }

    function saveGame() {
        if (!game.nickname) return;
        const saveData = {
            nickname: game.nickname,
            fish: game.fish,
            total_fish: game.totalFish,
            upgrades: game.upgrades,
            stats: game.stats,
            achievements: game.achievements,
            anticheatDisabled: game.anticheatDisabled,
            role: game.role,
            prestigeBonus: game.prestigeBonus,
        };
        localStorage.setItem(`sealGame_${game.nickname}`, JSON.stringify(saveData));
    }

    function loadGame(nickname) {
        const raw = localStorage.getItem(`sealGame_${nickname}`);
        if (!raw) {
            game.nickname = nickname;
            game.fish = 0;
            game.totalFish = 0;
            game.upgrades = { clickPower:0, autoClicker:0, crit:0, clickMult:0, passiveMult:0, eventBonus:0 };
            game.stats = { totalClicks:0, prestigeCount:0 };
            game.achievements = {};
            game.anticheatDisabled = false;
            game.role = 'player';
            game.prestigeBonus = 0;
            initAchievements();
            saveGame();
            return;
        }
        try {
            const data = JSON.parse(raw);
            game.nickname = data.nickname;
            game.fish = data.fish;
            game.totalFish = data.total_fish;
            game.upgrades = data.upgrades;
            game.stats = data.stats;
            game.achievements = data.achievements || {};
            game.anticheatDisabled = data.anticheatDisabled || false;
            game.role = data.role || 'player';
            game.prestigeBonus = data.prestigeBonus || 0;
            initAchievements();
        } catch(e) { console.warn(e); }
    }

    // ========== ОСТАЛЬНОЙ UI (рендер, циклы) ==========
    let renderScheduled = false;
    function scheduleRender() {
        if (!renderScheduled) {
            renderScheduled = true;
            requestAnimationFrame(() => { renderUI(); renderScheduled = false; });
        }
    }

    function renderUI() {
        const root = document.getElementById('app');
        if (!game.nickname) {
            root.innerHTML = `
                <h1>🦭 SEAL CLICKER</h1>
                <div class="nick-panel">
                    <input type="text" id="nickInput" class="nick-input" placeholder="Твой ник" maxlength="20">
                    <button id="startBtn">НАЧАТЬ</button>
                </div>
                <button id="leaderboardBtn" style="width:100%; margin-top:10px;">🏆 Глобальный топ</button>
                <footer>Введи ник – сохраняется в браузере.</footer>
            `;
            document.getElementById('startBtn').onclick = () => {
                const nick = document.getElementById('nickInput').value.trim();
                if (!nick) return;
                loadGame(nick);
                startGameLoop();
                renderUI();
            };
            document.getElementById('leaderboardBtn').onclick = showLeaderboardModal;
            return;
        }

        const fish = Math.floor(game.fish);
        const total = Math.floor(game.totalFish);
        const clickPower = getClickPower();
        const passive = getPassiveIncome();
        const critChance = getCritChance();
        const blocked = isAnticheatBlocked();
        const unlockCount = achievementsList.filter(a => game.achievements[a.id]).length;

        const upgradesList = [
            { id: 'clickPower', name: '🐟 Острый зуб', desc: '+2 рыбы/клик', basePrice: 20, level: game.upgrades.clickPower },
            { id: 'autoClicker', name: '⏱️ Автокормушка', desc: '+1 рыба/сек', basePrice: 25, level: game.upgrades.autoClicker },
            { id: 'crit', name: '⚡ Крит-удар', desc: '+5% шанс x2', basePrice: 80, level: game.upgrades.crit },
            { id: 'clickMult', name: '📈 Множитель клика', desc: '+3% к силе', basePrice: 500, level: game.upgrades.clickMult },
            { id: 'passiveMult', name: '📈 Множитель пассива', desc: '+2% к пассивке', basePrice: 700, level: game.upgrades.passiveMult },
            { id: 'eventBonus', name: '🎁 Бонус событий', desc: '+10% к наградам', basePrice: 300, level: game.upgrades.eventBonus },
        ];

        let upgradesHtml = '';
        for (let up of upgradesList) {
            const price = Math.floor(up.basePrice * (up.level + 1));
            const canBuy = game.fish >= price && !blocked;
            upgradesHtml += `
                <div class="upgrade">
                    <div class="upgrade-info">
                        <div class="upgrade-name">${up.name}</div>
                        <div class="upgrade-desc">${up.desc} (ур.${up.level})</div>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button class="buy-btn" data-upgrade="${up.id}" data-price="${up.basePrice}" ${!canBuy ? 'disabled' : ''}>${price} 🐟</button>
                        <div class="help-icon" data-help="${up.id}">?</div>
                    </div>
                </div>
            `;
        }

        let achievementsHtml = '';
        for (let ach of achievementsList.slice(0, 50)) {
            const unlocked = game.achievements[ach.id];
            achievementsHtml += `<div class="achievement ${unlocked ? 'unlocked' : ''}">${unlocked ? '✅' : '🔒'} ${ach.name}</div>`;
        }

        root.innerHTML = `
            <h1>🦭 SEAL CLICKER</h1>
            <div class="nick-panel" style="justify-content:space-between;">
                <span>🐚 ${escapeHtml(game.nickname)} | Роль: ${game.role === 'developer' ? '👑 Разработчик' : '🦭 Игрок'}</span>
                <span>⭐ Престиж +${game.prestigeBonus}%</span>
                <button id="logoutBtn">Выйти</button>
            </div>
            <div class="seal-area" id="clickZone">
                <div class="seal-emoji" id="sealEmoji">🦭</div>
                <div>👆 нажми на тюленя</div>
            </div>
            <div class="fish-counter">🐟 ${fish.toLocaleString()}</div>
            <div class="stat-grid">
                <div class="stat">💪 Сила: +${clickPower}</div>
                <div class="stat">⏱️ Пассив: +${passive}/сек</div>
                <div class="stat">💥 Крит: ${critChance}%</div>
            </div>
            <div class="stat-grid">
                <div class="stat">🏆 Всего: ${total.toLocaleString()}</div>
                <div class="stat">🖱️ Кликов: ${game.stats.totalClicks}</div>
            </div>
            ${blocked ? `<div class="warning">⛔ Античит: клики заблокированы на несколько секунд</div>` : ''}
            <div class="action-buttons">
                ${!game.anticheatDisabled ? `<button id="disableAnticheatBtn">🔓 Отключить защиту</button>` : `<button id="enableAnticheatBtn" style="background:#b48c60;">🛡️ Включить защиту</button>`}
                <button id="adminPanelBtn">👑 Админ</button>
                <button id="playersBtn">👥 Игроки</button>
                <button id="leaderboardBtn">🏆 Топ</button>
                <button id="prestigeBtn">🏅 Престиж</button>
            </div>
            <div style="font-weight:bold; margin:10px 0 5px;">📦 МАГАЗИН</div>
            ${upgradesHtml}
            <div class="achievements">
                <strong>🏅 ДОСТИЖЕНИЯ (${unlockCount}/${achievementsList.length})</strong>
                <div style="max-height:200px; overflow-y:auto;">${achievementsHtml}</div>
            </div>
        `;

        document.getElementById('clickZone').onclick = () => {
            if (!registerClick()) return;
            let gain = getClickPower();
            if (Math.random() < getCritChance()/100) gain *= 2;
            addFish(gain, true);
            const seal = document.getElementById('sealEmoji');
            if (seal) {
                seal.classList.add('click-effect');
                setTimeout(() => seal.classList.remove('click-effect'), 100);
                playSound(600, 0.08);
            }
        };
        document.getElementById('logoutBtn').onclick = () => { game.nickname = null; if (passiveInterval) clearInterval(passiveInterval); renderUI(); };
        if (!game.anticheatDisabled) {
            const btn = document.getElementById('disableAnticheatBtn');
            if (btn) btn.onclick = showDisableAnticheatModal;
        } else {
            const btn = document.getElementById('enableAnticheatBtn');
            if (btn) btn.onclick = enableAnticheat;
        }
        document.getElementById('adminPanelBtn').onclick = showAdminModal;
        document.getElementById('playersBtn').onclick = showPlayersModal;
        document.getElementById('leaderboardBtn').onclick = showLeaderboardModal;
        document.getElementById('prestigeBtn').onclick = doPrestige;
        document.querySelectorAll('.buy-btn').forEach(btn => {
            const id = btn.dataset.upgrade;
            const price = parseInt(btn.dataset.price);
            btn.onclick = () => buyUpgrade(id, price, upgradesList.find(u => u.id === id).name);
        });
        document.querySelectorAll('.help-icon').forEach(icon => {
            const id = icon.dataset.help;
            icon.onclick = (e) => { e.stopPropagation(); showHelp(id); };
        });
    }

    function showHelp(upgradeId) {
        const helps = {
            clickPower: "🐟 Острый зуб: +2 рыбы за клик за уровень.",
            autoClicker: "⏱️ Автокормушка: +1 рыба/сек за уровень.",
            crit: "⚡ Крит-удар: +5% шанс x2 за уровень.",
            clickMult: "📈 Множитель клика: +3% к силе клика за уровень.",
            passiveMult: "📈 Множитель пассива: +2% к пассивному доходу за уровень.",
            eventBonus: "🎁 Бонус событий: +10% к наградам событий за уровень.",
        };
        alert(helps[upgradeId] || "Улучшение увеличивает доход.");
    }

    let audioCtx = null;
    function playSound(freq, duration) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.value = 0.05;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function createModal(html) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = html;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        return modal;
    }

    let passiveInterval = null;
    let eventInterval = null;
    function startGameLoop() {
        if (passiveInterval) clearInterval(passiveInterval);
        if (eventInterval) clearInterval(eventInterval);
        passiveInterval = setInterval(() => {
            if (game.nickname) {
                let inc = getPassiveIncome();
                if (inc > 0) addFish(inc, false);
            }
        }, 1000);
        eventInterval = setInterval(() => {
            if (game.nickname && Math.random() < 0.4) {
                const events = [
                    { msg: "🐟 Косяк рыбы! +50", gain: 50 },
                    { msg: "💎 Золотая рыбка! +200", gain: 200 },
                    { msg: "🎣 Рыбак поделился +30", gain: 30 },
                ];
                const ev = events[Math.floor(Math.random() * events.length)];
                let gain = ev.gain * getEventBonus();
                addFish(gain, false);
                showToast(ev.msg + " " + Math.floor(gain) + " рыб!");
            }
        }, 25000);
    }

    initAchievements();
    renderUI();
</script>
</body>
</html>
