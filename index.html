<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Seal Clicker | Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: #1e6b3e;
            font-family: 'Segoe UI', system-ui;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        #app {
            background: white;
            border-radius: 40px;
            padding: 25px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        button {
            background: #ffb347;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }
        input {
            padding: 8px;
            border-radius: 30px;
            border: 1px solid #ccc;
            margin: 5px;
        }
        .clicker {
            font-size: 4rem;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
        }
        .clicker:active {
            transform: scale(0.95);
        }
        .flex {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            z-index: 999;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
<div id="app">Загрузка...</div>

<script>
    // ---- ТВОИ КЛЮЧИ (ПРОВЕРЬ, ЧТО ОНИ ТОЧНО ТВОИ) ----
    const SUPABASE_URL = 'https://pmvbhhidcojkkpumsxxb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdmJoaGlkY29qa2twdW1zeHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzk3MjcsImV4cCI6MjA5Mjg1NTcyN30.1eKxcaqeClRdAVH8lVcOdYaV0o_PbRzjnM9vBUP15QQ';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let clickTimestamps = [];
    let blockedUntil = 0;

    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    // Проверка античита
    function isBlocked() {
        if (currentUser?.anticheat_disabled) return false;
        if (Date.now() < blockedUntil) return true;
        let now = Date.now();
        clickTimestamps.push(now);
        while (clickTimestamps.length && clickTimestamps[0] < now - 1000) clickTimestamps.shift();
        if (clickTimestamps.length > 18) {
            blockedUntil = now + 8000;
            clickTimestamps = [];
            showToast("⚠️ Слишком быстро! Блокировка 8 сек");
            return true;
        }
        return false;
    }

    // Сохранение пользователя
    async function saveUser() {
        if (!currentUser) return;
        await supabaseClient.from('users').upsert({
            nickname: currentUser.nickname,
            password: currentUser.password,
            fish: currentUser.fish,
            total_fish: currentUser.total_fish,
            anticheat_disabled: currentUser.anticheat_disabled,
            updated_at: new Date()
        }, { onConflict: 'nickname' });
        await supabaseClient.from('leaderboard').upsert({
            nickname: currentUser.nickname,
            total_fish: currentUser.total_fish
        }, { onConflict: 'nickname' });
    }

    async function loadUser(nick, pass) {
        let { data, error } = await supabaseClient.from('users').select('*').eq('nickname', nick).maybeSingle();
        if (error || !data || data.password !== pass) return null;
        return data;
    }

    async function registerUser(nick, pass) {
        let { data: existing } = await supabaseClient.from('users').select('nickname').eq('nickname', nick);
        if (existing && existing.length) { showToast("Ник занят"); return false; }
        let newUser = {
            nickname: nick,
            password: pass,
            fish: 0,
            total_fish: 0,
            anticheat_disabled: false
        };
        let { error } = await supabaseClient.from('users').insert(newUser);
        if (error) { showToast("Ошибка: " + error.message); return false; }
        await supabaseClient.from('leaderboard').insert({ nickname: nick, total_fish: 0 });
        currentUser = newUser;
        return true;
    }

    async function clickForFish() {
        if (!currentUser) return;
        if (isBlocked()) { showToast("Античит активен"); return; }
        currentUser.fish += 1;
        currentUser.total_fish += 1;
        await saveUser();
        render();
    }

    async function adminGive() {
        let pass = prompt("Пароль админа:");
        if (pass !== 'seal123') { showToast("Неверный пароль"); return; }
        let nick = prompt("Ник игрока:");
        if (!nick) return;
        let amount = parseInt(prompt("Рыба:"));
        if (isNaN(amount)) return;
        let { data: target } = await supabaseClient.from('users').select('*').eq('nickname', nick).single();
        if (!target) { showToast("Игрок не найден"); return; }
        target.fish += amount;
        target.total_fish += amount;
        await supabaseClient.from('users').update({ fish: target.fish, total_fish: target.total_fish }).eq('nickname', nick);
        await supabaseClient.from('leaderboard').upsert({ nickname: nick, total_fish: target.total_fish });
        showToast(`Выдано ${amount} рыбы ${nick}`);
        if (currentUser && currentUser.nickname === nick) currentUser.fish = target.fish;
    }

    async function showLeaderboard() {
        let { data } = await supabaseClient.from('leaderboard').select('nickname, total_fish').order('total_fish', { ascending: false }).limit(15);
        let msg = "🏆 ТОП РЫБЫ 🏆\n";
        data.forEach((u,i) => msg += `${i+1}. ${u.nickname} — ${u.total_fish}\n`);
        alert(msg);
    }

    async function handleRegister() {
        let nick = document.getElementById('regNick')?.value.trim();
        let pass = document.getElementById('regPass')?.value;
        if (!nick || !pass) { showToast("Введите ник и пароль"); return; }
        let ok = await registerUser(nick, pass);
        if (ok) {
            localStorage.setItem('seal_user', JSON.stringify({ nickname: nick, password: pass }));
            render();
        }
    }

    async function handleLogin() {
        let nick = document.getElementById('loginNick')?.value.trim();
        let pass = document.getElementById('loginPass')?.value;
        if (!nick || !pass) { showToast("Введите ник и пароль"); return; }
        let user = await loadUser(nick, pass);
        if (!user) { showToast("Неверный ник или пароль"); return; }
        currentUser = user;
        localStorage.setItem('seal_user', JSON.stringify({ nickname: nick, password: pass }));
        render();
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('seal_user');
        render();
    }

    async function render() {
        let app = document.getElementById('app');
        if (!currentUser) {
            app.innerHTML = `
                <h2>🐟 SEAL CLICKER</h2>
                <div class="flex">
                    <input id="regNick" placeholder="Ник">
                    <input id="regPass" type="password" placeholder="Пароль">
                    <button id="regBtn">РЕГИСТРАЦИЯ</button>
                </div>
                <div class="flex">
                    <input id="loginNick" placeholder="Ник">
                    <input id="loginPass" type="password" placeholder="Пароль">
                    <button id="loginBtn">ВХОД</button>
                </div>
                <button id="leaderBtn">🏆 ТОП</button>
                <footer style="margin-top:20px;">Прогресс сохраняется в Supabase</footer>
            `;
            document.getElementById('regBtn').addEventListener('click', handleRegister);
            document.getElementById('loginBtn').addEventListener('click', handleLogin);
            document.getElementById('leaderBtn').addEventListener('click', showLeaderboard);
            return;
        }

        app.innerHTML = `
            <div style="display:flex; justify-content:space-between;">
                <span>🦭 ${currentUser.nickname}</span>
                <button id="logoutBtn">Выйти</button>
            </div>
            <div class="clicker" id="clickZone">🦭</div>
            <div style="text-align:center; font-size:2rem;">🐟 ${Math.floor(currentUser.fish)}</div>
            <div>🏆 Всего: ${Math.floor(currentUser.total_fish)}</div>
            <div class="flex">
                <button id="adminBtn">👑 Админ</button>
                <button id="leaderBtn">🏆 Топ</button>
            </div>
            <footer>Нажми на тюленя → +1 рыба</footer>
        `;
        document.getElementById('clickZone').addEventListener('click', clickForFish);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('adminBtn').addEventListener('click', adminGive);
        document.getElementById('leaderBtn').addEventListener('click', showLeaderboard);
    }

    // Восстановление сессии
    (async () => {
        let saved = localStorage.getItem('seal_user');
        if (saved) {
            let { nickname, password } = JSON.parse(saved);
            let user = await loadUser(nickname, password);
            if (user) currentUser = user;
        }
        render();
    })();
</script>
</body>
</html>
