<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonTunnel | Видео</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ШАПКА */
        .header {
            text-align: center;
            padding: 30px;
            background: #1a1a3a;
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #b0b0ff;
        }

        .header p {
            color: #888;
            margin-top: 10px;
            font-size: 14px;
        }

        /* КНОПКА ВХОДА */
        .login-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4a4a8a;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            z-index: 100;
            font-size: 12px;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background: #5a5a9a;
            transform: scale(1.05);
        }

        /* АДМИН ПАНЕЛЬ */
        .admin-panel {
            background: #1a1a2a;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: none;
            animation: fadeIn 0.5s;
        }

        .admin-panel.active {
            display: block;
        }

        /* КНОПКА ЗАГРУЗКИ */
        .upload-label {
            display: inline-block;
            background: #4a4a8a;
            padding: 12px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .upload-label:hover {
            background: #5a5a9a;
            transform: scale(1.05);
            box-shadow: 0 0 15px #4a4a8a;
        }

        input[type="file"] {
            display: none;
        }

        /* ПРОГРЕСС БАР */
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #2a2a4a;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #7a7aff;
            transition: width 0.3s;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .status {
            text-align: center;
            padding: 10px;
            color: #a0a0ff;
            font-size: 12px;
        }

        /* СЕТКА ВИДЕО */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* КАРТОЧКА ВИДЕО */
        .video-card {
            background: #1a1a2a;
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .video-card:hover {
            transform: translateY(-5px);
            background: #2a2a4a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-thumb {
            width: 100%;
            height: 180px;
            background: #000;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 10px;
            position: relative;
        }

        /* СТАТУС ВИДЕО (НЕДОСТУПНО) */
        .video-status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 5px;
            border-radius: 10px;
            font-size: 10px;
            text-align: center;
        }

        .status-waiting {
            background: #ffaa44;
            color: #1a1a2a;
        }

        .status-available {
            background: #4aff7a;
            color: #1a1a2a;
        }

        .status-uploading {
            background: #4a4a8a;
            color: white;
        }

        .video-name {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
            word-break: break-word;
        }

        .video-size {
            font-size: 11px;
            color: #888;
        }

        .video-time {
            font-size: 11px;
            color: #ffaa44;
            margin-top: 5px;
        }

        /* КНОПКА УДАЛЕНИЯ */
        .delete-video {
            background: rgba(239,68,68,0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 5px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 10px;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .delete-video:hover {
            background: #ef4444;
            color: white;
        }

        /* ПЛЕЕР */
        .player-section {
            background: #1a1a2a;
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.5s;
        }

        .player-section.active {
            display: block;
        }

        video {
            width: 100%;
            max-height: 450px;
            border-radius: 15px;
            background: #000;
        }

        .close-player {
            background: #4a4a8a;
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .close-player:hover {
            background: #5a5a9a;
            transform: scale(1.05);
        }

        /* МОДАЛКА ВХОДА */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a3a;
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #4a4a8a;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            margin-bottom: 20px;
            font-size: 20px;
            color: #b0b0ff;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #2a2a4a;
            border: 1px solid #4a4a8a;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .modal-content button {
            background: #4a4a8a;
            border: none;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .modal-content button:hover {
            background: #5a5a9a;
        }

        .error {
            color: #ef4444;
            margin-top: 10px;
            font-size: 12px;
        }

        /* СООБЩЕНИЕ О ВРЕМЕНИ */
        .time-message {
            text-align: center;
            padding: 20px;
            background: #1a1a2a;
            border-radius: 15px;
            margin-bottom: 20px;
            color: #ffaa44;
            font-size: 12px;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 600px) {
            .videos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <button class="login-btn" id="loginBtn" onclick="showLoginModal()">🔐 ВХОД</button>

    <div class="container">
        <div class="header">
            <h1>🌙 MOONTUNNEL</h1>
            <p>Видео строительства в выживании</p>
        </div>

        <!-- СООБЩЕНИЕ О ВРЕМЕНИ -->
        <div class="time-message" id="timeMessage">
            ⏳ ВИДЕО БУДЕТ ДОСТУПНО ЧЕРЕЗ 1 ДЕНЬ ⏳
        </div>

        <!-- АДМИН ПАНЕЛЬ -->
        <div id="adminPanel" class="admin-panel">
            <div style="text-align: center;">
                <label class="upload-label" onclick="document.getElementById('videoInput').click()">
                    📹 ЗАГРУЗИТЬ ВИДЕО
                </label>
                <input type="file" id="videoInput" accept="video/*" onchange="uploadVideo()">
                <div class="progress-bar" id="progressBar" style="display: none;">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div id="uploadStatus" class="status"></div>
            </div>
        </div>

        <!-- СПИСОК ВИДЕО -->
        <div class="videos-grid" id="videosGrid"></div>

        <!-- ПЛЕЕР -->
        <div class="player-section" id="playerSection">
            <video id="videoPlayer" controls></video>
            <button class="close-player" onclick="closePlayer()">❌ ЗАКРЫТЬ</button>
        </div>
    </div>

    <!-- МОДАЛКА ВХОДА -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>🔐 ВХОД ДЛЯ АДМИНА</h2>
            <input type="text" id="loginUsername" placeholder="ЛОГИН">
            <input type="password" id="loginPassword" placeholder="ПАРОЛЬ">
            <button onclick="checkAdminLogin()">ВОЙТИ</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <script>
        // ============================================
        // SUPABASE (ТВОИ КЛЮЧИ)
        // ============================================
        const SUPABASE_URL = 'https://pmvbhhidcojkkpumsxxb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdmJoaGlkY29qa2twdW1zeHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzk3MjcsImV4cCI6MjA5Mjg1NTcyN30.1eKxcaqeClRdAVH8lVcOdYaV0o_PbRzjnM9vBUP15QQ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let videos = [];
        let isAdmin = false;

        // ДАТА ДОСТУПА (через 1 день от загрузки)
        function getAvailableDate(createdAt) {
            const date = new Date(createdAt);
            date.setDate(date.getDate() + 1);
            return date;
        }

        function isVideoAvailable(createdAt) {
            const availableDate = getAvailableDate(createdAt);
            return new Date() >= availableDate;
        }

        function formatTimeLeft(createdAt) {
            const availableDate = getAvailableDate(createdAt);
            const now = new Date();
            const diff = availableDate - now;
            
            if (diff <= 0) return null;
            
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            
            if (hours > 0) {
                return `${hours} ч ${minutes} мин`;
            }
            return `${minutes} мин`;
        }

        // ============================================
        // ЗАГРУЗКА ВИДЕО
        // ============================================
        async function loadVideos() {
            const { data, error } = await supabase
                .from('videos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Ошибка:', error);
                return;
            }

            videos = data;
            renderVideos();
        }

        function renderVideos() {
            const grid = document.getElementById('videosGrid');
            
            if (videos.length === 0) {
                grid.innerHTML = '<div style="text-align:center; color:#888; padding:40px;">📭 Нет видео</div>';
                return;
            }

            let html = '';
            videos.forEach(video => {
                const sizeMB = (video.size / 1024 / 1024).toFixed(2);
                const available = isVideoAvailable(video.created_at);
                const timeLeft = formatTimeLeft(video.created_at);
                
                let statusHtml = '';
                let playHandler = '';
                
                if (!available) {
                    statusHtml = `<div class="video-status status-waiting">⏳ Доступно через ${timeLeft}</div>`;
                    playHandler = `onclick="showWaitMessage()"`;
                } else {
                    statusHtml = `<div class="video-status status-available">✅ Доступно</div>`;
                    playHandler = `onclick="playVideo('${video.url}', '${video.name}')"`;
                }
                
                html += `
                    <div class="video-card" ${playHandler}>
                        <div class="video-thumb">
                            🎬
                            ${statusHtml}
                        </div>
                        <div class="video-name">${escapeHtml(video.name)}</div>
                        <div class="video-size">${sizeMB} MB</div>
                        <div class="video-time">📅 ${new Date(video.created_at).toLocaleDateString()}</div>
                        ${isAdmin ? `<button class="delete-video" onclick="event.stopPropagation(); deleteVideo('${video.id}')">🗑️ УДАЛИТЬ</button>` : ''}
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        function showWaitMessage() {
            alert('⏳ ВИДЕО БУДЕТ ДОСТУПНО ЧЕРЕЗ 1 ДЕНЬ ПОСЛЕ ЗАГРУЗКИ ⏳');
        }

        // ============================================
        // ЗАГРУЗКА ВИДЕО (АДМИН)
        // ============================================
        async function uploadVideo() {
            if (!isAdmin) {
                alert('Только админ может загружать видео');
                return;
            }

            const fileInput = document.getElementById('videoInput');
            const file = fileInput.files[0];
            
            if (!file) return;
            
            if (file.size > 2 * 1024 * 1024 * 1024) {
                alert('❌ Файл больше 2GB');
                return;
            }
            
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const statusDiv = document.getElementById('uploadStatus');
            
            progressBar.style.display = 'block';
            statusDiv.innerHTML = '⏳ Загрузка... 0%';
            
            const fileName = `${Date.now()}_${file.name}`;
            const filePath = `videos/${fileName}`;
            
            const { data, error } = await supabase.storage
                .from('videos')
                .upload(filePath, file, {
                    onUploadProgress: (progress) => {
                        const percent = (progress.loaded / progress.total) * 100;
                        progressFill.style.width = `${percent}%`;
                        statusDiv.innerHTML = `⏳ Загрузка... ${Math.round(percent)}%`;
                    }
                });
            
            if (error) {
                statusDiv.innerHTML = '❌ Ошибка';
                progressBar.style.display = 'none';
                return;
            }
            
            const { data: urlData } = supabase.storage
                .from('videos')
                .getPublicUrl(filePath);
            
            const videoUrl = urlData.publicUrl;
            
            await supabase
                .from('videos')
                .insert([{
                    name: file.name,
                    size: file.size,
                    url: videoUrl,
                    created_at: new Date().toISOString()
                }]);
            
            statusDiv.innerHTML = '✅ Готово!';
            progressFill.style.width = '100%';
            
            setTimeout(() => {
                progressBar.style.display = 'none';
                statusDiv.innerHTML = '';
            }, 2000);
            
            fileInput.value = '';
            await loadVideos();
        }

        // ============================================
        // ПЛЕЕР
        // ============================================
        function playVideo(url, name) {
            const player = document.getElementById('videoPlayer');
            const section = document.getElementById('playerSection');
            
            player.src = url;
            player.load();
            section.classList.add('active');
            section.scrollIntoView({ behavior: 'smooth' });
        }

        function closePlayer() {
            const player = document.getElementById('videoPlayer');
            const section = document.getElementById('playerSection');
            
            player.pause();
            player.src = '';
            section.classList.remove('active');
        }

        // ============================================
        // УДАЛЕНИЕ
        // ============================================
        async function deleteVideo(id) {
            if (!confirm('🗑️ Удалить это видео?')) return;
            
            const video = videos.find(v => v.id === id);
            if (!video) return;
            
            const urlParts = video.url.split('/');
            const filePath = `videos/${urlParts[urlParts.length - 1]}`;
            
            await supabase.storage.from('videos').remove([filePath]);
            await supabase.from('videos').delete().eq('id', id);
            await loadVideos();
        }

        // ============================================
        // ВХОД
        // ============================================
        function showLoginModal() {
            document.getElementById('loginModal').classList.add('active');
        }

        async function checkAdminLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (username === 'milk' && password === 'milk') {
                isAdmin = true;
                document.getElementById('loginModal').classList.remove('active');
                document.getElementById('adminPanel').classList.add('active');
                document.getElementById('loginBtn').style.display = 'none';
                renderVideos();
            } else {
                document.getElementById('loginError').innerText = '❌ Неверный логин или пароль';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // СТАРТ
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            loadVideos();
        });

        window.onclick = function(event) {
            const modal = document.getElementById('loginModal');
            if (event.target === modal) {
                modal.classList.remove('active');
            }
        }
    </script>
</body>
</html>
