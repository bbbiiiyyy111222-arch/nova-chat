<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🦭 SEAL CLICKER | Регистрация + логин</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1e6b3e;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-card {
            max-width: 750px;
            width: 100%;
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #1c6948; margin-bottom: 20px; }
        .auth-panel {
            background: #e9f3ed;
            border-radius: 60px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .auth-input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 50px;
            border: 1px solid #ffc896;
            text-align: center;
        }
        button {
            background: #ffb347;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
            margin: 5px;
        }
        button:active { transform: scale(0.97); }
        .seal-area { text-align: center; cursor: pointer; margin: 20px 0; }
        .seal-emoji { font-size: 8rem; display: inline-block; transition: 0.07s; }
        .click-effect { transform: scale(0.9); }
        .fish-counter {
            background: #2a5c48;
            color: #FFE5B4;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            margin: 15px 0;
        }
        .stat-grid {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .stat {
            background: #e3f0ea;
            flex: 1;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            font-weight: bold;
        }
        .upgrade {
            background: #faefe2;
            border-radius: 50px;
            padding: 10px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .upgrade-info { flex: 2; }
        .upgrade-name { font-weight: bold; }
        .upgrade-desc { font-size: 0.7rem; color: #7a6a54; }
        .help-icon {
            background: #ffb347;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            margin-left: 8px;
        }
        .warning {
            background: #f9e6e6;
            color: #c7254e;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .action-buttons button { flex: 1; font-size: 0.8rem; padding: 6px; }
        .achievements {
            background: #f7efdd;
            border-radius: 40px;
            padding: 12px;
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }
        .achievement {
            font-size: 0.75rem;
            padding: 4px 8px;
            margin: 4px 0;
            border-radius: 30px;
            background: #fff3e0;
        }
        .achievement.unlocked { background: #ffe0b5; font-weight: bold; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2b241cee;
            color: #ffeaaf;
            padding: 8px 20px;
            border-radius: 60px;
            animation: fadeOut 2s forwards;
            z-index: 1001;
        }
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 0; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #6e8f7a;
        }
    </style>
</head>
<body>
<div class="game-card" id="app"></div>

<script>
    // ========== SUPABASE ==========
    const SUPABASE_URL = 'https://pmvbhhidcojkkpumsxxb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdmJoaGlkY29qa2twdW1zeHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzk3MjcsImV4cCI6MjA5Mjg1NTcyN30.1eKxcaqeClRdAVH8lVcOdYaV0o_PbRzjnM9vBUP15QQ';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ========== ГЛОБАЛЬНОЕ СОСТОЯНИЕ ==========
    let game = {
        nickname: null,
        password: null,
        fish: 0,
        totalFish: 0,
        upgrades: {
            clickPower: 0,
            autoClicker: 0,
            crit: 0,
            clickMult: 0,
            passiveMult: 0,
            eventBonus: 0,
        },
        stats: { totalClicks: 0, prestigeCount: 0 },
        achievements: {},
        anticheatDisabled: false,
        anticheatBlockedUntil: 0,
        clickTimestamps: [],
        prestigeBonus: 0,
    };

    // ========== ДОСТИЖЕНИЯ ==========
    function generateAchievements() {
        const list = [];
        for (let i = 1; i <= 20; i++) {
            let target = 100 * Math.pow(1.6, i-1);
            list.push({ id: `total_${i}`, name: `${Math.floor(target).toLocaleString()} рыб`, cond: () => game.totalFish >= target, reward: Math.floor(target * 0.1) });
        }
        for (let i = 1; i <= 15; i++) {
            let clicks = 50 * Math.pow(2, i-1);
            list.push({ id: `clicks_${i}`, name: `${Math.floor(clicks).toLocaleString()} кликов`, cond: () => game.stats.totalClicks >= clicks, reward: Math.floor(clicks * 0.2) });
        }
        for (let i = 1; i <= 10; i++) {
            list.push({ id: `clickPower_${i}`, name: `Сила клика ${i}`, cond: () => game.upgrades.clickPower >= i, reward: 50 * i });
            list.push({ id: `auto_${i}`, name: `Автокликер ${i}`, cond: () => game.upgrades.autoClicker >= i, reward: 60 * i });
        }
        for (let i = 1; i <= 5; i++) {
            list.push({ id: `crit_${i}`, name: `Крит ${i}`, cond: () => game.upgrades.crit >= i, reward: 80 * i });
        }
        return list.slice(0, 60);
    }
    let achievementsList = generateAchievements();

    function initAchievements() {
        achievementsList.forEach(ach => {
            if (game.achievements[ach.id] === undefined) game.achievements[ach.id] = false;
        });
    }

    async function checkAchievements() {
        let changed = false;
        for (let ach of achievementsList) {
            if (!game.achievements[ach.id] && ach.cond()) {
                game.achievements[ach.id] = true;
                game.fish += ach.reward;
                game.totalFish += ach.reward;
                changed = true;
                showToast(`🏆 ${ach.name}! +${ach.reward} рыб`);
            }
        }
        if (changed) await saveToSupabase();
    }

    // ========== ИГРОВЫЕ РАСЧЁТЫ ==========
    function getClickPower() {
        let base = 1 + game.upgrades.clickPower * 2;
        let mult = 1 + game.upgrades.clickMult * 0.03;
        let prestige = game.prestigeBonus;
        return Math.floor(base * mult * (1 + prestige / 100));
    }
    function getPassiveIncome() {
        let inc = game.upgrades.autoClicker * 1;
        let mult = 1 + game.upgrades.passiveMult * 0.02;
        return Math.floor(inc * mult);
    }
    function getCritChance() { return Math.min(70, game.upgrades.crit * 5); }
    function getEventBonus() { return 1 + game.upgrades.eventBonus * 0.1; }

    async function addFish(amount, fromClick = false) {
        if (!game.nickname) return;
        let final = amount;
        game.fish += final;
        game.totalFish += final;
        if (fromClick) game.stats.totalClicks++;
        await saveToSupabase();
        await checkAchievements();
        renderUI();
    }

    // ========== АНТИЧИТ ==========
    function isAnticheatBlocked() {
        if (game.anticheatDisabled) return false;
        if (Date.now() < game.anticheatBlockedUntil) return true;
        return false;
    }
    function registerClick() {
        if (isAnticheatBlocked()) {
            showToast("⛔ Античит: клики заблокированы на 8 секунд");
            return false;
        }
        const now = Date.now();
        game.clickTimestamps.push(now);
        while (game.clickTimestamps.length && game.clickTimestamps[0] < now - 1000) game.clickTimestamps.shift();
        if (game.clickTimestamps.length > 18 && !game.anticheatDisabled) {
            game.anticheatBlockedUntil = now + 8000;
            game.clickTimestamps = [];
            showToast("⚠️ Слишком быстро! Блокировка на 8 секунд.");
            renderUI();
            return false;
        }
        return true;
    }

    // ========== РАБОТА С БД ==========
    async function saveToSupabase() {
        if (!game.nickname) return;
        const data = {
            nickname: game.nickname,
            password: game.password,
            fish: game.fish,
            total_fish: game.totalFish,
            click_power_level: game.upgrades.clickPower,
            auto_level: game.upgrades.autoClicker,
            crit_level: game.upgrades.crit,
            click_mult_level: game.upgrades.clickMult,
            passive_mult_level: game.upgrades.passiveMult,
            event_bonus_level: game.upgrades.eventBonus,
            prestige_bonus: game.prestigeBonus,
            anticheat_disabled: game.anticheatDisabled,
            stats: game.stats,
            achievements: game.achievements,
            updated_at: new Date(),
        };
        await supabase.from('users').upsert(data, { onConflict: 'nickname' });
        await supabase.from('leaderboard').upsert({ nickname: game.nickname, total_fish: game.totalFish, updated_at: new Date() }, { onConflict: 'nickname' });
    }

    async function loadFromSupabase(nickname, password) {
        const { data, error } = await supabase.from('users').select('*').eq('nickname', nickname).maybeSingle();
        if (error || !data) return null;
        if (data.password !== password) return null;
        game.nickname = data.nickname;
        game.password = data.password;
        game.fish = data.fish;
        game.totalFish = data.total_fish;
        game.upgrades = {
            clickPower: data.click_power_level || 0,
            autoClicker: data.auto_level || 0,
            crit: data.crit_level || 0,
            clickMult: data.click_mult_level || 0,
            passiveMult: data.passive_mult_level || 0,
            eventBonus: data.event_bonus_level || 0,
        };
        game.stats = data.stats || { totalClicks:0, prestigeCount:0 };
        game.achievements = data.achievements || {};
        game.anticheatDisabled = data.anticheat_disabled || false;
        game.prestigeBonus = data.prestige_bonus || 0;
        initAchievements();
        return game;
    }

    async function registerUser(nickname, password) {
        const { data: existing } = await supabase.from('users').select('nickname').eq('nickname', nickname);
        if (existing && existing.length > 0) return null;
        const newUser = {
            nickname, password,
            fish: 0, total_fish: 0,
            click_power_level: 0, auto_level: 0, crit_level: 0,
            click_mult_level: 0, passive_mult_level: 0, event_bonus_level: 0,
            prestige_bonus: 0, anticheat_disabled: false,
            stats: { totalClicks:0, prestigeCount:0 },
            achievements: {},
        };
        const { error } = await supabase.from('users').insert(newUser);
        if (error) return null;
        return newUser;
    }

    // ========== АДМИН-ПАНЕЛЬ (пароль seal123) ==========
    async function showAdminModal() {
        const modalHtml = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>👑 Админ-панель</h3>
                <input type="password" id="adminPass" placeholder="Пароль администратора" style="width:100%; margin:10px 0;">
                <button id="adminLoginBtn">Войти</button>
                <div id="adminControls" style="display:none; margin-top:15px;">
                    <input type="text" id="targetNick" placeholder="Ник игрока" style="width:100%; margin-bottom:10px;">
                    <input type="number" id="giveFish" placeholder="Количество рыбы"> <button id="giveFishBtn">Выдать рыбу</button><br><br>
                    <select id="upgradeSelect">
                        <option value="clickPower">Сила клика</option>
                        <option value="autoClicker">Автокликер</option>
                        <option value="crit">Крит</option>
                        <option value="clickMult">Множитель клика</option>
                        <option value="passiveMult">Множитель пассива</option>
                        <option value="eventBonus">Бонус событий</option>
                    </select>
                    <input type="number" id="giveLevels" placeholder="Уровней"> <button id="giveUpgradeBtn">Выдать уровни</button><br><br>
                    <button id="resetAllBtn" style="background:#c7254e;">⚠️ СБРОСИТЬ ВСЕ ДАННЫЕ</button>
                </div>
            </div>
        `;
        const modal = createModal(modalHtml);
        const adminLoginBtn = modal.querySelector('#adminLoginBtn');
        const adminControls = modal.querySelector('#adminControls');
        adminLoginBtn.onclick = () => {
            const pass = modal.querySelector('#adminPass').value;
            if (pass === 'seal123') {
                adminControls.style.display = 'block';
                adminLoginBtn.disabled = true;
            } else showToast("Неверный пароль!");
        };
        modal.querySelector('#giveFishBtn').onclick = async () => {
            const nick = modal.querySelector('#targetNick').value.trim();
            const amount = parseInt(modal.querySelector('#giveFish').value);
            if (!nick || isNaN(amount)) return;
            const { data: user, error } = await supabase.from('users').select('*').eq('nickname', nick).single();
            if (error || !user) { showToast("Игрок не найден"); return; }
            const newFish = (user.fish || 0) + amount;
            const newTotal = (user.total_fish || 0) + amount;
            await supabase.from('users').update({ fish: newFish, total_fish: newTotal }).eq('nickname', nick);
            await supabase.from('leaderboard').upsert({ nickname: nick, total_fish: newTotal, updated_at: new Date() });
            showToast(`Выдано ${amount} рыбы игроку ${nick}`);
            if (game.nickname === nick) { game.fish = newFish; game.totalFish = newTotal; renderUI(); }
        };
        modal.querySelector('#giveUpgradeBtn').onclick = async () => {
            const nick = modal.querySelector('#targetNick').value.trim();
            const up = modal.querySelector('#upgradeSelect').value;
            const levels = parseInt(modal.querySelector('#giveLevels').value);
            if (!nick || isNaN(levels)) return;
            const { data: user, error } = await supabase.from('users').select('*').eq('nickname', nick).single();
            if (error || !user) { showToast("Игрок не найден"); return; }
            const fieldMap = { clickPower:'click_power_level', autoClicker:'auto_level', crit:'crit_level', clickMult:'click_mult_level', passiveMult:'passive_mult_level', eventBonus:'event_bonus_level' };
            const field = fieldMap[up];
            const current = user[field] || 0;
            await supabase.from('users').update({ [field]: current + levels }).eq('nickname', nick);
            showToast(`Улучшение ${up} +${levels} для ${nick}`);
            if (game.nickname === nick) { game.upgrades[up] = current + levels; renderUI(); }
        };
        modal.querySelector('#resetAllBtn').onclick = async () => {
            if (confirm("СБРОСИТЬ ВСЮ БАЗУ ДАННЫХ? Это удалит всех игроков!")) {
                await supabase.from('users').delete().neq('nickname', '___none');
                await supabase.from('leaderboard').delete().neq('nickname', '___none');
                showToast("База данных очищена");
                if (game.nickname) { await saveToSupabase(); renderUI(); }
            }
        };
    }

    // ========== ПРОФИЛЬ ==========
    async function showProfileModal() {
        const modalHtml = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>👤 Профиль</h3>
                <p><strong>Ник:</strong> ${escapeHtml(game.nickname)}</p>
                <p><strong>Всего рыбы:</strong> ${game.totalFish.toLocaleString()}</p>
                <p><strong>Сила клика:</strong> ${getClickPower()}</p>
                <p><strong>Пассивный доход:</strong> ${getPassiveIncome()}/сек</p>
                <p><strong>Критический шанс:</strong> ${getCritChance()}%</p>
                <hr>
                <h4>Сменить ник</h4>
                <input type="text" id="newNick" placeholder="Новый ник" style="width:100%; margin:5px 0;">
                <input type="password" id="confirmPassword" placeholder="Ваш пароль" style="width:100%; margin:5px 0;">
                <button id="changeNickBtn">Сменить ник</button>
            </div>
        `;
        const modal = createModal(modalHtml);
        modal.querySelector('#changeNickBtn').onclick = async () => {
            const newNick = modal.querySelector('#newNick').value.trim();
            const pass = modal.querySelector('#confirmPassword').value;
            if (!newNick || !pass) { showToast("Заполните поля"); return; }
            if (pass !== game.password) { showToast("Неверный пароль"); return; }
            const { data: existing } = await supabase.from('users').select('nickname').eq('nickname', newNick);
            if (existing && existing.length > 0) { showToast("Ник уже занят"); return; }
            await supabase.from('users').update({ nickname: newNick }).eq('nickname', game.nickname);
            await supabase.from('leaderboard').update({ nickname: newNick }).eq('nickname', game.nickname);
            game.nickname = newNick;
            await saveToSupabase();
            showToast("Ник изменён!");
            modal.remove();
            renderUI();
        };
    }

    // ========== ЛИДЕРБОРД ==========
    async function showLeaderboardModal() {
        const { data, error } = await supabase.from('leaderboard').select('nickname, total_fish').order('total_fish', { ascending: false }).limit(20);
        if (error) { alert("Ошибка"); return; }
        let msg = "🏆 ГЛОБАЛЬНЫЙ ТОП 🏆\n";
        data.forEach((u,i) => msg += `${i+1}. ${u.nickname} — ${u.total_fish.toLocaleString()} 🐟\n`);
        alert(msg);
    }

    // ========== ПРЕСТИЖ ==========
    async function doPrestige() {
        if (game.totalFish < 5000) { showToast("Нужно 5000 общей рыбы"); return; }
        if (confirm("Престиж: сбросить рыбу и улучшения, получить +50% к силе клика?")) {
            game.prestigeBonus += 50;
            game.fish = 0;
            game.totalFish = 0;
            game.upgrades = { clickPower:0, autoClicker:0, crit:0, clickMult:0, passiveMult:0, eventBonus:0 };
            game.stats.prestigeCount++;
            await saveToSupabase();
            await checkAchievements();
            renderUI();
            showToast("🌟 Престиж! +50% к силе клика.");
        }
    }

    // ========== ОТКЛЮЧЕНИЕ ЗАЩИТЫ (пароль seal) ==========
    function showDisableAnticheatModal() {
        const modalHtml = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>Отключение защиты от авто-клика</h3>
                <input type="password" id="anticheatPass" placeholder="Пароль" style="width:100%; margin:10px 0;">
                <button id="confirmDisableBtn">Отключить навсегда</button>
            </div>
        `;
        const modal = createModal(modalHtml);
        modal.querySelector('#confirmDisableBtn').onclick = async () => {
            const pass = modal.querySelector('#anticheatPass').value;
            if (pass === 'seal') {
                game.anticheatDisabled = true;
                await saveToSupabase();
                showToast("✅ Защита отключена!");
                modal.remove();
                renderUI();
            } else showToast("❌ Неверный пароль!");
        };
    }

    function enableAnticheat() {
        game.anticheatDisabled = false;
        saveToSupabase();
        showToast("🛡️ Защита включена.");
        renderUI();
    }

    // ========== ПОКУПКА УЛУЧШЕНИЙ ==========
    async function buyUpgrade(id, basePrice, name) {
        let level = game.upgrades[id];
        let price = Math.floor(basePrice * (level + 1));
        if (game.fish < price) { showToast(`❌ Нужно ${price} рыб`); return; }
        game.fish -= price;
        game.upgrades[id]++;
        await saveToSupabase();
        await checkAchievements();
        renderUI();
        showToast(`🎉 ${name} → ур.${game.upgrades[id]}`);
    }

    // ========== UI ОТРИСОВКА ==========
    function renderUI() {
        const root = document.getElementById('app');
        if (!game.nickname) {
            root.innerHTML = `
                <h1>🦭 SEAL CLICKER</h1>
                <div class="auth-panel">
                    <h3>Регистрация</h3>
                    <input type="text" id="regNick" class="auth-input" placeholder="Ник">
                    <input type="password" id="regPass" class="auth-input" placeholder="Пароль">
                    <button id="registerBtn">Зарегистрироваться</button>
                    <hr>
                    <h3>Вход</h3>
                    <input type="text" id="loginNick" class="auth-input" placeholder="Ник">
                    <input type="password" id="loginPass" class="auth-input" placeholder="Пароль">
                    <button id="loginBtn">Войти</button>
                </div>
                <footer>Регистрация создаёт уникальный ник. После входа начнётся игра.</footer>
            `;
            document.getElementById('registerBtn').onclick = async () => {
                const nick = document.getElementById('regNick').value.trim();
                const pass = document.getElementById('regPass').value;
                if (!nick || !pass) { alert("Заполните поля"); return; }
                const newUser = await registerUser(nick, pass);
                if (!newUser) { alert("Ник уже существует"); return; }
                await loadFromSupabase(nick, pass);
                startGameLoop();
                renderUI();
            };
            document.getElementById('loginBtn').onclick = async () => {
                const nick = document.getElementById('loginNick').value.trim();
                const pass = document.getElementById('loginPass').value;
                const user = await loadFromSupabase(nick, pass);
                if (!user) { alert("Неверные данные"); return; }
                startGameLoop();
                renderUI();
            };
            return;
        }

        // ИГРОВОЙ ИНТЕРФЕЙС
        const fish = Math.floor(game.fish);
        const total = Math.floor(game.totalFish);
        const clickPower = getClickPower();
        const passive = getPassiveIncome();
        const critChance = getCritChance();
        const blocked = isAnticheatBlocked();
        const unlockCount = achievementsList.filter(a => game.achievements[a.id]).length;

        const upgradesList = [
            { id: 'clickPower', name: '🐟 Острый зуб', desc: '+2 рыбы/клик', basePrice: 20, level: game.upgrades.clickPower },
            { id: 'autoClicker', name: '⏱️ Автокормушка', desc: '+1 рыба/сек', basePrice: 25, level: game.upgrades.autoClicker },
            { id: 'crit', name: '⚡ Крит-удар', desc: '+5% шанс x2', basePrice: 80, level: game.upgrades.crit },
            { id: 'clickMult', name: '📈 Множитель клика', desc: '+3% к силе', basePrice: 500, level: game.upgrades.clickMult },
            { id: 'passiveMult', name: '📈 Множитель пассива', desc: '+2% к пассивке', basePrice: 700, level: game.upgrades.passiveMult },
            { id: 'eventBonus', name: '🎁 Бонус событий', desc: '+10% к наградам', basePrice: 300, level: game.upgrades.eventBonus },
        ];

        let upgradesHtml = '';
        for (let up of upgradesList) {
            const price = Math.floor(up.basePrice * (up.level + 1));
            const canBuy = game.fish >= price && !blocked;
            upgradesHtml += `
                <div class="upgrade">
                    <div class="upgrade-info">
                        <div class="upgrade-name">${up.name}</div>
                        <div class="upgrade-desc">${up.desc} (ур.${up.level})</div>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button class="buy-btn" data-upgrade="${up.id}" data-price="${up.basePrice}" ${!canBuy ? 'disabled' : ''}>${price} 🐟</button>
                        <div class="help-icon" data-help="${up.id}">?</div>
                    </div>
                </div>
            `;
        }

        let achievementsHtml = '';
        for (let ach of achievementsList.slice(0, 50)) {
            const unlocked = game.achievements[ach.id];
            achievementsHtml += `<div class="achievement ${unlocked ? 'unlocked' : ''}">${unlocked ? '✅' : '🔒'} ${ach.name}</div>`;
        }

        root.innerHTML = `
            <h1>🦭 SEAL CLICKER</h1>
            <div class="nick-panel" style="display:flex; justify-content:space-between; background:#e9f3ed; border-radius:60px; padding:12px; margin-bottom:15px;">
                <span>🐚 ${escapeHtml(game.nickname)}</span>
                <span>⭐ Престиж +${game.prestigeBonus}%</span>
                <button id="logoutBtn">Выйти</button>
            </div>
            <div class="seal-area" id="clickZone">
                <div class="seal-emoji" id="sealEmoji">🦭</div>
                <div>👆 нажми на тюленя</div>
            </div>
            <div class="fish-counter">🐟 ${fish.toLocaleString()}</div>
            <div class="stat-grid">
                <div class="stat">💪 Сила: +${clickPower}</div>
                <div class="stat">⏱️ Пассив: +${passive}/сек</div>
                <div class="stat">💥 Крит: ${critChance}%</div>
            </div>
            <div class="stat-grid">
                <div class="stat">🏆 Всего: ${total.toLocaleString()}</div>
                <div class="stat">🖱️ Кликов: ${game.stats.totalClicks}</div>
            </div>
            ${blocked ? `<div class="warning">⛔ Античит: клики заблокированы на несколько секунд</div>` : ''}
            <div class="action-buttons">
                ${!game.anticheatDisabled ? `<button id="disableAnticheatBtn">🔓 Отключить защиту</button>` : `<button id="enableAnticheatBtn" style="background:#b48c60;">🛡️ Включить защиту</button>`}
                <button id="adminPanelBtn">👑 Админ</button>
                <button id="profileBtn">👤 Профиль</button>
                <button id="leaderboardBtn">🏆 Топ</button>
                <button id="prestigeBtn">🏅 Престиж</button>
            </div>
            <div style="font-weight:bold; margin:10px 0 5px;">📦 МАГАЗИН</div>
            ${upgradesHtml}
            <div class="achievements">
                <strong>🏅 ДОСТИЖЕНИЯ (${unlockCount}/${achievementsList.length})</strong>
                <div style="max-height:200px; overflow-y:auto;">${achievementsHtml}</div>
            </div>
        `;

        document.getElementById('clickZone').onclick = () => {
            if (!registerClick()) return;
            let gain = getClickPower();
            if (Math.random() < getCritChance()/100) gain *= 2;
            addFish(gain, true);
            const seal = document.getElementById('sealEmoji');
            if (seal) {
                seal.classList.add('click-effect');
                setTimeout(() => seal.classList.remove('click-effect'), 100);
                playSound(600, 0.08);
            }
        };
        document.getElementById('logoutBtn').onclick = () => { game.nickname = null; if (passiveInterval) clearInterval(passiveInterval); renderUI(); };
        if (!game.anticheatDisabled) {
            const btn = document.getElementById('disableAnticheatBtn');
            if (btn) btn.onclick = showDisableAnticheatModal;
        } else {
            const btn = document.getElementById('enableAnticheatBtn');
            if (btn) btn.onclick = enableAnticheat;
        }
        document.getElementById('adminPanelBtn').onclick = showAdminModal;
        document.getElementById('profileBtn').onclick = showProfileModal;
        document.getElementById('leaderboardBtn').onclick = showLeaderboardModal;
        document.getElementById('prestigeBtn').onclick = doPrestige;
        document.querySelectorAll('.buy-btn').forEach(btn => {
            const id = btn.dataset.upgrade;
            const price = parseInt(btn.dataset.price);
            btn.onclick = () => buyUpgrade(id, price, upgradesList.find(u => u.id === id).name);
        });
        document.querySelectorAll('.help-icon').forEach(icon => {
            const id = icon.dataset.help;
            icon.onclick = (e) => { e.stopPropagation(); showHelp(id); };
        });
    }

    function showHelp(upgradeId) {
        const helps = {
            clickPower: "🐟 Острый зуб: +2 рыбы за клик за уровень.",
            autoClicker: "⏱️ Автокормушка: +1 рыба/сек за уровень.",
            crit: "⚡ Крит-удар: +5% шанс x2 за уровень.",
            clickMult: "📈 Множитель клика: +3% к силе клика за уровень.",
            passiveMult: "📈 Множитель пассива: +2% к пассивному доходу за уровень.",
            eventBonus: "🎁 Бонус событий: +10% к наградам событий за уровень.",
        };
        alert(helps[upgradeId] || "Улучшение увеличивает доход.");
    }

    let audioCtx = null;
    function playSound(freq, duration) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.value = 0.05;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function createModal(html) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = html;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        return modal;
    }

    let passiveInterval = null;
    let eventInterval = null;
    function startGameLoop() {
        if (passiveInterval) clearInterval(passiveInterval);
        if (eventInterval) clearInterval(eventInterval);
        passiveInterval = setInterval(async () => {
            if (game.nickname) {
                let inc = getPassiveIncome();
                if (inc > 0) await addFish(inc, false);
            }
        }, 1000);
        eventInterval = setInterval(async () => {
            if (game.nickname && Math.random() < 0.4) {
                const events = [
                    { msg: "🐟 Косяк рыбы! +50", gain: 50 },
                    { msg: "💎 Золотая рыбка! +200", gain: 200 },
                    { msg: "🎣 Рыбак поделился +30", gain: 30 },
                ];
                const ev = events[Math.floor(Math.random() * events.length)];
                let gain = ev.gain * getEventBonus();
                await addFish(gain, false);
                showToast(ev.msg + " " + Math.floor(gain) + " рыб!");
            }
        }, 25000);
    }

    initAchievements();
    renderUI();
</script>
</body>
</html>
