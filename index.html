<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🦭 SEAL CLICKER | Античит + топ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1e6b3e;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-card {
            max-width: 600px;
            width: 100%;
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #1c6948;
            margin-bottom: 20px;
        }
        .nick-panel {
            background: #e9f3ed;
            border-radius: 60px;
            padding: 15px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nick-input {
            flex: 2;
            padding: 10px;
            border-radius: 50px;
            border: 1px solid #ffc896;
            text-align: center;
            font-weight: bold;
        }
        button {
            background: #ffb347;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
        }
        button:active { transform: scale(0.97); }
        .seal-area {
            text-align: center;
            cursor: pointer;
            margin: 20px 0;
        }
        .seal-emoji {
            font-size: 8rem;
            display: inline-block;
            transition: 0.07s;
        }
        .click-effect { transform: scale(0.9); }
        .fish-counter {
            background: #2a5c48;
            color: #FFE5B4;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            margin: 15px 0;
        }
        .stat-grid {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .stat {
            background: #e3f0ea;
            flex: 1;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            font-weight: bold;
        }
        .upgrade {
            background: #faefe2;
            border-radius: 50px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .anticheat-panel {
            background: #f0e5d8;
            border-radius: 50px;
            padding: 12px;
            margin: 15px 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .anticheat-panel input {
            flex: 1;
            padding: 6px;
            border-radius: 40px;
            border: 1px solid #cca86b;
        }
        .warning {
            background: #f9e6e6;
            color: #c7254e;
            border-radius: 40px;
            padding: 6px;
            text-align: center;
            font-size: 0.8rem;
            margin-top: 8px;
        }
        .leaderboard-btn {
            background: #ffb347;
            width: 100%;
            margin-top: 15px;
        }
        .prestige-btn {
            background: #b48c60;
            color: white;
            width: 100%;
            margin-top: 10px;
        }
        .achievements {
            background: #f7efdd;
            border-radius: 40px;
            padding: 12px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .achievement {
            font-size: 0.75rem;
            padding: 4px 8px;
            margin: 4px 0;
            border-radius: 30px;
            background: #fff3e0;
        }
        .achievement.unlocked { background: #ffe0b5; font-weight: bold; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2b241cee;
            color: #ffeaaf;
            padding: 8px 20px;
            border-radius: 60px;
            animation: fadeOut 2s forwards;
            z-index: 1000;
        }
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 0; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #6e8f7a;
        }
    </style>
</head>
<body>
<div class="game-card" id="app"></div>

<script>
    // ==================== SUPABASE (твои ключи) ====================
    const SUPABASE_URL = 'https://pmvbhhidcojkkpumsxxb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdmJoaGlkY29qa2twdW1zeHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzk3MjcsImV4cCI6MjA5Mjg1NTcyN30.1eKxcaqeClRdAVH8lVcOdYaV0o_PbRzjnM9vBUP15QQ';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // -------------------- Игровое состояние --------------------
    let game = {
        nickname: null,
        fish: 0,
        totalFish: 0,
        upgrades: {
            clickPower: 0,      // +2 рыбы/клик
            autoClicker: 0,     // +1 рыба/сек
        },
        stats: { totalClicks: 0, prestigeCount: 0 },
        achievements: {},
        anticheatDisabled: false,
        anticheatBlockedUntil: 0,
        clickTimestamps: [],
    };

    // -------------------- Достижения (10 штук) --------------------
    const achievementsList = [
        { id: "total_100", name: "100 рыб", cond: () => game.totalFish >= 100, reward: 50 },
        { id: "total_1000", name: "1000 рыб", cond: () => game.totalFish >= 1000, reward: 150 },
        { id: "total_10000", name: "10 000 рыб", cond: () => game.totalFish >= 10000, reward: 500 },
        { id: "clicks_100", name: "100 кликов", cond: () => game.stats.totalClicks >= 100, reward: 50 },
        { id: "clicks_1000", name: "1000 кликов", cond: () => game.stats.totalClicks >= 1000, reward: 200 },
        { id: "clickPower_5", name: "Сила клика 5", cond: () => game.upgrades.clickPower >= 5, reward: 150 },
        { id: "auto_5", name: "Автокликер 5", cond: () => game.upgrades.autoClicker >= 5, reward: 200 },
        { id: "prestige_1", name: "Первый престиж", cond: () => game.stats.prestigeCount >= 1, reward: 500 },
        { id: "total_50000", name: "50 000 рыб", cond: () => game.totalFish >= 50000, reward: 2000 },
        { id: "clickPower_10", name: "Сила клика 10", cond: () => game.upgrades.clickPower >= 10, reward: 500 },
    ];

    function initAchievements() {
        achievementsList.forEach(ach => {
            if (game.achievements[ach.id] === undefined) game.achievements[ach.id] = false;
        });
    }

    function checkAchievements() {
        let changed = false;
        for (let ach of achievementsList) {
            if (!game.achievements[ach.id] && ach.cond()) {
                game.achievements[ach.id] = true;
                game.fish += ach.reward;
                game.totalFish += ach.reward;
                changed = true;
                showToast(`🏆 Достижение: ${ach.name}! +${ach.reward} рыб`);
            }
        }
        if (changed) saveGameToCloud();
    }

    // -------------------- Игровые расчёты --------------------
    function getClickPower() {
        let base = 1 + game.upgrades.clickPower * 2;
        let prestigeBonus = parseInt(localStorage.getItem('prestigeBonus') || 0);
        return Math.floor(base * (1 + prestigeBonus / 100));
    }
    function getPassiveIncome() {
        return game.upgrades.autoClicker * 1;
    }

    // Добавление рыбы
    async function addFish(amount, fromClick = false) {
        if (!game.nickname) return;
        game.fish += amount;
        game.totalFish += amount;
        if (fromClick) game.stats.totalClicks++;
        await saveGameToCloud();
        checkAchievements();
        updateLeaderboard();
        renderUI();
    }

    // -------------------- Анти-автоклик --------------------
    function isAnticheatBlocked() {
        if (game.anticheatDisabled) return false;
        if (Date.now() < game.anticheatBlockedUntil) return true;
        return false;
    }

    function registerClick() {
        if (isAnticheatBlocked()) {
            showToast("⛔ Античит: клики заблокированы на 8 секунд");
            return false;
        }
        const now = Date.now();
        game.clickTimestamps.push(now);
        while (game.clickTimestamps.length && game.clickTimestamps[0] < now - 1000) game.clickTimestamps.shift();
        if (game.clickTimestamps.length > 18) {
            game.anticheatBlockedUntil = now + 8000;
            game.clickTimestamps = [];
            showToast("⚠️ Слишком быстро! Античит блокирует клики.");
            renderUI();
            return false;
        }
        return true;
    }

    async function disableAnticheat(password) {
        if (password === "seal") {
            game.anticheatDisabled = true;
            await saveGameToCloud();
            showToast("✅ Защита от авто-клика отключена навсегда!");
            renderUI();
        } else {
            showToast("❌ Неверный пароль!");
        }
    }

    // -------------------- Престиж --------------------
    async function doPrestige() {
        if (game.totalFish < 5000) {
            showToast("Нужно 5000 рыб для престижа!");
            return;
        }
        if (confirm("Престиж: сбросить рыбу и улучшения, но получить +50% к силе клика?")) {
            let bonus = parseInt(localStorage.getItem('prestigeBonus') || 0);
            bonus += 50;
            localStorage.setItem('prestigeBonus', bonus);
            game.fish = 0;
            game.totalFish = 0;
            game.upgrades = { clickPower: 0, autoClicker: 0 };
            game.stats.prestigeCount++;
            await saveGameToCloud();
            checkAchievements();
            updateLeaderboard();
            renderUI();
            showToast("🌟 Престиж! +50% к силе клика.");
        }
    }

    // -------------------- Покупка улучшений --------------------
    async function buyUpgrade(upgradeId, basePrice, name) {
        if (!game.nickname) return;
        let level = game.upgrades[upgradeId];
        let price = Math.floor(basePrice * (level + 1));
        if (game.fish < price) {
            showToast(`❌ Не хватает рыбы (нужно ${price})`);
            return;
        }
        game.fish -= price;
        game.upgrades[upgradeId]++;
        await saveGameToCloud();
        checkAchievements();
        renderUI();
        showToast(`🎉 ${name} улучшен до ${game.upgrades[upgradeId]} уровня!`);
    }

    // -------------------- Supabase: сохранение и лидерборд --------------------
    async function saveGameToCloud() {
        if (!game.nickname) return;
        const data = {
            nickname: game.nickname,
            fish: game.fish,
            total_fish: game.totalFish,
            upgrades: game.upgrades,
            achievements: game.achievements,
            stats: game.stats,
            anticheat_disabled: game.anticheatDisabled,
            updated_at: new Date(),
        };
        await supabase.from('user_data').upsert(data, { onConflict: 'nickname' });
        await supabase.from('leaderboard').upsert({ nickname: game.nickname, total_fish: game.totalFish, updated_at: new Date() }, { onConflict: 'nickname' });
    }

    async function loadGameFromCloud(nickname) {
        const { data, error } = await supabase.from('user_data').select('*').eq('nickname', nickname).maybeSingle();
        if (error || !data) {
            game.nickname = nickname;
            game.fish = 0;
            game.totalFish = 0;
            game.upgrades = { clickPower: 0, autoClicker: 0 };
            game.stats = { totalClicks: 0, prestigeCount: 0 };
            game.achievements = {};
            game.anticheatDisabled = false;
            initAchievements();
            await saveGameToCloud();
            return;
        }
        game.nickname = data.nickname;
        game.fish = data.fish;
        game.totalFish = data.total_fish;
        game.upgrades = data.upgrades || { clickPower: 0, autoClicker: 0 };
        game.achievements = data.achievements || {};
        game.stats = data.stats || { totalClicks: 0, prestigeCount: 0 };
        game.anticheatDisabled = data.anticheat_disabled || false;
        initAchievements();
    }

    async function updateLeaderboard() {
        if (!game.nickname) return;
        await supabase.from('leaderboard').upsert({ nickname: game.nickname, total_fish: game.totalFish, updated_at: new Date() }, { onConflict: 'nickname' });
    }

    async function fetchLeaderboard() {
        const { data, error } = await supabase.from('leaderboard').select('nickname, total_fish').order('total_fish', { ascending: false }).limit(15);
        if (error) return [];
        return data;
    }

    async function showLeaderboardModal() {
        const leaders = await fetchLeaderboard();
        let msg = "🏆 ГЛОБАЛЬНЫЙ ТОП 🏆\n";
        leaders.forEach((u, i) => {
            msg += `${i+1}. ${u.nickname} — ${u.total_fish.toLocaleString()} 🐟\n`;
        });
        alert(msg);
    }

    // -------------------- UI рендеринг --------------------
    function renderUI() {
        const root = document.getElementById('app');
        if (!game.nickname) {
            root.innerHTML = `
                <h1>🦭 SEAL CLICKER</h1>
                <div class="nick-panel">
                    <input type="text" id="nickInput" class="nick-input" placeholder="Твой ник" maxlength="20">
                    <button id="startBtn">НАЧАТЬ</button>
                </div>
                <button id="leaderboardBtn" class="leaderboard-btn">🏆 Глобальный топ</button>
                <footer>Введи ник – прогресс сохранится в облаке.</footer>
            `;
            document.getElementById('startBtn').onclick = async () => {
                const nick = document.getElementById('nickInput').value.trim();
                if (!nick) return;
                await loadGameFromCloud(nick);
                startGameLoop();
                renderUI();
            };
            document.getElementById('leaderboardBtn').onclick = showLeaderboardModal;
            return;
        }

        const fish = Math.floor(game.fish);
        const total = Math.floor(game.totalFish);
        const clickPower = getClickPower();
        const passive = getPassiveIncome();
        const blocked = isAnticheatBlocked();
        const prestigeBonus = parseInt(localStorage.getItem('prestigeBonus') || 0);

        const upgradeClickPrice = Math.floor(20 * (game.upgrades.clickPower + 1));
        const upgradeAutoPrice = Math.floor(25 * (game.upgrades.autoClicker + 1));

        let achievementsHtml = '';
        for (let ach of achievementsList) {
            const unlocked = game.achievements[ach.id];
            achievementsHtml += `<div class="achievement ${unlocked ? 'unlocked' : ''}">${unlocked ? '✅' : '🔒'} ${ach.name}</div>`;
        }

        root.innerHTML = `
            <h1>🦭 SEAL CLICKER</h1>
            <div class="nick-panel" style="justify-content:space-between;">
                <span>🐚 ${escapeHtml(game.nickname)}</span>
                <span>⭐ Престиж +${prestigeBonus}%</span>
                <button id="logoutBtn">Выйти</button>
            </div>
            <div class="seal-area" id="clickZone">
                <div class="seal-emoji" id="sealEmoji">🦭</div>
                <div>👆 нажми на тюленя</div>
            </div>
            <div class="fish-counter">🐟 ${fish.toLocaleString()}</div>
            <div class="stat-grid">
                <div class="stat">💪 Сила: +${clickPower}</div>
                <div class="stat">⏱️ Пассив: +${passive}/сек</div>
                <div class="stat">🏆 Всего: ${total.toLocaleString()}</div>
            </div>
            ${blocked ? `<div class="warning">⛔ Античит: клики заблокированы на несколько секунд</div>` : ''}
            <div class="anticheat-panel">
                <input type="password" id="antibotPass" placeholder="пароль для отключения защиты">
                <button id="disableAntibotBtn">🔓 Снять защиту</button>
                <span style="font-size:0.7rem;">(пароль: seal)</span>
            </div>
            <div class="upgrade">
                <div><strong>🐟 Острый зуб</strong><br>+2 рыбы/клик<br>Уровень ${game.upgrades.clickPower}</div>
                <button id="buyClickBtn">${upgradeClickPrice} 🐟</button>
            </div>
            <div class="upgrade">
                <div><strong>⏱️ Автокормушка</strong><br>+1 рыба/сек<br>Уровень ${game.upgrades.autoClicker}</div>
                <button id="buyAutoBtn">${upgradeAutoPrice} 🐟</button>
            </div>
            <button id="prestigeBtn" class="prestige-btn">🏅 ПРЕСТИЖ (5000 рыб, +50%)</button>
            <button id="leaderboardBtn" class="leaderboard-btn">🏆 Глобальный топ</button>
            <div class="achievements">
                <strong>🏅 ДОСТИЖЕНИЯ (${achievementsList.filter(a => game.achievements[a.id]).length}/${achievementsList.length})</strong>
                ${achievementsHtml}
            </div>
            <footer>Автосохранение в облаке. Античит отключается паролем "seal".</footer>
        `;

        // События
        document.getElementById('clickZone').onclick = () => {
            if (!registerClick()) return;
            let gain = getClickPower();
            addFish(gain, true);
            const seal = document.getElementById('sealEmoji');
            if (seal) {
                seal.classList.add('click-effect');
                setTimeout(() => seal.classList.remove('click-effect'), 100);
                playSound(600, 0.08);
            }
        };
        document.getElementById('logoutBtn').onclick = () => {
            game.nickname = null;
            if (passiveInterval) clearInterval(passiveInterval);
            renderUI();
        };
        document.getElementById('prestigeBtn').onclick = doPrestige;
        document.getElementById('leaderboardBtn').onclick = showLeaderboardModal;
        document.getElementById('disableAntibotBtn').onclick = () => {
            const pass = document.getElementById('antibotPass').value;
            disableAnticheat(pass);
        };
        document.getElementById('buyClickBtn').onclick = () => buyUpgrade('clickPower', 20, 'Острый зуб');
        document.getElementById('buyAutoBtn').onclick = () => buyUpgrade('autoClicker', 25, 'Автокормушка');
    }

    // -------------------- Звук --------------------
    let audioCtx = null;
    function playSound(freq, duration) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.value = 0.05;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    // -------------------- Игровой цикл --------------------
    let passiveInterval = null;
    function startGameLoop() {
        if (passiveInterval) clearInterval(passiveInterval);
        passiveInterval = setInterval(async () => {
            if (game.nickname) {
                let income = getPassiveIncome();
                if (income > 0) {
                    await addFish(income, false);
                }
            }
        }, 1000);
    }

    // Инициализация
    (function init() {
        renderUI();
    })();
</script>
</body>
</html>
