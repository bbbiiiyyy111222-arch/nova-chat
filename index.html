<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🦭 Тюлений жиробас – Кликер с толстением</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1e5631;
            background-image: radial-gradient(circle at 20% 40%, #2d6e3f 2%, transparent 2.5%);
            background-size: 45px 45px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Neue', system-ui;
            padding: 15px;
        }
        .game-container {
            max-width: 1400px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        /* Левая панель – тюлень */
        .seal-panel {
            flex: 2;
            min-width: 300px;
            background: #fffbf0;
            border-radius: 80px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 25px 35px rgba(0,0,0,0.3);
        }
        /* Правая панель – магазин и статистика */
        .shop-panel {
            flex: 1.5;
            min-width: 280px;
            background: #fff5e8;
            border-radius: 80px;
            padding: 25px;
            box-shadow: 0 25px 35px rgba(0,0,0,0.3);
        }
        .seal-emoji {
            font-size: 8rem;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-block;
            filter: drop-shadow(0 12px 18px rgba(0,0,0,0.2));
        }
        .seal-emoji:active {
            transform: scale(0.92);
        }
        .fat-text {
            font-weight: bold;
            color: #b95f2a;
        }
        .counter {
            font-size: 2rem;
            background: #2e5f4a;
            display: inline-block;
            padding: 10px 35px;
            border-radius: 60px;
            color: #ffefb9;
            margin: 15px 0;
            font-weight: bold;
        }
        .stat-card {
            background: #e9f3ef;
            border-radius: 60px;
            padding: 12px;
            margin: 12px 0;
        }
        .upgrade {
            background: #f4e5d6;
            border-radius: 50px;
            padding: 12px 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        button {
            background: #f3a683;
            border: none;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.05s linear;
            box-shadow: 0 2px 0 #b45f2e;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: none;
        }
        .buy-btn {
            background: #ffb347;
        }
        .nick-bar {
            background: #d9e2db;
            border-radius: 60px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        input {
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid #cca76e;
            background: white;
            font-weight: bold;
            text-align: center;
        }
        .error {
            color: #c53a1f;
            font-size: 0.8rem;
        }
        .leaderboard {
            background: #e7dccb;
            border-radius: 50px;
            padding: 15px;
            margin-top: 20px;
        }
        footer {
            font-size: 0.7rem;
            margin-top: 20px;
            color: #6c8d7a;
        }
        .special-event {
            background: #fedba5;
            border-radius: 50px;
            padding: 8px;
            margin-top: 15px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { background: #fedba5; }
            50% { background: #ffc07a; }
            100% { background: #fedba5; }
        }
    </style>
</head>
<body>
<div class="game-container" id="app"></div>

<script>
    // ------------------ ИГРОВЫЕ ДАННЫЕ ------------------
    let gameState = {
        user: null,              // { nickname, fish, totalFish, clickPower, passiveIncome, fatLevel }
        upgrades: {
            click: 0,    // +1 за уровень
            auto1: 0,    // +1 рыба/сек
            auto2: 0,    // +5 рыба/сек
            auto3: 0,    // +20 рыба/сек
            crit: 0      // шанс двойного клика (уровень * 5%)
        },
        events: [],       // активные события
        lastUpdate: Date.now()
    };

    let passiveInterval = null;

    // ------------------ ХРАНИЛИЩЕ (localStorage) ------------------
    function loadGame() {
        const stored = localStorage.getItem('sealFatGame');
        if (stored) {
            try {
                const data = JSON.parse(stored);
                gameState.user = data.user;
                gameState.upgrades = data.upgrades;
                gameState.events = data.events || [];
            } catch(e) {}
        }
    }
    function saveGame() {
        if (!gameState.user) return;
        localStorage.setItem('sealFatGame', JSON.stringify({
            user: gameState.user,
            upgrades: gameState.upgrades,
            events: gameState.events
        }));
    }

    // ------------------ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ------------------
    function getClickPower() {
        let base = 1;
        base += gameState.upgrades.click * 2;   // +2 за уровень
        return base;
    }

    function getPassiveIncome() {
        let inc = 0;
        inc += gameState.upgrades.auto1 * 1;
        inc += gameState.upgrades.auto2 * 5;
        inc += gameState.upgrades.auto3 * 20;
        return inc;
    }

    function getCritChance() {
        return Math.min(75, gameState.upgrades.crit * 5);
    }

    // Жирность тюленя (размер эмодзи и текст)
    function updateFatLevel() {
        let total = gameState.user.totalFish;
        let level = 0;
        let sizeRem = 5;
        if (total >= 10000) level = 5;
        else if (total >= 5000) level = 4;
        else if (total >= 2000) level = 3;
        else if (total >= 500) level = 2;
        else if (total >= 100) level = 1;
        else level = 0;
        gameState.user.fatLevel = level;
        // размер эмодзи от 5rem до 12rem
        sizeRem = 5 + (level * 1.4);
        return { level, sizeRem };
    }

    async function addFish(amount) {
        if (!gameState.user) return;
        gameState.user.fish += amount;
        gameState.user.totalFish += amount;
        saveGame();
        renderUI();
        // проверить события
        checkRandomEvent();
    }

    async function addPassiveIncome() {
        if (!gameState.user) return;
        let income = getPassiveIncome();
        if (income > 0) {
            gameState.user.fish += income;
            gameState.user.totalFish += income;
            saveGame();
            renderUI();
        }
    }

    // Случайные события (каждые 30 секунд)
    let lastEventTime = Date.now();
    function checkRandomEvent() {
        const now = Date.now();
        if (now - lastEventTime > 30000 && Math.random() < 0.35) {
            lastEventTime = now;
            const rand = Math.random();
            let bonus = 0;
            let msg = "";
            if (rand < 0.5) {
                bonus = 50 + Math.floor(Math.random() * 200);
                msg = `🐟✨ Мимо проплыла косяк рыбы! +${bonus} рыб!`;
            } else if (rand < 0.8) {
                bonus = 20 + Math.floor(Math.random() * 100);
                msg = `🦭 Дельфин поделился уловом! +${bonus} рыб!`;
            } else {
                bonus = 100 + Math.floor(Math.random() * 500);
                msg = `🎣 Рыбацкое счастье! Выловили золотую рыбку! +${bonus} рыб!`;
            }
            gameState.user.fish += bonus;
            gameState.user.totalFish += bonus;
            saveGame();
            const eventDiv = document.getElementById('eventMessage');
            if (eventDiv) {
                eventDiv.innerHTML = `<div class="special-event">✨ ${msg} ✨</div>`;
                setTimeout(() => eventDiv.innerHTML = '', 4000);
            }
            renderUI();
        }
    }

    // Покупка улучшения
    async function buyUpgrade(type) {
        if (!gameState.user) return;
        let level = gameState.upgrades[type];
        let price = 0;
        if (type === 'click') price = 20 * (level + 1);
        if (type === 'auto1') price = 15 * (level + 1);
        if (type === 'auto2') price = 150 * (level + 1);
        if (type === 'auto3') price = 800 * (level + 1);
        if (type === 'crit') price = 500 * (level + 1);
        if (gameState.user.fish < price) {
            const errDiv = document.getElementById('shopError');
            if (errDiv) errDiv.innerText = "🐟 Не хватает рыб!";
            setTimeout(() => errDiv.innerText = "", 1500);
            return;
        }
        gameState.user.fish -= price;
        gameState.upgrades[type]++;
        saveGame();
        renderUI();
    }

    // Клик по тюленю
    function handleClick() {
        if (!gameState.user) return;
        let gain = getClickPower();
        let crit = getCritChance();
        if (Math.random() * 100 < crit) {
            gain *= 2;
            const critDiv = document.getElementById('critMsg');
            if (critDiv) {
                critDiv.innerText = "💥 КРИТИЧЕСКИЙ ЖИР! x2 💥";
                setTimeout(() => critDiv.innerText = "", 800);
            }
        }
        addFish(gain);
        // анимация тюленя
        const sealEmoji = document.getElementById('sealEmoji');
        if (sealEmoji) {
            sealEmoji.style.transform = 'scale(0.85)';
            setTimeout(() => sealEmoji.style.transform = '', 100);
        }
    }

    // Сброс прогресса (престиж)
    function prestige() {
        if (confirm("Тюлень хочет похудеть и начать новую жизнь? Все улучшения сбросятся, рыба обнулится, но останутся достижения и ник.")) {
            gameState.upgrades = { click: 0, auto1: 0, auto2: 0, auto3: 0, crit: 0 };
            gameState.user.fish = 0;
            gameState.user.totalFish = 0;
            saveGame();
            renderUI();
        }
    }

    // ------------------ ОТРИСОВКА ------------------
    function renderUI() {
        const app = document.getElementById('app');
        if (!gameState.user) {
            // экран регистрации
            app.innerHTML = `
                <div style="max-width:500px; background:#fffef5; border-radius:80px; padding:35px; text-align:center;">
                    <h2 style="color:#2c6e4f;">🦭 ТЮЛЕНИЙ ЖИРОБАС</h2>
                    <p style="margin:15px 0;">Корми тюленя -> становится огромным! Улучшения, события, криты.</p>
                    <div class="nick-bar" style="justify-content:center;">
                        <input type="text" id="nickInput" placeholder="ТВОЙ НИКНЕЙМ" maxlength="20">
                        <button id="startBtn">НАЧАТЬ ЖИРНЕТЬ</button>
                    </div>
                    <div id="loginError" class="error"></div>
                    <footer>Всё сохраняется в браузере. Жирность растёт от общего количества съеденной рыбы</footer>
                </div>
            `;
            document.getElementById('startBtn').onclick = () => {
                const nick = document.getElementById('nickInput').value.trim();
                if (!nick) return;
                gameState.user = {
                    nickname: nick,
                    fish: 0,
                    totalFish: 0,
                    clickPower: 1,
                    passiveIncome: 0,
                    fatLevel: 0
                };
                gameState.upgrades = { click: 0, auto1: 0, auto2: 0, auto3: 0, crit: 0 };
                saveGame();
                startPassiveLoop();
                renderUI();
            };
            return;
        }

        const fatInfo = updateFatLevel();
        const sealSize = fatInfo.sizeRem;
        let sealEmojiChar = "🦭";
        if (fatInfo.level >= 4) sealEmojiChar = "🦭🐟🦭";
        if (fatInfo.level >= 5) sealEmojiChar = "🐋🦭🐋";
        const clickPowerNow = getClickPower();
        const passiveNow = getPassiveIncome();
        const critChance = getCritChance();

        const html = `
            <div class="seal-panel">
                <div class="nick-bar">
                    <span>🐚 ${escapeHtml(gameState.user.nickname)}</span>
                    <button id="logoutBtn">🚪 Сменить ника</button>
                </div>
                <div style="margin: 20px 0;">
                    <div class="seal-emoji" id="sealEmoji" style="font-size: ${sealSize}rem;">${sealEmojiChar}</div>
                </div>
                <div class="counter">🐟 ${Math.floor(gameState.user.fish).toLocaleString()}</div>
                <div class="stat-card">
                    <div>⚡ Сила клика: +${clickPowerNow} 🐟</div>
                    <div>⏱️ Пассив: +${passiveNow} 🐟/сек</div>
                    <div>💥 Шанс крита: ${critChance}% (x2)</div>
                    <div>🏆 Всего съедено: ${Math.floor(gameState.user.totalFish).toLocaleString()} 🐟</div>
                    <div>🍔 Стадия жира: ${fatInfo.level === 0 ? "Худой тюлень" : fatInfo.level === 1 ? "В теле" : fatInfo.level === 2 ? "Пышный" : fatInfo.level === 3 ? "Бочонок" : fatInfo.level === 4 ? "Гора жира" : "КИТОТЮЛЕНЬ"}</div>
                </div>
                <button id="prestigeBtn" style="background:#bda48b; margin-top:10px;">🏋️‍♂️ ПРЕСТИЖ (сброс)</button>
                <div id="eventMessage" style="margin-top:15px;"></div>
                <div id="critMsg" style="font-weight:bold; color:#b45f2e;"></div>
            </div>
            <div class="shop-panel">
                <h2>🐟 МАГАЗИН ЖИРА</h2>
                <div id="shopError" class="error" style="margin-bottom:10px;"></div>
                <div class="upgrade">
                    <span>🎣 УДОЧКА (+2🐟/клик)</span>
                    <span>Ур.${gameState.upgrades.click}</span>
                    <button class="buy-btn" id="buyClick">${20 * (gameState.upgrades.click+1)} 🐟</button>
                </div>
                <div class="upgrade">
                    <span>🐟 РЫБАК (+1🐟/сек)</span>
                    <span>Ур.${gameState.upgrades.auto1}</span>
                    <button class="buy-btn" id="buyAuto1">${15 * (gameState.upgrades.auto1+1)} 🐟</button>
                </div>
                <div class="upgrade">
                    <span>🚤 ТРАЛЕР (+5🐟/сек)</span>
                    <span>Ур.${gameState.upgrades.auto2}</span>
                    <button class="buy-btn" id="buyAuto2">${150 * (gameState.upgrades.auto2+1)} 🐟</button>
                </div>
                <div class="upgrade">
                    <span>🔥 ФАБРИКА РЫБЫ (+20🐟/сек)</span>
                    <span>Ур.${gameState.upgrades.auto3}</span>
                    <button class="buy-btn" id="buyAuto3">${800 * (gameState.upgrades.auto3+1)} 🐟</button>
                </div>
                <div class="upgrade">
                    <span>💢 КРИТИЧЕСКИЙ УДАР (+5% шанс x2)</span>
                    <span>Ур.${gameState.upgrades.crit}</span>
                    <button class="buy-btn" id="buyCrit">${500 * (gameState.upgrades.crit+1)} 🐟</button>
                </div>
                <div class="leaderboard" id="leadBoard"></div>
                <footer>Чем больше рыбы, тем жирнее тюлень! Кликай и покупай улучшения</footer>
            </div>
        `;
        app.innerHTML = html;

        // вешаем события
        document.getElementById('sealEmoji').onclick = handleClick;
        document.getElementById('buyClick').onclick = () => buyUpgrade('click');
        document.getElementById('buyAuto1').onclick = () => buyUpgrade('auto1');
        document.getElementById('buyAuto2').onclick = () => buyUpgrade('auto2');
        document.getElementById('buyAuto3').onclick = () => buyUpgrade('auto3');
        document.getElementById('buyCrit').onclick = () => buyUpgrade('crit');
        document.getElementById('prestigeBtn').onclick = prestige;
        document.getElementById('logoutBtn').onclick = () => {
            gameState.user = null;
            localStorage.removeItem('sealFatGame');
            if (passiveInterval) clearInterval(passiveInterval);
            renderUI();
        };
        renderLeaderboard();
    }

    function renderLeaderboard() {
        const container = document.getElementById('leadBoard');
        if (!container) return;
        // локальный лидерборд из всех сохранённых игр (только текущий пользователь? лучше собрать из localStorage разных ников? сложно, сделаем просто топ по текущему пользователю, но добавим "Ваши достижения")
        const total = gameState.user ? gameState.user.totalFish : 0;
        container.innerHTML = `
            <h3>🏆 ЛИЧНАЯ СТАТИСТИКА 🏆</h3>
            <p>⭐ Всего рыбы за всё время: ${Math.floor(total).toLocaleString()}</p>
            <p>🔰 Уровень жира: ${gameState.user ? gameState.user.fatLevel : 0}/5</p>
            <p>💪 Мощь клика: ${getClickPower()}</p>
        `;
    }

    function startPassiveLoop() {
        if (passiveInterval) clearInterval(passiveInterval);
        passiveInterval = setInterval(() => {
            if (gameState.user) {
                addPassiveIncome();
                checkRandomEvent();
                updateFatLevel();
                renderUI();
            }
        }, 1000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ИНИЦИАЛИЗАЦИЯ
    loadGame();
    if (gameState.user) startPassiveLoop();
    renderUI();
</script>
</body>
</html>
