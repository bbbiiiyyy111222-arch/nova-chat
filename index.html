<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌙 Nova Chat | Мессенджер</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2a 100%);
        }

        .app {
            display: flex;
            height: 100vh;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
        }

        .sidebar {
            width: 320px;
            background: rgba(17, 17, 17, 0.9);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(13, 13, 13, 0.8);
        }

        .sidebar-header h2 {
            font-size: 22px;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .user-info-sidebar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            background: rgba(13, 13, 13, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-info-sidebar:hover {
            background: rgba(168,85,247,0.1);
        }

        .user-avatar-sidebar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 0 20px rgba(168,85,247,0.3);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .user-avatar-sidebar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info-sidebar .user-details {
            flex: 1;
        }

        .user-info-sidebar .user-name {
            font-weight: bold;
            font-size: 16px;
        }

        .user-info-sidebar .user-status {
            font-size: 11px;
            color: #4ade80;
        }

        .logout-sidebar {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .logout-sidebar:hover {
            background: rgba(239,68,68,0.2);
            transform: scale(1.1);
        }

        .search-box {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168,85,247,0.3);
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .tab-btn.active {
            color: #a855f7;
            border-bottom: 2px solid #a855f7;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .chat-item:hover {
            background: rgba(168,85,247,0.1);
            transform: translateX(5px);
        }

        .chat-item.active {
            background: rgba(168,85,247,0.15);
            border-left: 3px solid #a855f7;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
            overflow: hidden;
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: bold;
            font-size: 15px;
        }

        .chat-type {
            font-size: 10px;
            color: #a855f7;
            margin-left: 5px;
        }

        .chat-preview {
            font-size: 11px;
            color: #888;
            margin-top: 3px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 10, 10, 0.6);
        }

        .chat-header {
            padding: 15px 25px;
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .chat-header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chat-header-status {
            font-size: 11px;
            color: #888;
            margin-top: 3px;
        }

        .chat-actions {
            display: flex;
            gap: 10px;
        }

        .chat-action-btn {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .chat-action-btn:hover {
            background: #a855f7;
            transform: scale(1.1);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 70%;
            animation: fadeInUp 0.3s ease;
            position: relative;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            overflow: hidden;
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-bubble {
            background: rgba(26, 26, 26, 0.9);
            padding: 10px 16px;
            border-radius: 20px;
            max-width: 100%;
            backdrop-filter: blur(5px);
            position: relative;
        }

        .message-own .message-bubble {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: white;
        }

        .message-user {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #a855f7;
        }

        .message-own .message-user {
            color: #e0a0ff;
        }

        .message-text {
            font-size: 14px;
            word-wrap: break-word;
        }

        .voice-message {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
        }

        .voice-play {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .voice-wave {
            flex: 1;
            height: 30px;
            background: repeating-linear-gradient(90deg, #a855f7, #a855f7 2px, transparent 2px, transparent 6px);
            background-size: 4px 100%;
        }

        .voice-duration {
            font-size: 11px;
            color: #a0a0ff;
            min-width: 40px;
        }

        .message-file {
            margin-top: 5px;
        }

        .file-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 10px;
            text-decoration: none;
            color: #a855f7;
            font-size: 12px;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 5px;
        }

        .message-time {
            font-size: 9px;
            color: #888;
            margin-top: 4px;
            text-align: right;
        }

        .message-delete {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .message:hover .message-delete {
            display: flex;
        }

        .message-input-area {
            padding: 15px 25px;
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .message-input {
            flex: 1;
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 12px 18px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .message-input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168,85,247,0.3);
        }

        .file-input-label {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .file-input-label:hover {
            background: #a855f7;
            transform: scale(1.05);
        }

        .file-input {
            display: none;
        }

        .voice-record-btn {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }

        .voice-record-btn.recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }

        .voice-record-btn .timer {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            white-space: nowrap;
            background: #1a1a2a;
            padding: 2px 6px;
            border-radius: 10px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .send-btn {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            border-radius: 30px;
            padding: 0 28px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            height: 45px;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(168,85,247,0.5);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2a, #0f0f1f);
            border-radius: 30px;
            padding: 35px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(168,85,247,0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: modalFadeIn 0.4s ease;
            max-height: 80vh;
            overflow-y: auto;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .modal-content input:focus, .modal-content textarea:focus, .modal-content select:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168,85,247,0.3);
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            margin-top: 5px;
            transition: all 0.3s;
        }

        .modal-content button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(168,85,247,0.5);
        }

        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #888;
            transition: all 0.3s;
        }

        .close-modal:hover {
            color: #a855f7;
            transform: rotate(90deg);
        }

        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .code-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
        }

        .code-input {
            width: 50px;
            text-align: center;
            font-size: 28px;
            padding: 12px;
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
        }

        .error {
            color: #ef4444;
            text-align: center;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .link-btn {
            background: none !important;
            color: #a855f7 !important;
            margin-top: 10px;
        }

        .link-btn:hover {
            background: none !important;
            text-decoration: underline;
        }

        /* Стили для звонков */
        .call-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            max-width: 90%;
            background: linear-gradient(135deg, #1a1a2a, #0f0f1f);
            border-radius: 20px;
            border: 2px solid #a855f7;
            z-index: 2000;
            display: none;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(168,85,247,0.5);
        }

        .call-header {
            padding: 20px;
            text-align: center;
        }

        #callStatus {
            color: #a855f7;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .call-video-container {
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            min-height: 300px;
        }

        .local-video {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 120px;
            height: 90px;
            border-radius: 10px;
            border: 2px solid #a855f7;
            object-fit: cover;
            background: #000;
            z-index: 10;
        }

        .remote-video {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: #000;
        }

        .call-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .call-control-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            background: #2a2a4a;
            color: white;
        }

        .call-control-btn:hover {
            transform: scale(1.1);
        }

        .end-call {
            background: #ef4444;
            color: white;
        }

        .end-call:hover {
            background: #dc2626;
        }

        .call-control-btn.muted {
            background: #ef4444;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: #a855f7;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 280px;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="app" id="app" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🌙 NOVA CHAT</h2>
            </div>
            <div class="user-info-sidebar" onclick="showProfileModal()">
                <div class="user-avatar-sidebar" id="sidebarAvatar">
                    <div id="sidebarAvatarContent">👤</div>
                    <div class="avatar-overlay">Изменить</div>
                </div>
                <div class="user-details">
                    <div class="user-name" id="sidebarName">milk123</div>
                    <div class="user-status">🟢 Онлайн</div>
                </div>
                <button class="logout-sidebar" onclick="logout()">🚪</button>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск...">
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('chats')">💬 Чаты</button>
                <button class="tab-btn" onclick="switchTab('groups')">👥 Группы</button>
                <button class="tab-btn" onclick="switchTab('channels')">📢 Каналы</button>
            </div>
            <div class="chats-list" id="chatsList"></div>
            <div style="padding: 15px;">
                <button class="send-btn" onclick="showCreateGroupModal()" style="width: 100%;">➕ Создать группу</button>
                <button class="send-btn" onclick="showCreateChannelModal()" style="width: 100%; margin-top: 10px; background: linear-gradient(135deg, #7c3aed, #6d28d9);">📢 Создать канал</button>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-header-avatar" id="chatHeaderAvatar" onclick="showChatInfo()">
                    <span id="chatHeaderAvatarContent">👥</span>
                </div>
                <div class="chat-header-info">
                    <div class="chat-header-name">
                        <span id="chatHeaderName">Общий чат</span>
                        <span id="chatHeaderType" class="chat-type">(группа)</span>
                    </div>
                    <div class="chat-header-status" id="chatHeaderStatus">👥 3 участника</div>
                </div>
                <div class="chat-actions">
                    <button class="chat-action-btn" onclick="showChatInfo()" title="Информация">ℹ️</button>
                    <button class="chat-action-btn" onclick="startAudioCall()" title="Аудиозвонок">🎤</button>
                    <button class="chat-action-btn" onclick="startVideoCall()" title="Видеозвонок">📹</button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="message-input-area">
                <label class="file-input-label">
                    📎
                    <input type="file" id="fileInput" class="file-input" multiple onchange="uploadFiles()">
                </label>
                <button class="voice-record-btn" id="voiceRecordBtn" onclick="toggleVoiceRecording()">🎙️</button>
                <input type="text" class="message-input" id="messageInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">📤</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ВХОДА/РЕГИСТРАЦИИ -->

        // Глобальные переменные

        // ============================================

        function moveToNext(current, nextId) {
            if (current.value.length === 1) {
                document.getElementById(nextId).focus();

        function getCode() {
            return document.getElementById('code1').value +
                   document.getElementById('code2').value +
                   document.getElementById('code3').value +
                   document.getElementById('code4').value +
                   document.getElementById('code5').value +
                   document.getElementById('code6').value;
        }

        function clearCodeInputs() {
            for(let i = 1; i <= 6; i++) {
                document.getElementById(`code${i}`).value = '';
            }
            document.getElementById('code1').focus();
        }

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            if (el) {
                el.innerText = message;
                setTimeout(() => el.innerText = '', 3000);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function saveSession(user) {
            localStorage.setItem('nova_chat_user', JSON.stringify(user));
        }

        function loadSession() {
            const saved = localStorage.getItem('nova_chat_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                return true;
            }
            return false;
        }

        function clearSession() {
            localStorage.removeItem('nova_chat_user');
        }

        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // ============================================
        // РЕГИСТРАЦИЯ И ПОДТВЕРЖДЕНИЕ
        // ============================================
        window.sendVerificationCode = async function() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username || !email || !password) {
                showError('registerError', '❌ Заполните все поля');
                return;
            }
            if (password.length < 4) {
                showError('registerError', '❌ Пароль минимум 4 символа');
                return;
            }

            const { data: existing } = await supabaseClient
                .from('users')
                .select('username')
                .eq('username', username)
                .or(`email.eq.${email}`);

            if (existing && existing.length > 0) {
                showError('registerError', '❌ Пользователь или email уже существуют');
                return;
            }

            const code = Math.floor(100000 + Math.random() * 900000).toString();
            pendingCode = code;
            pendingRegistration = { username, email, password };

            try {
                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                    email: email,
                    code: code
                });
                
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('verifyForm').style.display = 'block';
                clearCodeInputs();
                showError('verifyError', '');
            } catch (error) {
                console.error('EmailJS error:', error);
                showError('registerError', '❌ Ошибка отправки кода. Попробуйте позже.');
            }
        };

        window.verifyCode = async function() {
            const code = getCode();
            if (code.length !== 6) {
                showError('verifyError', '❌ Введите 6-значный код');
                return;
            }
            if (code !== pendingCode) {
                showError('verifyError', '❌ Неверный код');
                return;
            }

            const { data, error } = await supabaseClient
                .from('users')
                .insert([{
                    username: pendingRegistration.username,
                    email: pendingRegistration.email,
                    password: pendingRegistration.password,
                    role: 'user',
                    display_name: pendingRegistration.username,
                    avatar: '👤'
                }])
                .select();

            if (error) {
                showError('verifyError', '❌ Ошибка регистрации');
                return;
            }

            currentUser = data[0];
            saveSession(currentUser);
            
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('sidebarName').innerText = currentUser.display_name || currentUser.username;
            document.getElementById('sidebarAvatarContent').innerText = currentUser.avatar || '👤';
            
            await loadChats();
            await loadMessages();
            startRealtime();
            subscribeToSignals();
        };

        window.resendCode = async function() {
            if (!pendingRegistration) return;
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            pendingCode = code;
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                email: pendingRegistration.email,
                code: code
            });
            alert('📨 Код отправлен повторно');
        };

        // ============================================
        // АВТОРИЗАЦИЯ
        // ============================================
        window.doLogin = async function() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            const { data, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('username', username)
                .eq('password', password);

            if (error || !data || data.length === 0) {
                showError('loginError', '❌ Неверное имя или пароль');
                return;
            }

            currentUser = data[0];
            saveSession(currentUser);
            
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('sidebarName').innerText = currentUser.display_name || currentUser.username;
            document.getElementById('sidebarAvatarContent').innerText = currentUser.avatar || '👤';
            
            await loadChats();
            await loadMessages();
            startRealtime();
            subscribeToSignals();
        };

        window.logout = function() {
            if (realtimeSubscription) {
                realtimeSubscription.unsubscribe();
            }
            clearSession();
            currentUser = null;
            document.getElementById('app').style.display = 'none';
            document.getElementById('authModal').style.display = 'flex';
            window.showLoginForm();
        };

        // ============================================
        // ПРОФИЛЬ
        // ============================================
        window.showProfileModal = function() {
            document.getElementById('profileDisplayName').value = currentUser.display_name || currentUser.username;
            document.getElementById('profileBio').value = currentUser.bio || '';
            document.getElementById('profileModal').style.display = 'flex';
            document.getElementById('profileAvatarPreviewContent').innerText = currentUser.avatar || '👤';
        };

        window.closeProfileModal = function() {
            document.getElementById('profileModal').style.display = 'none';
        };

        window.uploadProfileAvatar = function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('profileAvatarPreviewContent').innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
                    selectedAvatar = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        window.updateProfile = async function() {
            const displayName = document.getElementById('profileDisplayName').value.trim();
            const bio = document.getElementById('profileBio').value.trim();
            
            const { error } = await supabaseClient
                .from('users')
                .update({
                    display_name: displayName || currentUser.username,
                    bio: bio,
                    avatar: selectedAvatar
                })
                .eq('id', currentUser.id);

            if (error) {
                showError('profileError', '❌ Ошибка сохранения');
                return;
            }

            currentUser.display_name = displayName || currentUser.username;
            currentUser.bio = bio;
            currentUser.avatar = selectedAvatar;
            
            document.getElementById('sidebarName').innerText = currentUser.display_name;
            document.getElementById('sidebarAvatarContent').innerHTML = typeof selectedAvatar === 'string' && selectedAvatar.startsWith('data:') ? `<img src="${selectedAvatar}" style="width:100%;height:100%;object-fit:cover;">` : selectedAvatar;
            
            window.closeProfileModal();
            await loadChats();
            alert('✅ Профиль обновлён');
        };

        // ============================================
        // ЗАГРУЗКА ЧАТОВ (ИСПРАВЛЕНО)
        // ============================================
        async function loadChats() {
            // Группы - упрощённый запрос
            const { data: memberships, error: groupsError } = await supabaseClient
                .from('group_members')
                .select('group_id')
                .eq('username', currentUser.username);

            if (groupsError) {
                console.error('Groups error:', groupsError);
            }

            // Получаем данные групп отдельно
            let groupsList = [];
            if (memberships && memberships.length > 0) {
                const groupIds = memberships.map(m => m.group_id);
                const { data: groupsData } = await supabaseClient
                    .from('groups')
                    .select('*')
                    .in('id', groupIds);
                groupsList = groupsData || [];
            }

            // Каналы
            const { data: channelsList } = await supabaseClient
                .from('channel_subscribers')
                .select('channel_id')
                .eq('username', currentUser.username);

            let channelsData = [];
            if (channelsList && channelsList.length > 0) {
                const channelIds = channelsList.map(c => c.channel_id);
                const { data: chData } = await supabaseClient
                    .from('channels')
                    .select('*')
                    .in('id', channelIds);
                channelsData = chData || [];
            }

            // Пользователи для ЛС
            const { data: usersList } = await supabaseClient
                .from('users')
                .select('username, display_name, avatar, status')
                .neq('username', currentUser.username);

            chats = [];
            
            // Добавляем группы
            groupsList.forEach(g => {
                chats.push({
                    id: g.id,
                    type: 'group',
                    name: g.name,
                    avatar: g.avatar || '👥',
                    preview: ''
                });
            });
            
            // Добавляем каналы
            channelsData.forEach(c => {
                chats.push({
                    id: c.id,
                    type: 'channel',
                    name: c.name,
                    avatar: c.avatar || '📢',
                    preview: '',
                    isChannel: true
                });
            });
            
            // Добавляем пользователей
            if (usersList) {
                usersList.forEach(u => {
                    chats.push({
                        id: u.username,
                        type: 'user',
                        name: u.display_name || u.username,
                        avatar: u.avatar || '👤',
                        status: u.status || 'offline',
                        preview: ''
                    });
                });
            }

            renderChats();
        }

        function renderChats() {
            const container = document.getElementById('chatsList');
            let filtered = chats;
            
            if (searchQuery) {
                filtered = chats.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase()));
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #888;">Нет чатов</div>';
                return;
            }
            
            let html = '';
            filtered.forEach(chat => {
                const isActive = (currentChat.type === chat.type && currentChat.id === chat.id);
                const statusIcon = chat.status === 'online' ? '🟢' : '⚫';
                html += `
                    <div class="chat-item ${isActive ? 'active' : ''}" onclick="switchChat('${chat.type}', '${chat.id}', '${chat.name.replace(/'/g, "\\'")}', '${chat.avatar}')">
                        <div class="chat-avatar">${typeof chat.avatar === 'string' && chat.avatar.startsWith('data:') ? `<img src="${chat.avatar}">` : chat.avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${chat.name} ${chat.type === 'user' ? statusIcon : ''} ${chat.type === 'channel' ? '📢' : ''}</div>
                            <div class="chat-preview">${chat.preview || 'Напишите сообщение...'}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadChats();
        };

        window.switchChat = function(type, id, name, avatar) {
            currentChat = { type, id, name, avatar };
            document.getElementById('chatHeaderName').innerText = name;
            document.getElementById('chatHeaderAvatarContent').innerHTML = typeof avatar === 'string' && avatar.startsWith('data:') ? `<img src="${avatar}">` : avatar;
            
            if (type === 'group') {
                document.getElementById('chatHeaderType').innerHTML = '(группа)';
                document.getElementById('chatHeaderStatus').innerHTML = '👥 Группа';
            } else if (type === 'channel') {
                document.getElementById('chatHeaderType').innerHTML = '(канал)';
                document.getElementById('chatHeaderStatus').innerHTML = '📢 Канал';
            } else {
                document.getElementById('chatHeaderType').innerHTML = '(личные)';
                const user = chats.find(c => c.id === id);
                document.getElementById('chatHeaderStatus').innerHTML = user?.status === 'online' ? '🟢 Онлайн' : '⚫ Офлайн';
            }
            loadMessages();
            renderChats();
        };

        // ============================================
        // ЗАГРУЗКА СООБЩЕНИЙ
        // ============================================
        async function loadMessages() {
            const container = document.getElementById('messagesContainer');
            let messages = [];

            if (currentChat.type === 'group') {
                const { data } = await supabaseClient
                    .from('group_messages')
                    .select('*')
                    .eq('group_id', currentChat.id)
                    .order('created_at', { ascending: true });
                messages = data || [];
            } else if (currentChat.type === 'channel') {
                const { data } = await supabaseClient
                    .from('channel_messages')
                    .select('*')
                    .eq('channel_id', currentChat.id)
                    .order('created_at', { ascending: true });
                messages = data || [];
            } else {
                const { data } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .or(`and(from_user.eq.${currentUser.username},to_user.eq.${currentChat.id}),and(from_user.eq.${currentChat.id},to_user.eq.${currentUser.username})`)
                    .order('created_at', { ascending: true });
                messages = data || [];
            }

            const usersMap = {};
            const { data: users } = await supabaseClient.from('users').select('username, avatar, display_name');
            if (users) {
                users.forEach(u => {
                    usersMap[u.username] = { avatar: u.avatar || '👤', display_name: u.display_name || u.username };
                });
            }

            let html = '';
            messages.forEach(msg => {
                const isOwn = msg.from_user === currentUser.username;
                const canDelete = isOwn || currentUser.role === 'admin';
                const avatar = isOwn ? (currentUser.avatar || '👤') : (usersMap[msg.from_user]?.avatar || '👤');
                const displayName = isOwn ? (currentUser.display_name || currentUser.username) : (usersMap[msg.from_user]?.display_name || msg.from_user);
                const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                if (msg.message && msg.message.startsWith('audio:')) {
                    const audioData = msg.message.substring(6);
                    const duration = msg.duration || '0:00';
                    html += `
                        <div class="message ${isOwn ? 'message-own' : ''}">
                            <div class="message-avatar">${typeof avatar === 'string' && avatar.startsWith('data:') ? `<img src="${avatar}">` : avatar}</div>
                            <div class="message-bubble">
                                <div class="message-user">${escapeHtml(displayName)}</div>
                                <div class="voice-message">
                                    <button class="voice-play" onclick="playAudio('${audioData}')">▶️</button>
                                    <div class="voice-wave"></div>
                                    <span class="voice-duration">${duration}</span>
                                </div>
                                <div class="message-time">${time}</div>
                            </div>
                            ${canDelete ? `<button class="message-delete" onclick="deleteMessage('${msg.id}', '${currentChat.type}')">✖</button>` : ''}
                        </div>
                    `;
                } else if (msg.message && msg.message.startsWith('file:')) {
                    const fileData = JSON.parse(msg.message.substring(5));
                    html += `
                        <div class="message ${isOwn ? 'message-own' : ''}">
                            <div class="message-avatar">${typeof avatar === 'string' && avatar.startsWith('data:') ? `<img src="${avatar}">` : avatar}</div>
                            <div class="message-bubble">
                                <div class="message-user">${escapeHtml(displayName)}</div>
                                ${fileData.type.startsWith('image/') ? 
                                    `<img src="${fileData.data}" class="message-image" onclick="viewImage('${fileData.data}')">` :
                                    `<a href="${fileData.data}" download="${fileData.name}" class="file-link">📎 ${fileData.name}</a>`
                                }
                                <div class="message-time">${time}</div>
                            </div>
                            ${canDelete ? `<button class="message-delete" onclick="deleteMessage('${msg.id}', '${currentChat.type}')">✖</button>` : ''}
                        </div>
                    `;

       // ГОЛОСОВЫЕ СООБЩЕНИЯ С ТАЙМЕРОМ (ИСПРАВЛЕНО)
window.toggleVoiceRecording = async function() {
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            recordingStartTime = Date.now();
            
            const voiceBtn = document.getElementById('voiceRecordBtn');
            voiceBtn.classList.add('recording');
            
            let seconds = 0;
            recordingTimer = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                voiceBtn.innerHTML = `⏹️ ${mins}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    audioChunks.push(event.data);
                }
            };
            
            mediaRecorder.onstop = async () => {
                clearInterval(recordingTimer);
                voiceBtn.classList.remove('recording');
                voiceBtn.innerHTML = '🎙️';
                
                if (audioChunks.length === 0) {
                    console.log('Нет данных для отправки');
                    return;
                }
                
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                
                reader.onloadend = async () => {
                    try {
                        const audioDataUrl = reader.result;
                        const duration = Math.floor((Date.now() - recordingStartTime) / 1000);
                        const mins = Math.floor(duration / 60);
                        const secs = duration % 60;
                        const durationStr = `${mins}:${secs.toString().padStart(2, '0')}`;
                        const audioMessage = `audio:${audioDataUrl}`;
                        
                        if (currentChat.type === 'group') {
                            await supabaseClient.from('group_messages').insert([{
                                group_id: currentChat.id,
                                username: currentUser.username,
                                message: audioMessage,
                                duration: durationStr
                            }]);
                        } else if (currentChat.type === 'channel') {
                            const { data: channel } = await supabaseClient
                                .from('channels')
                                .select('owner')
                                .eq('id', currentChat.id)
                                .single();
                            if (channel.owner === currentUser.username) {
                                await supabaseClient.from('channel_messages').insert([{
                                    channel_id: currentChat.id,
                                    username: currentUser.username,
                                    message: audioMessage,
                                    duration: durationStr
                                }]);
                            } else {
                                alert('❌ Только создатель канала может отправлять сообщения');
                            }
                        } else {
                            await supabaseClient.from('messages').insert([{
                                from_user: currentUser.username,
                                to_user: currentChat.id,
                                message: audioMessage,
                                duration: durationStr
                            }]);
                        }
                        loadMessages();
                    } catch (error) {
                        console.error('Ошибка отправки голосового:', error);
                        alert('Ошибка отправки голосового сообщения');
                    }
                };
                
                reader.readAsDataURL(audioBlob);
                stream.getTracks().forEach(track => track.stop());
                audioChunks = [];
            };
            
            mediaRecorder.start(100);
            isRecording = true;
            
            // Автоматическая остановка через 60 секунд
            setTimeout(() => {
                if (isRecording) {
                    stopVoiceRecording();
                }
            }, 60000);
            
        } catch (err) {
            console.error('Ошибка доступа к микрофону:', err);
            alert('Не удалось получить доступ к микрофону. Разрешите доступ в браузере.');
        }
    } else {
        stopVoiceRecording();
    }
};

function stopVoiceRecording() {
    if (mediaRecorder && isRecording && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        isRecording = false;
    }
}

        window.startCall = async function(toUser, callType = 'audio') {
            if (!currentUser) {
                alert('Сначала войдите в аккаунт');
                return;
            }
            
            if (callActive) {
                alert('Уже есть активный звонок');
                return;
            }
            
            try {
                const constraints = callType === 'video' 
                    ? { audio: true, video: { width: 640, height: 480 } }
                    : { audio: true, video: false };
                
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                peerConnection = new RTCPeerConnection(pcConfig);
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        sendSignal(toUser, 'candidate', event.candidate);
                    }
                };
                
                peerConnection.onconnectionstatechange = () => {
                    if (peerConnection.connectionState === 'connected') {
                        document.getElementById('callStatus').innerHTML = '🎙️ В разговоре';
                        callActive = true;
                    }
                    if (peerConnection.connectionState === 'disconnected' || 
                        peerConnection.connectionState === 'failed' ||
                        peerConnection.connectionState === 'closed') {
                        endCall();
                    }
                };
                
                peerConnection.ontrack = (event) => {
                    const remoteVideo = document.getElementById('remoteVideo');
                    if (remoteVideo && event.streams[0]) {
                        remoteVideo.srcObject = event.streams[0];
                        remoteVideo.play().catch(e => console.log(e));
                    }
                };
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                await sendSignal(toUser, 'offer', offer);
                
                currentCall = { toUser, callType };
                showCallModal(true);
                
                await supabaseClient.from('calls').insert([{
                    from_user: currentUser.username,
                    to_user: toUser,
                    status: 'calling',
                    call_type: callType
                }]);
                
            } catch (error) {
                console.error('Ошибка начала звонка:', error);
                alert('Не удалось получить доступ к микрофону/камере');
            }
        };

        async function sendSignal(toUser, type, data) {
            try {
                await supabaseClient.from('signals').insert([{
                    from_user: currentUser.username,
                    to_user: toUser,
                    type: type,
                    data: JSON.stringify(data)
                }]);
            } catch (e) {
                console.error('Ошибка отправки сигнала:', e);
            }
        }

        async function handleSignal(signal) {
            const data = JSON.parse(signal.data);
            
            if (signal.type === 'offer') {
                if (confirm(`📞 Входящий звонок от ${signal.from_user}\nОтветить?`)) {
                    await answerCall(signal.from_user, data);
                } else {
                    await sendSignal(signal.from_user, 'reject', {});
                }
            }
            else if (signal.type === 'answer' && peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
            }
            else if (signal.type === 'candidate' && peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data));
                } catch (e) {
                    console.error('Ошибка добавления кандидата:', e);
                }
            }
            else if (signal.type === 'reject') {
                alert(`❌ ${signal.from_user} отклонил звонок`);
                endCall();
            }
            else if (signal.type === 'end') {
                endCall();
            }
        }

        async function answerCall(fromUser, offer) {
            try {
                const constraints = { audio: true, video: false };
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                peerConnection = new RTCPeerConnection(pcConfig);
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        sendSignal(fromUser, 'candidate', event.candidate);
                    }
                };
                
                peerConnection.onconnectionstatechange = () => {
                    if (peerConnection.connectionState === 'connected') {
                        document.getElementById('callStatus').innerHTML = '🎙️ В разговоре';
                        callActive = true;
                    }
                    if (peerConnection.connectionState === 'disconnected' || 
                        peerConnection.connectionState === 'failed') {
                        endCall();
                    }
                };
                
                peerConnection.ontrack = (event) => {
                    const remoteVideo = document.getElementById('remoteVideo');
                    if (remoteVideo && event.streams[0]) {
                        remoteVideo.srcObject = event.streams[0];
                        remoteVideo.play().catch(e => console.log(e));
                    }
                };
                
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await sendSignal(fromUser, 'answer', answer);
                
                currentCall = { toUser: fromUser };
                showCallModal(true);
                
            } catch (error) {
                console.error('Ошибка ответа на звонок:', error);
            }
        }

            document.getElementById('sidebarAvatarContent').innerText = currentUser.avatar || '👤';
            loadChats();
            loadMessages();
            startRealtime();
            subscribeToSignals();
        }
    </script>
</body>
</html>
