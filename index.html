<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Seal Clicker | Бои + авто-кликер</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1e6b3e;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-card {
            max-width: 1200px;
            width: 100%;
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #1c6948;
            margin-bottom: 20px;
        }
        .auth-panel {
            background: #e9f3ed;
            border-radius: 60px;
            padding: 15px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nick-input, .pass-input {
            flex: 2;
            padding: 10px;
            border-radius: 50px;
            border: 1px solid #ffc896;
            text-align: center;
            font-weight: bold;
        }
        button {
            background: #ffb347;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
            color: white;
        }
        button:active {
            transform: scale(0.97);
        }
        .flex {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .panel {
            background: #f0ecdf;
            border-radius: 40px;
            padding: 15px;
            flex: 1;
        }
        .seal-area {
            text-align: center;
            cursor: pointer;
            margin: 15px 0;
        }
        .seal-emoji {
            font-size: 6rem;
            display: inline-block;
            transition: 0.07s;
        }
        .click-effect {
            transform: scale(0.9);
        }
        .resource {
            background: #2a5c48;
            color: #FFE5B4;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            margin: 15px 0;
        }
        .hp-bar {
            background: #ccc;
            border-radius: 20px;
            height: 20px;
            overflow: hidden;
            margin: 10px 0;
        }
        .hp-fill {
            background: #ff6b6b;
            height: 100%;
            width: 100%;
            transition: width 0.2s;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2b241cee;
            color: #ffeaaf;
            padding: 8px 20px;
            border-radius: 60px;
            animation: fadeOut 2s forwards;
            z-index: 1001;
        }
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 0; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            color: #7e9a7a;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .effect-text {
            font-weight: bold;
            animation: pulse 0.3s;
            margin-top: 8px;
            color: #c7254e;
        }
        @keyframes pulse {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
<div class="game-card" id="app"></div>

<script>
    // ==================== SUPABASE ====================
    const _SUPABASE_URL = 'https://pmvbhhidcojkkpumsxxb.supabase.co';
    const _SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdmJoaGlkY29qa2twdW1zeHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzk3MjcsImV4cCI6MjA5Mjg1NTcyN30.1eKxcaqeClRdAVH8lVcOdYaV0o_PbRzjnM9vBUP15QQ';
    const supabase = window.supabase.createClient(_SUPABASE_URL, _SUPABASE_ANON_KEY);

    let currentUser = null;
    let useEmoji = false;
    let passiveInterval = null;
    let syncInterval = null;
    let anticheatBlockedUntil = 0, clickTimestamps = [];
    let lastEffect = "";
    let boss = { hp: 2000, max_hp: 2000, level: 1 };

    // Звуки (простые, через Web Audio)
    let audioCtx = null;
    function playSound(freq, duration, volume = 0.1) {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.value = volume;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    // Функции работы с базой
    async function loadBoss() {
        const { data } = await supabase.from('global_boss').select('*').eq('id', 1).single();
        if (data) {
            boss = { hp: data.hp, max_hp: data.max_hp, level: data.level };
        }
    }

    async function saveBoss() {
        await supabase.from('global_boss').update({ hp: boss.hp, max_hp: boss.max_hp, level: boss.level }).eq('id', 1);
    }

    async function saveUser() {
        if (!currentUser) return;
        const data = {
            nickname: currentUser.nickname,
            password: currentUser.password,
            fish: currentUser.fish,
            total_fish: currentUser.total_fish,
            click_power: currentUser.click_power,
            auto_power: currentUser.auto_power,
            crit_chance: currentUser.crit_chance,
            attack: currentUser.attack,
            defense: currentUser.defense,
            hp: currentUser.hp,
            max_hp: currentUser.max_hp,
            prestige_bonus: currentUser.prestige_bonus,
            anticheat_disabled: currentUser.anticheat_disabled,
            role: currentUser.role,
            stats: currentUser.stats,
        };
        await supabase.from('users').upsert(data, { onConflict: 'nickname' });
        await supabase.from('leaderboard').upsert({ nickname: currentUser.nickname, total_fish: currentUser.total_fish, wins: currentUser.stats.wins });
    }

    async function loadUser(nick, pass) {
        const { data } = await supabase.from('users').select('*').eq('nickname', nick).maybeSingle();
        if (!data || data.password !== pass) return null;
        return data;
    }

    async function registerUser(nick, pass) {
        const { data: existing } = await supabase.from('users').select('nickname').eq('nickname', nick);
        if (existing && existing.length) { showToast("Ник занят"); return false; }
        const newUser = {
            nickname: nick, password: pass,
            fish: 0, total_fish: 0,
            click_power: 1, auto_power: 0,
            crit_chance: 5, attack: 10, defense: 5,
            hp: 100, max_hp: 100,
            prestige_bonus: 0, anticheat_disabled: false, role: 'player',
            stats: { wins: 0, losses: 0 },
        };
        await supabase.from('users').insert(newUser);
        await supabase.from('leaderboard').insert({ nickname: nick, total_fish: 0, wins: 0 });
        currentUser = newUser;
        currentUser.nickname = nick;
        currentUser.password = pass;
        return true;
    }

    // Игровые механики
    function getClickPower() {
        let base = 1;
        let prestige = currentUser.prestige_bonus || 0;
        return Math.floor(base * (1 + prestige / 100));
    }

    function getAutoPower() {
        return currentUser.auto_power || 0;
    }

    async function clickForFish() {
        if (!currentUser) return;
        if (isBlocked()) { showToast("⛔ Античит: подождите"); return; }
        let gain = getClickPower();
        currentUser.fish += gain;
        currentUser.total_fish += gain;
        await saveUser();
        playSound(800, 0.1);
        const seal = document.getElementById('sealEmoji');
        if (seal) {
            seal.classList.add('click-effect');
            setTimeout(() => seal.classList.remove('click-effect'), 100);
        }
        renderUI();
        showToast(`+${gain} рыбы`);
    }

    function isBlocked() {
        if (currentUser?.anticheat_disabled) return false;
        if (Date.now() < anticheatBlockedUntil) return true;
        const now = Date.now();
        clickTimestamps.push(now);
        while (clickTimestamps.length && clickTimestamps[0] < now - 1000) clickTimestamps.shift();
        if (clickTimestamps.length > 18) {
            anticheatBlockedUntil = now + 8000;
            clickTimestamps = [];
            showToast("⚠️ Слишком быстро! Блокировка 8 сек");
            return true;
        }
        return false;
    }

    async function attackBoss() {
        if (!currentUser) return;
        if (currentUser.hp <= 0) {
            showToast("❌ Вы мертвы! Лечитесь рыбой.");
            return;
        }
        let bossDefense = Math.floor(boss.level * 0.5);
        let playerDamage = Math.max(1, currentUser.attack - bossDefense + Math.floor(Math.random() * 6));
        let isCrit = Math.random() * 100 < currentUser.crit_chance;
        if (isCrit) {
            playerDamage = Math.floor(playerDamage * 1.5);
            lastEffect = "КРИТИЧЕСКИЙ УДАР!";
            playSound(1000, 0.2, 0.15);
        } else {
            lastEffect = `Урон ${playerDamage}`;
            playSound(600, 0.1);
        }
        boss.hp -= playerDamage;
        if (boss.hp <= 0) {
            let reward = 200 * boss.level;
            currentUser.fish += reward;
            currentUser.total_fish += reward;
            currentUser.stats.wins++;
            boss.level++;
            boss.max_hp = Math.floor(2000 + boss.level * 500);
            boss.hp = boss.max_hp;
            await saveBoss();
            await saveUser();
            showToast(`🎉 Босс повержен! +${reward} рыбы, уровень босса ${boss.level}`);
            playSound(300, 0.5, 0.2);
        } else {
            let bossDamage = Math.max(1, Math.floor(boss.level * 10) - currentUser.defense + Math.floor(Math.random() * 10));
            let isBlock = Math.random() * 100 < 15;
            if (isBlock) {
                bossDamage = Math.floor(bossDamage / 2);
                lastEffect += " (БЛОК!)";
                playSound(400, 0.1);
            } else {
                playSound(200, 0.2);
            }
            currentUser.hp -= bossDamage;
            if (currentUser.hp < 0) currentUser.hp = 0;
            if (currentUser.hp <= 0) currentUser.stats.losses++;
            await saveUser();
            showToast(`⚔️ Вы нанесли ${playerDamage}, босс нанёс ${bossDamage} урона. Ваше HP: ${currentUser.hp}/${currentUser.max_hp}`);
        }
        await saveBoss();
        renderUI();
    }

    async function heal() {
        let price = 20 * (Math.floor((currentUser.max_hp - currentUser.hp) / 10) + 1);
        if (currentUser.fish < price) { showToast("❌ Не хватает рыбы"); return; }
        currentUser.fish -= price;
        currentUser.hp = currentUser.max_hp;
        await saveUser();
        showToast("❤️ Здоровье восстановлено!");
        playSound(500, 0.2);
        renderUI();
    }

    async function buyUpgrade(stat, basePrice, increase, name) {
        let level = currentUser[stat];
        let price = basePrice * (level + 1);
        if (currentUser.fish < price) { showToast("❌ Не хватает рыбы"); return; }
        currentUser.fish -= price;
        currentUser[stat] += increase;
        await saveUser();
        showToast(`🎉 ${name} улучшен до ${currentUser[stat]}`);
        playSound(700, 0.1);
        renderUI();
    }

    async function buyClickUpgrade() {
        let price = 30 * (currentUser.click_power + 1);
        if (currentUser.fish < price) { showToast("❌ Не хватает рыбы"); return; }
        currentUser.fish -= price;
        currentUser.click_power++;
        await saveUser();
        showToast(`🐟 Сила клика → ${getClickPower()}`);
        renderUI();
    }

    async function buyAutoUpgrade() {
        let price = 50 * (currentUser.auto_power + 1);
        if (currentUser.fish < price) { showToast("❌ Не хватает рыбы"); return; }
        currentUser.fish -= price;
        currentUser.auto_power++;
        await saveUser();
        showToast(`⚙️ Авто-кликер +${getAutoPower()}/сек`);
        renderUI();
    }

    async function doPrestige() {
        if (currentUser.total_fish < 5000) { showToast("Нужно 5000 рыб"); return; }
        if (confirm("Престиж: сбросить рыбу и улучшения, получить +50% к силе клика и +5 ко всем характеристикам?")) {
            currentUser.prestige_bonus = (currentUser.prestige_bonus || 0) + 50;
            currentUser.fish = 0;
            currentUser.total_fish = 0;
            currentUser.click_power = 1;
            currentUser.auto_power = 0;
            currentUser.crit_chance = 5;
            currentUser.attack = 10 + 5;
            currentUser.defense = 5 + 5;
            currentUser.hp = 100;
            currentUser.max_hp = 100;
            await saveUser();
            showToast("🌟 Престиж выполнен!");
            renderUI();
        }
    }

    // Админ-панель
    async function showAdminModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>👑 Админ-панель</h3>
                <input type="password" id="adminPass" placeholder="Пароль" style="width:100%; padding:8px; margin:10px 0;">
                <button id="adminLoginBtn">Войти</button>
                <div id="adminControls" style="display:none; margin-top:15px;">
                    <input type="text" id="targetNick" placeholder="Ник игрока" style="width:100%; margin-bottom:8px;">
                    <input type="number" id="giveFish" placeholder="Рыба">
                    <button id="giveFishBtn">Выдать рыбу</button><br><br>
                    <button id="resetAnticheatBtn">Сбросить античит для всех</button>
                </div>
                <button style="margin-top:10px;" onclick="this.closest('.modal').remove()">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        const loginBtn = modal.querySelector('#adminLoginBtn');
        loginBtn.onclick = async () => {
            if (modal.querySelector('#adminPass').value === 'seal123') {
                modal.querySelector('#adminControls').style.display = 'block';
                loginBtn.disabled = true;
            } else showToast("Неверный пароль");
        };
        modal.querySelector('#giveFishBtn').onclick = async () => {
            const nick = modal.querySelector('#targetNick').value.trim();
            const amount = parseInt(modal.querySelector('#giveFish').value);
            if (isNaN(amount)) return;
            const { data: target } = await supabase.from('users').select('*').eq('nickname', nick).single();
            if (!target) { showToast("Игрок не найден"); return; }
            target.fish += amount;
            target.total_fish += amount;
            await supabase.from('users').update({ fish: target.fish, total_fish: target.total_fish }).eq('nickname', nick);
            await supabase.from('leaderboard').upsert({ nickname: nick, total_fish: target.total_fish, wins: target.stats.wins });
            showToast(`Выдано ${amount} рыбы игроку ${nick}`);
            if (currentUser.nickname === nick) {
                currentUser.fish = target.fish;
                currentUser.total_fish = target.total_fish;
                renderUI();
            }
        };
        modal.querySelector('#resetAnticheatBtn').onclick = async () => {
            await supabase.from('users').update({ anticheat_disabled: false }).neq('nickname', '');
            showToast("Античит сброшен для всех");
        };
    }

    async function showLeaderboard() {
        const { data } = await supabase.from('leaderboard').select('nickname, total_fish, wins').order('wins', { ascending: false }).limit(20);
        let msg = "🏆 ТОП ПО ПОБЕДАМ 🏆\n";
        data.forEach((p,i) => msg += `${i+1}. ${p.nickname} — побед: ${p.wins}, рыбы: ${p.total_fish}\n`);
        alert(msg);
    }

    async function showPlayers() {
        const { data } = await supabase.from('users').select('nickname, total_fish, role');
        let msg = "👥 ВСЕ ИГРОКИ 👥\n";
        data.forEach(p => msg += `${p.nickname} [${p.role}] — ${p.total_fish} 🐟\n`);
        alert(msg);
    }

    // Регистрация / логин
    async function handleRegister() {
        const nick = document.getElementById('regNick').value.trim();
        const pass = document.getElementById('regPass').value;
        if (!nick || !pass) { showToast("Введите ник и пароль"); return; }
        if (await registerUser(nick, pass)) {
            localStorage.setItem('seal_user', JSON.stringify({ nickname: nick, password: pass }));
            startLoops();
            renderUI();
        }
    }
    async function handleLogin() {
        const nick = document.getElementById('loginNick').value.trim();
        const pass = document.getElementById('loginPass').value;
        if (!nick || !pass) { showToast("Введите ник и пароль"); return; }
        const data = await loadUser(nick, pass);
        if (!data) { showToast("Неверный ник или пароль"); return; }
        currentUser = data;
        localStorage.setItem('seal_user', JSON.stringify({ nickname: nick, password: pass }));
        startLoops();
        renderUI();
    }
    function logout() {
        currentUser = null;
        if (passiveInterval) clearInterval(passiveInterval);
        if (syncInterval) clearInterval(syncInterval);
        localStorage.removeItem('seal_user');
        renderUI();
    }

    function toggleStyle() { useEmoji = !useEmoji; renderUI(); }
    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    // Авто-кликер и синхронизация
    function startPassive() {
        if (passiveInterval) clearInterval(passiveInterval);
        passiveInterval = setInterval(async () => {
            if (currentUser && getAutoPower() > 0) {
                currentUser.fish += getAutoPower();
                currentUser.total_fish += getAutoPower();
                await saveUser();
                renderUI();
            }
        }, 1000);
    }

    function startSync() {
        if (syncInterval) clearInterval(syncInterval);
        syncInterval = setInterval(async () => {
            if (currentUser) {
                const { data } = await supabase.from('users').select('*').eq('nickname', currentUser.nickname).single();
                if (data && (data.fish !== currentUser.fish || data.hp !== currentUser.hp)) {
                    currentUser = data;
                    renderUI();
                    showToast("🔄 Данные обновлены");
                }
                await loadBoss();
                renderUI();
            }
        }, 3000);
    }

    function startLoops() {
        startPassive();
        startSync();
    }

    // Рендер
    function renderUI() {
        const root = document.getElementById('app');
        if (!currentUser) {
            root.innerHTML = `
                <h1>🐟 SEAL CLICKER</h1>
                <div class="auth-panel">
                    <input id="regNick" class="nick-input" placeholder="Ник">
                    <input id="regPass" class="pass-input" type="password" placeholder="Пароль">
                    <button id="regBtn">Регистр</button>
                </div>
                <div class="auth-panel">
                    <input id="loginNick" class="nick-input" placeholder="Ник">
                    <input id="loginPass" class="pass-input" type="password" placeholder="Пароль">
                    <button id="loginBtn">Войти</button>
                </div>
                <button id="leaderBtn" style="width:100%; margin-bottom:10px;">🏆 Топ</button>
                <button id="playersBtn" style="width:100%; margin-bottom:10px;">👥 Игроки</button>
                <button id="styleBtn" style="width:100%;">🎨 Стиль</button>
                <footer>Уникальный ник+пароль. Данные в облаке.</footer>
            `;
            document.getElementById('regBtn').onclick = handleRegister;
            document.getElementById('loginBtn').onclick = handleLogin;
            document.getElementById('leaderBtn').onclick = showLeaderboard;
            document.getElementById('playersBtn').onclick = showPlayers;
            document.getElementById('styleBtn').onclick = toggleStyle;
            return;
        }

        const s = (e, t) => useEmoji ? e : t;
        const fish = Math.floor(currentUser.fish);
        const total = Math.floor(currentUser.total_fish);
        const clickPower = getClickPower();
        const autoPower = getAutoPower();
        const prestigeBonus = currentUser.prestige_bonus || 0;
        const playerHpPercent = (currentUser.hp / currentUser.max_hp) * 100;
        const bossHpPercent = (boss.hp / boss.max_hp) * 100;

        root.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div>${s('🦭','[ТЮЛЕНЬ]')} ${currentUser.nickname} <span style="background:#ffb347; padding:2px 8px; border-radius:20px;">${currentUser.role}</span></div>
                <div>⭐ +${prestigeBonus}%</div>
                <button id="logoutBtn">Выйти</button>
            </div>
            <div class="seal-area" id="clickZone">
                <div class="seal-emoji" id="sealEmoji">${s('🦭','[ТЮЛЕНЬ]')}</div>
                <div>${s('👆 клик – +рыба', '[КЛИК]')}</div>
            </div>
            <div class="resource">${s('🐟','[РЫБА]')} ${fish} | Всего: ${total}</div>
            <div class="flex">
                <div class="panel">❤️ HP: ${currentUser.hp}/${currentUser.max_hp}</div>
                <div class="panel">⚔️ Атака: ${currentUser.attack}</div>
                <div class="panel">🛡️ Защита: ${currentUser.defense}</div>
                <div class="panel">💥 Крит: ${currentUser.crit_chance}%</div>
                <div class="panel">💪 Сила клика: +${clickPower}</div>
                <div class="panel">⚙️ Авто: +${autoPower}/сек</div>
            </div>
            <div class="panel" style="text-align:center;">
                <h3>${s('👾','[БОСС]')} Ур.${boss.level} (HP: ${boss.hp}/${boss.max_hp})</h3>
                <div class="hp-bar"><div class="hp-fill" style="width:${bossHpPercent}%"></div></div>
                <button id="attackBtn">⚔️ БОЙ</button>
                <div class="effect-text">${lastEffect}</div>
            </div>
            <div class="flex">
                <button id="healBtn">❤️ Лечиться</button>
                <button id="upgradeClickBtn">🐟 Сила клика (${30*(currentUser.click_power+1)} 🐟)</button>
                <button id="upgradeAutoBtn">⚙️ Авто-кликер (${50*(currentUser.auto_power+1)} 🐟)</button>
                <button id="upgradeAttackBtn">⚔️ +Атака (${20*(currentUser.attack+1)} 🐟)</button>
                <button id="upgradeDefenseBtn">🛡️ +Защита (${20*(currentUser.defense+1)} 🐟)</button>
                <button id="upgradeCritBtn">💥 +Крит (${30*(currentUser.crit_chance+1)} 🐟)</button>
                <button id="prestigeBtn">🏅 Престиж</button>
                <button id="adminBtn">👑 Админ</button>
                <button id="leaderBtn">🏆 Топ</button>
                <button id="playersBtn">👥 Игроки</button>
                <button id="styleBtn">${useEmoji ? '📄 Текст' : '😀 Смайлы'}</button>
            </div>
            <footer>Авто-кликер работает каждую секунду. Админ-пароль: seal123</footer>
        `;

        document.getElementById('clickZone').onclick = clickForFish;
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('attackBtn').onclick = attackBoss;
        document.getElementById('healBtn').onclick = heal;
        document.getElementById('upgradeClickBtn').onclick = buyClickUpgrade;
        document.getElementById('upgradeAutoBtn').onclick = buyAutoUpgrade;
        document.getElementById('upgradeAttackBtn').onclick = () => buyUpgrade('attack', 20, 1, 'Атака');
        document.getElementById('upgradeDefenseBtn').onclick = () => buyUpgrade('defense', 20, 1, 'Защита');
        document.getElementById('upgradeCritBtn').onclick = () => buyUpgrade('crit_chance', 30, 5, 'Крит');
        document.getElementById('prestigeBtn').onclick = doPrestige;
        document.getElementById('adminBtn').onclick = showAdminModal;
        document.getElementById('leaderBtn').onclick = showLeaderboard;
        document.getElementById('playersBtn').onclick = showPlayers;
        document.getElementById('styleBtn').onclick = toggleStyle;
    }

    // Инициализация
    (async () => {
        await loadBoss();
        const saved = localStorage.getItem('seal_user');
        if (saved) {
            const { nickname, password } = JSON.parse(saved);
            const user = await loadUser(nickname, password);
            if (user) {
                currentUser = user;
                startLoops();
            }
        }
        renderUI();
    })();
</script>
</body>
</html>
