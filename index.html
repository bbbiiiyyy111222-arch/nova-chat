<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🦭 Тюлень-лакомка | Корми и толстей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #3b8db0, #146b8a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Neue', system-ui, sans-serif;
            padding: 20px;
        }

        /* карточка игры */
        .game-container {
            max-width: 550px;
            width: 100%;
            background: #fffef5;
            border-radius: 80px;
            padding: 25px 20px 35px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            text-align: center;
            transition: 0.2s;
        }

        h1 {
            font-size: 1.9rem;
            color: #155f7c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 5px;
        }

        .nick-bar {
            background: #e7f4f0;
            border-radius: 60px;
            padding: 10px 18px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nick-name {
            font-weight: bold;
            background: white;
            padding: 6px 18px;
            border-radius: 50px;
            color: #146b8a;
        }

        button {
            background: #ffb67e;
            border: none;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.1s;
            box-shadow: 0 2px 0 #b4622a;
            color: #2d3e48;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        /* зона тюленя */
        .seal-area {
            background: #e0f0ea;
            border-radius: 70px;
            padding: 20px 15px;
            margin: 20px 0;
            transition: all 0.2s;
        }

        .seal-photo {
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
            transition: transform 0.2s ease;
        }

        .seal-photo img {
            width: 100%;
            border-radius: 60px;
            box-shadow: 0 12px 20px rgba(0,0,0,0.2);
            background: #cbe3db;
        }

        /* анимация тюленя при клике */
        .shake {
            animation: bounce 0.2s ease;
        }

        @keyframes bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .stage-text {
            margin-top: 12px;
            font-weight: bold;
            color: #376e5f;
            background: #fff0da;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        /* рыбка-кнопка */
        .fish-btn {
            background: #f7b05e;
            border: none;
            border-radius: 120px;
            padding: 18px 25px;
            margin: 15px auto;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 18px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #2a4b3e;
            box-shadow: 0 8px 0 #a25d29;
            transition: 0.05s linear;
        }

        .fish-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #a25d29;
        }

        .counter {
            font-size: 2rem;
            font-weight: bold;
            background: #2e5f6e;
            display: inline-block;
            padding: 8px 35px;
            border-radius: 70px;
            color: #ffe1b3;
            margin: 12px 0;
        }

        .fullness-bar {
            background: #cfd9d4;
            border-radius: 30px;
            height: 20px;
            width: 100%;
            overflow: hidden;
            margin: 15px 0;
        }

        .fullness-fill {
            background: #f3a683;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
            border-radius: 30px;
        }

        .reset-btn {
            background: #bda48b;
            color: white;
            box-shadow: none;
            margin-top: 8px;
        }

        footer {
            font-size: 0.65rem;
            color: #7e9aa8;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot">
    <!-- сюда будем рендерить -->
</div>

<script>
    // ------------------------------------------------------------------
    //  ФОТО ТЮЛЕНЯ (3 стадии) – прямые ссылки на реальные фото (бесплатные)
    // ------------------------------------------------------------------
    const SEAL_IMAGES = [
        "https://images.pexels.com/photos/7770591/pexels-photo-7770591.jpeg?auto=compress&cs=tinysrgb&w=300&h=300&fit=crop", // стройный
        "https://images.pexels.com/photos/40747/sea-lion-animal-mammal-marine-40747.jpeg?auto=compress&cs=tinysrgb&w=300&h=300&fit=crop", // средний
        "https://images.pexels.com/photos/8102731/pexels-photo-8102731.jpeg?auto=compress&cs=tinysrgb&w=300&h=300&fit=crop"  // толстый
    ];
    // подписи стадий
    const STAGE_NAMES = [
        "🧸 Поджарый тюлень",
        "🍔 Немного в теле",
        "🛋️ Настоящий бочонок"
    ];
    // пороги для смены стадии (количество съеденной рыбы)
    const STAGE_THRESHOLDS = [0, 10, 30, 70];  // 0-9, 10-29, 30-69, 70+

    // ---------- работа с localStorage ----------
    let allUsers = [];       // [{ nickname, totalFish }]
    let currentUser = null;  // { nickname, totalFish }

    // загрузить базу пользователей
    function loadUsersFromStorage() {
        const stored = localStorage.getItem("fatseal_users");
        if (stored) {
            allUsers = JSON.parse(stored);
        } else {
            allUsers = [];
        }
    }

    function saveUsersToStorage() {
        localStorage.setItem("fatseal_users", JSON.stringify(allUsers));
    }

    function saveCurrentUser() {
        if (currentUser) {
            localStorage.setItem("fatseal_current", currentUser.nickname);
            // обновляем данные в allUsers
            const index = allUsers.findIndex(u => u.nickname === currentUser.nickname);
            if (index !== -1) {
                allUsers[index].totalFish = currentUser.totalFish;
            } else {
                allUsers.push({ nickname: currentUser.nickname, totalFish: currentUser.totalFish });
            }
            saveUsersToStorage();
        } else {
            localStorage.removeItem("fatseal_current");
        }
    }

    function loadCurrentUserFromStorage() {
        const savedNick = localStorage.getItem("fatseal_current");
        if (savedNick) {
            const userData = allUsers.find(u => u.nickname === savedNick);
            if (userData) {
                currentUser = { nickname: userData.nickname, totalFish: userData.totalFish };
                return true;
            }
        }
        return false;
    }

    // получить стадию по количеству рыбы
    function getStage(fishCount) {
        if (fishCount >= 70) return 2;
        if (fishCount >= 30) return 1;
        return 0;
    }

    // обновить отображение игры
    function renderGame() {
        const root = document.getElementById("gameRoot");
        if (!currentUser) {
            // экран входа / регистрации
            root.innerHTML = `
                <h1>🦭 ТЮЛЕНЬ-ЛАКОМКА 🐟</h1>
                <div style="margin: 20px 0; font-size:0.95rem; color:#2a6b5e;">Корми тюленя рыбкой → он толстеет</div>
                <div class="nick-bar" style="justify-content: center; gap: 12px; flex-wrap: wrap;">
                    <input type="text" id="loginNick" placeholder="ТВОЙ НИКНЕЙМ" maxlength="18" style="padding: 10px 15px; border-radius: 50px; border: 1px solid #ffc896; background: #fff7e8; text-align: center; font-weight: bold;">
                    <button id="enterBtn">🚀 ВОЙТИ / ЗАРЕГИСТРИРОВАТЬ</button>
                </div>
                <div id="loginError" style="color:#c25a2c; font-size:0.8rem; margin: 10px;"></div>
                <footer>Ник сохранится. Твой тюлень будет помнить, сколько съел.</footer>
            `;
            document.getElementById("enterBtn").onclick = () => {
                const nick = document.getElementById("loginNick").value.trim();
                const errDiv = document.getElementById("loginError");
                if (!nick) { errDiv.innerText = "❌ Введи ник!"; return; }
                // проверим, есть ли пользователь
                let existing = allUsers.find(u => u.nickname === nick);
                if (existing) {
                    currentUser = { nickname: existing.nickname, totalFish: existing.totalFish };
                } else {
                    currentUser = { nickname: nick, totalFish: 0 };
                }
                saveCurrentUser();
                renderGame();
            };
            return;
        }

        // ----- ИГРОВОЙ ЭКРАН -----
        const fishCount = currentUser.totalFish;
        const stageIndex = getStage(fishCount);
        const photoUrl = SEAL_IMAGES[stageIndex];
        const stageTitle = STAGE_NAMES[stageIndex];
        // максимальная рыба для шкалы (условно 100, но можно и больше)
        const maxForBar = 100;
        const fullnessPercent = Math.min(100, (fishCount / maxForBar) * 100);
        const nextStageFish = (stageIndex === 0 ? 10 : stageIndex === 1 ? 30 : 70);
        const fishToNext = fishCount >= 70 ? 0 : (nextStageFish - fishCount);

        root.innerHTML = `
            <h1>🐟 КОРМИ ТЮЛЕНЯ 🦭</h1>
            <div class="nick-bar">
                <span class="nick-name">🐚 ${escapeHtml(currentUser.nickname)}</span>
                <button id="logoutBtn">🚪 Сменить никель</button>
            </div>
            <div class="seal-area">
                <div class="seal-photo" id="sealImgWrap">
                    <img src="${photoUrl}" alt="тюлень" id="sealImg">
                </div>
                <div class="stage-text">${stageTitle}</div>
            </div>
            <div class="counter">
                🐟 ${fishCount} рыб
            </div>
            <div class="fullness-bar">
                <div class="fullness-fill" style="width: ${fullnessPercent}%;"></div>
            </div>
            ${fishToNext > 0 ? `<div style="font-size:0.75rem; margin-top:-5px;">🍥 до следующей стадии: ${fishToNext} рыб</div>` : '<div style="font-size:0.75rem;">🏆 МАКСИМУМ! Тюлень лопается от счастья</div>'}
            <button class="fish-btn" id="feedBtn">
                🐟🐟🐟 НАКОРМИТЬ! 🐟🐟🐟
            </button>
            <button class="reset-btn" id="resetWeightBtn">🏊‍♂️ ПОПЛАВАТЬ (сбросить вес)</button>
            <footer>Кликай по рыбке. Тюлень толстеет на глазах!</footer>
        `;

        // Анимация клика + кормление
        const feedBtn = document.getElementById("feedBtn");
        const sealImg = document.getElementById("sealImg");
        const sealWrap = document.getElementById("sealImgWrap");

        feedBtn.onclick = () => {
            // добавляем рыбу
            currentUser.totalFish += 1;
            saveCurrentUser();
            // анимация тюленя
            if (sealWrap) {
                sealWrap.classList.add("shake");
                setTimeout(() => sealWrap.classList.remove("shake"), 200);
            }
            renderGame();  // обновляем UI
        };

        document.getElementById("resetWeightBtn").onclick = () => {
            if (confirm("Тюлень поплывёт сжигать жир? Вес обнулится, но ник останется.")) {
                currentUser.totalFish = 0;
                saveCurrentUser();
                renderGame();
            }
        };

        document.getElementById("logoutBtn").onclick = () => {
            currentUser = null;
            saveCurrentUser();
            renderGame();
        };
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ИНИЦИАЛИЗАЦИЯ
    loadUsersFromStorage();
    const logged = loadCurrentUserFromStorage();
    if (!logged) {
        currentUser = null;
    }
    renderGame();
</script>
</body>
</html>
