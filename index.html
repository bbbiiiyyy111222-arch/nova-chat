<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тюлений кликер | Стабильно</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1e6b3e;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-card {
            max-width: 1000px;
            width: 100%;
            background: #fffef5;
            border-radius: 60px;
            padding: 25px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #1c6948;
            margin-bottom: 20px;
        }
        .nick-panel {
            background: #e9f3ed;
            border-radius: 60px;
            padding: 15px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nick-input, .pass-input {
            flex: 2;
            padding: 10px;
            border-radius: 50px;
            border: 1px solid #ffc896;
            text-align: center;
            font-weight: bold;
            background: #fffcf5;
        }
        button {
            background: #ffb347;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
            color: white;
        }
        button:active {
            transform: scale(0.97);
        }
        .seal-area {
            text-align: center;
            cursor: pointer;
            margin: 20px 0;
        }
        .seal-emoji {
            font-size: 7rem;
            display: inline-block;
            transition: 0.07s;
        }
        .click-effect {
            transform: scale(0.9);
        }
        .fish-counter {
            background: #2a5c48;
            color: #FFE5B4;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            margin: 15px 0;
        }
        .stat-grid {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .stat {
            background: #e3f0ea;
            flex: 1;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            color: #1c6948;
        }
        .upgrade {
            background: #faefe2;
            border-radius: 50px;
            padding: 10px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .action-buttons button {
            flex: 1;
            font-size: 0.8rem;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2b241cee;
            color: #ffeaaf;
            padding: 8px 20px;
            border-radius: 60px;
            animation: fadeOut 2s forwards;
            z-index: 1001;
        }
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 0; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            color: #7e9a7a;
        }
        .role-badge {
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            background: #a0c4ff;
        }
    </style>
</head>
<body>
<div class="game-card" id="app"></div>

<script>
    // Единственное глобальное объявление Supabase
    const SUPABASE_URL = 'https://pmvbhhidcojkkpumsxxb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdmJoaGlkY29qa2twdW1zeHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzk3MjcsImV4cCI6MjA5Mjg1NTcyN30.1eKxcaqeClRdAVH8lVcOdYaV0o_PbRzjnM9vBUP15QQ';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Состояние
    let currentUser = null;
    let useEmoji = false;   // false = текст, true = смайлы
    let passiveInterval = null;
    let syncInterval = null;

    // Вспомогательные функции
    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    async function saveUserToDB() {
        if (!currentUser) return;
        const data = {
            nickname: currentUser.nickname,
            password: currentUser.password,
            fish: currentUser.fish,
            total_fish: currentUser.total_fish,
            click_power_level: currentUser.click_power_level,
            auto_level: currentUser.auto_level,
            crit_level: currentUser.crit_level,
            prestige_bonus: currentUser.prestige_bonus,
            anticheat_disabled: currentUser.anticheat_disabled,
            role: currentUser.role,
            stats: currentUser.stats,
            achievements: currentUser.achievements,
        };
        await supabase.from('users').upsert(data, { onConflict: 'nickname' });
        await supabase.from('leaderboard').upsert({ nickname: currentUser.nickname, total_fish: currentUser.total_fish });
    }

    async function loadUserFromDB(nick, pass) {
        const { data, error } = await supabase.from('users').select('*').eq('nickname', nick).maybeSingle();
        if (error || !data || data.password !== pass) return null;
        return data;
    }

    async function register(nick, pass) {
        const { data: existing } = await supabase.from('users').select('nickname').eq('nickname', nick);
        if (existing && existing.length) { showToast("Ник уже занят"); return false; }
        const newUser = {
            nickname: nick, password: pass,
            fish: 0, total_fish: 0,
            click_power_level: 0, auto_level: 0, crit_level: 0,
            prestige_bonus: 0, anticheat_disabled: false, role: 'player',
            stats: { totalClicks: 0, prestigeCount: 0 },
            achievements: {},
        };
        const { error } = await supabase.from('users').insert(newUser);
        if (error) { showToast("Ошибка регистрации"); return false; }
        await supabase.from('leaderboard').insert({ nickname: nick, total_fish: 0 });
        currentUser = newUser;
        currentUser.nickname = nick;
        currentUser.password = pass;
        return true;
    }

    // Игровые формулы
    function getClickPower() {
        let base = 1 + (currentUser.click_power_level || 0) * 2;
        let prestige = currentUser.prestige_bonus || 0;
        return Math.floor(base * (1 + prestige / 100));
    }
    function getPassiveIncome() {
        return (currentUser.auto_level || 0) * 1;
    }
    function getCritChance() {
        return Math.min(70, (currentUser.crit_level || 0) * 5);
    }

    async function addFish(amount, fromClick = false) {
        if (!currentUser) return;
        currentUser.fish += amount;
        currentUser.total_fish += amount;
        if (fromClick) currentUser.stats.totalClicks += 1;
        await saveUserToDB();
        renderUI(); // обновляем интерфейс мгновенно
    }

    async function buyUpgrade(upgradeId, basePrice, name) {
        let level = currentUser[upgradeId] || 0;
        let price = basePrice * (level + 1);
        if (currentUser.fish < price) { showToast("❌ Не хватает рыбы!"); return; }
        currentUser.fish -= price;
        currentUser[upgradeId] = level + 1;
        await saveUserToDB();
        renderUI();
        showToast(`🎉 ${name} → уровень ${currentUser[upgradeId]}`);
    }

    async function doPrestige() {
        if (currentUser.total_fish < 5000) { showToast("Нужно 5000 общей рыбы"); return; }
        if (confirm("Сбросить прогресс и получить +50% к силе клика?")) {
            currentUser.prestige_bonus = (currentUser.prestige_bonus || 0) + 50;
            currentUser.fish = 0;
            currentUser.total_fish = 0;
            currentUser.click_power_level = 0;
            currentUser.auto_level = 0;
            currentUser.crit_level = 0;
            currentUser.stats.prestigeCount += 1;
            await saveUserToDB();
            renderUI();
            showToast("🌟 Престиж! +50% к силе клика");
        }
    }

    // Админ-панель (выдача рыбы)
    async function adminGiveFish() {
        const pass = prompt("Пароль администратора:");
        if (pass !== 'seal123') { showToast("Неверный пароль"); return; }
        const nick = prompt("Ник игрока:");
        if (!nick) return;
        const amount = parseInt(prompt("Количество рыбы:"));
        if (isNaN(amount)) return;
        const { data: target, error } = await supabase.from('users').select('*').eq('nickname', nick).single();
        if (error || !target) { showToast("Игрок не найден"); return; }
        target.fish += amount;
        target.total_fish += amount;
        await supabase.from('users').update({ fish: target.fish, total_fish: target.total_fish }).eq('nickname', nick);
        await supabase.from('leaderboard').upsert({ nickname: nick, total_fish: target.total_fish });
        showToast(`Выдано ${amount} рыбы игроку ${nick}`);
        if (currentUser && currentUser.nickname === nick) {
            currentUser.fish = target.fish;
            currentUser.total_fish = target.total_fish;
            renderUI();
        }
    }

    // Лидерборд и список игроков
    async function showLeaderboard() {
        const { data } = await supabase.from('leaderboard').select('nickname, total_fish').order('total_fish', { ascending: false }).limit(20);
        let msg = "🏆 ГЛОБАЛЬНЫЙ ТОП 🏆\n";
        data.forEach((u, i) => msg += `${i+1}. ${u.nickname} — ${u.total_fish} 🐟\n`);
        alert(msg);
    }
    async function showPlayers() {
        const { data } = await supabase.from('users').select('nickname, total_fish, role');
        let msg = "👥 ВСЕ ИГРОКИ 👥\n";
        data.forEach(p => msg += `${p.nickname} [${p.role}] — ${p.total_fish} 🐟\n`);
        alert(msg);
    }

    // Регистрация / логин / выход
    async function handleRegister() {
        const nick = document.getElementById('regNick').value.trim();
        const pass = document.getElementById('regPass').value;
        if (!nick || !pass) { showToast("Введите ник и пароль"); return; }
        const ok = await register(nick, pass);
        if (ok) {
            localStorage.setItem('seal_user', JSON.stringify({ nickname: nick, password: pass }));
            startGameLoops();
            renderUI();
        }
    }
    async function handleLogin() {
        const nick = document.getElementById('loginNick').value.trim();
        const pass = document.getElementById('loginPass').value;
        if (!nick || !pass) { showToast("Введите ник и пароль"); return; }
        const data = await loadUserFromDB(nick, pass);
        if (!data) { showToast("Неверный ник или пароль"); return; }
        currentUser = data;
        localStorage.setItem('seal_user', JSON.stringify({ nickname: nick, password: pass }));
        startGameLoops();
        renderUI();
    }
    function logout() {
        currentUser = null;
        if (passiveInterval) clearInterval(passiveInterval);
        if (syncInterval) clearInterval(syncInterval);
        localStorage.removeItem('seal_user');
        renderUI();
    }

    // Переключение стиля
    function toggleStyle() {
        useEmoji = !useEmoji;
        renderUI();
    }

    // Рендер UI
    function renderUI() {
        const root = document.getElementById('app');
        if (!currentUser) {
            root.innerHTML = `
                <h1>🐟 Тюлений кликер</h1>
                <div class="nick-panel">
                    <input type="text" id="regNick" class="nick-input" placeholder="Ник" maxlength="20">
                    <input type="password" id="regPass" class="pass-input" placeholder="Пароль">
                    <button id="registerBtn">ЗАРЕГИСТРИРОВАТЬСЯ</button>
                </div>
                <div class="nick-panel">
                    <input type="text" id="loginNick" class="nick-input" placeholder="Ник">
                    <input type="password" id="loginPass" class="pass-input" placeholder="Пароль">
                    <button id="loginBtn">ВОЙТИ</button>
                </div>
                <div class="action-buttons">
                    <button id="leaderboardBtn">🏆 Топ</button>
                    <button id="playersBtn">👥 Игроки</button>
                </div>
                <footer>Создайте аккаунт или войдите</footer>
            `;
            document.getElementById('registerBtn').onclick = handleRegister;
            document.getElementById('loginBtn').onclick = handleLogin;
            document.getElementById('leaderboardBtn').onclick = showLeaderboard;
            document.getElementById('playersBtn').onclick = showPlayers;
            return;
        }

        const s = (emoji, text) => useEmoji ? emoji : text;
        const fish = Math.floor(currentUser.fish);
        const total = Math.floor(currentUser.total_fish);
        const clickPower = getClickPower();
        const passive = getPassiveIncome();
        const critChance = getCritChance();
        const prestigeBonus = currentUser.prestige_bonus || 0;

        root.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
                <div>${s('🦭', '[ТЮЛЕНЬ]')} ${currentUser.nickname} <span class="role-badge">${currentUser.role}</span></div>
                <div>⭐ Престиж +${prestigeBonus}%</div>
                <button id="logoutBtn">Выйти</button>
            </div>
            <div class="seal-area" id="clickZone">
                <div class="seal-emoji" id="sealEmoji">${s('🦭', '[ТЮЛЕНЬ]')}</div>
                <div>${s('👆 нажми на тюленя', '[КЛИК]')}</div>
            </div>
            <div class="fish-counter">${s('🐟', '[РЫБА]')} ${fish.toLocaleString()}</div>
            <div class="stat-grid">
                <div class="stat">💪 Сила: +${clickPower}</div>
                <div class="stat">⏱ Пассив: +${passive}/сек</div>
                <div class="stat">💥 Крит: ${critChance}%</div>
            </div>
            <div class="stat-grid">
                <div class="stat">🏆 Всего: ${total.toLocaleString()}</div>
                <div class="stat">🖱 Кликов: ${currentUser.stats.totalClicks}</div>
            </div>
            <div class="upgrade">
                <div>🐟 Сила клика (ур.${currentUser.click_power_level})</div>
                <button id="buyClickBtn">${20 * (currentUser.click_power_level + 1)} 🐟</button>
            </div>
            <div class="upgrade">
                <div>⏱ Автокликер (ур.${currentUser.auto_level})</div>
                <button id="buyAutoBtn">${25 * (currentUser.auto_level + 1)} 🐟</button>
            </div>
            <div class="upgrade">
                <div>⚡ Крит-удар (ур.${currentUser.crit_level})</div>
                <button id="buyCritBtn">${80 * (currentUser.crit_level + 1)} 🐟</button>
            </div>
            <div class="action-buttons">
                <button id="prestigeBtn">🏅 Престиж</button>
                <button id="adminBtn">👑 Админ</button>
                <button id="leaderboardBtn">🏆 Топ</button>
                <button id="playersBtn">👥 Игроки</button>
                <button id="styleBtn">${useEmoji ? '📄 Текст' : '😀 Смайлы'}</button>
            </div>
            <footer>Автосохранение, синхронизация каждые 3 сек</footer>
        `;

        // Привязываем обработчики (все через addEventListener, избегая глобальных onclick)
        document.getElementById('clickZone').onclick = async () => {
            let gain = getClickPower();
            if (Math.random() * 100 < getCritChance()) gain *= 2;
            await addFish(gain, true);
            const seal = document.getElementById('sealEmoji');
            if (seal) {
                seal.classList.add('click-effect');
                setTimeout(() => seal.classList.remove('click-effect'), 100);
            }
        };
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('buyClickBtn').onclick = () => buyUpgrade('click_power_level', 20, 'Сила клика');
        document.getElementById('buyAutoBtn').onclick = () => buyUpgrade('auto_level', 25, 'Автокликер');
        document.getElementById('buyCritBtn').onclick = () => buyUpgrade('crit_level', 80, 'Крит-удар');
        document.getElementById('prestigeBtn').onclick = doPrestige;
        document.getElementById('adminBtn').onclick = adminGiveFish;
        document.getElementById('leaderboardBtn').onclick = showLeaderboard;
        document.getElementById('playersBtn').onclick = showPlayers;
        document.getElementById('styleBtn').onclick = toggleStyle;
    }

    // Фоновые циклы: пассивный доход и синхронизация
    async function startGameLoops() {
        if (passiveInterval) clearInterval(passiveInterval);
        if (syncInterval) clearInterval(syncInterval);
        passiveInterval = setInterval(async () => {
            if (currentUser) {
                let inc = getPassiveIncome();
                if (inc > 0) await addFish(inc, false);
            }
        }, 1000);
        syncInterval = setInterval(async () => {
            if (currentUser) {
                const { data } = await supabase.from('users').select('*').eq('nickname', currentUser.nickname).single();
                if (data && (data.fish !== currentUser.fish || data.total_fish !== currentUser.total_fish)) {
                    currentUser = data;
                    renderUI();
                    showToast("🔄 Данные обновлены");
                }
            }
        }, 3000);
    }

    // Инициализация сессии
    (async () => {
        const saved = localStorage.getItem('seal_user');
        if (saved) {
            const { nickname, password } = JSON.parse(saved);
            const data = await loadUserFromDB(nickname, password);
            if (data) {
                currentUser = data;
                startGameLoops();
            }
        }
        renderUI();
    })();
</script>
</body>
</html>
