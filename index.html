<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🦭 ЛЁГКИЙ ТЕСТ НА ТЮЛЕНЯ | 1 минута проверки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #59b8d4, #1c6d8f);
            font-family: 'Segoe UI', 'Comic Neue', system-ui, sans-serif;
            min-height: 100vh;
            padding: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: #fffef7;
            border-radius: 70px;
            padding: 25px 28px 35px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            transition: 0.2s;
        }

        h1 {
            font-size: 2rem;
            text-align: center;
            color: #1e5a7a;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 5px;
        }

        .sub {
            text-align: center;
            color: #4f7f9c;
            border-bottom: 2px dashed #ffb882;
            display: inline-block;
            width: auto;
            margin: 0 auto 20px auto;
            padding-bottom: 6px;
            font-size: 0.95rem;
        }

        .nick-area {
            text-align: center;
            margin-bottom: 15px;
        }

        input {
            width: 80%;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 60px;
            border: 1px solid #ffca9a;
            background: #fff6ea;
            text-align: center;
            font-weight: bold;
            outline: none;
        }

        button {
            background: #f3a683;
            border: none;
            padding: 12px 22px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.1s;
            box-shadow: 0 3px 0 #b95f3a;
            width: auto;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .question-card {
            background: #fff4e8;
            border-radius: 35px;
            padding: 16px 20px;
            margin-bottom: 18px;
            border: 1px solid #ffe1bf;
        }

        .question-text {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #2c4e62;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .option {
            background: white;
            border: 1px solid #ffcf9a;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .option.selected {
            background: #ffdbb5;
            border-color: #f3a683;
            font-weight: bold;
        }

        .timer-check {
            background: #e6f4f0;
            border-radius: 50px;
            padding: 15px;
            text-align: center;
            margin: 20px 0;
        }

        .timer-clock {
            font-size: 2.3rem;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 4px;
            color: #1e5a7a;
        }

        .result-box {
            background: #ffefdb;
            border-radius: 50px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .leaderboard {
            background: #fff1e4;
            border-radius: 40px;
            padding: 16px;
            margin-top: 25px;
        }

        .leaderboard h3 {
            color: #1e5a7a;
            font-size: 1.3rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .leaderboard ol {
            padding-left: 28px;
        }

        .leaderboard li {
            margin: 6px 0;
            border-bottom: 1px solid #ffd9b5;
            padding: 5px;
        }

        .error {
            color: #c95a3a;
            font-size: 0.8rem;
            margin-top: 6px;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #8baabc;
            margin-top: 20px;
        }

        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: default;
        }

        .flex-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    // ---------- ВОПРОСЫ (6 шт) ----------
    const QUESTIONS = [
        { text: "Какой звук издаёт тюлень?", options: ["🐱 Мяу", "🦭 Рык/хрюканье", "🐶 Гав", "🐮 Му"], correct: 1 },
        { text: "Что тюлени больше всего любят есть?", options: ["🐟 Рыбу", "🍎 Яблоки", "🍔 Бургеры", "🐧 Пингвинов"], correct: 0 },
        { text: "Как называются 'ножки' тюленя?", options: ["🐾 Лапы", "🦶 Ласты", "✋ Руки", "🦵 Ноги"], correct: 1 },
        { text: "Где тюлени любят отдыхать?", options: ["🌲 На дереве", "🏔️ В горах", "🏖️ На льду или пляже", "🛌 В кровати"], correct: 2 },
        { text: "Кто из этих животных — близкий родственник тюленя?", options: ["🐬 Дельфин", "🐻 Медведь", "🐧 Пингвин", "🦭 Морж"], correct: 3 },
        { text: "Почему тюленя называют 'тюлень' в сленге?", options: ["😴 Сонный и медленный", "🧠 Очень умный", "🐟 Любит рыбу", "📢 Громко орёт"], correct: 0 }
    ];

    // ----- Состояние -----
    let leaderboard = [];       // [{nickname, score}]
    let state = {
        user: null,             // { nickname }
        answers: new Array(QUESTIONS.length).fill(null),
        waitingResult: false,
        timerSeconds: 60,
        timerInterval: null,
        finalScore: null
    };

    // ----- РАБОТА С LOCALSTORAGE -----
    function loadLeaderboardFromStorage() {
        const saved = localStorage.getItem('seal_leaderboard_easy');
        if (saved) {
            leaderboard = JSON.parse(saved);
        } else {
            leaderboard = [];
        }
    }

    function saveLeaderboard() {
        localStorage.setItem('seal_leaderboard_easy', JSON.stringify(leaderboard));
    }

    function saveUserToStorage() {
        if (state.user) {
            localStorage.setItem('seal_current_user', state.user.nickname);
        } else {
            localStorage.removeItem('seal_current_user');
        }
    }

    function loadUserFromStorage() {
        const savedNick = localStorage.getItem('seal_current_user');
        if (savedNick) {
            state.user = { nickname: savedNick };
            // Если такой ник есть в лидерборде — ок, если нет — всё равно пусть проходит тест
            return true;
        }
        return false;
    }

    function updateLeaderboard(nickname, score) {
        const existing = leaderboard.find(entry => entry.nickname === nickname);
        if (existing) {
            if (score > existing.score) existing.score = score;
        } else {
            leaderboard.push({ nickname, score });
        }
        leaderboard.sort((a,b) => b.score - a.score);
        saveLeaderboard();
    }

    function renderLeaderboard(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        if (leaderboard.length === 0) {
            container.innerHTML = `<h3>🏆 ЛИДЕРБОРД 🏆</h3><p style="color:#8b9aa5;">Пока нет результатов</p>`;
            return;
        }
        let html = `<h3>🏆 ЛИДЕРБОРД (лучший счёт) 🏆</h3><ol>`;
        for (let i = 0; i < Math.min(leaderboard.length, 8); i++) {
            html += `<li><strong>${escapeHtml(leaderboard[i].nickname)}</strong> — ${leaderboard[i].score}/${QUESTIONS.length}</li>`;
        }
        html += `</ol>`;
        container.innerHTML = html;
    }

    function calculateScore() {
        let correct = 0;
        for (let i = 0; i < QUESTIONS.length; i++) {
            if (state.answers[i] === QUESTIONS[i].correct) correct++;
        }
        return correct;
    }

    function getVerdict(score) {
        if (score === QUESTIONS.length) return "🌟 СУПЕР-ТЮЛЕНЬ! Ты настоящий ластоногий знаток! 🌟";
        if (score >= 4) return "🐟 ХОРОШИЙ ТЮЛЕНЬ! Жира недостаточно, но ты на правильном пути.";
        if (score >= 2) return "🫧 МАЛЕНЬКИЙ ТЮЛЕНЁНОК — ещё учишься нырять, но милота есть.";
        return "🧸 ТЫ НЕ ТЮЛЕНЬ... Скорее всего, ты пингвин. Поплачь и попробуй ещё!";
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ----- ОТРИСОВКА -----
    function render() {
        const app = document.getElementById('app');

        // 1. Нет пользователя
        if (!state.user) {
            app.innerHTML = `
                <h1>🦭 ТЕСТ НА ТЮЛЕНЯ 🦭</h1>
                <div class="sub">лёгкий · 6 вопросов · 1 минута проверки</div>
                <div class="nick-area">
                    <input type="text" id="nickInput" placeholder="ТВОЙ УНИКАЛЬНЫЙ НИК" maxlength="18">
                    <div><button id="startNickBtn">🚀 ВОЙТИ / ЗАРЕГИСТРИРОВАТЬСЯ</button></div>
                    <div id="nickError" class="error"></div>
                </div>
                <div class="leaderboard" id="leaderboardMain"></div>
                <footer>Ник запоминается в браузере. При перезагрузке ты останешься в системе.</footer>
            `;
            renderLeaderboard('leaderboardMain');
            document.getElementById('startNickBtn').onclick = () => {
                const nick = document.getElementById('nickInput').value.trim();
                const errorDiv = document.getElementById('nickError');
                if (!nick) { errorDiv.innerText = '❌ Введи ник!'; return; }
                // Проверка на занятость ника — не блокируем, просто предупредим, что результат будет новым
                state.user = { nickname: nick };
                saveUserToStorage();
                state.answers = new Array(QUESTIONS.length).fill(null);
                state.waitingResult = false;
                state.finalScore = null;
                if (state.timerInterval) clearInterval(state.timerInterval);
                render();
            };
            document.getElementById('nickInput').onkeypress = (e) => {
                if (e.key === 'Enter') document.getElementById('startNickBtn').click();
            };
            return;
        }

        // 2. Ожидание проверки (минута)
        if (state.waitingResult) {
            const mins = Math.floor(state.timerSeconds / 60);
            const secs = state.timerSeconds % 60;
            const timeString = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            app.innerHTML = `
                <h1>🦭 ПРОВЕРКА ОТВЕТОВ 🦭</h1>
                <div class="timer-check">
                    <div style="font-size:1.2rem;">Система анализирует тюленьи знания...</div>
                    <div class="timer-clock">${timeString}</div>
                    <div>не закрывайте страницу</div>
                </div>
                <div class="leaderboard" id="leaderboardWait"></div>
                <footer>⏳ ровно минута — и узнаешь свой результат!</footer>
            `;
            renderLeaderboard('leaderboardWait');
            return;
        }

        // 3. Результат после проверки
        if (state.finalScore !== null) {
            const verdict = getVerdict(state.finalScore);
            app.innerHTML = `
                <h1>🦭 РЕЗУЛЬТАТ 🦭</h1>
                <div class="result-box">
                    ${state.finalScore} / ${QUESTIONS.length}<br>
                    <span style="font-size:1rem;">${verdict}</span>
                </div>
                <div class="flex-btns">
                    <button id="retryTestBtn">🔄 ПРОЙТИ ЗАНОВО</button>
                    <button id="logoutBtn">🔁 СМЕНИТЬ НИК</button>
                </div>
                <div class="leaderboard" id="leaderboardResult"></div>
                <footer>Лучший результат сохраняется в лидерборд</footer>
            `;
            renderLeaderboard('leaderboardResult');
            document.getElementById('retryTestBtn').onclick = () => {
                state.answers = new Array(QUESTIONS.length).fill(null);
                state.finalScore = null;
                state.waitingResult = false;
                if (state.timerInterval) clearInterval(state.timerInterval);
                render();
            };
            document.getElementById('logoutBtn').onclick = () => {
                state.user = null;
                saveUserToStorage();
                state.answers = new Array(QUESTIONS.length).fill(null);
                state.finalScore = null;
                state.waitingResult = false;
                if (state.timerInterval) clearInterval(state.timerInterval);
                render();
            };
            return;
        }

        // 4. Тест (выбор ответов)
        let html = `<h1>🦭 ЗДРАВСТВУЙ, ${escapeHtml(state.user.nickname)}!</h1>
                    <div class="sub">выбери ответы на 6 вопросов</div>`;
        QUESTIONS.forEach((q, idx) => {
            const selected = state.answers[idx] !== null ? state.answers[idx] : -1;
            html += `<div class="question-card" data-qidx="${idx}">
                        <div class="question-text"><span>❓</span> ${q.text}</div>
                        <div class="options">`;
            q.options.forEach((opt, optIdx) => {
                const selectedClass = (selected === optIdx) ? 'selected' : '';
                html += `<div class="option ${selectedClass}" data-optidx="${optIdx}">${opt}</div>`;
            });
            html += `</div></div>`;
        });
        html += `<div class="flex-btns">
                    <button id="submitAnswersBtn">✅ ЗАВЕРШИТЬ ТЕСТ И ПРОВЕРИТЬ (1 мин)</button>
                 </div>
                 <div id="testError" class="error"></div>
                 <div class="leaderboard" id="leaderboardTest"></div>
                 <footer>Меняй ответы до нажатия кнопки. После нажатия — 1 минута ожидания</footer>`;
        app.innerHTML = html;

        // Обработчики выбора ответов
        document.querySelectorAll('.question-card').forEach(card => {
            const qIdx = parseInt(card.dataset.qidx);
            card.querySelectorAll('.option').forEach(opt => {
                opt.onclick = () => {
                    if (state.waitingResult || state.finalScore !== null) return;
                    const optIdx = parseInt(opt.dataset.optidx);
                    state.answers[qIdx] = optIdx;
                    card.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                };
            });
        });

        document.getElementById('submitAnswersBtn').onclick = () => {
            if (state.answers.some(a => a === null)) {
                document.getElementById('testError').innerText = '❌ Ответь на все 6 вопросов!';
                return;
            }
            state.waitingResult = true;
            state.timerSeconds = 60;
            if (state.timerInterval) clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                if (state.timerSeconds <= 1) {
                    clearInterval(state.timerInterval);
                    state.timerInterval = null;
                    state.waitingResult = false;
                    const finalScore = calculateScore();
                    state.finalScore = finalScore;
                    updateLeaderboard(state.user.nickname, finalScore);
                    render();
                } else {
                    state.timerSeconds--;
                    const clockSpan = document.querySelector('.timer-clock');
                    if (clockSpan && state.waitingResult) {
                        const mins = Math.floor(state.timerSeconds / 60);
                        const secs = state.timerSeconds % 60;
                        clockSpan.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                    }
                }
            }, 1000);
            render();
        };
        renderLeaderboard('leaderboardTest');
    }

    // ----- СТАРТ -----
    loadLeaderboardFromStorage();
    const hasUser = loadUserFromStorage();
    // Если пользователь загружен, надо проверить, не осталось ли у него незавершённого теста? По умолчанию начинаем заново.
    if (hasUser) {
        // Если был пользователь, но вдруг остались старые данные answers — сбросим их, чтобы всегда начинать чистый тест.
        state.answers = new Array(QUESTIONS.length).fill(null);
        state.waitingResult = false;
        state.finalScore = null;
        if (state.timerInterval) clearInterval(state.timerInterval);
    }
    render();
</script>
</body>
</html>
