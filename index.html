<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Seal Clicker | Supabase версия</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #1e6b3e; font-family: 'Segoe UI', system-ui; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .game-card { max-width: 1000px; width: 100%; background: #fffef5; border-radius: 60px; padding: 25px; box-shadow: 0 20px 30px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #1c6948; margin-bottom: 20px; }
        .auth-panel { background: #e9f3ed; border-radius: 60px; padding: 15px; display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nick-input, .pass-input { flex: 2; padding: 10px; border-radius: 50px; border: 1px solid #ffc896; text-align: center; font-weight: bold; background: #fffcf5; }
        button { background: #ffb347; border: none; padding: 8px 18px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.05s linear; color: white; }
        button:active { transform: scale(0.97); }
        .seal-area { text-align: center; cursor: pointer; margin: 15px 0; }
        .seal-emoji { font-size: 6rem; display: inline-block; transition: 0.07s; }
        .click-effect { transform: scale(0.9); }
        .resource { background: #2a5c48; color: #FFE5B4; font-size: 1.8rem; font-weight: bold; text-align: center; padding: 10px; border-radius: 60px; margin: 15px 0; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
        .stat-card { background: #e3f0ea; flex: 1; border-radius: 40px; padding: 8px; text-align: center; font-weight: bold; color: #1c6948; }
        .battle-panel { background: #f0ecdf; border-radius: 50px; padding: 20px; margin: 20px 0; text-align: center; }
        .hp-bar { background: #ccc; border-radius: 20px; height: 20px; overflow: hidden; margin: 10px 0; }
        .hp-fill { background: #ff6b6b; height: 100%; transition: width 0.2s; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2b241cee; color: #ffeaaf; padding: 8px 20px; border-radius: 60px; animation: fadeOut 2s forwards; z-index: 1001; }
        @keyframes fadeOut { 0% { opacity: 1; bottom: 0; } 80% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        footer { text-align: center; font-size: 0.7rem; margin-top: 20px; color: #7e9a7a; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fffef5; border-radius: 60px; padding: 25px; max-width: 400px; width: 90%; text-align: center; }
    </style>
</head>
<body>
<div class="game-card" id="app"></div>

<script>
(function() {
    // --- Supabase клиент (уникальное имя) ---
    const SUPABASE_URL = 'https://pmvbhhidcojkkpumsxxb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdmJoaGlkY29qa2twdW1zeHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzk3MjcsImV4cCI6MjA5Mjg1NTcyN30.1eKxcaqeClRdAVH8lVcOdYaV0o_PbRzjnM9vBUP15QQ';
    const sup = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let useEmoji = false;
    let syncInterval = null, passiveInterval = null;
    let anticheatBlockedUntil = 0, clickTimestamps = [];
    let boss = { hp: 200, max_hp: 200, attack: 15, defense: 8, level: 1 };
    let lastEffect = "";

    // --- Вспомогательные ---
    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    // --- Сохранение/загрузка ---
    async function saveUser() {
        if (!currentUser) return;
        const data = {
            nickname: currentUser.nickname,
            password: currentUser.password,
            fish: currentUser.fish,
            total_fish: currentUser.total_fish,
            click_level: currentUser.click_level,
            auto_level: currentUser.auto_level,
            crit_level: currentUser.crit_level,
            health: currentUser.health,
            max_health: currentUser.max_health,
            attack: currentUser.attack,
            defense: currentUser.defense,
            prestige_bonus: currentUser.prestige_bonus,
            anticheat_disabled: currentUser.anticheat_disabled,
            role: currentUser.role,
            stats: currentUser.stats
        };
        const { error } = await sup.from('users').upsert(data, { onConflict: 'nickname' });
        if (error) console.error(error);
        await sup.from('leaderboard').upsert({ nickname: currentUser.nickname, wins: currentUser.stats.wins, total_fish: currentUser.total_fish });
    }

    async function loadUser(nick, pass) {
        const { data, error } = await sup.from('users').select('*').eq('nickname', nick).maybeSingle();
        if (error || !data || data.password !== pass) return null;
        return data;
    }

    async function registerUser(nick, pass) {
        const { data: existing, error: checkErr } = await sup.from('users').select('nickname').eq('nickname', nick);
        if (checkErr) { showToast("Ошибка проверки: " + checkErr.message); return false; }
        if (existing && existing.length) { showToast("Ник уже занят"); return false; }
        const newUser = {
            nickname: nick, password: pass,
            fish: 0, total_fish: 0,
            click_level: 0, auto_level: 0, crit_level: 0,
            health: 100, max_health: 100,
            attack: 10, defense: 5,
            prestige_bonus: 0, anticheat_disabled: false, role: 'player',
            stats: { totalClicks: 0, wins: 0, losses: 0, prestigeCount: 0 }
        };
        const { error } = await sup.from('users').insert(newUser);
        if (error) { showToast("Ошибка регистрации: " + error.message); return false; }
        await sup.from('leaderboard').insert({ nickname: nick, wins: 0, total_fish: 0 });
        currentUser = newUser;
        currentUser.nickname = nick;
        currentUser.password = pass;
        return true;
    }

    async function loadBoss() {
        const { data, error } = await sup.from('boss').select('*').eq('id', 1).single();
        if (data) boss = { hp: data.hp, max_hp: data.max_hp, attack: data.attack, defense: data.defense, level: data.level };
        else console.error("Boss not found");
    }
    async function saveBoss() {
        await sup.from('boss').upsert({ id: 1, hp: boss.hp, max_hp: boss.max_hp, attack: boss.attack, defense: boss.defense, level: boss.level });
    }

    // --- Игровые механики ---
    function getClickPower() { return 1 + (currentUser.click_level || 0) * 2; }
    function getPassiveIncome() { return (currentUser.auto_level || 0) * 1; }
    function getCritChance() { return Math.min(70, (currentUser.crit_level || 0) * 5); }

    async function addFish(amount, fromClick = false) {
        if (!currentUser) return;
        currentUser.fish += amount;
        currentUser.total_fish += amount;
        if (fromClick) currentUser.stats.totalClicks++;
        await saveUser();
        renderUI();
    }

    // Античит
    function isBlocked() {
        if (currentUser?.anticheat_disabled) return false;
        if (Date.now() < anticheatBlockedUntil) return true;
        const now = Date.now();
        clickTimestamps.push(now);
        while (clickTimestamps.length && clickTimestamps[0] < now - 1000) clickTimestamps.shift();
        if (clickTimestamps.length > 18) {
            anticheatBlockedUntil = now + 8000;
            clickTimestamps = [];
            showToast("⚠️ Слишком быстро! Блокировка 8 сек");
            return true;
        }
        return false;
    }

    async function clickForFish() {
        if (!currentUser) return;
        if (isBlocked()) { showToast("Античит: клики заблокированы"); return; }
        let gain = getClickPower();
        if (Math.random() * 100 < getCritChance()) gain *= 2;
        await addFish(gain, true);
        const seal = document.getElementById('sealEmoji');
        if (seal) {
            seal.classList.add('click-effect');
            setTimeout(() => seal.classList.remove('click-effect'), 100);
        }
        renderUI();
    }

    async function attackBoss() {
        if (!currentUser) return;
        if (currentUser.health <= 0) { showToast("❌ Вы мертвы! Лечитесь."); return; }
        let playerDamage = Math.max(1, currentUser.attack - boss.defense + Math.floor(Math.random() * 5));
        let isCrit = Math.random() * 100 < getCritChance();
        if (isCrit) playerDamage = Math.floor(playerDamage * 1.5);
        boss.hp -= playerDamage;
        if (boss.hp <= 0) {
            let reward = 100 * boss.level;
            await addFish(reward, false);
            currentUser.stats.wins++;
            boss.level++;
            boss.max_hp = Math.floor(200 + boss.level * 30);
            boss.hp = boss.max_hp;
            boss.attack = 15 + boss.level * 2;
            boss.defense = 8 + Math.floor(boss.level / 2);
            await saveBoss();
            await saveUser();
            lastEffect = `ПОБЕДА! +${reward} рыб! Уровень ${boss.level}`;
            showToast(`🏆 Босс повержен! +${reward} рыб`);
        } else {
            let bossDamage = Math.max(1, boss.attack - currentUser.defense + Math.floor(Math.random() * 6));
            let isBlock = Math.random() * 100 < 15;
            if (isBlock) bossDamage = Math.floor(bossDamage / 2);
            currentUser.health -= bossDamage;
            if (currentUser.health < 0) currentUser.health = 0;
            if (currentUser.health <= 0) currentUser.stats.losses++;
            await saveUser();
            lastEffect = `Урон: ${playerDamage} | Босс нанёс ${bossDamage}`;
            showToast(`⚔️ ${lastEffect}`);
        }
        renderUI();
    }

    async function heal() {
        if (!currentUser) return;
        let price = 20 * (Math.floor((currentUser.max_health - currentUser.health) / 10) + 1);
        if (currentUser.fish < price) { showToast("❌ Не хватает рыбы"); return; }
        currentUser.fish -= price;
        currentUser.health = currentUser.max_health;
        await saveUser();
        showToast("❤️ Здоровье восстановлено!");
        renderUI();
    }

    async function buyUpgrade(upgradeId, basePrice, name, onBuy) {
        let level = currentUser[upgradeId] || 0;
        let price = basePrice * (level + 1);
        if (currentUser.fish < price) { showToast("❌ Не хватает рыбы"); return; }
        currentUser.fish -= price;
        currentUser[upgradeId] = level + 1;
        if (onBuy) onBuy(currentUser);
        await saveUser();
        showToast(`🎉 ${name} → уровень ${currentUser[upgradeId]}`);
        renderUI();
    }

    async function doPrestige() {
        if (currentUser.total_fish < 5000) { showToast("Нужно 5000 рыб"); return; }
        if (confirm("Престиж: сбросить рыбу и улучшения, получить +50% к силе клика и +5 ко всем характеристикам?")) {
            currentUser.prestige_bonus = (currentUser.prestige_bonus || 0) + 50;
            currentUser.fish = 0;
            currentUser.total_fish = 0;
            currentUser.click_level = 0;
            currentUser.auto_level = 0;
            currentUser.crit_level = 0;
            currentUser.attack = 10 + 5;
            currentUser.defense = 5 + 5;
            currentUser.health = 100;
            currentUser.max_health = 100;
            currentUser.stats.prestigeCount++;
            await saveUser();
            showToast("🌟 Престиж выполнен!");
            renderUI();
        }
    }

    // --- Админ-панель ---
    function showAdminModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>👑 Админ-панель</h3>
                <input type="password" id="adminPass" placeholder="Пароль" style="width:100%; padding:8px; margin:10px 0;">
                <button id="adminLoginBtn">Войти</button>
                <div id="adminControls" style="display:none; margin-top:15px;">
                    <input type="text" id="targetNick" placeholder="Ник игрока" style="width:100%; margin-bottom:8px;">
                    <input type="number" id="giveFish" placeholder="Рыба" style="width:100%; margin-bottom:8px;">
                    <button id="giveFishBtn">Выдать рыбу</button><br><br>
                    <button id="resetAnticheatBtn">Сбросить античит для всех</button>
                </div>
                <button style="margin-top:10px;" onclick="this.closest('.modal').remove()">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        const loginBtn = modal.querySelector('#adminLoginBtn');
        loginBtn.onclick = () => {
            const pass = modal.querySelector('#adminPass').value;
            if (pass === 'seal123') {
                modal.querySelector('#adminControls').style.display = 'block';
                loginBtn.disabled = true;
            } else showToast("Неверный пароль");
        };
        modal.querySelector('#giveFishBtn').onclick = async () => {
            const nick = modal.querySelector('#targetNick').value.trim();
            const amount = parseInt(modal.querySelector('#giveFish').value);
            if (!nick || isNaN(amount)) return;
            const { data: target } = await sup.from('users').select('*').eq('nickname', nick).single();
            if (target) {
                target.fish += amount;
                target.total_fish += amount;
                await sup.from('users').update({ fish: target.fish, total_fish: target.total_fish }).eq('nickname', nick);
                await sup.from('leaderboard').upsert({ nickname: nick, wins: target.stats.wins, total_fish: target.total_fish });
                showToast(`Выдано ${amount} рыбы игроку ${nick}`);
                if (currentUser && currentUser.nickname === nick) {
                    currentUser.fish = target.fish;
                    currentUser.total_fish = target.total_fish;
                    renderUI();
                }
            } else showToast("Игрок не найден");
        };
        modal.querySelector('#resetAnticheatBtn').onclick = async () => {
            await sup.from('users').update({ anticheat_disabled: false }).neq('nickname', '');
            if (currentUser) currentUser.anticheat_disabled = false;
            showToast("Античит сброшен для всех");
        };
    }

    async function showLeaderboard() {
        const { data } = await sup.from('leaderboard').select('nickname, wins, total_fish').order('wins', { ascending: false }).limit(20);
        let msg = "🏆 ТОП ПО ПОБЕДАМ 🏆\n";
        data.forEach((u,i) => msg += `${i+1}. ${u.nickname} — побед: ${u.wins}, рыбы: ${u.total_fish}\n`);
        alert(msg);
    }

    // --- Регистрация / логин ---
    async function handleRegister() {
        const nick = document.getElementById('regNick').value.trim();
        const pass = document.getElementById('regPass').value;
        if (!nick || !pass) { showToast("Введите ник и пароль"); return; }
        const ok = await registerUser(nick, pass);
        if (ok) {
            localStorage.setItem('seal_user', JSON.stringify({ nickname: nick, password: pass }));
            startSync();
            startPassive();
            renderUI();
        }
    }
    async function handleLogin() {
        const nick = document.getElementById('loginNick').value.trim();
        const pass = document.getElementById('loginPass').value;
        if (!nick || !pass) { showToast("Введите ник и пароль"); return; }
        const data = await loadUser(nick, pass);
        if (!data) { showToast("Неверный ник или пароль"); return; }
        currentUser = data;
        localStorage.setItem('seal_user', JSON.stringify({ nickname: nick, password: pass }));
        startSync();
        startPassive();
        renderUI();
    }
    function logout() {
        currentUser = null;
        if (syncInterval) clearInterval(syncInterval);
        if (passiveInterval) clearInterval(passiveInterval);
        localStorage.removeItem('seal_user');
        renderUI();
    }

    function toggleStyle() { useEmoji = !useEmoji; renderUI(); }

    function startSync() {
        if (syncInterval) clearInterval(syncInterval);
        syncInterval = setInterval(async () => {
            if (currentUser) {
                const { data } = await sup.from('users').select('*').eq('nickname', currentUser.nickname).single();
                if (data && (data.fish !== currentUser.fish || data.health !== currentUser.health)) {
                    currentUser = data;
                    renderUI();
                    showToast("🔄 Данные обновлены");
                }
                await loadBoss();
                renderUI();
            }
        }, 3000);
    }

    function startPassive() {
        if (passiveInterval) clearInterval(passiveInterval);
        passiveInterval = setInterval(async () => {
            if (currentUser) {
                let inc = getPassiveIncome();
                if (inc > 0) await addFish(inc, false);
            }
        }, 1000);
    }

    function renderUI() {
        const root = document.getElementById('app');
        if (!currentUser) {
            root.innerHTML = `
                <h1>🐟 Seal Clicker</h1>
                <div class="auth-panel">
                    <input id="regNick" class="nick-input" placeholder="Ник">
                    <input id="regPass" class="pass-input" type="password" placeholder="Пароль">
                    <button id="regBtn">Регистрация</button>
                </div>
                <div class="auth-panel">
                    <input id="loginNick" class="nick-input" placeholder="Ник">
                    <input id="loginPass" class="pass-input" type="password" placeholder="Пароль">
                    <button id="loginBtn">Вход</button>
                </div>
                <button id="leaderBtn" style="width:100%; margin-bottom:10px;">🏆 Топ</button>
                <button id="styleBtn" style="width:100%;">🎨 Стиль</button>
                <footer>Введите ник и пароль. Данные в облаке.</footer>
            `;
            document.getElementById('regBtn').onclick = handleRegister;
            document.getElementById('loginBtn').onclick = handleLogin;
            document.getElementById('leaderBtn').onclick = showLeaderboard;
            document.getElementById('styleBtn').onclick = toggleStyle;
            return;
        }

        const s = (e, t) => useEmoji ? e : t;
        const fish = Math.floor(currentUser.fish);
        const total = Math.floor(currentUser.total_fish);
        const clickPower = getClickPower();
        const passive = getPassiveIncome();
        const critChance = getCritChance();
        const prestigeBonus = currentUser.prestige_bonus || 0;
        const playerHpPercent = (currentUser.health / currentUser.max_health) * 100;
        const bossHpPercent = (boss.hp / boss.max_hp) * 100;

        root.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div>${s('🦭','[SEAL]')} ${currentUser.nickname} (${currentUser.role})</div>
                <div>⭐ +${prestigeBonus}%</div>
                <button id="logoutBtn">Выйти</button>
            </div>
            <div class="seal-area" id="clickZone">
                <div class="seal-emoji" id="sealEmoji">${s('🦭','[SEAL]')}</div>
                <div>${s('👆 клик', '[CLICK]')}</div>
            </div>
            <div class="resource">${s('🐟','[FISH]')} ${fish} | Всего: ${total}</div>
            <div class="flex">
                <div class="stat-card">❤️ HP: ${currentUser.health}/${currentUser.max_health}</div>
                <div class="stat-card">⚔️ Атака: ${currentUser.attack}</div>
                <div class="stat-card">🛡️ Защита: ${currentUser.defense}</div>
                <div class="stat-card">💥 Крит: ${critChance}%</div>
            </div>
            <div class="flex">
                <div class="stat-card">💪 Сила: +${clickPower}</div>
                <div class="stat-card">⏱ Пассив: +${passive}/сек</div>
            </div>
            <div class="battle-panel">
                <h3>${s('👾','[BOSS]')} Ур.${boss.level} (HP: ${boss.hp}/${boss.max_hp})</h3>
                <div class="hp-bar"><div class="hp-fill" style="width:${bossHpPercent}%"></div></div>
                <button id="attackBtn">⚔️ БОЙ</button>
                <div class="effect-text">${lastEffect}</div>
            </div>
            <div class="flex">
                <button id="healBtn">❤️ Лечиться</button>
                <button id="upgradeClickBtn">🐟 Сила клика (${20*(currentUser.click_level+1)})</button>
                <button id="upgradeAutoBtn">⏱ Автокликер (${25*(currentUser.auto_level+1)})</button>
                <button id="upgradeCritBtn">💥 Крит (${30*(currentUser.crit_level+1)})</button>
                <button id="upgradeAttackBtn">⚔️ Атака (${50*(currentUser.attack-9)})</button>
