<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тюленья битва | Смайлы/Текст</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #1e6b3e; font-family: 'Segoe UI', system-ui; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .game-card { max-width: 1200px; width: 100%; background: #fffef5; border-radius: 60px; padding: 25px; box-shadow: 0 20px 30px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #1c6948; margin-bottom: 20px; }
        .nick-panel { background: #e9f3ed; border-radius: 60px; padding: 15px; display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nick-input, .pass-input { flex: 2; padding: 10px; border-radius: 50px; border: 1px solid #ffc896; text-align: center; font-weight: bold; }
        button { background: #ffb347; border: none; padding: 8px 18px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.05s linear; }
        button:active { transform: scale(0.97); }
        .flex { display: flex; gap: 15px; flex-wrap: wrap; margin: 15px 0; }
        .panel { background: #f0ecdf; border-radius: 40px; padding: 15px; flex: 1; }
        .seal-area { text-align: center; cursor: pointer; margin: 20px 0; }
        .seal-emoji { font-size: 7rem; display: inline-block; transition: 0.07s; }
        .click-effect { transform: scale(0.9); }
        .fish-counter { background: #2a5c48; color: #FFE5B4; font-size: 2rem; font-weight: bold; text-align: center; padding: 12px; border-radius: 60px; margin: 15px 0; }
        .stat-grid { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
        .stat { background: #e3f0ea; flex: 1; border-radius: 40px; padding: 8px; text-align: center; font-weight: bold; }
        .upgrade { background: #faefe2; border-radius: 50px; padding: 10px 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .warning { background: #f9e6e6; color: #c7254e; border-radius: 40px; padding: 8px; text-align: center; font-size: 0.8rem; margin-top: 10px; }
        .boss-panel { background: #f0e5d8; border-radius: 50px; padding: 15px; margin-top: 15px; text-align: center; }
        .boss-health { height: 20px; background: #ccc; border-radius: 20px; overflow: hidden; margin: 10px 0; }
        .boss-fill { height: 100%; background: #ff6b6b; width: 100%; transition: width 0.2s; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2b241cee; color: #ffeaaf; padding: 8px 20px; border-radius: 60px; animation: fadeOut 2s forwards; z-index: 1001; }
        @keyframes fadeOut { 0% { opacity: 1; bottom: 0; } 80% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        footer { text-align: center; font-size: 0.7rem; margin-top: 20px; color: #6e8f7a; }
        .role-badge { padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .role-player { background: #a0c4ff; }
        .role-developer { background: #ffb347; color: white; }
        .role-seal { background: #6b8e23; color: white; }
    </style>
</head>
<body>
<div class="game-card" id="app"></div>

<script>
    // ==================== SUPABASE ====================
    const SUPABASE_URL = 'https://pmvbhhidcojkkpumsxxb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdmJoaGlkY29qa2twdW1zeHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzk3MjcsImV4cCI6MjA5Mjg1NTcyN30.1eKxcaqeClRdAVH8lVcOdYaV0o_PbRzjnM9vBUP15QQ';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // -------------------- Состояние --------------------
    let currentUser = null;
    let useEmoji = false;   // false = текст, true = смайлы
    let syncInterval = null, passiveInterval = null;
    let bossData = { health: 1000, max_health: 1000, level: 1 };
    let anticheatBlockedUntil = 0, clickTimestamps = [];

    // -------------------- Вспомогательные функции --------------------
    async function saveUser() {
        if (!currentUser) return;
        const data = {
            nickname: currentUser.nickname,
            password: currentUser.password,
            fish: currentUser.fish,
            total_fish: currentUser.total_fish,
            click_power_level: currentUser.click_power_level,
            auto_level: currentUser.auto_level,
            crit_level: currentUser.crit_level,
            prestige_bonus: currentUser.prestige_bonus,
            anticheat_disabled: currentUser.anticheat_disabled,
            role: currentUser.role,
            stats: currentUser.stats,
            achievements: currentUser.achievements,
            avatar: currentUser.avatar,
        };
        await supabase.from('users').upsert(data, { onConflict: 'nickname' });
        await supabase.from('leaderboard').upsert({ nickname: currentUser.nickname, total_fish: currentUser.total_fish });
    }

    async function loadUser(nick, pass) {
        const { data } = await supabase.from('users').select('*').eq('nickname', nick).maybeSingle();
        if (!data || data.password !== pass) return null;
        return data;
    }

    async function registerUser(nick, pass) {
        const { data: existing } = await supabase.from('users').select('nickname').eq('nickname', nick);
        if (existing && existing.length) { showToast("Ник уже занят"); return false; }
        const newUser = {
            nickname: nick, password: pass,
            fish: 0, total_fish: 0,
            click_power_level: 0, auto_level: 0, crit_level: 0,
            prestige_bonus: 0, anticheat_disabled: false, role: 'player',
            stats: { totalClicks: 0, prestigeCount: 0, wins: 0, losses: 0 },
            achievements: {}, avatar: null,
        };
        const { error } = await supabase.from('users').insert(newUser);
        if (error) { showToast("Ошибка: " + error.message); return false; }
        await supabase.from('leaderboard').insert({ nickname: nick, total_fish: 0 });
        currentUser = newUser;
        currentUser.nickname = nick;
        currentUser.password = pass;
        return true;
    }

    // -------------------- Игровые расчёты --------------------
    function getClickPower() { return 1 + (currentUser.click_power_level || 0) * 2; }
    function getPassiveIncome() { return (currentUser.auto_level || 0) * 1; }
    function getCritChance() { return Math.min(70, (currentUser.crit_level || 0) * 5); }
    function getAttack() { return 5 + (currentUser.click_power_level || 0); }

    async function addFish(amount, fromClick = false) {
        if (!currentUser) return;
        currentUser.fish += amount;
        currentUser.total_fish += amount;
        if (fromClick) currentUser.stats.totalClicks = (currentUser.stats.totalClicks || 0) + 1;
        await saveUser();
        checkAchievements();
        renderUI();
    }

    // -------------------- Античит --------------------
    function isBlocked() {
        if (currentUser?.anticheat_disabled) return false;
        if (Date.now() < anticheatBlockedUntil) return true;
        return false;
    }
    function registerClick() {
        if (!currentUser) return false;
        if (currentUser.anticheat_disabled) return true;
        if (isBlocked()) { showToast("⛔ Античит: блокировка 8 сек"); return false; }
        const now = Date.now();
        clickTimestamps.push(now);
        while (clickTimestamps.length && clickTimestamps[0] < now - 1000) clickTimestamps.shift();
        if (clickTimestamps.length > 18) {
            anticheatBlockedUntil = now + 8000;
            clickTimestamps = [];
            showToast("⚠️ Слишком быстро! Блокировка 8 сек.");
            renderUI();
            return false;
        }
        return true;
    }

    // -------------------- Достижения --------------------
    const achievementsList = (() => {
        const list = [];
        for (let i = 1; i <= 20; i++) {
            let target = 100 * Math.pow(1.6, i-1);
            list.push({ id: `total_${i}`, name: `${Math.floor(target).toLocaleString()} рыб`, cond: (d) => d.total_fish >= target, reward: Math.floor(target * 0.1) });
        }
        for (let i = 1; i <= 15; i++) {
            let clicks = 50 * Math.pow(2, i-1);
            list.push({ id: `clicks_${i}`, name: `${Math.floor(clicks).toLocaleString()} кликов`, cond: (d) => (d.stats?.totalClicks || 0) >= clicks, reward: Math.floor(clicks * 0.2) });
        }
        for (let i = 1; i <= 5; i++) {
            list.push({ id: `wins_${i}`, name: `${i*5} побед`, cond: (d) => (d.stats?.wins || 0) >= i*5, reward: 100 * i });
        }
        for (let i = 1; i <= 10; i++) {
            list.push({ id: `clickPower_${i}`, name: `Сила клика ${i}`, cond: (d) => (d.click_power_level || 0) >= i, reward: 50 * i });
            list.push({ id: `auto_${i}`, name: `Автокликер ${i}`, cond: (d) => (d.auto_level || 0) >= i, reward: 60 * i });
        }
        for (let i = 1; i <= 5; i++) {
            list.push({ id: `crit_${i}`, name: `Крит ${i}`, cond: (d) => (d.crit_level || 0) >= i, reward: 80 * i });
        }
        return list.slice(0, 70);
    })();

    function checkAchievements() {
        if (!currentUser.achievements) currentUser.achievements = {};
        let changed = false;
        for (let ach of achievementsList) {
            if (!currentUser.achievements[ach.id] && ach.cond(currentUser)) {
                currentUser.achievements[ach.id] = true;
                currentUser.fish += ach.reward;
                currentUser.total_fish += ach.reward;
                changed = true;
                showToast(`🏆 ${ach.name}! +${ach.reward} рыб`);
            }
        }
        if (changed) saveUser();
    }

    // -------------------- Босс --------------------
    async function loadBoss() {
        const { data } = await supabase.from('boss').select('*').eq('id', 1).single();
        if (data) bossData = { health: data.health, max_health: data.max_health, level: data.level };
    }
    async function attackBoss() {
        if (!currentUser) return;
        let damage = getAttack();
        let newHealth = bossData.health - damage;
        if (newHealth <= 0) {
            let reward = 500 * bossData.level;
            await addFish(reward, false);
            showToast(`Босс повержен! +${reward} рыб! Уровень босса повышен.`);
            newHealth = Math.floor(bossData.max_health * 1.2);
            await supabase.from('boss').update({ health: newHealth, max_health: newHealth, level: bossData.level + 1 }).eq('id', 1);
            await loadBoss();
        } else {
            await supabase.from('boss').update({ health: newHealth }).eq('id', 1);
            bossData.health = newHealth;
        }
        renderUI();
    }

    // -------------------- PvP --------------------
    async function pvpAttack(targetNick) {
        if (!currentUser) return;
        const { data: target } = await supabase.from('users').select('*').eq('nickname', targetNick).single();
        if (!target) { showToast("Игрок не найден"); return; }
        let myAttack = getAttack();
        let targetDefense = target.crit_level || 0;
        let damage = Math.max(1, myAttack - targetDefense);
        let targetHealth = target.health || 20;
        let newHealth = targetHealth - damage;
        if (newHealth <= 0) {
            await addFish(100 * (target.total_fish / 1000 || 1), false);
            currentUser.stats.wins = (currentUser.stats.wins || 0) + 1;
            await saveUser();
            showToast(`Вы победили ${targetNick}! +${Math.floor(100 * (target.total_fish / 1000 || 1))} рыб`);
            await supabase.from('users').update({ health: 20 + (target.auto_level || 0) * 2 }).eq('nickname', targetNick);
        } else {
            await supabase.from('users').update({ health: newHealth }).eq('nickname', targetNick);
            showToast(`Вы атаковали ${targetNick}, у него осталось ${newHealth} HP`);
        }
        renderUI();
    }

    // -------------------- Покупка улучшений --------------------
    async function buyUpgrade(upgradeId, basePrice, name) {
        let level = currentUser[upgradeId] || 0;
        let price = Math.floor(basePrice * (level + 1));
        if (currentUser.fish < price) { showToast(`❌ Нужно ${price} рыб`); return; }
        currentUser.fish -= price;
        currentUser[upgradeId] = level + 1;
        await saveUser();
        checkAchievements();
        renderUI();
        showToast(`🎉 ${name} → ур.${currentUser[upgradeId]}`);
    }

    // -------------------- Престиж --------------------
    async function doPrestige() {
        if (currentUser.total_fish < 5000) { showToast("Нужно 5000 рыб"); return; }
        if (confirm("Престиж: сбросить рыбу и улучшения, получить +50% к силе клика?")) {
            currentUser.prestige_bonus = (currentUser.prestige_bonus || 0) + 50;
            currentUser.fish = 0;
            currentUser.total_fish = 0;
            currentUser.click_power_level = 0;
            currentUser.auto_level = 0;
            currentUser.crit_level = 0;
            currentUser.stats.prestigeCount = (currentUser.stats.prestigeCount || 0) + 1;
            await saveUser();
            checkAchievements();
            renderUI();
            showToast("🌟 Престиж! +50% к силе клика");
        }
    }

    // -------------------- Админ-панель --------------------
    async function showAdminModal() {
        const pass = prompt("Введите пароль администратора:");
        if (pass !== 'seal123') { showToast("Неверный пароль"); return; }
        const targetNick = prompt("Ник игрока для выдачи рыбы:");
        if (!targetNick) return;
        const amount = parseInt(prompt("Количество рыбы:"));
        if (isNaN(amount)) return;
        const { data: target } = await supabase.from('users').select('*').eq('nickname', targetNick).single();
        if (!target) { showToast("Игрок не найден"); return; }
        target.fish += amount;
        target.total_fish += amount;
        await supabase.from('users').update({ fish: target.fish, total_fish: target.total_fish }).eq('nickname', targetNick);
        await supabase.from('leaderboard').upsert({ nickname: targetNick, total_fish: target.total_fish });
        showToast(`Выдано ${amount} рыбы игроку ${targetNick}`);
        if (currentUser && currentUser.nickname === targetNick) {
            currentUser.fish = target.fish;
            currentUser.total_fish = target.total_fish;
            renderUI();
        }
    }

    // -------------------- Лидерборд и список игроков --------------------
    async function showLeaderboard() {
        const { data } = await supabase.from('leaderboard').select('nickname, total_fish').order('total_fish', { ascending: false }).limit(20);
        let msg = "🏆 ГЛОБАЛЬНЫЙ ТОП 🏆\n";
        data.forEach((u,i) => msg += `${i+1}. ${u.nickname} — ${u.total_fish} 🐟\n`);
        alert(msg);
    }
    async function showPlayers() {
        const { data } = await supabase.from('users').select('nickname, total_fish, role');
        let msg = "👥 ВСЕ ИГРОКИ 👥\n";
        data.forEach(p => msg += `${p.nickname} [${p.role}] — ${p.total_fish} 🐟\n`);
        alert(msg);
    }

    // -------------------- Регистрация / логин / выход --------------------
    async function handleRegister() {
        const nick = document.getElementById('regNick').value.trim();
        const pass = document.getElementById('regPass').value;
        if (!nick || !pass) { showToast("Введите ник и пароль"); return; }
        const ok = await registerUser(nick, pass);
        if (ok) {
            localStorage.setItem('seal_user', JSON.stringify({ nickname: nick, password: pass }));
            startGameLoops();
            renderUI();
        }
    }
    async function handleLogin() {
        const nick = document.getElementById('loginNick').value.trim();
        const pass = document.getElementById('loginPass').value;
        if (!nick || !pass) { showToast("Введите ник и пароль"); return; }
        const data = await loadUser(nick, pass);
        if (!data) { showToast("Неверный ник или пароль"); return; }
        currentUser = data;
        localStorage.setItem('seal_user', JSON.stringify({ nickname: nick, password: pass }));
        startGameLoops();
        renderUI();
    }
    function logout() {
        currentUser = null;
        localStorage.removeItem('seal_user');
        if (syncInterval) clearInterval(syncInterval);
        if (passiveInterval) clearInterval(passiveInterval);
        renderUI();
    }

    // -------------------- Стиль (смайлы / текст) --------------------
    function toggleStyle() {
        useEmoji = !useEmoji;
        renderUI();
    }

    // -------------------- UI рендеринг --------------------
    function renderUI() {
        const root = document.getElementById('app');
        if (!currentUser) {
            root.innerHTML = `
                <h1>Тюленья битва</h1>
                <div class="nick-panel">
                    <input type="text" id="regNick" class="nick-input" placeholder="Ник" maxlength="20">
                    <input type="password" id="regPass" class="pass-input" placeholder="Пароль">
                    <button id="registerBtn">ЗАРЕГИСТРИРОВАТЬСЯ</button>
                </div>
                <div class="nick-panel">
                    <input type="text" id="loginNick" class="nick-input" placeholder="Ник">
                    <input type="password" id="loginPass" class="pass-input" placeholder="Пароль">
                    <button id="loginBtn">ВОЙТИ</button>
                </div>
                <div class="flex">
                    <button onclick="showLeaderboard()">🏆 Топ</button>
                    <button onclick="showPlayers()">👥 Игроки</button>
                </div>
                <footer>Создайте аккаунт или войдите</footer>
            `;
            document.getElementById('registerBtn').onclick = handleRegister;
            document.getElementById('loginBtn').onclick = handleLogin;
            return;
        }

        const s = (emoji, text) => useEmoji ? emoji : text;
        const fish = Math.floor(currentUser.fish);
        const total = Math.floor(currentUser.total_fish);
        const clickPower = getClickPower();
        const passive = getPassiveIncome();
        const critChance = getCritChance();
        const prestigeBonus = currentUser.prestige_bonus || 0;
        const role = currentUser.role || 'player';

        root.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div>${s('🦭','[SEAL]')} ${currentUser.nickname} <span class="role-badge role-${role}">${role}</span></div>
                <div>⭐ Престиж +${prestigeBonus}%</div>
                <button onclick="logout()">Выйти</button>
            </div>
            <div class="seal-area" id="clickZone">
                <div class="seal-emoji" id="sealEmoji">${s('🦭','[ТЮЛЕНЬ]')}</div>
                <div>${s('👆 нажми на тюленя','[КЛИК]')}</div>
            </div>
            <div class="fish-counter">${s('🐟','[РЫБА]')} ${fish.toLocaleString()}</div>
            <div class="flex">
                <div class="panel">
                    💪 Сила: +${clickPower}<br>
                    ⏱ Пассив: +${passive}/сек<br>
                    💥 Крит: ${critChance}%
                </div>
                <div class="panel">
                    🏆 Всего: ${total.toLocaleString()}<br>
                    🖱 Кликов: ${currentUser.stats?.totalClicks || 0}<br>
                    🏅 Побед: ${currentUser.stats?.wins || 0}
                </div>
            </div>
            <div class="boss-panel">
                <h3>${s('👾','БОСС')} Ур.${bossData.level}</h3>
                <div class="boss-health"><div class="boss-fill" style="width:${(bossData.health / bossData.max_health) * 100}%"></div></div>
                <button onclick="attackBoss()">Атаковать босса</button>
            </div>
            <div class="flex">
                <div class="panel">
                    <button onclick="buyUpgrade('click_power_level',20,'Сила клика')">${s('🐟','[ОСТРЫЙ ЗУБ]')} (${20*(currentUser.click_power_level+1)})</button><br>
                    <button onclick="buyUpgrade('auto_level',25,'Автокликер')">${s('⏱','[АВТОКОРМУШКА]')} (${25*(currentUser.auto_level+1)})</button><br>
                    <button onclick="buyUpgrade('crit_level',80,'Крит')">${s('⚡','[КРИТ]')} (${80*(currentUser.crit_level+1)})</button><br>
                    <button onclick="doPrestige()">${s('🏅','[ПРЕСТИЖ]')}</button>
                </div>
                <div class="panel">
                    <button onclick="showPlayers()">👥 Игроки</button>
                    <button onclick="showLeaderboard()">🏆 Топ</button>
                    <button onclick="showAdminModal()">👑 Админ</button>
                    <button onclick="toggleStyle()">${useEmoji ? '📄 Текст' : '😀 Смайлы'}</button>
                </div>
            </div>
            <footer>Автосохранение. Админ-пароль: seal123</footer>
        `;
        document.getElementById('clickZone').onclick = async () => {
            if (!registerClick()) return;
            let gain = getClickPower();
            if (Math.random() * 100 < getCritChance()) gain *= 2;
            await addFish(gain, true);
            const seal = document.getElementById('sealEmoji');
            if (seal) {
                seal.classList.add('click-effect');
                setTimeout(() => seal.classList.remove('click-effect'), 100);
                try { new AudioContext().then(ctx => { /* звук */ }) } catch(e) {}
            }
        };
    }

    // -------------------- Фоновые циклы --------------------
    async function startGameLoops() {
        if (passiveInterval) clearInterval(passiveInterval);
        if (syncInterval) clearInterval(syncInterval);
        passiveInterval = setInterval(async () => {
            if (currentUser) {
                let inc = getPassiveIncome();
                if (inc > 0) await addFish(inc, false);
            }
        }, 1000);
        syncInterval = setInterval(async () => {
            if (currentUser) {
                const { data } = await supabase.from('users').select('*').eq('nickname', currentUser.nickname).single();
                if (data && (data.fish !== currentUser.fish || data.total_fish !== currentUser.total_fish)) {
                    currentUser = data;
                    renderUI();
                    showToast("🔄 Данные обновлены");
                }
                await loadBoss();
                renderUI();
            }
        }, 3000);
        await loadBoss();
        renderUI();
    }

    // -------------------- Инициализация --------------------
    (async () => {
        const saved = localStorage.getItem('seal_user');
        if (saved) {
            const { nickname, password } = JSON.parse(saved);
            const data = await loadUser(nickname, password);
            if (data) {
                currentUser = data;
                startGameLoops();
            }
        }
        renderUI();
    })();
</script>
</body>
</html>
